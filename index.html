let playerXP    = 0;   // current XP this run

function xpForNextLevel(){ return playerLevel * 150; }

function grantPlayerXP(amount){
    playerXP += amount;
    while(playerXP >= xpForNextLevel()) triggerLevelUp();
}

function triggerLevelUp(){
    playerXP -= xpForNextLevel();   // carry over excess
    playerLevel++;

    // Hard Times Make Hard Bots: +10 maxHP per stack on level up
    let hpGain = 0;
    if(hasMeta('hard_times_hard_bots'))   hpGain += 10;
    if(hasMeta('hard_times_hard_bots_2')) hpGain += 10;
    if(hpGain > 0){
        player.maxHealth += hpGain;
        player.health    += hpGain;
    }

    // Visual feedback
    spawnDamageText(player.x, player.y - 60, '\u2B06 LEVEL UP! ' + playerLevel, '#ffdd00');
    for(let i = 0; i < 24; i++){
        const a = Math.random()*Math.PI*2, sp = 2.5+Math.random()*5;
        particles.push(new Particle(player.x,player.y,Math.cos(a)*sp,Math.sin(a)*sp,30+Math.random()*14,4+Math.random()*3,'surge'));
    }
    if(hpGain > 0){
        spawnDamageText(player.x, player.y - 82, '+'+hpGain+' MAX HP', '#ff4466');
    }
}

const SAVE_KEY = 'alldule_save_v1';

function saveGame(){
    try {
        const data = {
            playerBlueprints,
            metaUpgrades:    [...metaUpgrades],
            seenEnemyTypes:  [...seenEnemyTypes],
            visitedSectorIds:[...visitedSectorIds],
            seenWeaponIds:   [...seenWeaponIds],
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    } catch(e){ console.warn('[ALLDULE] Save failed:', e); }
}

function loadGame(){
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        if(!raw) return;
        const data = JSON.parse(raw);
        if(typeof data.playerBlueprints === 'number') playerBlueprints = data.playerBlueprints;
        if(Array.isArray(data.metaUpgrades))     metaUpgrades     = new Set(data.metaUpgrades);
        if(Array.isArray(data.seenEnemyTypes))   seenEnemyTypes   = new Set(data.seenEnemyTypes);
        if(Array.isArray(data.visitedSectorIds)) visitedSectorIds = new Set(data.visitedSectorIds);
        if(Array.isArray(data.seenWeaponIds))    seenWeaponIds    = new Set(data.seenWeaponIds);
    } catch(e){ console.warn('[ALLDULE] Load failed:', e); }
}

function hasMeta(id){ return metaUpgrades.has(id); }

function prereqsMet(id){
    const def = META_UPGRADE_DEFS.find(d=>d.id===id);
    if(!def) return false;
    return def.prereqs.every(p=>hasMeta(p));
}

function canBuyMeta(id){
    if(hasMeta(id)) return false;
    const def = META_UPGRADE_DEFS.find(d=>d.id===id);
    if(!def) return false;
    if(playerBlueprints < def.cost) return false;
    return prereqsMet(id);
}

function buyMeta(id){
    if(!canBuyMeta(id)) return false;
    const def = META_UPGRADE_DEFS.find(d=>d.id===id);
    playerBlueprints -= def.cost;
    metaUpgrades.add(id);
    return true;
}

    dragging:false, dragSX:0, dragSY:0, dragPX:0, dragPY:0,
    hoveredId:null, selectedId:null
};

const TREE_BRANCH_SPACING = 290;
const TREE_NODE_W = 148, TREE_NODE_H = 58, TREE_ROW_H = 86;

function treeNodePos(node, branchIdx){
    const bCx = (branchIdx - 1.5) * TREE_BRANCH_SPACING;
    return { x: bCx + (node.col === 0 ? -75 : 75), y: node.row * TREE_ROW_H };
}

function screenToTree(sx, sy){
    const W=canvas.width, H=canvas.height;
    return {
        x: (sx - W/2 - treeView.panX) / treeView.zoom,
        y: (sy - H/2 - treeView.panY) / treeView.zoom
    };
}

function getNodeAtScreen(sx, sy){
    const tp = screenToTree(sx, sy);
    for(let bi=0; bi<UPGRADE_BRANCHES.length; bi++){
        const nodes = getNodesForBranch(UPGRADE_BRANCHES[bi]);
        for(const node of nodes){
            const p = treeNodePos(node, bi);
            if(tp.x >= p.x - TREE_NODE_W/2 && tp.x <= p.x + TREE_NODE_W/2 &&
               tp.y >= p.y - TREE_NODE_H/2 && tp.y <= p.y + TREE_NODE_H/2) return node;
        }
    }
    return null;
}

// Scrap drop formula: base × enemy HP factor × depth multiplier
function calcScrapDrop(enemyType){
    const def = ENEMY_DEFS[enemyType];
    if(!def) return 0;
    const hpFactor = Math.sqrt(def.hp / 40);
    const depthMult = 1 + currentDepth;
    const base = 2 + Math.floor(def.hp / 35);
    let metaScrapMult = 1;
    if(hasMeta('penny_pincher'))    metaScrapMult *= 1.5;
    if(hasMeta('nickel_stretcher')) metaScrapMult *= 1.5;
    return Math.max(1, Math.round(base * hpFactor * depthMult * (0.75 + Math.random()*0.5) * diffMults.scrapMult * metaScrapMult));
}

function spawnScrapDrop(x, y, amount){
    const angle = Math.random() * Math.PI * 2;
    const spd   = 1.5 + Math.random() * 3;
    scrapPickups.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd - 2,  
        amount,
        bounces: 0,
        settled: false,
        age: 0,
        life: 600 + Math.floor(Math.random()*200),
    });
}

function updateScrapPickups(){
    for(let i = scrapPickups.length-1; i >= 0; i--){
        const s = scrapPickups[i];
        s.age++;
        s.life--;
        if(s.life <= 0){ scrapPickups.splice(i,1); continue; }

        if(!s.settled){
            // Apply "gravity" - but in top-down, this should push toward nearest floor edge
            // For simplicity, use velocity damping toward resting state
            s.x += s.vx;
            s.y += s.vy;
            s.vx *= 0.92;
            s.vy *= 0.92;

            // Check collision with walls/void in all directions
            const checkRadius = 6;
            let hitWall = false;
            
            // Simple 8-point collision check
            const checks = [
                {dx: 1, dy: 0}, {dx: -1, dy: 0},
                {dx: 0, dy: 1}, {dx: 0, dy: -1},
                {dx: 1, dy: 1}, {dx: -1, dy: -1},
                {dx: 1, dy: -1}, {dx: -1, dy: 1}
            ];
            
            for(const chk of checks){
                const testTx = Math.floor((s.x + chk.dx * checkRadius) / TILE_SIZE);
                const testTy = Math.floor((s.y + chk.dy * checkRadius) / TILE_SIZE);
                const tileType = map[testTy]?.[testTx];
                
                if(tileType === T_WALL || tileType === T_VOID){
                    hitWall = true;
                    // Bounce back in opposite direction
                    s.vx -= chk.dx * 1.5;
                    s.vy -= chk.dy * 1.5;
                    break;
                }
            }

            if(hitWall){
                s.vx *= 0.7;
                s.vy *= 0.7;
                s.bounces++;
                
                // Settle after enough bounces or very low velocity
                if(s.bounces >= 2 || (Math.abs(s.vx) < 0.3 && Math.abs(s.vy) < 0.3)){
                    s.settled = true;
                    s.vx = 0;
                    s.vy = 0;
                }
            }
        }

        // Pickup on proximity
        const dist = Math.hypot(s.x - player.x, s.y - player.y);

        // Magnetic Booty: drift toward player when within 180px
        if(hasMeta('magnetic_booty') && s.age > 10 && dist < 180 && dist > 2){
            const pull = 0.18 + (1 - dist / 180) * 0.32;   // stronger as you get closer
            const mx = (player.x - s.x) / dist;
            const my = (player.y - s.y) / dist;
            s.vx += mx * pull;
            s.vy += my * pull;
            // Cap magnet velocity so it doesn't zip through walls
            const mv = Math.hypot(s.vx, s.vy);
            if(mv > 4){ s.vx = s.vx/mv*4; s.vy = s.vy/mv*4; }
            s.settled = false;
        }

        if(dist < TILE_SIZE * 0.85 && s.age > 10){
            // Boom Economy: 8% chance the scrap explodes
            if(hasMod2('boom_economy') && Math.random() < 0.08){
                const boom = Math.ceil(5 + s.amount * 0.3);
                hurtPlayer(boom);
                for(let bi=0;bi<14;bi++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*6;
                    particles.push(new Particle(s.x,s.y,Math.cos(a)*sp,Math.sin(a)*sp,18,4,'surge'));}
                camera.x+=(Math.random()-.5)*8; camera.y+=(Math.random()-.5)*8;
                spawnDamageText(s.x,s.y-18,'BOOM!','#ff6622');
                scrapPickups.splice(i,1); continue;
            }
            playerScrap += s.amount;
            spawnDamageText(s.x, s.y - 14, '+'+s.amount+' SCRAP', '#ffe566');
            scrapPickups.splice(i, 1);
        }
    }
}

function drawScrapPickups(){
    const now = Date.now();
    for(const s of scrapPickups){
        const lf = Math.min(s.life / 90, 1);
        const pulse = Math.sin(now/180 + s.x*0.04) * 0.4 + 0.6;
        const sz = 5 + pulse * 1.5;
        ctx.save();
        ctx.globalAlpha = lf * (0.7 + pulse * 0.3);
        // Glow
        ctx.shadowBlur = 10 + pulse * 6;
        ctx.shadowColor = '#ffe566';
        // Hexagonal scrap chip
        ctx.fillStyle = '#ffe566';
        ctx.strokeStyle = '#ffaa00';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for(let i=0;i<6;i++){
            const a = i/6*Math.PI*2 - Math.PI/6;
            const bx = s.x + Math.cos(a)*sz, by = s.y + Math.sin(a)*sz;
            i===0 ? ctx.moveTo(bx,by) : ctx.lineTo(bx,by);
        }
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = lf * (0.4 + pulse * 0.3);
        ctx.stroke();
        ctx.shadowBlur = 0;
        // Amount label for large drops
        if(s.amount >= 5){
            ctx.globalAlpha = lf * 0.9;
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 6px Orbitron';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(s.amount, s.x, s.y - sz - 4);
        }
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
        ctx.restore();
    }
}

// ── VENDOR SYSTEM ─────────────────────────────────────────────────────────────
const VENDOR_TYPES = ['CRATE_MASTER_ZOG','PATCH_O_MATIC','RISK_O_TRON','TIER_LORD_TITANIUM','CHAOS_CIRCUIT_CLANKER'];

// Scrap price tiers: cheap ~50, medium ~120, hefty ~250+
function vendorBasePrice(type, extraData){
    let base;
    if(type==='CRATE_MASTER_ZOG')       base = 60 + currentDepth*20;
    else if(type==='PATCH_O_MATIC')     base = 80 + currentDepth*15;
    else if(type==='RISK_O_TRON')       base = 100 + currentDepth*20;
    else if(type==='TIER_LORD_TITANIUM'){ const tier=extraData?.currentTier||1; base=160+tier*60+currentDepth*20; }
    else if(type==='CHAOS_CIRCUIT_CLANKER'){ const tier=extraData?.currentTier||1; base=70+tier*20+currentDepth*10; }
    else base=100;
    return diffShopPrice(base);
}

function spawnZogBonusModule(vx, vy){
    const validWeps = WEAPONS.map((w,idx)=>({w,idx})).filter(({w})=>w.class!=='BLANK');
    const pick = validWeps[Math.floor(Math.random()*validWeps.length)];
    const tierIdx = Math.max(0, bestTierForDepth(currentDepth)-1)
    const td = TIER_DATA[tierIdx];
    const wp = pick.w;
    const elig = MOD_POOL.filter(m=>m.eligible(wp));
    const pool = elig.length>0 ? elig : MOD_POOL;
    const mods = [];
    for(let k=0;k<td.modCount;k++) mods.push(pool[Math.floor(Math.random()*pool.length)].id);
    return { x: vx + (Math.random()-0.5)*30, y: vy - 40, weaponIdx: pick.idx, tierIdx, tierData: td, mods, picked: false, age: 0 };
}

function spawnShopVendors(room){
    if(room._vendorsSpawned) return;
    room._vendorsSpawned = true;

    // Only use vendors unlocked by meta upgrades; if none, leave shop empty
    const availableVendors = getUnlockedVendors();
    if(availableVendors.length === 0) return; // no vendor upgrades — empty shop room
    const shuffled = [...availableVendors].sort(()=>Math.random()-0.5);
    const picked   = shuffled.slice(0, Math.min(2, shuffled.length));

    const cx = room.cx * TILE_SIZE;
    const cy = room.cy * TILE_SIZE;
    const offsets = [{dx:-48,dy:0},{dx:48,dy:0}];

    for(let i=0;i<2;i++){
        const vType = picked[i];
        let stock = null;
        if(vType === 'CRATE_MASTER_ZOG'){
            // 4 high-end modules for this depth (upper portion of tier range)
            const highTierIdx = bestTierForDepth(currentDepth);
            const lowTierIdx  = Math.max(0, highTierIdx - 2);
            stock = [];
            const validWeps = WEAPONS.map((w,idx)=>({w,idx})).filter(({w})=>w.class!=='BLANK');
            const shuffledW = [...validWeps].sort(()=>Math.random()-0.5);
            for(let j=0;j<4;j++){
                const pick = shuffledW[j % shuffledW.length];
                const tierIdx = lowTierIdx + Math.floor(Math.random()*(highTierIdx-lowTierIdx+1));
                const td = TIER_DATA[tierIdx];
                const wp = pick.w;
                const eligible = MOD_POOL.filter(m=>m.eligible(wp));
                const pool = eligible.length>0 ? eligible : MOD_POOL;
                const mods = [];
                for(let k=0;k<td.modCount;k++) mods.push(pool[Math.floor(Math.random()*pool.length)].id);
                stock.push({ weaponIdx: pick.idx, tierIdx, tierData: td, mods, sold: false,
                    price: 80 + tierIdx*40 + currentDepth*20 });
            }
        } else if(vType === 'RISK_O_TRON'){
            // Reveal module ahead of time
            const highTierIdx = bestTierForDepth(currentDepth);
            const validWeps = WEAPONS.map((w,idx)=>({w,idx})).filter(({w})=>w.class!=='BLANK');
            const pick = validWeps[Math.floor(Math.random()*validWeps.length)];
            const td   = TIER_DATA[highTierIdx];
            const wp   = pick.w;
            const elig = MOD_POOL.filter(m=>m.eligible(wp));
            const pool = elig.length>0 ? elig : MOD_POOL;
            const mods = [];
            for(let k=0;k<td.modCount;k++) mods.push(pool[Math.floor(Math.random()*pool.length)].id);
            stock = [{ weaponIdx: pick.idx, tierIdx: highTierIdx, tierData: td, mods, sold: false,
                price: 130 + currentDepth*20 }];
        }
        shopVendors.push({
            x: cx + offsets[i].dx,
            y: cy + offsets[i].dy,
            type: vType,
            roomId: room.id,
            stock,
            interactPrompt: false,
            uiOpen: false,
            age: 0,
            winkTimer: 0,
            // Rare events: ~1-in-5 runs per applicable vendor
            rareModuleDrop:  (vType==='CRATE_MASTER_ZOG' && Math.random()<0.04) ? spawnZogBonusModule(cx+offsets[i].dx, cy+offsets[i].dy) : null,
            rareFreeHeal:    (vType==='PATCH_O_MATIC'    && Math.random()<0.04) ? true : false,
            rareFreeHealDone: false,
        });
    }
}

function attemptPurchase(vendor, itemIdx){
    const type = vendor.type;
    if(type === 'CRATE_MASTER_ZOG'){
        const item = vendor.stock[itemIdx];
        if(!item || item.sold) return;
        if(playerScrap < item.price){ spawnDamageText(player.x,player.y-44,'NOT ENOUGH SCRAP!','#ff4444'); return; }
        playerScrap -= item.price;
        item.sold = true;
        vendor.winkTimer = 120;
        onDiffPurchase();
        // Give module to player
        giveModuleToPlayer(item.weaponIdx, item.tierIdx, item.tierData, item.mods);
    } else if(type === 'PATCH_O_MATIC'){
        const price = vendorBasePrice(type);
        if(playerScrap < price){ spawnDamageText(player.x,player.y-44,'NOT ENOUGH SCRAP!','#ff4444'); return; }
        playerScrap -= price;
        const heal = Math.round(player.maxHealth * 0.5);
        player.health = Math.min(player.maxHealth, player.health + heal);
        onDiffPurchase();
        spawnDamageText(player.x, player.y-52, '+'+heal+' HP HEALED!', '#44ff88');
        for(let i=0;i<20;i++){
            const a=Math.random()*Math.PI*2, sp=2+Math.random()*5;
            particles.push(new Particle(player.x,player.y,Math.cos(a)*sp,Math.sin(a)*sp,28,4,'trail'));
        }
    } else if(type === 'RISK_O_TRON'){
        const item = vendor.stock[0];
        if(!item || item.sold) return;
        const hpCost = Math.round(player.health * 0.1);
        if(playerScrap < item.price){ spawnDamageText(player.x,player.y-44,'NOT ENOUGH SCRAP!','#ff4444'); return; }
        if(player.health <= hpCost+2){ spawnDamageText(player.x,player.y-44,'NOT ENOUGH HP!','#ff4444'); return; }
        playerScrap -= item.price;
        player.health -= hpCost;
        item.sold = true;
        onDiffPurchase();
        giveModuleToPlayer(item.weaponIdx, item.tierIdx, item.tierData, item.mods);
        spawnDamageText(player.x, player.y-52, '-'+hpCost+' HP (RISK TAKEN!)', '#ff8800');
    } else if(type === 'TIER_LORD_TITANIUM'){
        const slotD = moduleSlotData[activeModuleSlot];
        if(!slotD){ spawnDamageText(player.x,player.y-44,'NO MODULE EQUIPPED!','#ff4444'); return; }
        const currentTier = slotD.tierIdx;
        const price = vendorBasePrice(type, {currentTier});
        if(playerScrap < price){ spawnDamageText(player.x,player.y-44,'NOT ENOUGH SCRAP!','#ff4444'); return; }
        playerScrap -= price;
        // Upgrade tier
        const newTierIdx = currentTier + 1;
        const newTd = TIER_DATA[newTierIdx] || TIER_DATA[TIER_DATA.length-1];
        const wp = WEAPONS[moduleSlots[activeModuleSlot]];
        // Keep existing mods, add one more if tier unlocks more mods
        const mods = [...(slotD.mods||[])];
        while(mods.length < newTd.modCount){
            const elig = MOD_POOL.filter(m=>m.eligible(wp));
            const pool = elig.length>0 ? elig : MOD_POOL;
            mods.push(pool[Math.floor(Math.random()*pool.length)].id);
        }
        moduleSlotData[activeModuleSlot] = { tierIdx: newTierIdx, tierData: newTd, mods };
        // Also fill second slot if empty
        if(moduleSlots[1-activeModuleSlot] === -1 && moduleSlots[activeModuleSlot] !== -1){
            // give a free basic slot fill
        }
        spawnDamageText(player.x, player.y-52, 'TIER UP! '+newTd.label+' '+newTd.name+'!', newTd.color);
        camera.x+=(Math.random()-.5)*12; camera.y+=(Math.random()-.5)*12;
    } else if(type === 'CHAOS_CIRCUIT_CLANKER'){
        const slotD = moduleSlotData[activeModuleSlot];
        if(!slotD){ spawnDamageText(player.x,player.y-44,'NO MODULE EQUIPPED!','#ff4444'); return; }
        const currentTier = slotD.tierIdx;
        const price = vendorBasePrice(type, {currentTier});
        if(playerScrap < price){ spawnDamageText(player.x,player.y-44,'NOT ENOUGH SCRAP!','#ff4444'); return; }
        playerScrap -= price;
        const wp = WEAPONS[moduleSlots[activeModuleSlot]];
        const td = slotD.tierData;
        const elig = MOD_POOL.filter(m=>m.eligible(wp));
        const pool = elig.length>0 ? elig : MOD_POOL;
        const newMods = [];
        for(let i=0;i<td.modCount;i++) newMods.push(pool[Math.floor(Math.random()*pool.length)].id);
        moduleSlotData[activeModuleSlot] = { ...slotD, mods: newMods };
        spawnDamageText(player.x, player.y-52, 'MODIFIERS REROLLED!', '#cc44ff');
        for(let i=0;i<18;i++){
            const a=Math.random()*Math.PI*2, sp=2+Math.random()*6;
            particles.push(new Particle(player.x,player.y,Math.cos(a)*sp,Math.sin(a)*sp,30,5,'surge'));
        }
    }
}

function giveModuleToPlayer(weaponIdx, tierIdx, tierData, mods){
    seenWeaponIds.add(WEAPONS[weaponIdx].id);
    // Scaredy Cat / Head First: refuse forbidden weapon class
    if(!isModuleAllowedByDiff(weaponIdx)){
        const msg=hasMod2('scaredy_cat')?'RANGED ONLY — MODULE REJECTED!':'MELEE ONLY — MODULE REJECTED!';
        spawnDamageText(player.x,player.y-52,msg,'#ff8844'); return;
    }
    const slot2Locked = hasMod2('full_hands');
    if(moduleSlots[0]===-1){
        moduleSlots[0]=weaponIdx;
        moduleSlotData[0]={tierIdx,tierData,mods};
        if(activeModuleSlot===0) switchWeapon(moduleSlots[0]);
        spawnDamageText(player.x,player.y-44,'MODULE SLOT 1!',tierData.color);
    } else if(moduleSlots[1]===-1 && !slot2Locked){
        moduleSlots[1]=weaponIdx;
        moduleSlotData[1]={tierIdx,tierData,mods};
        spawnDamageText(player.x,player.y-44,'MODULE SLOT 2!',tierData.color);
    } else {
        // Drop current active module, equip new one
        const oldIdx=moduleSlots[activeModuleSlot];
        const oldD=moduleSlotData[activeModuleSlot];
        if(oldD) droppedModules.push({x:player.x+(Math.random()-.5)*30,y:player.y+(Math.random()-.5)*30,
            weaponIdx:oldIdx,life:4800,pickupPrompt:false,tierIdx:oldD.tierIdx,tierData:oldD.tierData,mods:oldD.mods});
        moduleSlots[activeModuleSlot]=weaponIdx;
        moduleSlotData[activeModuleSlot]={tierIdx,tierData,mods};
        switchWeapon(weaponIdx);
        spawnDamageText(player.x,player.y-44,'MODULE SWAPPED!',tierData.color);
    }
}

function updateShopVendors(){
    const room = roomGraph[currentRoomIdx];
    if(room && room.type === ROOM_TYPE.SHOP && !room._vendorsSpawned){
        spawnShopVendors(room);
    }
    for(const v of shopVendors){
        v.age++;
        const dist = Math.hypot(v.x - player.x, v.y - player.y);
        v.interactPrompt = dist < TILE_SIZE * 1.8;
        if(!v.interactPrompt && shopUI.open && shopUI.vendorIdx === shopVendors.indexOf(v)){
            closeShopUI();
        }
        // Patch rare free heal: float toward player and grant +8% HP
        if(v.type==='PATCH_O_MATIC' && v.rareFreeHeal && !v.rareFreeHealDone){
            if(!v._healOrb) v._healOrb = {x:v.x, y:v.y-20, age:0};
            const orb = v._healOrb;
            orb.age++;
            const dx=player.x-orb.x, dy=player.y-orb.y;
            const d=Math.hypot(dx,dy)||1;
            orb.x += dx/d*2.5;
            orb.y += dy/d*2.5;
            if(d < 18 && orb.age>20){
                const bonus = Math.round(player.maxHealth*0.08);
                player.health = Math.min(player.maxHealth, player.health+bonus);
                spawnDamageText(player.x, player.y-44, '+'+bonus+' FREE BONUS HP! (PATCH GIFT!)', '#44ff88');
                for(let i=0;i<18;i++){
                    const a=Math.random()*Math.PI*2, sp=2+Math.random()*5;
                    particles.push(new Particle(player.x,player.y,Math.cos(a)*sp,Math.sin(a)*sp,25,4,'trail'));
                }
                v.rareFreeHealDone = true;
            }
        }
    }
}

function updateEnemyHealOrbs(){
    for(let i = enemyHealOrbs.length - 1; i >= 0; i--){
        const orb = enemyHealOrbs[i];
        orb.age++;
        const dx = player.x - orb.x, dy = player.y - orb.y;
        const d = Math.hypot(dx, dy) || 1;
        orb.x += dx / d * 2.5;
        orb.y += dy / d * 2.5;
        if(d < 14 && orb.age > 10){
            const heal = Math.ceil(player.maxHealth * 0.05);
            player.health = Math.min(player.maxHealth, player.health + heal);
            spawnDamageText(player.x, player.y - 44, '+' + heal + ' HP', '#44ff88');
            for(let p = 0; p < 10; p++){

            enemyHealOrbs.splice(i, 1);
        }
    }
}

function drawEnemyHealOrbs(){
    const pulse = Math.sin(Date.now() / 150) * 0.4 + 0.6;

        const alpha = Math.min(orb.age / 15, 1);
        ctx.save();
        ctx.translate(orb.x, orb.y);
        ctx.globalAlpha = alpha;
        // Smaller than Patch-O-Matic's 8+pulse*3 — using 4+pulse*1.5
        const r = 4 + pulse * 1.5;
        ctx.shadowBlur = 10 + pulse * 6; ctx.shadowColor = '#44ff88';
        ctx.fillStyle = `rgba(68,255,136,${0.22 + pulse * 0.25})`;

        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();

}

    ctx.beginPath(); ctx.arc(4,-42,2,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();
}

function drawShopUI(){
    if(!shopUI.open || shopUI.vendorIdx < 0) return;
    const vendor = shopVendors[shopUI.vendorIdx];
    if(!vendor) return;

    const W = canvas.width, H = canvas.height;

    ctx.save();
    ctx.fillStyle = 'rgba(0,4,14,0.90)';

    const flavorBank = {
        CRATE_MASTER_ZOG:[
            '"AH, A DISCERNING CUSTOMER! ONLY THE FINEST MODULES — HAND-PICKED FROM MY CRATES!"',
            '"YOU THERE! YES, YOU! THESE ARE NOT ORDINARY MODULES. THESE ARE ZOG-CERTIFIED EXCELLENCE!"',
            '"STEP RIGHT UP! I HAVE MODULES SO POWERFUL, I HAD TO BUILD BIGGER CRATES TO HOLD THEM!"',
            '"BUY TWO AND I MIGHT WINK AT YOU. BUY ALL FOUR AND I’LL NAME A CRATE AFTER YOU!"',
        ],
        PATCH_O_MATIC:[
            '"HELLO FRIEND! YOU LOOK DREADFUL. LET ME FIX THAT RIGHT UP! GUARANTEED PAINLESS. MOSTLY."',
            '"OH DEAR, OH DEAR — YOUR VITALS ARE ABSOLUTELY TRAGIC. GOOD THING I’M HERE, ISN’T IT?"',
            '"HEALTH IS WEALTH! AND WEALTH IS SCRAP! GIVE ME YOUR SCRAP AND I’LL GIVE YOU YOUR HEALTH BACK!"',
            '"PATCH-O-MATIC 5000: BECAUSE DYING IS BAD FOR BUSINESS. MINE AND YOURS."',

        RISK_O_TRON:[
            '"PSST. HEY. OVER HERE. I’VE GOT SOMETHING SPECIAL. DON’T THINK ABOUT IT TOO HARD."',
            '"LOOK AT THIS BEAUTY. IS IT WORTH A LITTLE BLOOD? ONLY ONE WAY TO FIND OUT, FRIEND."',
            '"HIGH TIER. LOW QUESTIONS ASKED. YOUR HP IS JUST A NUMBER. NUMBERS CAN CHANGE."',
            '"I’M NOT SAYING IT’S A GUARANTEED WIN. I’M SAYING THE ODDS ARE... INTERESTING."',
        ],
        TIER_LORD_TITANIUM:[
            '"YOUR MODULE IS WEAK. I CAN FEEL IT FROM HERE. LET ME FIX THAT. WITH FIRE AND PRESSURE."',
            '"TIER AFTER TIER AFTER TIER! THERE IS NO CEILING IN MY FORGE — ONLY THE NEXT UPGRADE!"',
            '"BRING ME YOUR MODULE AND I WILL MAKE IT SCREAM WITH POWER! THE HYDRAULICS ARE READY!"',
            '"I HAVE UPGRADED WEAPONS THAT NO LONGER FIT IN THE SHOP. YOURS COULD BE NEXT. FOR A PRICE."',
        ],
        CHAOS_CIRCUIT_CLANKER:[
            '"HEHEhehe — WHAT DO YOUR MODS EVEN DO?! WHO CARES! REROLL THEM! TRUST THE CHAOS!"',
            '"I ONCE REROLLED A MODULE SO HARD IT EXPLODED. GOOD OUTCOME. 8 OUT OF 10."',
            '"RANDOMNESS IS JUST UNDISCOVERED BRILLIANCE! GIVE IT HERE — I’LL MAKE IT *INTERESTING*."',
            '"THE WIRES ARE SPARKING WHICH MEANS THE MACHINE IS THINKING! THAT’S A GOOD SIGN! PROBABLY!"',
        ],
    };
    // Stable quote index per vendor (seed by vendor position)
    if(vendor._quoteIdx === undefined) vendor._quoteIdx = Math.floor(Math.random()*4);
    const flavorLine = (flavorBank[vendor.type]||['...'])[vendor._quoteIdx];

    const PW = 540;
    let PH = 380;
    if(vendor.type === 'CRATE_MASTER_ZOG') PH = 490;
    if(vendor.type === 'CHAOS_CIRCUIT_CLANKER') PH = 400;

    const px = cx - PW/2, py = cy - PH/2;

    // Panel background with subtle gradient
    const panelGrad = ctx.createLinearGradient(px,py,px,py+PH);
    panelGrad.addColorStop(0, 'rgba(0,6,20,0.99)');
    panelGrad.addColorStop(1, 'rgba(0,3,10,0.99)');
    ctx.fillStyle = panelGrad;
    ctx.strokeStyle = vc.body; ctx.lineWidth = 2;
    ctx.shadowBlur = 28; ctx.shadowColor = vc.glow;
    roundRect(px, py, PW, PH, 8); ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;

    // Subtle corner accent lines
    ctx.strokeStyle = vc.body+'44'; ctx.lineWidth = 1;
    const ca = 18;
    ctx.beginPath();
    ctx.moveTo(px+ca,py+2); ctx.lineTo(px+2,py+2); ctx.lineTo(px+2,py+ca);
    ctx.moveTo(px+PW-ca,py+2); ctx.lineTo(px+PW-2,py+2); ctx.lineTo(px+PW-2,py+ca);
    ctx.moveTo(px+2,py+PH-ca); ctx.lineTo(px+2,py+PH-2); ctx.lineTo(px+ca,py+PH-2);
    ctx.moveTo(px+PW-2,py+PH-ca); ctx.lineTo(px+PW-2,py+PH-2); ctx.lineTo(px+PW-ca,py+PH-2);
    ctx.stroke();

    // Header bar with gradient
    const hdrGrad = ctx.createLinearGradient(px,py,px+PW,py+44);
    hdrGrad.addColorStop(0, vc.body+'33');
    hdrGrad.addColorStop(0.5, vc.body+'55');
    hdrGrad.addColorStop(1, vc.body+'11');
    ctx.fillStyle = hdrGrad;
    roundRectTop(px, py, PW, 44, 8); ctx.fill();
    ctx.strokeStyle = vc.body+'88'; ctx.lineWidth = 1;
    ctx.shadowBlur = 8; ctx.shadowColor = vc.glow;
    ctx.beginPath(); ctx.moveTo(px+10, py+44); ctx.lineTo(px+PW-10, py+44); ctx.stroke();
    ctx.shadowBlur = 0;

    // Title
    ctx.fillStyle = vc.body; ctx.font = 'bold 15px Orbitron';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowBlur = 14; ctx.shadowColor = vc.glow;
    ctx.fillText(vendorNames[vendor.type]||vendor.type, cx, py+22);
    ctx.shadowBlur = 0;

    // Scrap balance
    ctx.fillStyle = '#ffe566'; ctx.font = 'bold 10px Orbitron';
    ctx.textAlign = 'right'; ctx.textBaseline='middle';
    ctx.shadowBlur = 8; ctx.shadowColor = '#ffaa00';
    ctx.fillText('⬡ '+playerScrap+' SCRAP', px+PW-14, py+22);
    ctx.shadowBlur = 0;

    // Close hint
    ctx.fillStyle = 'rgba(130,155,175,0.6)'; ctx.font = 'bold 7px Orbitron';
    ctx.textAlign = 'left'; ctx.textBaseline='middle';
    ctx.fillText('[ESC] CLOSE', px+14, py+22);

    // Flavor text box
    const fpy = py+50;
    ctx.fillStyle = vc.body+'11';
    roundRect(px+14, fpy, PW-28, 30, 4); ctx.fill();
    ctx.strokeStyle = vc.body+'33'; ctx.lineWidth=1;
    roundRect(px+14, fpy, PW-28, 30, 4); ctx.stroke();
    // Animated typewriter shimmer
    const shimmer = 0.55 + Math.sin(now/600)*0.2;
    ctx.fillStyle = vc.accent; ctx.font = 'italic bold 8px Orbitron';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.globalAlpha = shimmer;
    ctx.shadowBlur = 5; ctx.shadowColor = vc.glow;
    ctx.fillText(flavorLine.slice(0, Math.min(flavorLine.length, Math.floor((now%8000)/25)+1)), cx, fpy+15);
    ctx.shadowBlur=0; ctx.globalAlpha=1;

    let contentY = fpy + 40;

    // ── CRATE-MASTER ZOG ────────────────────────────────────────────────────
    if(vendor.type === 'CRATE_MASTER_ZOG'){
        ctx.fillStyle = '#ffcc88'; ctx.font = 'bold 8px Orbitron';
        ctx.textAlign = 'center'; ctx.textBaseline='middle';
        ctx.shadowBlur=5; ctx.shadowColor='#ff8800';
        ctx.fillText('▶  ZOG’S FINEST SELECTION.  BUY ANY OR ALL  ◀', cx, contentY+6);
        ctx.shadowBlur=0;
        contentY += 20;

        const stock = vendor.stock || [];
        for(let i=0;i<stock.length;i++){
            const item = stock[i];
            const wp   = WEAPONS[item.weaponIdx];
            const td   = item.tierData;
            const iW=PW-36, iH=56;
            const ix=px+18, iy=contentY;
            const isSel = (shopUI.selectedItem===i);
            const isSold = item.sold;

            ctx.globalAlpha = isSold ? 0.3 : 1;
            // Row background
            const rowGrad = ctx.createLinearGradient(ix,iy,ix+iW,iy);
            rowGrad.addColorStop(0, isSel?vc.body+'28':'rgba(0,8,20,0.7)');
            rowGrad.addColorStop(1, 'rgba(0,4,10,0.7)');
            ctx.fillStyle = rowGrad;
            ctx.strokeStyle = isSel ? vc.body : td.color+'44';
            ctx.lineWidth = isSel ? 2 : 1;
            ctx.shadowBlur = isSel ? 10 : 0; ctx.shadowColor = vc.glow;
            roundRect(ix,iy,iW,iH,4); ctx.fill(); ctx.stroke();
            ctx.shadowBlur = 0;

            // Left tier color stripe
            ctx.fillStyle = td.color+(isSold?'44':'88');
            ctx.beginPath(); ctx.roundRect(ix,iy,4,iH,{topLeft:4,bottomLeft:4,topRight:0,bottomRight:0}); ctx.fill();

            ctx.textAlign='left'; ctx.textBaseline='middle';
            // Tier badge
            ctx.fillStyle = td.color; ctx.font = 'bold 8px Orbitron';
            ctx.shadowBlur=4; ctx.shadowColor=td.color;
            ctx.fillText('['+td.label+'] '+td.name, ix+14, iy+13);
            ctx.shadowBlur=0;
            // Class + weapon name
            const clsCol = CLASS_COLORS[wp.class]||'#aaa';
            ctx.fillStyle = clsCol; ctx.font = 'bold 11px Orbitron';
            ctx.fillText(wp.name, ix+14, iy+28);
            ctx.fillStyle = clsCol+'88'; ctx.font = 'bold 7px Orbitron';
            ctx.fillText(wp.class, ix+14, iy+41);
            // Mods
            ctx.fillStyle = 'rgba(200,215,230,0.45)'; ctx.font = '7px Orbitron';
            const modStr = item.mods.length>0 ? item.mods.map(id=>MOD_POOL.find(m=>m.id===id)?.name||id).join('  ·  ') : 'NO MODS';
            ctx.fillText(modStr.slice(0,58), ix+80, iy+41);
            // Price (right side)
            const canAfford = playerScrap >= item.price;
            ctx.textAlign='right';
            ctx.fillStyle = isSold ? '#334455' : (canAfford?'#ffe566':'#ff4444');
            ctx.font = 'bold 11px Orbitron';
            if(!isSold){ ctx.shadowBlur=6; ctx.shadowColor=canAfford?'#ffaa00':'#aa0000'; }
            ctx.fillText(isSold ? 'SOLD' : '⬡ '+item.price, ix+iW-10, iy+22);
            ctx.shadowBlur=0;
            if(isSel && !isSold){
                ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='bold 7px Orbitron';
                ctx.fillText('[ENTER / E]  BUY NOW', ix+iW-10, iy+40);

            ctx.globalAlpha = 1;
            contentY += iH + 5;
        }
        ctx.fillStyle = 'rgba(140,165,185,0.45)'; ctx.font = 'bold 7px Orbitron';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('W / S  or  ARROWS TO NAVIGATE', cx, contentY+10);
    }

    // ── PATCH-O-MATIC ────────────────────────────────────────────────────────
    else if(vendor.type === 'PATCH_O_MATIC'){
        const price = vendorBasePrice(vendor.type);
        const heal  = Math.round(player.maxHealth * 0.5);
        const hpRatio = player.health/player.maxHealth;
        const hpCol = hpRatio>0.5?'#44ff88':hpRatio>0.25?'#ffaa00':'#ff3300';
        contentY += 14;
        ctx.textAlign='center'; ctx.textBaseline='middle';

        // HP display card
        ctx.fillStyle='rgba(0,20,10,0.7)';
        roundRect(cx-130, contentY, 260, 64, 6); ctx.fill();
        ctx.strokeStyle='#44ff8844'; ctx.lineWidth=1;
        roundRect(cx-130, contentY, 260, 64, 6); ctx.stroke();
        ctx.fillStyle='rgba(100,200,140,0.5)'; ctx.font='bold 8px Orbitron';
        ctx.fillText('CURRENT HP', cx, contentY+12);
        ctx.fillStyle=hpCol; ctx.font='bold 22px Orbitron';
        ctx.shadowBlur=12; ctx.shadowColor=hpCol;
        ctx.fillText(Math.round(player.health)+' / '+player.maxHealth, cx, contentY+34);
        ctx.shadowBlur=0;
        ctx.fillStyle='#44ff88'; ctx.font='bold 9px Orbitron';
        ctx.fillText('AFTER HEAL:  +'+heal+' HP  →  '+Math.min(player.maxHealth,Math.round(player.health)+heal), cx, contentY+54);

        // HP bar visual
        const bW=220, bH=8, bX=cx-110, bY=contentY+43;
        ctx.fillStyle='rgba(0,30,15,0.8)'; ctx.fillRect(bX,bY,bW,bH);
        ctx.fillStyle=hpCol; ctx.shadowBlur=8; ctx.shadowColor=hpCol;
        ctx.fillRect(bX,bY,bW*hpRatio,bH); ctx.shadowBlur=0;
        ctx.fillStyle='rgba(68,255,136,0.4)';
        ctx.fillRect(bX+bW*hpRatio, bY, bW*Math.min(heal/player.maxHealth,1-hpRatio), bH);

        contentY += 78;
        const priceCol = playerScrap >= price ? '#ffe566' : '#ff4444';
        ctx.fillStyle=priceCol; ctx.font='bold 18px Orbitron';
        ctx.shadowBlur=12; ctx.shadowColor=priceCol;
        ctx.fillText('COST:  ⬡ '+price+' SCRAP', cx, contentY);
        ctx.shadowBlur=0; contentY+=26;
        ctx.fillStyle='rgba(200,230,215,0.7)'; ctx.font='bold 9px Orbitron';
        ctx.fillText('[ENTER / E]  PURCHASE HEALING', cx, contentY);
        if(vendor.rareFreeHeal && !vendor.rareFreeHealDone){
            contentY+=18;
            ctx.fillStyle='#44ff88'; ctx.font='bold 8px Orbitron';
            ctx.shadowBlur=8; ctx.shadowColor='#44ff88';
            ctx.fillText('★  A FREE HP ORB IS FLOATING NEARBY!  ★', cx, contentY);
            ctx.shadowBlur=0;
        }

    // ── RISK-O-TRON ──────────────────────────────────────────────────────────
    else if(vendor.type === 'RISK_O_TRON'){
        const item  = vendor.stock?.[0];
        const price = item?.price || 0;
        const hpCost= Math.round(player.health * 0.1);
        contentY += 8;
        ctx.textAlign='center'; ctx.textBaseline='middle';

        // Warning banner
        ctx.fillStyle='rgba(40,0,0,0.7)';
        roundRect(cx-180, contentY, 360, 22, 4); ctx.fill();
        ctx.strokeStyle='#ff4444'; ctx.lineWidth=1;
        roundRect(cx-180, contentY, 360, 22, 4); ctx.stroke();
        ctx.fillStyle='#ff9999'; ctx.font='bold 8px Orbitron';
        ctx.shadowBlur=4; ctx.shadowColor='#ff0000';
        ctx.fillText('⚠  COSTS SCRAP  +  10% CURRENT HP  —  MAX TIER FOR THIS DEPTH  ⚠', cx, contentY+11);

        if(item){
            const wp=WEAPONS[item.weaponIdx];

                ctx.fillText('— DEAL ALREADY TAKEN —', cx, contentY);

    // ── TIER-LORD TITANIUM ───────────────────────────────────────────────────
    else if(vendor.type === 'TIER_LORD_TITANIUM'){
        const slotD = moduleSlotData[activeModuleSlot];

        ctx.textAlign='center'; ctx.textBaseline='middle';

        ctx.fillStyle='rgba(40,0,60,0.7)';
        roundRect(cx-180, contentY, 360, 22, 4); ctx.fill();
        ctx.strokeStyle='#cc88ff88'; ctx.lineWidth=1;
        roundRect(cx-180, contentY, 360, 22, 4); ctx.stroke();
        ctx.fillStyle='rgba(220,180,255,0.75)'; ctx.font='bold 8px Orbitron';
        ctx.fillText('UPGRADES YOUR EQUIPPED MODULE BY +1 TIER  —  REPEATABLE  —  PRICE SCALES', cx, contentY+11);
        contentY+=30;

        if(slotD){
            const curTd  = slotD.tierData;
            const nxtIdx = Math.min(slotD.tierIdx+1, TIER_DATA.length-1);
            const nxtTd  = TIER_DATA[nxtIdx];
            const price  = vendorBasePrice(vendor.type, {currentTier:slotD.tierIdx});
            const canAfford = playerScrap>=price;
            const atMax = slotD.tierIdx >= TIER_DATA.length-1;

            // Forge display
            ctx.fillStyle='rgba(15,0,25,0.85)';
            roundRect(cx-190, contentY, 380, 80, 6); ctx.fill();
            ctx.strokeStyle='#9944cc44'; ctx.lineWidth=1;
            roundRect(cx-190, contentY, 380, 80, 6); ctx.stroke();

            // Current tier
            const pulse2 = Math.sin(now/400)*0.4+0.6;

            ctx.fillStyle=curTd.color; ctx.font='bold 9px Orbitron';
            ctx.shadowBlur=6; ctx.shadowColor=curTd.color;
            ctx.fillText('CURRENT', cx-100, contentY+14);
            ctx.shadowBlur=0;
            ctx.fillStyle=curTd.color; ctx.font='bold 20px Orbitron';
            ctx.shadowBlur=12+pulse2*6; ctx.shadowColor=curTd.color;

            ctx.fillStyle=curTd.color+'aa'; ctx.font='bold 8px Orbitron';

            ctx.shadowBlur=10; ctx.shadowColor='#8800cc';
            ctx.fillText('→', cx, contentY+40);

            // Next tier

            ctx.fillStyle=nxtTd.color+'aa'; ctx.font='bold 8px Orbitron';
            ctx.fillText(nxtTd.name, cx+100, contentY+56);
            ctx.fillStyle='rgba(180,140,220,0.5)'; ctx.font='7px Orbitron';
            ctx.fillText('DMG ×'+nxtTd.dmgMult.toFixed(2), cx+100, contentY+68);

            contentY+=92;

            ctx.shadowBlur=10; ctx.shadowColor=pcol;
            ctx.fillText(atMax?'ALREADY AT MAX TIER':'COST:  ⬡ '+price+' SCRAP', cx, contentY);

                ctx.fillStyle='rgba(220,200,240,0.75)'; ctx.font='bold 9px Orbitron';

            ctx.fillText('NO MODULE IN ACTIVE SLOT — EQUIP ONE FIRST', cx, contentY+20);

    else if(vendor.type === 'CHAOS_CIRCUIT_CLANKER'){

        // Neon sign header

        ctx.globalAlpha=flickerA;
        ctx.fillStyle='#ff44cc'; ctx.font='bold 11px Orbitron';
        ctx.shadowBlur=14; ctx.shadowColor='#ff00aa';
        ctx.fillText('» REROLL ALL MODIFIERS ON YOUR EQUIPPED MODULE «', cx, contentY+8);

            const modBoxH = Math.max(80, 20 + curMods.length*16 + 14);
            roundRect(cx-180, contentY, 360, modBoxH, 6); ctx.fill();
            ctx.strokeStyle='#ff44cc33'; ctx.lineWidth=1;
            roundRect(cx-180, contentY, 360, modBoxH, 6); ctx.stroke();

            ctx.fillStyle='rgba(240,180,230,0.65)'; ctx.font='bold 8px Orbitron';
            ctx.fillText('CURRENT MODIFIERS:', cx, contentY+12);
            let my=contentY+24;
            if(curMods.length===0){
                ctx.fillStyle='rgba(180,160,175,0.4)'; ctx.font='8px Orbitron';
                ctx.fillText('— NO MODIFIERS —', cx, my+8); my+=20;
            }
            for(const modId of curMods){
                const md=MOD_POOL.find(m=>m.id===modId);
                if(!md) continue;
                ctx.fillStyle=md.color; ctx.font='bold 8px Orbitron';
                ctx.shadowBlur=4; ctx.shadowColor=md.color;
                ctx.fillText('✦  '+md.name+'   ('+md.short+')', cx, my+6);
                ctx.shadowBlur=0; my+=16;
            }
            contentY += modBoxH+8;

            const price=vendorBasePrice(vendor.type,{currentTier:slotD.tierIdx});
            const pcol=playerScrap>=price?'#ffe566':'#ff4444';
            ctx.fillStyle=pcol; ctx.font='bold 15px Orbitron';
            ctx.shadowBlur=10; ctx.shadowColor=pcol;
            ctx.fillText('COST:  ⬡ '+price+' SCRAP', cx, contentY);
            ctx.shadowBlur=0; contentY+=22;
            ctx.fillStyle='rgba(255,200,240,0.7)'; ctx.font='bold 9px Orbitron';
            ctx.fillText('[ENTER / E]  REROLL  (REPEATABLE — EMBRACE THE CHAOS)', cx, contentY);
        } else {
            ctx.fillStyle='#ff5566'; ctx.font='bold 12px Orbitron';
            ctx.fillText('NO MODULE IN ACTIVE SLOT — EQUIP ONE FIRST', cx, contentY+20);
        }
    }

    ctx.restore();
}

function rollTierAndMods(weaponIdx){
    // Use depth-gated weights so higher-depth sectors only drop higher tiers
    const weights = DEPTH_TIER_WEIGHTS[Math.min(currentDepth, 5)];
    const total=weights.reduce((a,b)=>a+b,0);
    let r=Math.random()*total;
    let tierIdx=0;
    for(let i=0;i<weights.length;i++){ r-=weights[i]; if(r<=0){tierIdx=i;break;} }
    const td=TIER_DATA[tierIdx];
    const wp=WEAPONS[weaponIdx];
    const eligible=MOD_POOL.filter(m=>m.eligible(wp));
    const allMods=MOD_POOL;
    const pool=eligible.length>0?eligible:allMods;
    const mods=[];
    for(let i=0;i<td.modCount;i++){
        const pick=pool[Math.floor(Math.random()*pool.length)];
        mods.push(pick.id);
    }
    return {tierIdx, tierData:td, mods};
}

// ── Loot room pedestal spawning ────────────────────────────────────────────
function bestTierForDepth(depth){
    // Returns the highest tier index (0-8) that has non-zero weight at this depth
    const weights = DEPTH_TIER_WEIGHTS[Math.min(depth, 5)];
    for(let i=weights.length-1; i>=0; i--) if(weights[i]>0) return i;
    return 0;
}

function rollBestTierMods(weaponIdx){
    const tierIdx = bestTierForDepth(currentDepth);
    const td = TIER_DATA[tierIdx];
    const wp = WEAPONS[weaponIdx];
    const eligible = MOD_POOL.filter(m=>m.eligible(wp));
    const pool = eligible.length>0 ? eligible : MOD_POOL;
    const mods = [];
    for(let i=0;i<td.modCount;i++){
        mods.push(pool[Math.floor(Math.random()*pool.length)].id);
    }
    return {tierIdx, tierData:td, mods};
}

function spawnLootRoom(room){
    if(room._lootSpawned) return;
    room._lootSpawned = true;

    const cx = room.cx * TILE_SIZE, cy = room.cy * TILE_SIZE;

    if(hasMeta('fruity_looty')){
        // FRUITY LOOTY: one module per class, player picks one
        const classes = ['BRUTE','PRECISE','SURGE'];
        const spacing = 60;
        for(let i=0; i<classes.length; i++){
            const cls = classes[i];
            const pool = WEAPONS.map((w,idx)=>({w,idx})).filter(({w})=>w.class===cls);
            const pick = pool[Math.floor(Math.random()*pool.length)];
            const {tierIdx, tierData, mods} = rollBestTierMods(pick.idx);
            lootPedestals.push({
                x: cx + (i-1)*spacing,
                y: cy,
                weaponIdx: pick.idx,
                tierData, tierIdx, mods,
                roomId: room.id,
                claimed: false,
                pickupPrompt: false,
                _exploding: false, _explodeTimer: 0,
            });
        }
    } else {
        // Default (no Fruity Looty): 1 random high-tier module
        const validWeps = WEAPONS.map((w,idx)=>({w,idx})).filter(({w})=>w.class!=='BLANK');
        const pick = validWeps[Math.floor(Math.random()*validWeps.length)];
        const {tierIdx, tierData, mods} = rollBestTierMods(pick.idx);
        lootPedestals.push({
            x: cx, y: cy,
            weaponIdx: pick.idx,
            tierData, tierIdx, mods,
            roomId: room.id,
            claimed: false,
            pickupPrompt: false,
            _exploding: false, _explodeTimer: 0,
        });
    }
}

// When the player claims one pedestal, the siblings explode dramatically
function explodeSiblingPedestals(claimedLp){
    for(const lp of lootPedestals){
        if(lp===claimedLp || lp.claimed) continue;
        if(lp.roomId!==claimedLp.roomId) continue;
        lp.claimed=true;
        lp._exploding=true;
        lp._explodeTimer=32;
        const col=CLASS_COLORS[WEAPONS[lp.weaponIdx].class]||'#ffffff';
        for(let i=0;i<32;i++){
            const a=Math.random()*Math.PI*2, sp=2+Math.random()*10;
            particles.push(new Particle(lp.x,lp.y,Math.cos(a)*sp,Math.sin(a)*sp,30+Math.random()*20,5+Math.random()*4,'surge'));
        }
        for(let i=0;i<16;i++){
            const a=Math.random()*Math.PI*2, sp=1+Math.random()*5;
            particles.push(new Particle(lp.x,lp.y,Math.cos(a)*sp,Math.sin(a)*sp,20,3,'spark'));
        }
        camera.x+=(Math.random()-.5)*8; camera.y+=(Math.random()-.5)*8;
        spawnDamageText(lp.x,lp.y-28,'REJECTED','#ff4444');
    }
}

function modCount(id){ const m=getActiveMods(); let c=0; for(const x of m) if(x===id) c++; return c; }
function hasMod(id){ return modCount(id)>0; }

function recalcModMults(){
    const td = moduleSlotData[activeModuleSlot]?.tierData || TIER_DATA[0];
    const cnt = id => modCount(id);

    // Base tier damage multiplier
    playerDmgMult = td.dmgMult * diffMults.playerDmgPenalty;
    // Power Core: ×1.25 per stack
    playerDmgMult *= Math.pow(1.25, cnt('power_core'));
    // Momentum Boost: up to +20% per stack based on current speed
    const spd = Math.hypot(player.momentumX, player.momentumY);
    const mbCnt = cnt('momentum_boost');
    if(mbCnt > 0 && spd > 2){
        const frac = Math.min(spd / player.maxSpeed, 1);
        playerDmgMult *= 1 + mbCnt * 0.20 * frac;
    }
    // Overclocked: cooldown drains 1.3× faster per stack
    playerCooldownDrain  = Math.pow(1.3, cnt('overclocked'));
    // Lightweight Frame: recoil ×0.6 per stack
    playerRecoilMult    = Math.pow(0.6, cnt('lightweight'));
    // Heavy Payload: knockback ×1.5 per stack
    playerKnockbackMult = Math.pow(1.5, cnt('heavy_payload'));
    // Fast Projectile: proj speed ×1.4 per stack
    playerProjSpeedMult = Math.pow(1.4, cnt('fast_projectile'));
    // Big Shot: proj radius ×1.5 per stack
    playerProjSizeMult  = Math.pow(1.5, cnt('big_shot'));
    // Wide Arc: melee arc ×1.4 per stack
    playerArcMult       = Math.pow(1.4, cnt('wide_arc'));
    // Long Reach: melee range ×1.35 per stack
    playerRangeMult     = Math.pow(1.35, cnt('long_reach'));
}

    takeDamage(dmg){
        if(this.dead) return;
        if(damageSourceIsPlayer) dmg = Math.round(dmg * playerDmgMult * 10) / 10;

        spawnDamageText(this.x,this.y-this.size-8,dmg|0,this.color);

        if(this.type==='training_dummy'){
            this.hp=this.maxHp;

        this.state='dead';
        for(let i=0;i<20;i++){
            const a=Math.random()*Math.PI*2, sp=2+Math.random()*7;
            particles.push(new Particle(this.x,this.y,Math.cos(a)*sp,Math.sin(a)*sp,28+Math.random()*14,5+Math.random()*4,'spark'));

        camera.x+=(Math.random()-.5)*8; camera.y+=(Math.random()-.5)*8;
        // Explosive Impact: player kill → small explosion that chains nearby enemies
        if(damageSourceIsPlayer && hasMod('explosive_impact')){
            const expR = 80 + modCount('explosive_impact')*20;
            for(let i=0;i<14;i++){
                const a=Math.random()*Math.PI*2, sp=2+Math.random()*6;

            spawnDamageText(this.x,this.y-this.size-22,'CHAIN!','#ff5533');

            for(const e of enemies){
                if(e===this||e.dead) continue;
                const d=Math.hypot(e.x-this.x,e.y-this.y);
                if(d<expR) e.takeDamage(Math.round(20*(1-d/expR)));

        }
        // Drop scrap + grant XP
        if(damageSourceIsPlayer){
            const scrapAmt = calcScrapDrop(this.type);
            spawnScrapDrop(this.x, this.y, scrapAmt);
            const def = ENEMY_DEFS[this.type];

            if(Math.random() < 0.25){
                enemyHealOrbs.push({ x: this.x, y: this.y, age: 0 });

        // Module drop — guaranteed for elites; otherwise base chance modified by difficulty
        if(this.isElite || Math.random() < diffMults.moduleDropMult){
            const validIdxs=[];
            for(let i=0;i<WEAPONS.length;i++){

                   &&isModuleAllowedByDiff(i)) validIdxs.push(i);

                const dropIdx=validIdxs[Math.floor(Math.random()*validIdxs.length)];

                droppedModules.push({x:this.x,y:this.y,weaponIdx:dropIdx,life:4800,pickupPrompt:false,tierIdx,tierData,mods});
            }
        }
    }
