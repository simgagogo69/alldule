//  TITLE SCREEN
// ═══════════════════════════════════════════════════════════════════════════════
function updateTitle(){
    titleState.frame++;
    if(titleState.flashTimer>0) titleState.flashTimer--;
    // Decorative bg particles
    if(Math.random()<0.25){
        const px=Math.random()*canvas.width, py=Math.random()*canvas.height;
        titleState.particles.push({x:px,y:py,vx:(Math.random()-.5)*0.6,vy:(Math.random()-.5)*0.6,
            life:120+Math.random()*120, maxLife:240, col:`hsl(${180+Math.random()*60},100%,65%)`});
    }
    for(let i=titleState.particles.length-1;i>=0;i--){
        const p=titleState.particles[i];
        p.x+=p.vx; p.y+=p.vy; p.life--;
        if(p.life<=0) titleState.particles.splice(i,1);
    }
}

function drawTitle(){
    const now=Date.now(), t=now/1000;
    const W=canvas.width, H=canvas.height;
    const cx=W/2, cy=H/2;

    // ── DEEP DARK VOID BASE ──────────────────────────────────────────────────
    ctx.fillStyle='#00060f'; ctx.fillRect(0,0,W,H);

    // ── PERSPECTIVE GRID — fading from centre ────────────────────────────────
    ctx.save();
    const gridY=cy+40;   // horizon line
    const gridCols=28, gridRows=16;
    const gridW=W*1.4, gridH=H*0.55;
    const gx0=cx-gridW/2, gy0=gridY;
    // Vertical lines converging to vanishing point
    for(let i=0;i<=gridCols;i++){
        const bx=gx0+i*(gridW/gridCols);
        const fade=Math.abs(i-gridCols/2)/(gridCols/2);
        const alpha=Math.max(0,(0.22-fade*0.18));
        ctx.strokeStyle=`rgba(0,140,220,${alpha})`;
        ctx.lineWidth= i%4===0?1.0:0.4;
        ctx.beginPath(); ctx.moveTo(cx,gy0);
        ctx.lineTo(bx, gy0+gridH); ctx.stroke();
    }
    // Horizontal lines fading away
    for(let j=1;j<=gridRows;j++){
        const progress=j/gridRows;
        const gy=gy0+progress*gridH;
        const width=progress*gridW;
        const alpha=0.25*(1-progress*0.7);
        ctx.strokeStyle=`rgba(0,160,240,${alpha})`;
        ctx.lineWidth=progress>0.85?1.0:0.4;
        ctx.beginPath();
        ctx.moveTo(cx-width/2,gy); ctx.lineTo(cx+width/2,gy); ctx.stroke();
    }
    // Same grid going UP (inverted) — fainter
    for(let i=0;i<=gridCols;i++){
        const bx=gx0+i*(gridW/gridCols);
        const fade=Math.abs(i-gridCols/2)/(gridCols/2);
        const alpha=Math.max(0,(0.10-fade*0.08));
        ctx.strokeStyle=`rgba(0,100,180,${alpha})`;
        ctx.lineWidth=0.3;
        ctx.beginPath(); ctx.moveTo(cx,gy0);
        ctx.lineTo(bx, gy0-gridH*0.6); ctx.stroke();
    }
    for(let j=1;j<=10;j++){
        const progress=j/10;
        const gy=gy0-progress*gridH*0.6;
        const width=progress*gridW;
        ctx.strokeStyle=`rgba(0,100,180,${0.10*(1-progress*0.8)})`;
        ctx.lineWidth=0.3;
        ctx.beginPath();
        ctx.moveTo(cx-width/2,gy); ctx.lineTo(cx+width/2,gy); ctx.stroke();
    }
    ctx.restore();

    // ── FLOATING HEXAGON UI SHAPES ───────────────────────────────────────────
    ctx.save();
    const hexShapes=[
        {x:cx-360,y:cy-160,r:38,speed:0.18,phase:0.0,alpha:0.12},
        {x:cx+370,y:cy-130,r:28,speed:0.22,phase:1.1,alpha:0.10},
        {x:cx-310,y:cy+160,r:22,speed:0.15,phase:2.3,alpha:0.09},
        {x:cx+330,y:cy+150,r:32,speed:0.20,phase:0.7,alpha:0.11},
        {x:cx+120,y:cy-220,r:18,speed:0.28,phase:3.2,alpha:0.08},
        {x:cx-180,y:cy+240,r:24,speed:0.16,phase:1.8,alpha:0.09},
    ];
    for(const h of hexShapes){
        const drift=Math.sin(t*h.speed+h.phase)*6;
        ctx.save(); ctx.translate(h.x, h.y+drift);
        ctx.strokeStyle=`rgba(0,180,255,${h.alpha})`;
        ctx.lineWidth=1.2;
        ctx.beginPath();
        for(let i=0;i<6;i++){
            const a=i/6*Math.PI*2-Math.PI/6;
            i===0?ctx.moveTo(Math.cos(a)*h.r,Math.sin(a)*h.r)
                 :ctx.lineTo(Math.cos(a)*h.r,Math.sin(a)*h.r);
        }
        ctx.closePath(); ctx.stroke();
        // Inner ring
        ctx.strokeStyle=`rgba(0,140,200,${h.alpha*0.5})`;
        ctx.lineWidth=0.6;
        ctx.beginPath();
        for(let i=0;i<6;i++){
            const a=i/6*Math.PI*2-Math.PI/6;
            i===0?ctx.moveTo(Math.cos(a)*h.r*0.65,Math.sin(a)*h.r*0.65)
                 :ctx.lineTo(Math.cos(a)*h.r*0.65,Math.sin(a)*h.r*0.65);
        }
        ctx.closePath(); ctx.stroke();
        ctx.restore();
    }

    // ── CIRCUIT LINE TRACES (decorative, corners and edges) ──────────────────
    ctx.save(); ctx.strokeStyle='rgba(0,120,200,0.18)'; ctx.lineWidth=1;
    // Bottom-left trace cluster
    ctx.beginPath();
    ctx.moveTo(40,H-40); ctx.lineTo(140,H-40); ctx.lineTo(140,H-80);
    ctx.lineTo(190,H-80); ctx.lineTo(190,H-60); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(40,H-55); ctx.lineTo(90,H-55); ctx.lineTo(90,H-90);
    ctx.lineTo(120,H-90); ctx.stroke();
    // Top-right trace cluster
    ctx.strokeStyle='rgba(0,120,200,0.15)';
    ctx.beginPath();
    ctx.moveTo(W-40,50); ctx.lineTo(W-140,50); ctx.lineTo(W-140,90);
    ctx.lineTo(W-190,90); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(W-40,68); ctx.lineTo(W-100,68); ctx.lineTo(W-100,110); ctx.stroke();
    // Dot nodes on traces
    ctx.fillStyle='rgba(0,180,255,0.3)';
    [[140,H-80],[190,H-80],[90,H-90],[W-140,90],[W-100,110]].forEach(([nx,ny])=>{
        ctx.beginPath(); ctx.arc(nx,ny,2.5,0,Math.PI*2); ctx.fill();
    });
    ctx.restore();

    // ── DRIFTING DATA-FRAGMENT PARTICLES ─────────────────────────────────────
    for(const p of titleState.particles){
        const a=p.life/p.maxLife;
        ctx.save(); ctx.globalAlpha=a*0.6;
        // Draw as a small dash/rect — data fragment feel
        ctx.fillStyle=p.col;
        ctx.shadowBlur=4; ctx.shadowColor=p.col;
        const len=3+a*4;
        ctx.fillRect(p.x-len/2, p.y-1, len, 1.5);
        ctx.shadowBlur=0; ctx.restore();
    }

    // ── VIGNETTE ────────────────────────────────────────────────────────────
    const vig = ctx.createRadialGradient(cx,cy,H*0.3,cx,cy,H*0.85);
    vig.addColorStop(0,'rgba(0,0,0,0)');
    vig.addColorStop(1,'rgba(0,4,12,0.35)');
    ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

    // ── THIN BORDER FRAME ───────────────────────────────────────────────────
    ctx.save();
    ctx.strokeStyle='rgba(0,160,220,0.5)'; ctx.lineWidth=1.5;
    ctx.strokeRect(12,12,W-24,H-24);
    ctx.strokeStyle='rgba(0,100,160,0.25)'; ctx.lineWidth=1;
    ctx.strokeRect(20,20,W-40,H-40);
    // Corner accent marks
    ctx.strokeStyle='rgba(0,200,255,0.6)'; ctx.lineWidth=2;
    const cm=22;
    [[12,12],[W-12,12],[12,H-12],[W-12,H-12]].forEach(([bx,by],i)=>{
        const sx=i%2===0?1:-1, sy=i<2?1:-1;
        ctx.beginPath();
        ctx.moveTo(bx+sx*cm,by); ctx.lineTo(bx,by); ctx.lineTo(bx,by+sy*cm);
        ctx.stroke();
    });
    ctx.restore();

    // ── GIANT METALLIC TITLE ─────────────────────────────────────────────────
    const titleY=cy-60;
    const TITLE='ΛLLDULΞ';
    ctx.font='bold 118px Orbitron';
    ctx.textAlign='center'; ctx.textBaseline='middle';

    // Deep shadow layer (multiple offsets for thick plate look)
    const shadowOffsets=[
        [3,3,'rgba(0,20,60,0.9)'],[5,5,'rgba(0,15,40,0.8)'],
        [7,7,'rgba(0,10,30,0.7)'],[2,2,'rgba(0,30,80,0.95)'],
    ];
    for(const [ox,oy,col] of shadowOffsets){
        ctx.fillStyle=col;
        ctx.fillText(TITLE,cx+ox,titleY+oy);
    }

    // Dark inner base (the "metal body")
    ctx.fillStyle='#001830';
    ctx.fillText(TITLE,cx,titleY);

    // Main metallic gradient — cold steel with cyan tint
    const mg=ctx.createLinearGradient(cx,titleY-64,cx,titleY+64);
    mg.addColorStop(0.00,'#e8f8ff');   // bright top highlight
    mg.addColorStop(0.12,'#aaddff');   // cool silver
    mg.addColorStop(0.30,'#55aadd');   // steel blue
    mg.addColorStop(0.50,'#2288bb');   // mid tone
    mg.addColorStop(0.70,'#114466');   // dark groove
    mg.addColorStop(0.82,'#336699');   // bevel catch
    mg.addColorStop(1.00,'#0d2233');   // deep bottom
    ctx.fillStyle=mg;
    ctx.fillText(TITLE,cx,titleY);

    // Bevel highlight — thin bright line at top of letters
    const bevG=ctx.createLinearGradient(cx,titleY-64,cx,titleY-44);
    bevG.addColorStop(0,'rgba(255,255,255,0.65)');
    bevG.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=bevG;
    ctx.fillText(TITLE,cx,titleY);

    // Panel seam — horizontal dark groove through middle of title
    ctx.save();
    ctx.beginPath(); ctx.rect(0,titleY-2,W,4); ctx.clip();
    ctx.fillStyle='rgba(0,10,30,0.55)';
    ctx.fillText(TITLE,cx,titleY);
    ctx.restore();

    // Rivet dots along the title baseline + topline
    ctx.save();
    ctx.fillStyle='rgba(0,180,255,0.4)'; ctx.shadowBlur=4; ctx.shadowColor='#00aaff';
    const metrics=ctx.measureText(TITLE);
    const titleLeft=cx-metrics.width/2+8;
    const spacing=metrics.width/9;
    for(let ri=0;ri<9;ri++){
        const rx=titleLeft+ri*spacing;
        ctx.beginPath(); ctx.arc(rx,titleY-57,2.5,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(rx,titleY+58,2.5,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();

    // ── ELECTRICITY / SPARKS running through letters ─────────────────────────
    ctx.save();
    // Clip to title text shape using composite
    ctx.globalCompositeOperation='source-over';
    if(Math.random()<0.35){
        // Arc from one random point to another across the title
        const ax1=cx-200+Math.random()*400, ay1=titleY-30+Math.random()*60;
        const ax2=ax1+(Math.random()-.5)*120, ay2=ay1+(Math.random()-.5)*40;
        const segs=6;
        ctx.strokeStyle=`rgba(${100+Math.random()*155|0},220,255,${0.6+Math.random()*0.4})`;
        ctx.lineWidth=1+Math.random();
        ctx.shadowBlur=10; ctx.shadowColor='#00eeff';
        ctx.beginPath(); ctx.moveTo(ax1,ay1);
        for(let s=1;s<=segs;s++){
            const px=ax1+(ax2-ax1)*s/segs+(Math.random()-.5)*18;
            const py=ay1+(ay2-ay1)*s/segs+(Math.random()-.5)*18;
            ctx.lineTo(px,py);
        }
        ctx.stroke(); ctx.shadowBlur=0;
    }
    // Floating spark dots near title
    for(let sp=0;sp<3;sp++){
        if(Math.random()<0.3){
            const spx=cx-220+Math.random()*440;
            const spy=titleY-55+Math.random()*110;
            ctx.fillStyle=`rgba(100,230,255,${0.4+Math.random()*0.5})`;
            ctx.shadowBlur=8; ctx.shadowColor='#00ddff';
            ctx.beginPath(); ctx.arc(spx,spy,1+Math.random()*2,0,Math.PI*2); ctx.fill();
            ctx.shadowBlur=0;
        }
    }
    ctx.restore();

    // ── ONE FLICKERING LETTER (the Ξ at the end) ─────────────────────────────
    // Draw the Ξ in a different colour when flickering
    const flickerOn = Math.sin(t*9.3)*Math.sin(t*6.7) > 0.6;
    if(flickerOn){
        ctx.save();
        // Measure approximate position of last letter
        const fullW=ctx.measureText(TITLE).width;
        const xiW=ctx.measureText('Ξ').width;
        const xiX=cx+fullW/2-xiW/2-4;
        ctx.globalAlpha=0.4+Math.random()*0.4;
        // Clip just the Ξ
        ctx.fillStyle='#001830';
        ctx.fillText(TITLE,cx,titleY);
        // Flicker colour — desaturated or shifted hue
        const fG=ctx.createLinearGradient(cx,titleY-64,cx,titleY+64);
        fG.addColorStop(0,'#ffffff'); fG.addColorStop(0.5,'rgba(0,60,120,0.6)'); fG.addColorStop(1,'#001830');
        ctx.fillStyle=fG;
        ctx.fillText(TITLE,cx,titleY);
        ctx.restore();
    }

    // ── SUBTITLE ─────────────────────────────────────────────────────────────
    const subY=titleY+90;
    ctx.fillStyle='rgba(0,180,255,0.25)'; ctx.font='bold 9px Orbitron';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('A  R O G U E L I T E  M A D E  B Y  A  C E R T A I N  S I M G A',cx,subY);

    // ── TERMINAL PROMPT — > press any key_ ───────────────────────────────────
    const termY=cy+150;
    // Terminal background panel
    ctx.fillStyle='rgba(0,8,18,0.75)';
    ctx.strokeStyle='rgba(0,140,200,0.4)'; ctx.lineWidth=1;
    roundRect(cx-160,termY-18,320,36,3); ctx.fill(); ctx.stroke();
    // Horizontal scan line across panel
    ctx.fillStyle='rgba(0,180,255,0.04)'; ctx.fillRect(cx-159,termY-8,318,3);
    ctx.fillStyle='rgba(0,180,255,0.04)'; ctx.fillRect(cx-159,termY+4,318,3);
    // Prompt text
    const blinkOn=Math.floor(t*1.8)%2===0;
    ctx.font='bold 14px Orbitron'; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(0,180,255,0.5)';
    ctx.fillText('>',cx-148,termY);
    ctx.fillStyle='#00ddff';
    ctx.shadowBlur=8; ctx.shadowColor='#00aaff';
    ctx.fillText('press any key',cx-128,termY);
    if(blinkOn){
        const promptW=ctx.measureText('press any key').width;
        ctx.fillStyle='#00ddff';
        ctx.fillRect(cx-128+promptW+4,termY-9,9,17);
    }
    ctx.shadowBlur=0;

    // ── VERSION ───────────────────────────────────────────────────────────────
    ctx.fillStyle='rgba(255,255,255,1)'; ctx.font='bold 6px Orbitron';
    ctx.textAlign='right'; ctx.textBaseline='bottom';
    ctx.fillText('v1  —  ΛLLDULΞ',W-22,H-14);

    // ── FLASH-IN ─────────────────────────────────────────────────────────────
    if(titleState.flashTimer>0){
        ctx.fillStyle=`rgba(0,180,255,${(titleState.flashTimer/30)*0.4})`;
        ctx.fillRect(0,0,W,H);
    }
}

// ─── Draw a single enemy sprite using the game's own draw functions ────────────
function drawEnemySprite(type, cx, cy, angle, scale){
    const def = ENEMY_DEFS[type];
    if(!def) return;
    // Fake minimal enemy object the draw functions expect
    const fakeE = {
        type, x:cx, y:cy, angle, aimAngle:angle,
        size:def.size*(scale||1),
        color:def.color, glow:def.glow,
        hp:def.hp, maxHp:def.hp,
        age:Date.now()/16|0,
        vars:{
            warnActive:false, warnTimer:0, laserEnd:{x:0,y:0},
            chargeAngle:0, chargeSpeed:0,
            orbitAngle:0, orbitR:0, sentinelArmAngle:(Date.now()/800)%Math.PI*2,
            pulseRings:[], wormBurrowTimer:0, wormEmerge:false,
            sludgeBlobs:[], plasmaOrb:null,
            stalkerVisible:true, stalkerAlpha:1, stalkerGlitch:0,
            stalkerTeleporting:false, stalkerTeleportTimer:0,
            stalkerTeleportTargetX:0, stalkerTeleportTargetY:0, stalkerStrikeTimer:0,
            lunarDriftAngle:0, lunarDriftPhase:0,
            wardenWheels:[{angle:0,destroyed:false},{angle:Math.PI,destroyed:false}],
            striderStrafeDir:1, striderStrafeTimer:0, striderBurst:0, striderBurstTimer:0,
            burstCount:0, circleAngle:0, circleDir:1,
        },
        state:'idle', dead:false,
    };
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(scale||1, scale||1);
    ctx.rotate(angle);
    switch(type){
        case 'test_drone':        drawTestDroneE(fakeE); break;
        case 'laser_turret':      drawLaserTurretE(fakeE); break;
        case 'security_charger':  drawSecurityChargerE(fakeE); break;
        case 'reactor_drone':     drawReactorDroneE(fakeE); break;
        case 'spark_mine':        drawSparkMineE(fakeE); break;
        case 'sniper_node':       drawSniperNodeE(fakeE); break;
        case 'scout_crawler':     drawScoutCrawlerE(fakeE); break;
        case 'radiation_emitter': drawRadiationEmitterE(fakeE); break;
        case 'heavy_charger':     drawHeavyChargerE(fakeE); break;
        case 'sludge_beast':      drawSludgeBeastE(fakeE); break;
        case 'spike_worm':        drawSpikeWormE(fakeE); break;
        case 'prototype_sentinel':drawPrototypeSentinelE(fakeE); break;
        case 'pulse_emitter':     drawPulseEmitterE(fakeE); break;
        case 'mutant_core':       drawMutantCoreE(fakeE); break;
        case 'plasma_orbiter':    drawPlasmaOrbiterE(fakeE); break;
        case 'war_automaton':     drawWarAutomatonE(fakeE); break;
        case 'phase_stalker':     drawPhaseStalkerE(fakeE); break;
        case 'lunar_drone':       drawLunarDroneE(fakeE); break;
        case 'solar_warden':      drawSolarWardenE(fakeE); break;
        case 'dust_strider':      drawDustStriderE(fakeE); break;
    }
    ctx.restore();
}

// ─── Enemy Index full-screen panel ────────────────────────────────────────────
function drawEnemyIndex(){
    const W=canvas.width, H=canvas.height;
    const now=Date.now();

    // Dark backdrop
    ctx.fillStyle='rgba(0,4,12,0.97)';
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(0,180,255,0.4)'; ctx.lineWidth=2;
    roundRect(12,12,W-24,H-24,8); ctx.stroke();

    // Header
    ctx.fillStyle='#00ccff'; ctx.font='bold 16px Orbitron';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowBlur=16; ctx.shadowColor='#0088ff';
    ctx.fillText('ENEMY INDEX', W/2, 38); ctx.shadowBlur=0;
    ctx.fillStyle='rgba(80,160,200,0.5)'; ctx.font='bold 8px Orbitron';
    ctx.fillText('[ESC] CLOSE', W/2, 58);

    const allTypes = Object.keys(ENEMY_INFO);
    const seen = allTypes.filter(t=>seenEnemyTypes.has(t));
    const unseen = allTypes.filter(t=>!seenEnemyTypes.has(t));
    const sortedTypes = [...seen, ...unseen];

    // ── Sidebar ───────────────────────────────────────────────────────────────
    const SBW=210, SBX=28, SBY=78, ITEM_H=32;
    const visItems = Math.floor((H-SBY-30)/ITEM_H);
    const scroll = Math.max(0, Math.min(lobbyState.indexScroll, sortedTypes.length-visItems));
    lobbyState.indexScroll = scroll;

    ctx.fillStyle='rgba(0,8,20,0.8)'; ctx.strokeStyle='rgba(0,100,160,0.4)'; ctx.lineWidth=1;
    roundRect(SBX, SBY, SBW, H-SBY-28, 5); ctx.fill(); ctx.stroke();

    ctx.save();
    ctx.beginPath(); roundRect(SBX+1,SBY+1,SBW-2,H-SBY-30,5); ctx.clip();
    for(let i=0;i<visItems;i++){
        const idx=i+scroll;
        if(idx>=sortedTypes.length) break;
        const type=sortedTypes[idx];
        const isSeen=seenEnemyTypes.has(type);
        const isSelected=type===lobbyState.indexSelected;
        const iy=SBY+i*ITEM_H+4;
        const info=ENEMY_INFO[type];
        const def=ENEMY_DEFS[type];

        if(isSelected){
            ctx.fillStyle=(def?.color||'#00ccff')+'33';
            roundRect(SBX+3,iy,SBW-6,ITEM_H-2,3); ctx.fill();
            ctx.strokeStyle=def?.color||'#00ccff'; ctx.lineWidth=1;
            roundRect(SBX+3,iy,SBW-6,ITEM_H-2,3); ctx.stroke();
        }

        if(isSeen){
            // Mini sprite
            ctx.save();
            ctx.translate(SBX+22, iy+ITEM_H/2);
            ctx.scale(0.7,0.7);
            ctx.rotate(Math.PI/2);
            drawEnemySprite(type, 0, 0, 0, 1);
            ctx.restore();
            ctx.fillStyle=isSelected?(def?.color||'#ffffff'):'rgba(180,200,220,0.85)';
            ctx.font='bold 8px Orbitron';
            ctx.textAlign='left'; ctx.textBaseline='middle';
            ctx.fillText(info.name, SBX+46, iy+ITEM_H/2);
        } else {
            ctx.fillStyle='rgba(60,80,100,0.5)';
            ctx.font='bold 8px Orbitron'; ctx.textAlign='left'; ctx.textBaseline='middle';
            ctx.fillText('??? UNKNOWN', SBX+14, iy+ITEM_H/2);
        }
    }
    ctx.restore();

    // Scroll indicators
    if(scroll>0){ ctx.fillStyle='rgba(0,180,255,0.6)'; ctx.font='bold 10px Orbitron'; ctx.textAlign='center'; ctx.fillText('▲',SBX+SBW/2,SBY+6); }
    if(scroll+visItems<sortedTypes.length){ ctx.fillStyle='rgba(0,180,255,0.6)'; ctx.font='bold 10px Orbitron'; ctx.textAlign='center'; ctx.fillText('▼',SBX+SBW/2,H-32); }

    // ── Detail pane ───────────────────────────────────────────────────────────
    const sel=lobbyState.indexSelected;
    const DX=SBX+SBW+20, DY=SBY, DW=W-DX-28;
    ctx.fillStyle='rgba(0,8,20,0.8)'; ctx.strokeStyle='rgba(0,100,160,0.4)'; ctx.lineWidth=1;
    roundRect(DX,DY,DW,H-DY-28,5); ctx.fill(); ctx.stroke();

    if(sel && seenEnemyTypes.has(sel)){
        const info=ENEMY_INFO[sel];
        const def=ENEMY_DEFS[sel];
        const col=def?.color||'#00ccff';

        // Big live sprite — faces cursor
        const spriteX=DX+DW*0.72, spriteY=DY+160;
        const cursorAngle=Math.atan2(mouseWorldY-canvas.height/2+camera.y-spriteY, mouseWorldX-canvas.width/2+camera.x-spriteX+canvas.width/2);
        ctx.save();
        const glowG=ctx.createRadialGradient(spriteX,spriteY,0,spriteX,spriteY,80);
        glowG.addColorStop(0,col+'22'); glowG.addColorStop(1,'transparent');
        ctx.fillStyle=glowG; ctx.beginPath(); ctx.arc(spriteX,spriteY,80,0,Math.PI*2); ctx.fill();
        ctx.restore();
        drawEnemySprite(sel, spriteX, spriteY, Math.atan2(mouseWorldY-(spriteY+camera.y-(canvas.height/2)), mouseWorldX-(spriteX+camera.x-(canvas.width/2))), 2.2);

        // Name
        ctx.fillStyle=col; ctx.font='bold 20px Orbitron';
        ctx.textAlign='left'; ctx.textBaseline='middle';
        ctx.shadowBlur=14; ctx.shadowColor=col;
        ctx.fillText(info.name, DX+24, DY+36); ctx.shadowBlur=0;

        // Stats strip
        const stats=[
            ['HP', def.hp],
            ['SPEED', def.speed===0?'STATIC':def.speed.toFixed(1)],
            ['ATK RANGE', def.atkRange+'px'],
            ['XP', def.xp],
        ];
        let sx=DX+24;
        for(const [label,val] of stats){
            ctx.fillStyle='rgba(80,120,160,0.5)'; ctx.font='bold 11px Orbitron'; ctx.textAlign='left'; ctx.textBaseline='middle';
            ctx.fillText(label, sx, DY+68);
            ctx.fillStyle=col; ctx.font='bold 15px Orbitron';
            ctx.fillText(val, sx, DY+84);
            sx+=DW/5;
        }

        // Sector list
        ctx.strokeStyle='rgba(0,100,160,0.3)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(DX+16,DY+100); ctx.lineTo(DX+DW-16,DY+100); ctx.stroke();
        ctx.fillStyle='rgba(80,140,180,0.5)'; ctx.font='bold 11px Orbitron'; ctx.textAlign='left';
        ctx.fillText('FOUND IN:', DX+24, DY+116);
        ctx.fillStyle='rgba(160,200,220,0.75)'; ctx.font='bold 13px Orbitron';
        ctx.fillText(info.sectors.join('  ·  '), DX+24, DY+132);

        // Description — scrollable word-wrapped block
        ctx.strokeStyle='rgba(0,100,160,0.3)'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(DX+16,DY+148); ctx.lineTo(DX+DW*0.6,DY+148); ctx.stroke();

        // Pre-compute all wrapped lines so we know total height
        ctx.font='11px Orbitron';
        const maxLineW=DW*0.58-32;
        const descLines=[];
        for(const paragraph of info.desc.replace(/\r/g,'\n\n').split('\n')){
            let line='';
            for(const word of paragraph.split(' ')){
                const test=line+(line?' ':'')+word;
                if(ctx.measureText(test).width>maxLineW && line){ descLines.push(line); line=word; }
                else line=test;
            }
            descLines.push(line); // always push (even empty string for blank \n lines)
        }
        const LINE_H=14;
        const descAreaTop=DY+155, descAreaBot=H-28-6;
        const descAreaH=descAreaBot-descAreaTop;
        const totalDescH=descLines.length*LINE_H;
        const maxDescScroll=Math.max(0, totalDescH-descAreaH);
        lobbyState.indexDescScroll=Math.min(lobbyState.indexDescScroll, maxDescScroll);
        const dScroll=lobbyState.indexDescScroll;

        // Clip to desc area and render lines offset by scroll
        ctx.save();
        ctx.beginPath(); ctx.rect(DX+16, descAreaTop, DW*0.6-16, descAreaH); ctx.clip();
        ctx.fillStyle='rgba(160,190,210,0.8)';
        for(let i=0;i<descLines.length;i++){
            const ly=descAreaTop+13+i*LINE_H-dScroll;
            if(ly+LINE_H<descAreaTop||ly>descAreaBot) continue;
            ctx.fillText(descLines[i], DX+24, ly);
        }
        ctx.restore();

        // Scroll indicators
        if(dScroll>0){
            ctx.fillStyle='rgba(0,180,255,0.6)'; ctx.font='bold 9px Orbitron';
            ctx.textAlign='left'; ctx.fillText('▲', DX+DW*0.6-22, descAreaTop+10);
        }
        if(dScroll<maxDescScroll){
            ctx.fillStyle='rgba(0,180,255,0.6)'; ctx.font='bold 9px Orbitron';
            ctx.textAlign='left'; ctx.fillText('▼', DX+DW*0.6-22, descAreaBot-2);
        }

    } else {
        ctx.fillStyle='rgba(60,100,140,0.4)'; ctx.font='bold 10px Orbitron';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(seenEnemyTypes.size===0?'NO ENEMIES ENCOUNTERED YET':'SELECT AN ENEMY FROM THE LIST', DX+DW/2, DY+(H-DY-28)/2);
    }

    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

// ─── Sector Map full-screen panel ─────────────────────────────────────────────
function drawSectorMap(){
    const W=canvas.width, H=canvas.height;

    ctx.fillStyle='rgba(0,4,12,0.97)'; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(0,180,255,0.4)'; ctx.lineWidth=2;
    roundRect(12,12,W-24,H-24,8); ctx.stroke();

    ctx.fillStyle='#00ccff'; ctx.font='bold 16px Orbitron';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowBlur=16; ctx.shadowColor='#0088ff';
    ctx.fillText('SECTOR MAP', W/2, 38); ctx.shadowBlur=0;
    ctx.fillStyle='rgba(80,160,200,0.5)'; ctx.font='bold 8px Orbitron';
    ctx.fillText('[ESC] CLOSE', W/2, 58);

    // Layout: tree from root, horizontal spacing
    const NODE_W=130, NODE_H=46, H_GAP=50, V_GAP=90;
    const cx=W/2, startY=100;

    // Compute positions for all nodes recursively
    const positions={};
    function assignPos(node, depth, sibIdx, sibCount, parentX){
        const y=startY+depth*V_GAP;
        // Spread siblings evenly
        const totalW=(sibCount-1)*(NODE_W+H_GAP);
        const baseX=parentX-totalW/2+sibIdx*(NODE_W+H_GAP);
        positions[node.id]={x:baseX, y, node};
        node.children.forEach((c,i)=>assignPos(c,depth+1,i,node.children.length,baseX));
    }
    assignPos(SECTOR_TREE,0,0,1,cx);

    // Draw edges first
    function drawEdges(node){
        const p=positions[node.id];
        const pVis=visitedSectorIds.has(node.id);
        for(const child of node.children){
            const c=positions[child.id];
            const cVis=visitedSectorIds.has(child.id);
            // Only draw edge if parent is visited
            if(pVis){
                ctx.strokeStyle=cVis?'rgba(0,180,255,0.4)':'rgba(60,80,100,0.4)';
                ctx.lineWidth=1.5; ctx.setLineDash(cVis?[]:[4,4]);
                ctx.beginPath(); ctx.moveTo(p.x+NODE_W/2,p.y+NODE_H);
                ctx.lineTo(c.x+NODE_W/2,c.y); ctx.stroke();
                ctx.setLineDash([]);
                drawEdges(child);
            }
        }
    }
    function drawNodes(node, parentVis){
        const pos=positions[node.id];
        const vis=visitedSectorIds.has(node.id);
        const showBlank=parentVis&&!vis;

        if(!parentVis) return; // hidden behind unexplored parent

        if(vis){
            ctx.fillStyle=node.color+'22';
            ctx.strokeStyle=node.color; ctx.lineWidth=1.5;
            ctx.shadowBlur=8; ctx.shadowColor=node.color;
            roundRect(pos.x,pos.y,NODE_W,NODE_H,5); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
            ctx.fillStyle=node.color; ctx.font='bold 8px Orbitron';
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(node.name.toUpperCase(), pos.x+NODE_W/2, pos.y+NODE_H/2-6);
            ctx.fillStyle='rgba(160,190,210,0.5)'; ctx.font='bold 6px Orbitron';
            ctx.fillText('DEPTH '+SECTOR_DEPTH_MAP[node.id], pos.x+NODE_W/2, pos.y+NODE_H/2+8);
            node.children.forEach(c=>drawNodes(c,true));
        } else if(showBlank){
            ctx.fillStyle='rgba(20,30,50,0.7)';
            ctx.strokeStyle='rgba(60,90,120,0.5)'; ctx.lineWidth=1;
            roundRect(pos.x,pos.y,NODE_W,NODE_H,5); ctx.fill(); ctx.stroke();
            ctx.fillStyle='rgba(80,110,140,0.5)'; ctx.font='bold 8px Orbitron';
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText('???', pos.x+NODE_W/2, pos.y+NODE_H/2);
        }
    }

    drawEdges(SECTOR_TREE);
    drawNodes(SECTOR_TREE, true);

    // Legend
    ctx.fillStyle='rgba(80,120,160,0.6)'; ctx.font='bold 7px Orbitron';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('Visited: '+visitedSectorIds.size+'  /  Total: '+Object.keys(SECTOR_DEPTH_MAP).length, 36, H-36);

    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

// ── Lobby interactive device drawing (Enemy Index + Sector Map) ──────────────
function drawLobbyDevices(t){
    const now = Date.now();

    // ════════════════════════════════════════════════════════════════════════
    //  ENEMY INDEX — tall arcade-scanner kiosk
    // ════════════════════════════════════════════════════════════════════════
    ctx.save(); ctx.translate(lobbyState.indexTermX, lobbyState.indexTermY);
    const iCol = '#ff8844';
    const iActive = lobbyState.indexTermPrompt;
    const iPulse = Math.sin(t * 2.2) * 0.4 + 0.6;
    const iGlow  = iActive ? 18 + iPulse * 8 : 4;

    // Ground shadow
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(0, 36, 20, 6, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;

    // ── Base pedestal ──────────────────────────────────────────────────────
    ctx.fillStyle = '#0a0f18'; ctx.strokeStyle = '#2a1a08'; ctx.lineWidth = 1.5;
    roundRect(-18, 24, 36, 12, 3); ctx.fill(); ctx.stroke();
    // Pedestal feet
    ctx.fillStyle = '#070c14';
    roundRect(-20, 32, 10, 5, 2); ctx.fill();
    roundRect(10,  32, 10, 5, 2); ctx.fill();

    // ── Cabinet body ──────────────────────────────────────────────────────
    ctx.fillStyle = '#0e1520'; ctx.strokeStyle = '#1a2030'; ctx.lineWidth = 1.5;
    ctx.shadowBlur = iGlow; ctx.shadowColor = iCol + '66';
    roundRect(-17, -8, 34, 34, 4); ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0;

    // Side panel rivets
    for(const sx of [-14, 14]){
        ctx.fillStyle = '#1a2535';
        for(const sy of [-2, 10, 22]) {
            ctx.beginPath(); ctx.arc(sx, sy, 1.5, 0, Math.PI * 2); ctx.fill();
        }
    }

    // ── Screen housing ────────────────────────────────────────────────────
    ctx.fillStyle = '#060c14'; ctx.strokeStyle = iCol + (iActive ? 'cc' : '44');
    ctx.lineWidth = 1.5; ctx.shadowBlur = iActive ? 10 : 3; ctx.shadowColor = iCol;
    roundRect(-13, -5, 26, 22, 3); ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0;

    // Screen glow / scanlines
    const scrG = ctx.createLinearGradient(-13, -5, -13, 17);
    scrG.addColorStop(0, `rgba(255,120,40,${0.12 + iPulse * 0.06})`);
    scrG.addColorStop(1, `rgba(255,60,0,0.04)`);
    ctx.fillStyle = scrG;
    roundRect(-13, -5, 26, 22, 3); ctx.fill();
    // Scanline sweep
    ctx.fillStyle = `rgba(255,140,60,${0.08 + iPulse * 0.04})`;
    const scanY = -5 + ((t * 28) % 22);
    ctx.fillRect(-13, scanY, 26, 2);
    // Scanline lines
    ctx.strokeStyle = 'rgba(255,100,40,0.07)'; ctx.lineWidth = 0.5;
    for(let sl = -4; sl < 18; sl += 3){
        ctx.beginPath(); ctx.moveTo(-13, sl); ctx.lineTo(13, sl); ctx.stroke();
    }

    // Screen content — small animated enemy silhouettes cycling
    const enemyTypes = ['test_drone','scout_crawler','heavy_charger','war_automaton','phase_stalker'];
    const scanIdx = Math.floor(t * 0.8) % enemyTypes.length;
    const scanType = enemyTypes[scanIdx];
    const scanFade = Math.abs(Math.sin(t * 0.8 * Math.PI));
    ctx.save();
    ctx.globalAlpha = seenEnemyTypes.size > 0 ? scanFade * 0.55 : 0.15;
    ctx.beginPath(); roundRect(-13, -5, 26, 22, 3); ctx.clip();
    // Draw tiny enemy sprite on screen
    const fakeScrE = {
        type: seenEnemyTypes.size > 0 ? [...seenEnemyTypes][scanIdx % seenEnemyTypes.size] : 'test_drone',
        age: (t * 60) | 0, size: 5,
        color: '#ff8844', glow: '#ff4400',
        vars: { warnActive:false, sentinelArmAngle: t, striderStrafeDir:1,
                striderBurst:0, striderBurstTimer:0, stalkerAlpha:1, stalkerGlitch:0,
                pulseRings:[], wardenWheels:[], lunarDriftAngle:t, lunarDriftPhase:0 },
        state:'idle',
    };
    ctx.translate(0, 6);
    ctx.scale(0.38, 0.38);
    ctx.rotate(Math.PI / 2);
    try {
        switch(fakeScrE.type){
            case 'test_drone': drawTestDroneE(fakeScrE); break;
            case 'scout_crawler': drawScoutCrawlerE(fakeScrE); break;
            case 'heavy_charger': drawHeavyChargerE(fakeScrE); break;
            case 'war_automaton': drawWarAutomatonE(fakeScrE); break;
            case 'phase_stalker': drawPhaseStalkerE(fakeScrE); break;
            default: drawTestDroneE(fakeScrE); break;
        }
    } catch(err){}
    ctx.restore();

    // Screen corner ticks
    ctx.strokeStyle = iCol; ctx.lineWidth = 1;
    const corners = [[-13,-5],[13,-5],[-13,17],[13,17]];
    const signs   = [[ 1, 1],[-1, 1],[ 1,-1],[-1,-1]];
    corners.forEach(([cx2,cy2],i)=>{
        const [sx,sy]=signs[i];
        ctx.beginPath(); ctx.moveTo(cx2+sx*4,cy2); ctx.lineTo(cx2,cy2); ctx.lineTo(cx2,cy2+sy*4); ctx.stroke();
    });

    // ── Marquee header above screen ───────────────────────────────────────
    ctx.fillStyle = '#0a0e18'; ctx.strokeStyle = iCol + '88'; ctx.lineWidth = 1;
    roundRect(-17, -26, 34, 19, 3); ctx.fill(); ctx.stroke();
    // Scrolling marquee text
    const marqueePhase = (t * 22) % 34;
    ctx.save();
    ctx.beginPath(); roundRect(-15, -24, 30, 15, 2); ctx.clip();
    ctx.fillStyle = iCol; ctx.font = 'bold 6px Orbitron';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.shadowBlur = 4; ctx.shadowColor = iCol;
    ctx.fillText('ENEMY INDEX ✦ ', -marqueePhase, -17);
    ctx.fillText('ENEMY INDEX ✦ ', 34 - marqueePhase, -17);
    ctx.shadowBlur = 0;
    ctx.restore();
    // LED strip
    ctx.fillStyle = iActive ? iCol : iCol + '44';
    ctx.shadowBlur = iActive ? 6 : 0; ctx.shadowColor = iCol;
    for(let li = -14; li <= 14; li += 4){
        ctx.beginPath(); ctx.arc(li, -28, 1.2, 0, Math.PI * 2); ctx.fill();
    }
    ctx.shadowBlur = 0;

    // ── Button panel below screen ─────────────────────────────────────────
    ctx.fillStyle = '#080d16'; ctx.strokeStyle = '#1a2030'; ctx.lineWidth = 1;
    roundRect(-13, 18, 26, 6, 2); ctx.fill(); ctx.stroke();
    // 3 small buttons
    const btnCols = [iCol, '#ff4444', '#ffdd00'];
    for(let bi = 0; bi < 3; bi++){
        ctx.fillStyle = btnCols[bi]; ctx.shadowBlur = iActive ? 5 : 0; ctx.shadowColor = btnCols[bi];
        ctx.beginPath(); ctx.arc(-7 + bi * 7, 21, 1.8, 0, Math.PI * 2); ctx.fill();
    }
    ctx.shadowBlur = 0;

    // ── Seen-count badge ──────────────────────────────────────────────────
    const seenStr = seenEnemyTypes.size + '/' + Object.keys(ENEMY_INFO).length + ' SEEN';
    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.strokeStyle = iCol + '55'; ctx.lineWidth = 0.8;
    const sw = ctx.measureText(seenStr).width-70;
    roundRect(-sw/2, -42, sw, 11, 3); ctx.fill(); ctx.stroke();
    ctx.fillStyle = iCol; ctx.font = 'bold 5px Orbitron'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(seenStr, 0, -37);

    // ── Interact prompt ───────────────────────────────────────────────────
    if(iActive){
        const pb = Math.floor(t * 2) % 2 === 0;
        ctx.fillStyle = pb ? 'rgba(255,255,255,0.9)' : 'rgba(255,180,100,0.75)';
        ctx.font = 'bold 6px Orbitron'; ctx.textAlign = 'center';
        ctx.shadowBlur = 6; ctx.shadowColor = iCol;
        ctx.fillText('[E] OPEN', 0, -56);
        ctx.shadowBlur = 0;
    }
    ctx.restore();

    // ════════════════════════════════════════════════════════════════════════
    //  SECTOR MAP — wide wall-mounted navigation console with antenna
    // ════════════════════════════════════════════════════════════════════════
    ctx.save(); ctx.translate(lobbyState.mapTermX, lobbyState.mapTermY);
    const mCol = '#44ccff';
    const mActive = lobbyState.mapTermPrompt;
    const mPulse = Math.sin(t * 1.6 + 1) * 0.4 + 0.6;
    const mGlow  = mActive ? 16 + mPulse * 8 : 4;

    // Ground shadow
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(0, 34, 26, 6, 0, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;

    // ── Base stand ────────────────────────────────────────────────────────
    ctx.fillStyle = '#080d18'; ctx.strokeStyle = '#112030'; ctx.lineWidth = 1.2;
    roundRect(-8, 26, 16, 8, 2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#060a12';
    roundRect(-22, 30, 44, 5, 2); ctx.fill(); ctx.stroke();

    // ── Main console body (wider than tall) ───────────────────────────────
    ctx.fillStyle = '#0c1626'; ctx.strokeStyle = '#162030'; ctx.lineWidth = 1.5;
    ctx.shadowBlur = mGlow; ctx.shadowColor = mCol + '55';
    roundRect(-24, -4, 48, 32, 5); ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0;
    // Top curved cap
    ctx.fillStyle = '#101e30'; ctx.strokeStyle = '#1a2a40'; ctx.lineWidth = 1;
    roundRect(-24, -4, 48, 10, 5); ctx.fill(); ctx.stroke();
    // Side vents
    for(const vx of [-20, 18]){
        ctx.strokeStyle = '#0a1828'; ctx.lineWidth = 1;
        for(let vi = 0; vi < 4; vi++){
            ctx.beginPath(); ctx.moveTo(vx, 8 + vi * 4); ctx.lineTo(vx + 2, 8 + vi * 4); ctx.stroke();
        }
    }

    // ── Monitor screen ────────────────────────────────────────────────────
    ctx.fillStyle = '#040a12'; ctx.strokeStyle = mCol + (mActive ? 'bb' : '33');
    ctx.lineWidth = 1.5; ctx.shadowBlur = mActive ? 12 : 3; ctx.shadowColor = mCol;
    roundRect(-19, -2, 38, 24, 3); ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0;

    // Screen gradient glow
    const mScrG = ctx.createLinearGradient(-19, -2, -19, 22);
    mScrG.addColorStop(0, `rgba(30,180,255,${0.10 + mPulse * 0.05})`);
    mScrG.addColorStop(1, `rgba(0,80,140,0.03)`);
    ctx.fillStyle = mScrG;
    roundRect(-19, -2, 38, 24, 3); ctx.fill();

    // Mini sector tree drawn on screen
    ctx.save();
    ctx.beginPath(); roundRect(-19, -2, 38, 24, 3); ctx.clip();
    const treeNodes = [
        {x:0, y:2, col:'#00ccff', visited: visitedSectorIds.has('laboratory')},
        {x:-10,y:9, col:'#ff8800', visited: visitedSectorIds.has('energy_plant')},
        {x:10, y:9, col:'#00ffcc', visited: visitedSectorIds.has('outskirts')},
        {x:-15,y:16,col:'#ff4400', visited: visitedSectorIds.has('reactor_room')},
        {x:-5, y:16,col:'#44cc44', visited: visitedSectorIds.has('sewers')},
        {x:5,  y:16,col:'#cc44ff', visited: visitedSectorIds.has('secret_lab')},
        {x:15, y:16,col:'#ffffff', visited: false},
    ];
    const treeEdges = [[0,1],[0,2],[1,2],[1,3],[1,4],[2,5],[2,6]];
    treeEdges.forEach(([a,b])=>{
        const na=treeNodes[a], nb=treeNodes[b];
        ctx.strokeStyle=(na.visited&&nb.visited)?`rgba(0,180,255,0.5)`:'rgba(20,50,80,0.6)';
        ctx.lineWidth=0.6;
        ctx.beginPath(); ctx.moveTo(na.x,na.y); ctx.lineTo(nb.x,nb.y); ctx.stroke();
    });
    treeNodes.forEach(n=>{
        ctx.fillStyle = n.visited ? n.col : '#1a2a3a';
        ctx.shadowBlur = n.visited ? 4 : 0; ctx.shadowColor = n.col;
        ctx.beginPath(); ctx.arc(n.x, n.y, n.visited ? 2.2 : 1.5, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    });
    // Blinking cursor on latest visited node
    const visitedNodes = treeNodes.filter(n=>n.visited);
    if(visitedNodes.length > 0 && Math.floor(t * 2) % 2 === 0){
        const last = visitedNodes[visitedNodes.length - 1];
        ctx.strokeStyle = mCol; ctx.lineWidth = 0.8; ctx.globalAlpha = 0.7;
        ctx.beginPath(); ctx.arc(last.x, last.y, 4, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha = 1;
    }
    ctx.restore();

    // Screen corner ticks
    ctx.strokeStyle = mCol + '88'; ctx.lineWidth = 0.8;
    [[-19,-2],[19,-2],[-19,22],[19,22]].forEach(([cx2,cy2],i)=>{
        const sx=i%2===0?1:-1, sy=i<2?1:-1;
        ctx.beginPath(); ctx.moveTo(cx2+sx*4,cy2); ctx.lineTo(cx2,cy2); ctx.lineTo(cx2,cy2+sy*4); ctx.stroke();
    });

    // ── Keyboard / input panel below screen ───────────────────────────────
    ctx.fillStyle = '#080f1e'; ctx.strokeStyle = '#0e1c2e'; ctx.lineWidth = 1;
    roundRect(-19, 23, 38, 6, 2); ctx.fill(); ctx.stroke();
    // Key rows
    for(let row = 0; row < 2; row++){
        const keys2 = row === 0 ? 8 : 6;
        const kw = 3, gap = 1.5;
        const totalW = keys2 * (kw + gap) - gap;
        const startX = -totalW/2;
        for(let k = 0; k < keys2; k++){
            const kx = startX + k * (kw + gap);
            const ky = 24 + row * 3;
            ctx.fillStyle = `rgba(0,${80+row*20},${120+k*5},0.4)`;
            roundRect(kx, ky, kw, 2, 0.5); ctx.fill();
        }
    }

    // ── Antenna on top ────────────────────────────────────────────────────
    ctx.strokeStyle = '#1a2a40'; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(8, -4); ctx.lineTo(8, -28); ctx.stroke();
    ctx.strokeStyle = '#0a1828'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(8, -28); ctx.lineTo(0, -22); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8, -28); ctx.lineTo(16, -22); ctx.stroke();
    // Antenna tip glow — pulses faster when active
    const antPulse = mActive ? Math.sin(t * 8) * 0.5 + 0.5 : mPulse * 0.5;
    ctx.fillStyle = mActive ? mCol : mCol + '66';
    ctx.shadowBlur = 6 + antPulse * 10; ctx.shadowColor = mCol;
    ctx.beginPath(); ctx.arc(8, -28, 2 + antPulse * 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    // Signal rings
    if(mActive || mPulse > 0.8){
        for(let ri = 1; ri <= 2; ri++){
            const rf = (t * 1.5 + ri * 0.5) % 2;
            ctx.strokeStyle = `rgba(68,200,255,${Math.max(0, 0.5 - rf * 0.3)})`;
            ctx.lineWidth = 0.8;
            ctx.beginPath(); ctx.arc(8, -28, 5 + rf * 12, 0, Math.PI * 2); ctx.stroke();
        }
    }

    // ── Visited count badge ───────────────────────────────────────────────
    const visitedStr = visitedSectorIds.size + '/' + Object.keys(SECTOR_DEPTH_MAP).length + ' VISITED';
    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.strokeStyle = mCol + '44'; ctx.lineWidth = 0.8;
    const mw = ctx.measureText(visitedStr).width-80;
    roundRect(-mw/2, -42, mw, 11, 3); ctx.fill(); ctx.stroke();
    ctx.fillStyle = mCol; ctx.font = 'bold 5px Orbitron'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(visitedStr, 0, -37);

    // ── Interact prompt ───────────────────────────────────────────────────
    if(mActive){
        const pb = Math.floor(t * 2) % 2 === 0;
        ctx.fillStyle = pb ? 'rgba(255,255,255,0.9)' : 'rgba(100,220,255,0.75)';
        ctx.font = 'bold 6px Orbitron'; ctx.textAlign = 'center';
        ctx.shadowBlur = 6; ctx.shadowColor = mCol;
        ctx.fillText('[E] OPEN', 0, -56);
        ctx.shadowBlur = 0;
    }
    ctx.restore();

    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

function handleLobbyKey(key){
    if(lobbyState.vanLaunching) return;

    // ── Escape closes any open panel ─────────────────────────────────────────
    if(key==='Escape'){
        if(lobbyState.weaponBrowserOpen){ lobbyState.weaponBrowserOpen=false; return; }
        if(lobbyState.rerollMenuOpen)   { lobbyState.rerollMenuOpen=false;    return; }
        if(lobbyState.indexOpen){ lobbyState.indexOpen=false; return; }
        if(lobbyState.mapOpen)  { lobbyState.mapOpen=false;   return; }
        if(lobbyModPanel)       { lobbyModPanel=false;         return; }
        if(lobbyUpgradePanel)   { lobbyUpgradePanel=false;     return; }
    }

    // ── Pass keys to open full-screen panels ─────────────────────────────────
    if(lobbyState.weaponBrowserOpen){
        const allWeps=WEAPONS.map((w,idx)=>({w,idx})).filter(({w})=>w.class!=='BLANK');
        if(key==='ArrowUp'||key==='w'||key==='W'){ lobbyState.weaponBrowserScroll=Math.max(0,lobbyState.weaponBrowserScroll-1); return; }
        if(key==='ArrowDown'||key==='s'||key==='S'){ lobbyState.weaponBrowserScroll=Math.min(allWeps.length-1,lobbyState.weaponBrowserScroll+1); return; }
        if(key==='Enter'||key==='e'||key==='E'){
            const {w,idx:wIdx}=allWeps[lobbyState.weaponBrowserScroll];
            if(!seenWeaponIds.has(w.id)) return;
            const tierIdx=lobbyState.tierTerminal.selectedTier;
            const td=TIER_DATA[tierIdx];
            const elig=MOD_POOL.filter(m=>m.eligible(w));
            const pool2=elig.length>0?elig:MOD_POOL;
            const mods=[];
            for(let k=0;k<td.modCount;k++) mods.push(pool2[Math.floor(Math.random()*pool2.length)].id);
            const angle=Math.random()*Math.PI*2;
            const spd=2.5+Math.random()*2;
            droppedModules.push({
                x:lobbyState.weaponBrowserTerminal.x, y:lobbyState.weaponBrowserTerminal.y-20,
                vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
                weaponIdx:wIdx, tierIdx, tierData:td, mods, life:1800, pickupPrompt:false
            });
            spawnDamageText(lobbyState.weaponBrowserTerminal.x, lobbyState.weaponBrowserTerminal.y-50, w.name+' DROPPED!', td.color);
            return;
        }
        return;
    }
    if(lobbyState.rerollMenuOpen){
        if(key==='Enter'||key==='e'||key==='E'){
            const slotD=moduleSlotData[activeModuleSlot];
            if(slotD){
                const wp2=WEAPONS[moduleSlots[activeModuleSlot]];
                const elig=MOD_POOL.filter(m=>m.eligible(wp2)), pool2=elig.length>0?elig:MOD_POOL;
                const newMods=[];
                for(let k=0;k<slotD.tierData.modCount;k++) newMods.push(pool2[Math.floor(Math.random()*pool2.length)].id);
                moduleSlotData[activeModuleSlot]={...slotD,mods:newMods};
                spawnDamageText(player.x,player.y-44,'MODS REROLLED!','#cc44ff');
            }
            return;
        }
        return;
    }
    if(lobbyState.indexOpen){
        const allTypes=Object.keys(ENEMY_INFO);
        const sorted=[...allTypes.filter(t=>seenEnemyTypes.has(t)),...allTypes.filter(t=>!seenEnemyTypes.has(t))];
        if(key==='ArrowUp'  ||key==='w'||key==='W'){ lobbyState.indexScroll=Math.max(0,lobbyState.indexScroll-1); lobbyState.indexDescScroll=0; return; }
        if(key==='ArrowDown'||key==='s'||key==='S'){ lobbyState.indexScroll=Math.min(sorted.length-1,lobbyState.indexScroll+1); lobbyState.indexDescScroll=0; return; }
        return; // swallow all other keys while index is open
    }
    if(lobbyState.mapOpen) return; // swallow all keys while map is open

    // ── Modifier panel hotkeys (only when open) ───────────────────────────────
    if(lobbyModPanel){
        const modKeys={'1':0,'2':1,'3':2,'4':3,'5':4,'6':5,'7':6,'8':7,'9':8,'q':9,'Q':9,'w':10,'W':10,'e':11,'E':11,'r':12,'R':12};
        if(modKeys[key]!==undefined){
            const idx=modKeys[key];
            if(idx<MODIFIER_DEFS.length){ toggleModifier(MODIFIER_DEFS[idx].id); return; }
        }
        return;
    }

    // ── Upgrade panel keys ────────────────────────────────────────────────────
    if(lobbyUpgradePanel){
        if(key==='e'||key==='E'||key==='Enter'){
            const node=META_UPGRADE_DEFS.find(d=>d.id===treeView.selectedId);
            if(node) buyMeta(node.id);
        } else if(key==='+'||key==='='){ treeView.zoom=Math.min(2.2,treeView.zoom+0.12);
        } else if(key==='-'){            treeView.zoom=Math.max(0.3,treeView.zoom-0.12);
        } else if(key==='0'){           treeView.zoom=0.85; treeView.panX=0; treeView.panY=0;
        }
        return;
    }

    // ── Tier terminal up/down ─────────────────────────────────────────────────
    if(key==='ArrowUp'   && lobbyState.tierTerminal.prompt){
        lobbyState.tierTerminal.selectedTier=Math.min(TIER_DATA.length-1,lobbyState.tierTerminal.selectedTier+1); return;
    }
    if(key==='ArrowDown' && lobbyState.tierTerminal.prompt){
        lobbyState.tierTerminal.selectedTier=Math.max(0,lobbyState.tierTerminal.selectedTier-1); return;
    }

    // ── Difficulty left/right (near NPC, no panel open) ───────────────────────
    if(lobbyState.npcPrompt){
        if(key==='a'||key==='A'||key==='ArrowLeft'){  selectedDifficulty=Math.max(0,selectedDifficulty-1); triggerDifficultyChange(); }
        if(key==='d'||key==='D'||key==='ArrowRight'){ selectedDifficulty=Math.min(2,selectedDifficulty+1); triggerDifficultyChange(); }
    }

    // ── [E] interactions ──────────────────────────────────────────────────────
    if(key==='e'||key==='E'){

        // Upgrade terminal → upgrade panel
        if(lobbyState.termPrompt){ lobbyUpgradePanel=true; return; }

        // Enemy Index terminal → open index
        if(lobbyState.indexTermPrompt){ lobbyState.indexOpen=true; return; }

        // Sector Map terminal → open map
        if(lobbyState.mapTermPrompt){ lobbyState.mapOpen=true; return; }

        // NPC → toggle modifier panel
        if(lobbyState.npcPrompt){ lobbyModPanel=!lobbyModPanel; return; }

        // Van → start run
        if(lobbyState.vanPrompt){ lobbyState.vanLaunching=true; lobbyState.vanLaunchTimer=0; return; }

        // ── Range terminals ───────────────────────────────────────────────────
        // Reroll terminal → open reroll menu (checked BEFORE rack so proximity doesn't conflict)
        const rrt=lobbyState.rerollTerminal;
        if(rrt.prompt){ lobbyState.rerollMenuOpen=true; return; }

        // Weapon browser terminal → open browser (checked BEFORE rack for same reason)
        const wbt=lobbyState.weaponBrowserTerminal;
        if(wbt.prompt){ lobbyState.weaponBrowserOpen=true; lobbyState.weaponBrowserScroll=0; return; }

        // Weapon rack
        const validWeps=WEAPONS.map((w,idx)=>({w,idx})).filter(({w})=>w.class!=='BLANK');
        for(let ti=0;ti<lobbyState.rackTerminals.length;ti++){
            const rt=lobbyState.rackTerminals[ti];
            if(!rt.prompt) continue;
            const {w,idx}=validWeps[ti % validWeps.length];
            if(!seenWeaponIds.has(w.id)) return;
            const tierIdx=lobbyState.tierTerminal.selectedTier;
            const td=TIER_DATA[tierIdx];
            const elig=MOD_POOL.filter(m=>m.eligible(w));
            const pool2=elig.length>0?elig:MOD_POOL;
            const mods=[];
            for(let k=0;k<td.modCount;k++) mods.push(pool2[Math.floor(Math.random()*pool2.length)].id);
            moduleSlots[activeModuleSlot]=idx;
            moduleSlotData[activeModuleSlot]={tierIdx,tierData:td,mods};
            lobbyState.rackSelectedWeaponIdx=idx;
            switchWeapon(idx);
            spawnDamageText(player.x,player.y-44,w.name+' '+td.label,td.color);
            return;
        }
        // Tier terminal
        const tt=lobbyState.tierTerminal;
        if(tt.prompt && moduleSlots[activeModuleSlot]!==-1){
            const tierIdx=tt.selectedTier, td=TIER_DATA[tierIdx];
            const wpIdx=moduleSlots[activeModuleSlot], wp2=WEAPONS[wpIdx];
            const elig=MOD_POOL.filter(m=>m.eligible(wp2)), pool2=elig.length>0?elig:MOD_POOL;
            const mods=[];
            for(let k=0;k<td.modCount;k++) mods.push(pool2[Math.floor(Math.random()*pool2.length)].id);
            moduleSlotData[activeModuleSlot]={tierIdx,tierData:td,mods};
            switchWeapon(wpIdx);
            spawnDamageText(player.x,player.y-44,'TIER SET: '+td.label,td.color);
            return;
        }
    }

    // ── U: upgrade panel (legacy shortcut near terminal) ─────────────────────
    if((key==='u'||key==='U') && lobbyState.termPrompt){ lobbyUpgradePanel=true; }
}
function triggerDifficultyChange(){
    lobbyState.dialTargetAngle = selectedDifficulty*(Math.PI*2/3);
    lobbyState.dialSpin += 0.3;
    const q=NPC_QUOTES[Math.floor(Math.random()*NPC_QUOTES.length)];
    lobbyState.npcQuote=q; lobbyState.npcQuoteTimer=140;
}

    resetRunState();
    applyDifficultyToRun();
    gameState='lobby';
    lobbyState.built = false
    buildLobby();

function drawRunComplete(){
    const W=canvas.width, H=canvas.height, rd=runCompleteData;
    if(!rd) return;
    const t=rd.timer/60;
    const fade=Math.min(1,t*1.5);

    // Full-screen dark overlay
    ctx.fillStyle=`rgba(0,4,12,${fade*0.96})`;
    ctx.fillRect(0,0,W,H);
    if(fade<0.3) return;

    const cx=W/2, cy=H/2;

    // Outer glow panel
    ctx.save();
    ctx.shadowBlur=40; ctx.shadowColor='#ffcc00';
    ctx.strokeStyle='rgba(255,200,40,0.5)'; ctx.lineWidth=2;
    roundRect(cx-260,cy-200,520,400,12); ctx.stroke(); ctx.shadowBlur=0;
    ctx.fillStyle='rgba(0,6,18,0.92)';
    roundRect(cx-260,cy-200,520,400,12); ctx.fill();
    ctx.restore();

    // Header
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#ffdd00'; ctx.font='bold 28px Orbitron';
    ctx.shadowBlur=24; ctx.shadowColor='#ffaa00';
    ctx.fillText('RUN COMPLETE', cx, cy-165); ctx.shadowBlur=0;

    ctx.fillStyle='rgba(255,200,60,0.6)'; ctx.font='bold 11px Orbitron';
    ctx.fillText(rd.bossName+' DEFEATED', cx, cy-138);

    // Separator
    ctx.strokeStyle='rgba(255,200,40,0.3)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx-220,cy-118); ctx.lineTo(cx+220,cy-118); ctx.stroke();

    // Stat rows
    const rows=[
        ['SECTORS CLEARED',   rd.sectorBP,    '#00ccff'],
        ['MODIFIERS ACTIVE',  rd.modifierBP,  '#cc44ff'],
        ['DIFFICULTY MULT',   rd.difficulty+'  ×'+rd.diffMult, '#ffaa44'],
    ];
    rows.forEach(([label,val,col],i)=>{
        const ry=cy-90+i*44;
        ctx.fillStyle='rgba(255,255,255,0.05)';
        roundRect(cx-210,ry-14,420,30,4); ctx.fill();
        ctx.fillStyle='rgba(140,170,190,0.7)'; ctx.font='bold 9px Orbitron';
        ctx.textAlign='left'; ctx.fillText(label,cx-196,ry+2);
        ctx.fillStyle=col; ctx.font='bold 12px Orbitron';
        ctx.textAlign='right'; ctx.fillText(val,cx+200,ry+2);
    });
    ctx.textAlign='center';

    // Separator
    ctx.strokeStyle='rgba(255,200,40,0.3)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx-220,cy+54); ctx.lineTo(cx+220,cy+54); ctx.stroke();

    // Blueprints earned
    ctx.fillStyle='rgba(255,220,60,0.85)'; ctx.font='bold 11px Orbitron';
    ctx.fillText('BLUEPRINTS EARNED', cx, cy+76);
    ctx.fillStyle='#ffdd00'; ctx.font='bold 42px Orbitron';
    ctx.shadowBlur=28; ctx.shadowColor='#ffaa00';
    ctx.fillText('+'+rd.earnedBP+' ◈', cx, cy+118); ctx.shadowBlur=0;

    ctx.fillStyle='rgba(140,170,190,0.55)'; ctx.font='bold 9px Orbitron';
    ctx.fillText('TOTAL BLUEPRINTS: '+rd.totalBP, cx, cy+146);

    // Blink prompt
    if(Math.floor(t*1.6)%2===0){
        ctx.fillStyle='rgba(0,200,255,0.7)'; ctx.font='bold 10px Orbitron';
        ctx.fillText('PRESS ANY KEY TO RETURN TO LOBBY', cx, cy+178);
    }

    // Scanline overlay
    ctx.fillStyle=`rgba(0,10,20,${0.07*fade})`;
    for(let sy=0;sy<H;sy+=4) ctx.fillRect(0,sy,W,2);
}

// ═══════════════════════════════════════════════════════════════════════════════
function loop(){
    if(gameState==='title'){
        updateTitle(); drawTitle();
    } else if(gameState==='tutorial'){
        updateTutorial();
        drawTitle(); // keep title bg rendering behind
        if(tutorialState.phase==='prompt') drawTutorialPrompt();
        else drawTutorial();
    } else if(gameState==='lobby'){
        updateLobby(); drawLobby();
    } else if(gameState==='run_complete'){
        updateRunComplete(); drawRunComplete();
    } else if(gameState==='player_dead'){
        updatePlayerDead(); draw(); drawPlayerDead();
    } else {
        update(); draw();
    }
    requestAnimationFrame(loop);
}

// Intercept any-key on title
window.addEventListener('keydown', e => {
    if(gameState==='title'){
        titleState.flashTimer=30;
        // First time ever? Offer tutorial via localStorage flag
        const seen = localStorage.getItem('alldule_tutorial_seen');
        if(!seen){
            gameState='tutorial';
            tutorialState.slide=0;
            tutorialState.phase='prompt';
            tutorialState.promptSel=0;
            tutorialState.fadeIn=0;
        } else {
            gameState='lobby';
            buildLobby();
        }
        return;
    }
    if(gameState==='tutorial'){
        if(tutorialState.phase==='prompt'){
            if(e.key==='ArrowLeft'||e.key==='ArrowRight'||e.key==='a'||e.key==='d'||e.key==='A'||e.key==='D'){
                tutorialState.promptSel=1-tutorialState.promptSel;
            } else if(e.key==='Enter'||e.key===' '){
                e.preventDefault();
                localStorage.setItem('alldule_tutorial_seen','1');
                if(tutorialState.promptSel===0){
                    // YES — show slides
                    tutorialState.phase='slides';
                    tutorialState.slide=0;
                    tutorialState.fadeIn=0;
                } else {
                    // NO — skip to lobby
                    gameState='lobby';
                    buildLobby();
                }
            } else if(e.key==='Escape'){
                localStorage.setItem('alldule_tutorial_seen','1');
                gameState='lobby'; buildLobby();
            }
        } else {
            // Slides phase
            if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'||e.key==='Enter'||e.key===' '){
                if(e.key===' '||e.key==='Enter') e.preventDefault();
                if(tutorialState.slide < TUTORIAL_SLIDES.length-1){
                    tutorialState.slide++;
                } else {
                    gameState='lobby'; buildLobby();
                }
            } else if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){
                if(tutorialState.slide > 0) tutorialState.slide--;
            } else if(e.key==='Escape'){
                gameState='lobby'; buildLobby();
            }
        }
        return;
    }
    if(gameState==='run_complete'){
        returnToLobby(); return;
    }
    if(gameState==='player_dead'){
        if(deathData && deathData.timer > 60) returnToLobby();
        return;
    }
    if(gameState==='lobby'){
        handleLobbyKey(e.key);
        // Still need normal keys[] for movement
        keys[e.key]=true;
        // While in range, also handle in-game key bindings
        if(lobbyState.inRange){
            if(e.key==='Tab'||e.key==='q'||e.key==='Q'){ e.preventDefault(); switchToSlot(1-activeModuleSlot); }
            if(e.key==='r'||e.key==='R') startReload();
            if(e.key===' ') e.preventDefault();
        }
        return;
    }
    // Normal in-game keys handled below (already registered)
}, true); // capture phase so this fires before existing listener

window.addEventListener('keyup', e => {
    if(gameState==='lobby'){ keys[e.key]=false; }
}, true);

// Start on title screen
loadGame();
loop();

// ═══════════════════════════════════════════════════════════════════════════════
//  DEBUG HELPERS  (call from browser console)
// ═══════════════════════════════════════════════════════════════════════════════
// Usage:  goTo('venus')   or   goTo('the_moon_a')   etc.
// Lists all valid IDs:  goTo()
function goTo(sectorId){
    // Collect every node from the sector tree
    function collectNodes(node, acc){
        acc.push(node);
        for(const c of node.children) collectNodes(c, acc);
        return acc;
    }
    const allNodes = collectNodes(SECTOR_TREE, []);

    if(!sectorId){
        console.log('%c[DEBUG] Valid sector IDs:', 'color:#00ccff;font-weight:bold');
        allNodes.forEach(n => console.log(`  %c${n.id}%c  (${n.name}, depth ${SECTOR_DEPTH_MAP[n.id]})`, 'color:#ffdd00', 'color:#aaaaaa'));
        return;
    }

    const target = allNodes.find(n => n.id === sectorId);
    if(!target){
        console.warn(`[DEBUG] Unknown sector "${sectorId}". Call goTo() with no args to list all IDs.`);
        return;
    }

    // Force into playing state and generate the world
    gameState = 'playing';
    generateWorld(target);

    // Give the player full health and push scrap up so the run is playable
    player.health    = player.maxHealth;
    player.momentumX = 0;
    player.momentumY = 0;

    console.log(`%c[DEBUG] Teleported to "${target.name}" (depth ${SECTOR_DEPTH_MAP[target.id]})`, 'color:#44ff88;font-weight:bold');
}

// Also expose on window so it's easy to call
window.goTo = goTo;
</script>
