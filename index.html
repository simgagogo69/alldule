                5, 10, '#ff6600', '#ff2200', 'firewheel'
            );
            proj.spinAngle = Math.random() * Math.PI * 2;
            proj.spinSpeed = 0.22 + Math.random() * 0.12;
            proj.age = 0;
            enemyProjectiles.push(proj);
        }
        // Screen shake
        camera.x += (Math.random() - 0.5) * 5;
        camera.y += (Math.random() - 0.5) * 5;
    }
}

// ── Dust Strider — fast strafing, fires 3-round burst ────────────────────────
function updateDustStrider(e,d){
    // Strafe perpendicular to the aim angle while advancing
    e.angle += (e.aimAngle - e.angle) * 0.10;
    e.vars.striderStrafeTimer--;
    if(e.vars.striderStrafeTimer <= 0){
        e.vars.striderStrafeTimer = 30 + Math.floor(Math.random() * 40);
        e.vars.striderStrafeDir *= -1;
    }
    const strafeAngle = e.aimAngle + Math.PI * 0.5 * e.vars.striderStrafeDir;
    const advanceAngle = e.aimAngle;
    // Move: advance toward player + strafe sideways
    const nx = e.x + Math.cos(advanceAngle) * e.speed * 0.55 + Math.cos(strafeAngle) * e.speed * 0.8;
    const ny = e.y + Math.sin(advanceAngle) * e.speed * 0.55 + Math.sin(strafeAngle) * e.speed * 0.8;
    const tt = map[Math.floor(ny/TILE_SIZE)]?.[Math.floor(nx/TILE_SIZE)];
    if(tt !== T_WALL && tt !== T_VOID){ e.x = nx; e.y = ny; }
    else { e.vars.striderStrafeDir *= -1; e.vars.striderStrafeTimer = 10; }

    // Burst fire
    if(e.vars.striderBurst > 0){
        e.vars.striderBurstTimer--;
        if(e.vars.striderBurstTimer <= 0){
            e.vars.striderBurst--;
            e.vars.striderBurstTimer = 8;
            const a = e.aimAngle + (Math.random() - 0.5) * 0.12;
            enemyProjectiles.push(new EnemyProjectile(
                e.x, e.y,
                Math.cos(a) * 7, Math.sin(a) * 7,
                2, 4, e.color, e.glow, 'bolt'
            ));
        }
    }
    if(d < e.atkRange && e.atkTimer <= 0 && e.vars.striderBurst === 0){
        e.atkTimer = e.atkCooldown;
        e.vars.striderBurst = 3;
        e.vars.striderBurstTimer = 0;
    }
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function drawEnemies(){
    // Draw active laser beams
    for(const b of activeLaserBeams){
        const f=b.life/b.maxLife;
        ctx.save();
        ctx.strokeStyle=b.color; ctx.lineWidth=2.5*f; ctx.shadowBlur=18*f; ctx.shadowColor=b.glow;
        ctx.globalAlpha=f;
        ctx.beginPath(); ctx.moveTo(b.x1,b.y1); ctx.lineTo(b.x2,b.y2); ctx.stroke();
        ctx.strokeStyle=`rgba(255,255,255,${f*.4})`; ctx.lineWidth=1; ctx.shadowBlur=0;
        ctx.beginPath(); ctx.moveTo(b.x1,b.y1); ctx.lineTo(b.x2,b.y2); ctx.stroke();
        ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
    }

    for(const proj of enemyProjectiles) proj.draw();

    // Draw pulse/radiation rings (world-space, enemy attached)
    for(const e of enemies){
        if(e.dead&&e.deathTimer<=0) continue;
        if((e.type==='radiation_emitter'||e.type==='pulse_emitter')&&e.vars.pulseRings){
            for(const r of e.vars.pulseRings){
                const rf=r.life/r.maxLife;
                ctx.save(); ctx.globalAlpha=rf*.5;
                ctx.strokeStyle=e.color; ctx.lineWidth=2+rf*2;
                ctx.shadowBlur=10; ctx.shadowColor=e.glow;
                ctx.beginPath(); ctx.arc(e.x,e.y,r.r,0,Math.PI*2); ctx.stroke();
                ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
            }
        }
    }

    for(const e of enemies){
        if(e.dead&&e.deathTimer<=0) continue;
        ctx.save();
        ctx.translate(e.x,e.y);

        if(e.dead){
            const df=e.deathTimer/35;
            ctx.globalAlpha=df;
            ctx.rotate(e.age*0.15);
            ctx.strokeStyle=e.color; ctx.lineWidth=2; ctx.shadowBlur=20*df; ctx.shadowColor=e.glow;
            ctx.beginPath(); ctx.arc(0,0,e.size*(2-df),0,Math.PI*2); ctx.stroke();
            ctx.restore(); continue;
        }

        ctx.rotate(e.angle);
        // Dispatch to type-specific draw
        // Phase Stalker: apply invisibility alpha before drawing
        if(e.type==='phase_stalker'){
            ctx.globalAlpha = Math.max(0.04, e.vars.stalkerAlpha + e.vars.stalkerGlitch*0.5);
        }
        switch(e.type){
            case 'test_drone':        drawTestDroneE(e); break;
            case 'laser_turret':      drawLaserTurretE(e); break;
            case 'security_charger':  drawSecurityChargerE(e); break;
            case 'reactor_drone':     drawReactorDroneE(e); break;
            case 'spark_mine':        drawSparkMineE(e); break;
            case 'sniper_node':       drawSniperNodeE(e); break;
            case 'scout_crawler':     drawScoutCrawlerE(e); break;
            case 'radiation_emitter': drawRadiationEmitterE(e); break;
            case 'heavy_charger':     drawHeavyChargerE(e); break;
            case 'sludge_beast':      drawSludgeBeastE(e); break;
            case 'spike_worm':        drawSpikeWormE(e); break;
            case 'prototype_sentinel':drawPrototypeSentinelE(e); break;
            case 'pulse_emitter':     drawPulseEmitterE(e); break;
            case 'mutant_core':       drawMutantCoreE(e); break;
            case 'plasma_orbiter':    drawPlasmaOrbiterE(e); break;
            case 'war_automaton':     drawWarAutomatonE(e); break;
            case 'phase_stalker':     drawPhaseStalkerE(e); break;
            case 'lunar_drone':       drawLunarDroneE(e); break;
            case 'solar_warden':      drawSolarWardenE(e); break;
            case 'dust_strider':      drawDustStriderE(e); break;
            case 'training_dummy':    drawTrainingDummyE(e); break;
        }
        if(e.type==='phase_stalker') ctx.globalAlpha=1;

        // ── Weakpoint indicator (enemy-local space, before un-rotate) ─────────────
        const _wpDef=ENEMY_DEFS[e.type];
        if(_wpDef&&_wpDef.wpOffset){
            // Phase stalker: weakpoint also fades with invisibility
            const _wpAlpha = e.type==='phase_stalker'
                ? Math.max(0.04, e.vars.stalkerAlpha + e.vars.stalkerGlitch*0.5)
                : 1;
            ctx.globalAlpha = _wpAlpha;
            const _wpulse=Math.sin(Date.now()/200)*0.4+0.6;
            ctx.fillStyle=`rgba(255,30,30,${0.55+_wpulse*0.35})`;
            ctx.shadowBlur=8*_wpulse; ctx.shadowColor='#ff0000';
            ctx.beginPath(); ctx.arc(_wpDef.wpOffset.x,_wpDef.wpOffset.y,4,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle=`rgba(255,110,110,0.75)`; ctx.lineWidth=1.2; ctx.shadowBlur=4;
            ctx.beginPath(); ctx.arc(_wpDef.wpOffset.x,_wpDef.wpOffset.y,6.5,0,Math.PI*2); ctx.stroke();
            ctx.shadowBlur=0;
            ctx.globalAlpha=1;
        }

        // Health arc (top of enemy, unrotated)
        ctx.rotate(-e.angle);
        if(e.hp<e.maxHp){
            const hf=e.hp/e.maxHp;
            ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=3;
            ctx.beginPath(); ctx.arc(0,0,e.size+5,-Math.PI/2,Math.PI*3/2); ctx.stroke();
            ctx.strokeStyle=hf>0.5?'#44ff44':hf>0.25?'#ffaa00':'#ff2200';
            ctx.shadowBlur=6; ctx.shadowColor=ctx.strokeStyle;
            ctx.lineWidth=2.5;
            ctx.beginPath(); ctx.arc(0,0,e.size+5,-Math.PI/2,-Math.PI/2+Math.PI*2*hf); ctx.stroke();
            ctx.shadowBlur=0;
        }

        // ── Elite indicator: pulsing outer ring + crown pip ──────────────────
        if(e.isElite){
            const ep=Math.sin(Date.now()/160)*0.5+0.5;
            ctx.strokeStyle=`rgba(255,${180+ep*75|0},0,${0.7+ep*0.3})`;
            ctx.lineWidth=2.5; ctx.shadowBlur=14+ep*8; ctx.shadowColor='#ffaa00';
            ctx.beginPath(); ctx.arc(0,0,e.size+10,0,Math.PI*2); ctx.stroke();
            // Crown pips (3 triangles on top of ring)
            ctx.fillStyle=`rgba(255,${200+ep*55|0},40,0.9)`;
            ctx.shadowBlur=8; ctx.shadowColor='#ffcc00';
            for(let ci=0;ci<3;ci++){
                const ca=-Math.PI/2+(ci-1)*(Math.PI*0.38);
                const ir=e.size+10, or2=ir+7+ep*3;
                ctx.beginPath();
                ctx.moveTo(Math.cos(ca)*or2,Math.sin(ca)*or2);
                ctx.lineTo(Math.cos(ca-0.18)*(ir+2),Math.sin(ca-0.18)*(ir+2));
                ctx.lineTo(Math.cos(ca+0.18)*(ir+2),Math.sin(ca+0.18)*(ir+2));
                ctx.closePath(); ctx.fill();
            }
            ctx.shadowBlur=0;
            // "ELITE" label above
            ctx.fillStyle=`rgba(255,210,60,${0.75+ep*0.25})`;
            ctx.font='bold 7px Orbitron'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.shadowBlur=6; ctx.shadowColor='#ffaa00';
            ctx.fillText('ELITE',0,-(e.size+22));
            ctx.shadowBlur=0;
        }

        ctx.restore();
    }
}
function drawTestDroneE(e){
    const pulse=Math.sin(e.age*.08)*.3+.7;
    // Outer ring glow
    ctx.strokeStyle=e.glow; ctx.lineWidth=1.5; ctx.shadowBlur=10; ctx.shadowColor=e.glow;
    ctx.beginPath(); ctx.arc(0,0,e.size+2,0,Math.PI*2); ctx.stroke();
    // Body disc
    ctx.fillStyle='#0a1420'; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(0,0,e.size,0,Math.PI*2); ctx.fill();
    // Inner circuit ring
    ctx.strokeStyle=e.color; ctx.lineWidth=1.5; ctx.globalAlpha=.5;
    ctx.beginPath(); ctx.arc(0,0,e.size*.6,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
    // Center core
    ctx.fillStyle=e.color; ctx.shadowBlur=8*pulse; ctx.shadowColor=e.color;
    ctx.beginPath(); ctx.arc(0,0,4,0,Math.PI*2); ctx.fill();
    // 3 sensor prongs at 120° offsets
    ctx.strokeStyle=e.color; ctx.lineWidth=2; ctx.shadowBlur=6;
    for(let i=0;i<3;i++){
        const a=i/3*Math.PI*2, r1=e.size*.65, r2=e.size+6;
        ctx.beginPath(); ctx.moveTo(Math.cos(a)*r1,Math.sin(a)*r1); ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2); ctx.stroke();
        ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(Math.cos(a)*r2,Math.sin(a)*r2,2.5,0,Math.PI*2); ctx.fill();
    }
    // Gun barrel (forward = right)
    ctx.fillStyle='#ccddee'; ctx.shadowBlur=4;
    ctx.fillRect(e.size-2,-2,10,4);
    ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(e.size+8,0,3,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
}

function drawLaserTurretE(e){
    const warn=e.vars.warnActive;
    const wf=warn?(e.vars.warnTimer/60):0;
    // Base octagon plate
    ctx.fillStyle='#1a0800';
    ctx.beginPath();
    for(let i=0;i<8;i++){const a=i/8*Math.PI*2;i===0?ctx.moveTo(Math.cos(a)*e.size,Math.sin(a)*e.size):ctx.lineTo(Math.cos(a)*e.size,Math.sin(a)*e.size);}
    ctx.closePath(); ctx.fill();
    // Plate bolts
    ctx.fillStyle='#332211';
    for(let i=0;i<8;i++){const a=i/8*Math.PI*2+Math.PI/8;ctx.beginPath();ctx.arc(Math.cos(a)*(e.size-5),Math.sin(a)*(e.size-5),2.5,0,Math.PI*2);ctx.fill();}
    // Warning ring glow
    if(warn){
        ctx.strokeStyle=`rgba(255,${200-wf*100|0},0,${wf*.8})`;
        ctx.lineWidth=2+wf*3; ctx.shadowBlur=12*wf; ctx.shadowColor='#ff4400';
        ctx.beginPath(); ctx.arc(0,0,e.size+3,0,Math.PI*2); ctx.stroke(); ctx.shadowBlur=0;
    }
    // Mount body (center)
    const g=ctx.createRadialGradient(0,0,2,0,0,e.size*.55);
    g.addColorStop(0,'#663322'); g.addColorStop(1,'#221108');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,e.size*.55,0,Math.PI*2); ctx.fill();
    // Outer edge ring
    ctx.strokeStyle=warn?e.color:'#663322'; ctx.lineWidth=2; ctx.shadowBlur=warn?10:4; ctx.shadowColor=e.glow;
    ctx.beginPath(); ctx.arc(0,0,e.size*.55,0,Math.PI*2); ctx.stroke(); ctx.shadowBlur=0;
    // Barrel housing
    ctx.fillStyle='#442211';
    ctx.fillRect(-4,-5,e.size*.7,10);
    // Barrel tube
    ctx.fillStyle=warn?e.color:'#886644'; ctx.shadowBlur=warn?12:4; ctx.shadowColor=e.glow;
    ctx.fillRect(e.size*.3,-3,e.size*.7,6);
    // Muzzle
    ctx.fillStyle=warn?'#ffffff':e.color;
    ctx.beginPath(); ctx.arc(e.size*.95,0,5,0,Math.PI*2); ctx.fill();
    // Warning line along barrel
    if(warn){
        ctx.strokeStyle=`rgba(255,100,0,${wf*.5})`; ctx.lineWidth=1; ctx.setLineDash([4,4]);
        ctx.beginPath(); ctx.moveTo(e.size,0); ctx.lineTo(e.atkRange,0); ctx.stroke();
        ctx.setLineDash([]);
    }
    ctx.shadowBlur=0;
}

function drawReactorDroneE(e){

    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=e.color; ctx.lineWidth=1.5; ctx.shadowBlur=6; ctx.shadowColor=e.glow;
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=i/6*Math.PI*2;i===0?ctx.moveTo(Math.cos(a)*e.size,Math.sin(a)*e.size):ctx.lineTo(Math.cos(a)*e.size,Math.sin(a)*e.size);}
    ctx.closePath(); ctx.stroke(); ctx.shadowBlur=0;
    // 4 plasma conduits
    ctx.strokeStyle=e.color; ctx.lineWidth=2; ctx.globalAlpha=.55;
    for(let i=0;i<4;i++){
        const a=i/4*Math.PI*2+e.age*0.02;
        ctx.beginPath(); ctx.moveTo(Math.cos(a)*5,Math.sin(a)*5); ctx.lineTo(Math.cos(a)*(e.size-4),Math.sin(a)*(e.size-4)); ctx.stroke();
        ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(Math.cos(a)*(e.size-4),Math.sin(a)*(e.size-4),2.5,0,Math.PI*2); ctx.fill();

    ctx.globalAlpha=1;
    // Glowing core
    const cg=ctx.createRadialGradient(0,0,0,0,0,7);

    ctx.fillStyle=cg; ctx.shadowBlur=12*pulse; ctx.shadowColor=e.glow;

}

function drawScoutCrawlerE(e){
    const legOff=Math.sin(e.age*.3)*.3;
    // 4 legs splayed outward (viewed from above)
    ctx.strokeStyle=e.color; ctx.lineWidth=2.5; ctx.globalAlpha=.7;
    const legPositions=[[-1,-1],[ 1,-1],[ 1,1],[-1,1]];
    for(const [lx,ly] of legPositions){
        const la=Math.atan2(ly,lx);
        const lSpread=e.size*.9+legOff*3*lx;
        ctx.beginPath();
        ctx.moveTo(Math.cos(la)*e.size*.5,Math.sin(la)*e.size*.5);
        ctx.lineTo(Math.cos(la)*lSpread,Math.sin(la)*lSpread);
        ctx.stroke();
        // Foot
        ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(Math.cos(la)*lSpread,Math.sin(la)*lSpread,3,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    // Body
    ctx.fillStyle='#081a08'; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.ellipse(0,0,e.size*.65,e.size*.5,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=e.color; ctx.lineWidth=1.5; ctx.shadowBlur=6; ctx.shadowColor=e.glow;
    ctx.beginPath(); ctx.ellipse(0,0,e.size*.65,e.size*.5,0,0,Math.PI*2); ctx.stroke(); ctx.shadowBlur=0;
    // Twin gun ports (forward)
    ctx.fillStyle='#224422';

// ── Phase Stalker draw — cloaked phantom with glitch ripple ──────────────────
function drawPhaseStalkerE(e){
    const v=e.vars;
    const pulse=Math.sin(e.age*0.12)*0.5+0.5;
    const glitch=v.stalkerGlitch;
    const teleporting=v.stalkerTeleporting;
    const strikeActive=v.stalkerStrikeTimer>0;
    const now=Date.now();

    // ── Glitch ripple rings (world-space distortion telegraph) ─────────────
    // Drawn at full opacity regardless of stalker alpha — always visible
    if(glitch>0.05 || teleporting){
        ctx.save();
        // Un-rotate for world-space effect
        ctx.rotate(-e.angle);
        const rippleA = glitch*(teleporting?1:0.7);
        for(let ring=0;ring<3;ring++){
            const rr=e.size*(1.2+ring*0.5)+(Math.sin(now/60+ring)*4);
            ctx.strokeStyle=`rgba(180,80,255,${rippleA*(0.6-ring*0.15)})`;
            ctx.lineWidth=teleporting?2.5:1.5;
            ctx.shadowBlur=teleporting?14:6; ctx.shadowColor='#cc44ff';
            ctx.setLineDash([4,4]); ctx.lineDashOffset=-(now/80+ring*3)%8;
            ctx.beginPath(); ctx.arc(0,0,rr,0,Math.PI*2); ctx.stroke();
            ctx.setLineDash([]); ctx.shadowBlur=0;
        }
        // Jagged glitch lines across body
        if(teleporting){
            for(let gl=0;gl<4;gl++){
                const gy=-e.size+gl*(e.size*2/3)+(Math.random()-0.5)*4;
                const gx1=-e.size*(0.5+Math.random()*0.5);
                const gx2=e.size*(0.5+Math.random()*0.5);
                ctx.strokeStyle=`rgba(200,100,255,${0.4+Math.random()*0.4})`;
                ctx.lineWidth=1;
                ctx.beginPath(); ctx.moveTo(gx1,gy); ctx.lineTo(gx2,gy); ctx.stroke();
            }
        }
        ctx.restore();
    }

    // ── Body — phantom angular shape ───────────────────────────────────────
    // Outer jagged outline (4-point diamond silhouette)
    ctx.strokeStyle=strikeActive?'#ff44ff':e.color;
    ctx.lineWidth=strikeActive?2.5:1.5;
    ctx.shadowBlur=strikeActive?20:8+glitch*14; ctx.shadowColor=e.glow;
    ctx.beginPath();
    ctx.moveTo(0,-e.size);
    ctx.lineTo(e.size*0.7, 0);
    ctx.lineTo(0, e.size*0.7);
    ctx.lineTo(-e.size*0.7, 0);
    ctx.closePath(); ctx.stroke(); ctx.shadowBlur=0;

    // Inner fill — very dark, almost transparent
    ctx.fillStyle=strikeActive?'rgba(140,20,160,0.6)':'rgba(60,0,80,0.35)';
    ctx.beginPath();
    ctx.moveTo(0,-e.size);
    ctx.lineTo(e.size*0.7,0);
    ctx.lineTo(0,e.size*0.7);
    ctx.lineTo(-e.size*0.7,0);
    ctx.closePath(); ctx.fill();

    // Core eye — single pulsing orb
    const eyeCol=strikeActive?'#ff88ff':e.color;
    ctx.fillStyle=eyeCol; ctx.shadowBlur=10+pulse*8; ctx.shadowColor=eyeCol;
    ctx.beginPath(); ctx.arc(0,0,3.5+pulse*1.5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    // Phase lines — 3 thin horizontal scan lines across body
    ctx.strokeStyle=`rgba(180,80,255,${0.25+pulse*0.2})`; ctx.lineWidth=0.8;
    [-e.size*0.45, 0, e.size*0.35].forEach(ly=>{
        const hw=e.size*(0.5-Math.abs(ly)/e.size*0.4);
        ctx.beginPath(); ctx.moveTo(-hw,ly); ctx.lineTo(hw,ly); ctx.stroke();
    });

    // Strike flash — bright burst when hitting
    if(strikeActive && v.stalkerStrikeTimer>6){
        ctx.fillStyle=`rgba(255,100,255,${(v.stalkerStrikeTimer/10)*0.35})`;
        ctx.beginPath(); ctx.arc(0,0,e.size*1.5,0,Math.PI*2); ctx.fill();
    }
}

    // Base shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(0,4,e.size+6,e.size*0.5,0,0,Math.PI*2); ctx.fill();
    // Armored hull — octagonal
    ctx.fillStyle='#1a0800';
    ctx.beginPath();
    for(let i=0;i<8;i++){const a=i/8*Math.PI*2+Math.PI/8; i===0?ctx.moveTo(Math.cos(a)*e.size,Math.sin(a)*e.size):ctx.lineTo(Math.cos(a)*e.size,Math.sin(a)*e.size);}
    ctx.closePath(); ctx.fill();
    // Armor plating lines
    ctx.strokeStyle='#3a1a00'; ctx.lineWidth=1;
    for(let i=0;i<8;i++){
        const a=i/8*Math.PI*2+Math.PI/8, na=(i+1)/8*Math.PI*2+Math.PI/8;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*e.size,Math.sin(a)*e.size); ctx.stroke();
    }
    // Outer hull glow
    ctx.strokeStyle=e.color; ctx.lineWidth=2; ctx.shadowBlur=12+pulse*8; ctx.shadowColor=e.glow;
    ctx.beginPath();
    for(let i=0;i<8;i++){const a=i/8*Math.PI*2+Math.PI/8; i===0?ctx.moveTo(Math.cos(a)*e.size,Math.sin(a)*e.size):ctx.lineTo(Math.cos(a)*e.size,Math.sin(a)*e.size);}
    ctx.closePath(); ctx.stroke(); ctx.shadowBlur=0;
    // Launch tubes (2, pointing forward)
    ctx.fillStyle='#2a0a00'; ctx.strokeStyle='#884400'; ctx.lineWidth=1;
    for(let t=0;t<2;t++){
        const ty=(t-0.5)*8;
        ctx.fillRect(e.size*0.4,ty-3,e.size*0.55+4,6); ctx.strokeRect(e.size*0.4,ty-3,e.size*0.55+4,6);
        ctx.fillStyle=e.color; ctx.shadowBlur=6*pulse; ctx.shadowColor=e.glow;
        ctx.beginPath(); ctx.arc(e.size*0.92+4,ty,3,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0; ctx.fillStyle='#2a0a00';
    }
    // Reactor core
    ctx.fillStyle='#330800'; ctx.beginPath(); ctx.arc(0,0,e.size*0.38,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=e.color; ctx.shadowBlur=14*pulse; ctx.shadowColor=e.glow;
    ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
}

// ── Dust Strider — fast angular walker, rifle-armed ──────────────────────────
function drawDustStriderE(e){
    const pulse=Math.sin(e.age*0.12)*0.4+0.6;
    const isBursting=e.vars.striderBurst>0;
    // Lean in strafe direction
    const leanOff=e.vars.striderStrafeDir*3;
    // Body — angular wedge shape
    ctx.fillStyle='#1e0e06';
    ctx.beginPath();
    ctx.moveTo(e.size,leanOff); ctx.lineTo(-e.size*0.6,-e.size*0.7+leanOff);
    ctx.lineTo(-e.size*0.8,0); ctx.lineTo(-e.size*0.6,e.size*0.7+leanOff);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=isBursting?'#ffaa55':e.color; ctx.lineWidth=1.5;
    ctx.shadowBlur=isBursting?14:8; ctx.shadowColor=e.glow;
    ctx.beginPath();
    ctx.moveTo(e.size,leanOff); ctx.lineTo(-e.size*0.6,-e.size*0.7+leanOff);
    ctx.lineTo(-e.size*0.8,0); ctx.lineTo(-e.size*0.6,e.size*0.7+leanOff);
    ctx.closePath(); ctx.stroke(); ctx.shadowBlur=0;
    // Strafe legs (4 thin lines)
    ctx.strokeStyle='#553322'; ctx.lineWidth=1.5; ctx.lineCap='round';
    [[-e.size*0.3,-e.size*0.5+leanOff],[-e.size*0.3,e.size*0.5+leanOff],
     [-e.size*0.7,-e.size*0.4],[-e.size*0.7,e.size*0.4]].forEach(([lx,ly])=>{
        const legExt = Math.sin(e.age*0.25)*3;
        ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx-8+legExt,ly+(ly>0?6:-6)); ctx.stroke();
    });
    // Rifle barrel
    ctx.fillStyle=isBursting?'#ffcc88':'#664422'; ctx.strokeStyle='#443311'; ctx.lineWidth=1;
    ctx.fillRect(e.size*0.2,-2.5,e.size*0.9+4,5); ctx.strokeRect(e.size*0.2,-2.5,e.size*0.9+4,5);
    // Muzzle flash
    if(isBursting && e.vars.striderBurstTimer<3){
        ctx.fillStyle='#ffcc44'; ctx.shadowBlur=14; ctx.shadowColor='#ff8800';
        ctx.beginPath(); ctx.arc(e.size+4,0,5,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    }
    // Sensor eye
    ctx.fillStyle=isBursting?'#ff6622':e.color; ctx.shadowBlur=8*pulse; ctx.shadowColor=e.glow;
    ctx.beginPath(); ctx.arc(e.size*0.3,leanOff,3,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
}

window.addEventListener('keydown', e => {
    if(gameState!=='playing') return;
    keys[e.key]=true;
    // Prevent space from scrolling the page
    if(e.key===' ') e.preventDefault();
    // Tab or Q: toggle between the 2 module slots
    if(e.key==='Tab'||e.key==='q'||e.key==='Q'){ e.preventDefault(); switchToSlot(1-activeModuleSlot); }

    // E: open shop if nearby vendor, else swap modules
    if(e.key==='e'||e.key==='E'){
        if(shopUI.open){
            // Confirm purchase
            const vendor = shopVendors[shopUI.vendorIdx];
            if(vendor) attemptPurchase(vendor, shopUI.selectedItem);
        } else {
            // Check for nearby vendor first
            let foundVendor = false;
            for(let vi=0;vi<shopVendors.length;vi++){
                const v = shopVendors[vi];
                if(v.interactPrompt){ openShopUI(vi); foundVendor=true; break; }
            }
            if(!foundVendor) tryModuleSwap();
            // Extraction van
            if(!foundVendor && runVan && runVan.prompt){ runVan.launching=true; runVan.launchTimer=0; return; }
        }
    }
    if(e.key==='Escape'){ if(shopUI.open) closeShopUI(); }
    // Shop navigation
    if(shopUI.open){
        const vendor = shopVendors[shopUI.vendorIdx];
        if(vendor && vendor.type==='CRATE_MASTER_ZOG'){
            const items = vendor.stock||[];
            if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'){
                shopUI.selectedItem = Math.max(0, shopUI.selectedItem-1);
                e.preventDefault();
            }
            if(e.key==='ArrowDown'||e.key==='s'||e.key==='S'){
                shopUI.selectedItem = Math.min(items.length-1, shopUI.selectedItem+1);
                e.preventDefault();
            }
        }
        if(e.key==='Enter') {
            if(vendor) attemptPurchase(vendor, shopUI.selectedItem);
        }
    }
    if(e.key==='r'||e.key==='R') startReload();
});

//  PARTICLES
// ═══════════════════════════════════════════════════════════════════════════════
class Particle {
    constructor(x,y,vx,vy,life=30,size=5,type='spark'){
        this.x=x; this.y=y; this.vx=vx; this.vy=vy;
        this.life=life; this.maxLife=life; this.size=size; this.type=type;
        this.rotation=Math.random()*Math.PI*2;
        this.rotSpeed=(Math.random()-.5)*.3;
    }
    update(){
        this.x+=this.vx; this.y+=this.vy;
        this.vx*=.93; this.vy*=.93; this.life--;
        this.rotation+=this.rotSpeed;
        if(checkColParticle(this.x,this.y)) this.life=0;
    }
    draw(){
        const a=this.life/this.maxLife, p=1-a, sz=this.size*a;
        ctx.save(); ctx.globalAlpha=a;
        ctx.translate(this.x,this.y); ctx.rotate(this.rotation);
        if(this.type==='trail'){
            ctx.shadowBlur=10; ctx.shadowColor='#0088ff';
            ctx.fillStyle=`rgb(0,${80+(1-p)*80|0},220)`;
        } else if(this.type==='surge'){
            ctx.shadowBlur=12; ctx.shadowColor='#ffcc00';
            ctx.fillStyle=`rgb(255,${(180+(1-p)*75)|0},0)`;
        } else {
            ctx.shadowBlur=14; ctx.shadowColor='#ffaa00';
            ctx.fillStyle=`rgb(255,${200*(1-p)|0},0)`;
        }
        ctx.fillRect(-sz/2,-sz/2,sz,sz);
        ctx.restore();
    }
    isAlive(){ return this.life>0; }
}

function spawnTrailParticles(){
    const spd=Math.hypot(player.momentumX,player.momentumY);
    if(spd<.2) return;
    const opp=Math.atan2(player.momentumY,player.momentumX)+Math.PI;
    const n=Math.min((spd*.6|0)+(Math.random()>.5?1:0),4);
    for(let i=0;i<n;i++){
        const sa=opp+(Math.random()-.5)*Math.PI, d=player.size/2+2;
        particles.push(new Particle(
            player.x+Math.cos(sa)*d, player.y+Math.sin(sa)*d,
            Math.cos(opp)*spd*.5+(Math.random()-.5)*2,
            Math.sin(opp)*spd*.5+(Math.random()-.5)*2,
            25, 4, 'trail'));
    }
}
function spawnImpactParticles(x,y,force,dx,dy){
    const n=Math.min((force*16|0)+3,12), na=Math.atan2(dy,dx)+Math.PI;
    for(let i=0;i<n;i++){
        const sa=na+(Math.random()-.5)*Math.PI*1.5, sp=2+Math.random()*3;
        particles.push(new Particle(
            x+Math.cos(na)*5+(Math.random()-.5)*TILE_SIZE,
            y+Math.sin(na)*5+(Math.random()-.5)*TILE_SIZE,
            Math.cos(sa)*sp, Math.sin(sa)*sp, 20+Math.random()*10, 5, 'spark'));
    }
}

//  PROJECTILE CLASS
// ═══════════════════════════════════════════════════════════════════════════════
class Projectile {
    constructor(x,y,vx,vy,kind,wd){
        this.x=x; this.y=y; this.vx=vx; this.vy=vy;
        this.kind=kind; this.wd=wd;
        this.alive=true; this.age=0;
        this.hitWall=false; this.fuseTimer=0;
    }
    update(){
        this.age++;
        // Store previous position so checkProjectileEnemyHits can ray-trace through weakpoints
        this.prevX=this.x; this.prevY=this.y;
        // Shard stick/detonate logic
        if(this.kind==='shard'){
            if(this.stuck){
                // If stuck to an enemy, track that enemy's position
                if(this.stuckEnemy&&!this.stuckEnemy.dead){
                    this.stickX=this.stuckEnemy.x+this.stuckOffX;
                    this.stickY=this.stuckEnemy.y+this.stuckOffY;
                }
                this.stickTimer--;
                if(this.stickTimer<=0){
                    // Explode!
                    const rad=this.wd.explosionRadius||80, bf=this.wd.blastForce||3.5;
                    for(let i=0;i<16;i++){
                        const a=Math.random()*Math.PI*2, sp=1.5+Math.random()*5;
                        particles.push(new Particle(this.stickX,this.stickY,Math.cos(a)*sp,Math.sin(a)*sp,20+Math.random()*14,5+Math.random()*3,'surge'));
                    }
                    camera.x+=(Math.random()-.5)*8; camera.y+=(Math.random()-.5)*8;
                    // Damage and push player
                    const dist=Math.hypot(player.x-this.stickX,player.y-this.stickY);
                    if(dist<rad){
                        const force=(1-dist/rad)*bf;
                        const ang=Math.atan2(player.y-this.stickY,player.x-this.stickX);
                        player.momentumX+=Math.cos(ang)*force; player.momentumY+=Math.sin(ang)*force;
                    }
                    // Blast damage enemies in radius
                    damageSourceIsPlayer=true;
                    const shardDmg=Math.round(30*playerDmgMult);
                    for(const e of enemies){
                        if(e.dead) continue;
                        const ed=Math.hypot(e.x-this.stickX,e.y-this.stickY);
                        if(ed<rad) e.takeDamage(Math.round(shardDmg*(1-ed/rad)));
                    }
                    if(activeBoss&&!activeBoss.dead){
                        const bd=Math.hypot(activeBoss.x-this.stickX,activeBoss.y-this.stickY);
                        if(bd<rad) activeBoss.takeDamage(Math.round(shardDmg*(1-bd/rad)),this.stickX,this.stickY);
                    }
                    this.alive=false;
                }
                return;
            }
            this.x+=this.vx; this.y+=this.vy;
            // Check enemy collision first — shards stick to enemies
            for(const e of enemies){
                if(e.dead) continue;
                if(Math.hypot(this.x-e.x,this.y-e.y)<e.size+3){
                    this.stuck=true; this.stuckEnemy=e;
                    this.stuckOffX=this.x-e.x; this.stuckOffY=this.y-e.y;
                    this.stickX=this.x; this.stickY=this.y;
                    this.stickTimer=this.wd.stickDuration||65;
                    this.vx=0; this.vy=0;
                    spawnDamageText(this.x,this.y-18,'STUCK!',this.wd.color||'#ff9933');
                    return;
                }
            }
            const t=map[Math.floor(this.y/TILE_SIZE)]?.[Math.floor(this.x/TILE_SIZE)];
            if(t===T_WALL||t===T_VOID){
                this.stuck=true; this.stickX=this.x; this.stickY=this.y; this.stuckEnemy=null;
                this.stickTimer=this.wd.stickDuration||65;
                this.vx=0; this.vy=0;
                spawnDamageText(this.x,this.y-18,'STUCK!',this.wd.color||'#ff9933');
            }
            if(this.x<0||this.x>MAP_W*TILE_SIZE||this.y<0||this.y>MAP_H*TILE_SIZE) this.alive=false;
            return;
        }
     if(!this.hitWall){
        // Sub-step movement to catch collisions reliably
        const substeps = Math.ceil(Math.hypot(this.vx, this.vy) / 3) || 1;
        const stepX = this.vx / substeps;
        const stepY = this.vy / substeps;
        
        let collided = false;
        for(let step = 0; step < substeps && !collided; step++){
            this.x += stepX;
            this.y += stepY;
            
            // Check collision at this sub-position
            const t = map[Math.floor(this.y/TILE_SIZE)]?.[Math.floor(this.x/TILE_SIZE)];
            if(t===T_WALL||t===T_VOID){
                collided = true;
                
                // Pellet bounce (scatter shot native bounces)
                if(this.kind==='pellet'&&(this.bouncesLeft||0)>0){
                    this.bouncesLeft--;
                    // Use prevX/prevY to detect which axis was free before the hit
                    const wasXFree = !(map[Math.floor(this.prevY/TILE_SIZE)]?.[Math.floor(this.x/TILE_SIZE)]===T_WALL || map[Math.floor(this.prevY/TILE_SIZE)]?.[Math.floor(this.x/TILE_SIZE)]===T_VOID);
                    const wasYFree = !(map[Math.floor(this.y/TILE_SIZE)]?.[Math.floor(this.prevX/TILE_SIZE)]===T_WALL || map[Math.floor(this.y/TILE_SIZE)]?.[Math.floor(this.prevX/TILE_SIZE)]===T_VOID);
                    if(wasYFree && !wasXFree){
                        this.vy = -this.vy * 0.8;
                        this.y = this.prevY;
                    } else if(wasXFree && !wasYFree){
                        this.vx = -this.vx * 0.8;
                        this.x = this.prevX;
                    } else {
                        this.vx = -this.vx * 0.8;
                        this.vy = -this.vy * 0.8;
                        this.x = this.prevX;
                        this.y = this.prevY;
                    }
                    for(let i=0;i<5;i++){
                        const a=Math.random()*Math.PI*2;
                        particles.push(new Particle(this.x,this.y,Math.cos(a)*2,Math.sin(a)*2,10,2,'surge'));
                    }
                // Ricochet modifier: non-pellet projectiles bounce
                } else if(this.kind!=='pellet'&&this.kind!=='cannon'&&this.kind!=='shard'&&(this.bouncesLeft||0)>0){
                    this.bouncesLeft--;
                    const wasXFree2 = !(map[Math.floor(this.prevY/TILE_SIZE)]?.[Math.floor(this.x/TILE_SIZE)]===T_WALL || map[Math.floor(this.prevY/TILE_SIZE)]?.[Math.floor(this.x/TILE_SIZE)]===T_VOID);
                    const wasYFree2 = !(map[Math.floor(this.y/TILE_SIZE)]?.[Math.floor(this.prevX/TILE_SIZE)]===T_WALL || map[Math.floor(this.y/TILE_SIZE)]?.[Math.floor(this.prevX/TILE_SIZE)]===T_VOID);
                    if(wasYFree2 && !wasXFree2){
                        this.vy = -this.vy;
                        this.y = this.prevY;
                    } else if(wasXFree2 && !wasYFree2){
                        this.vx = -this.vx;
                        this.x = this.prevX;
                    } else {
                        this.vx = -this.vx;
                        this.vy = -this.vy;
                        this.x = this.prevX;
                        this.y = this.prevY;
                    }
                    for(let i=0;i<6;i++){
                        const a=Math.random()*Math.PI*2;
                        particles.push(new Particle(this.x,this.y,Math.cos(a)*3,Math.sin(a)*3,10,2,'spark'));
                    }
                } else {
                    this.explode(); 
                }
            }
        }
    } else {
        // Already hit wall, on fuse timer
        this.fuseTimer--;
        if(this.fuseTimer<=0){ this.explode(); return; }
    }
    
    if(!this.alive) return;
    if(this.x<0||this.x>MAP_W*TILE_SIZE||this.y<0||this.y>MAP_H*TILE_SIZE) this.alive=false;
}
    explode(){
        const rad=this.wd.explosionRadius||70, bf=this.wd.blastForce||4;
        for(let i=0;i<22;i++){
            const a=Math.random()*Math.PI*2, sp=1.5+Math.random()*6;
            particles.push(new Particle(this.x,this.y,Math.cos(a)*sp,Math.sin(a)*sp,22+Math.random()*18,5+Math.random()*4,'spark'));
        }
        // Camera shake
        camera.x+=(Math.random()-.5)*12; camera.y+=(Math.random()-.5)*12;
        // Blast push player
        const dist=Math.hypot(player.x-this.x,player.y-this.y);
        if(dist<rad){
            const force=(1-dist/rad)*bf;
            const ang=Math.atan2(player.y-this.y,player.x-this.x);
            player.momentumX+=Math.cos(ang)*force; player.momentumY+=Math.sin(ang)*force;
        }
        // Blast damage enemies
        const explodeDmg = this.wd.damage??20;
        for(const e of enemies){
            if(e.dead) continue;
            const ed=Math.hypot(e.x-this.x,e.y-this.y);
            if(ed<rad) e.takeDamage(Math.round(explodeDmg*(1-ed/rad)));
        }
        if(activeBoss&&!activeBoss.dead){ const bd=Math.hypot(activeBoss.x-this.x,activeBoss.y-this.y); if(bd<rad) activeBoss.takeDamage(Math.round(explodeDmg*(1-bd/rad)),this.x,this.y); }
        this.alive=false;
    }
    draw(){
        if(this.hitWall&&this.fuseTimer>0){
            const pulse=Math.sin(this.age*.7)*.5+.5;
            ctx.fillStyle=`rgba(255,${100+pulse*80|0},0,0.9)`;
            ctx.shadowBlur=8+pulse*8; ctx.shadowColor='#ff4400';
            ctx.beginPath(); ctx.arc(this.x,this.y,4+pulse*2,0,Math.PI*2); ctx.fill();
            ctx.shadowBlur=0; return;
        }
        // Stuck shard: pulsing crystal
        if(this.kind==='shard'&&this.stuck){
            const pulse=Math.sin(this.age*.22)*.5+.5;
            const tf=Math.max(0,this.stickTimer/(this.wd.stickDuration||65));
            const col=this.wd.color||'#ff9933';
            ctx.fillStyle=col; ctx.shadowBlur=10+pulse*8; ctx.shadowColor=col;
            ctx.globalAlpha=0.7+pulse*.3;
            ctx.save(); ctx.translate(this.stickX,this.stickY); ctx.rotate(this.age*.08);
            ctx.beginPath();
            for(let i=0;i<4;i++){
                const a=i*Math.PI/2, r1=5+pulse*2, r2=2;
                ctx.lineTo(Math.cos(a)*r1,Math.sin(a)*r1);
                ctx.lineTo(Math.cos(a+Math.PI/4)*r2,Math.sin(a+Math.PI/4)*r2);
            }
            ctx.closePath(); ctx.fill();
            // Countdown ring
            ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.shadowBlur=6;
            ctx.globalAlpha=tf*.8;
            ctx.beginPath(); ctx.arc(0,0,9,0,Math.PI*2*tf); ctx.stroke();
            ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1; return;
        }
        const col=this.surgeColor||this.wd.color||'#ff4400';
        if(this.kind==='pellet'){
            const pSz=3*(this.sizeScale||1);
            ctx.fillStyle=col; ctx.shadowBlur=8; ctx.shadowColor=col;
            ctx.beginPath(); ctx.arc(this.x,this.y,pSz,0,Math.PI*2); ctx.fill();
            ctx.globalAlpha=.3;
            ctx.beginPath(); ctx.arc(this.x-this.vx*1.5,this.y-this.vy*1.5,pSz*.5,0,Math.PI*2); ctx.fill();
            ctx.globalAlpha=1; ctx.shadowBlur=0; return;
        }
        // Pulse storm: tiny bright dot
        if(this.kind==='pulse_s'){
            const psSz=2.5*(this.sizeScale||1);
            ctx.fillStyle=col; ctx.shadowBlur=10; ctx.shadowColor=col;
            ctx.beginPath(); ctx.arc(this.x,this.y,psSz,0,Math.PI*2); ctx.fill();
            ctx.shadowBlur=0; return;
        }
        const sz=(this.kind==='cannon'?8:this.kind==='shard'?4:3)*(this.sizeScale||1);
        ctx.fillStyle=col; ctx.shadowBlur=14; ctx.shadowColor=col;
        ctx.beginPath(); ctx.arc(this.x,this.y,sz,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=.35;
        ctx.beginPath(); ctx.arc(this.x-this.vx*2,this.y-this.vy*2,sz*.5,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=1; ctx.shadowBlur=0;
    }
}


// ═══════════════════════════════════════════════════════════════════════════════
//  MORTAR SHELL — top-down plunge illusion
//  A shell "rises then falls" toward a target. Height is purely visual:
//  the shell is drawn bigger + offset as it climbs, and shrinks + returns to
//  ground level as it falls. On landing: ripple shockwave → fuse → BIG blast.
// ═══════════════════════════════════════════════════════════════════════════════
class MortarShell {
    constructor(sx, sy, tx, ty, wd){
        this.sx=sx; this.sy=sy;          // spawn (player) position
        this.tx=tx; this.ty=ty;          // raw cursor target (may be inside wall)
        this.wd=wd;
        this.alive=true;
        this.age=0;

        // Flight duration — based on distance so it feels proportional
        const dist=Math.hypot(tx-sx, ty-sy);
        this.flightFrames=Math.max(30, Math.min(70, dist/8|0));

        // Fuse after landing
        this.fuse=wd.fuse||34;
        this.fuseTimer=0;
        this.landed=false;
        this.exploded=false;

        // Current *visual* world position (lerped, floor-projected)
        this.wx=sx; this.wy=sy;
        // Visual height (0 = on ground, peaks at 1 mid-flight)
        this.height=0;

        // Resolve actual landing position now so the ground reticle is accurate
        // during the whole flight arc (not just at the moment of landing).
        const resolved=this._raycastTarget();
        this.tx=resolved.x; this.ty=resolved.y;
    }

    // Check if target tile is open floor.
    // If the intended landing spot is clear, let it land there (shell arcs over walls).
    // Only if the target is inside a wall do we walk the ray and find the
    // closest open point along it from the player's side.
    _raycastTarget(){
        const dx=this.tx-this.sx, dy=this.ty-this.sy;
        const dist=Math.hypot(dx,dy);
        if(dist<1) return {x:this.tx, y:this.ty};

        // Is the raw target tile open?
        const tCol=Math.floor(this.tx/TILE_SIZE);
        const tRow=Math.floor(this.ty/TILE_SIZE);
        const targetTile=map[tRow]?.[tCol];
        if(targetTile!==T_WALL&&targetTile!==T_VOID){
            // Target is on open floor — shell flies over anything in between
            return {x:this.tx, y:this.ty};
        }

        // Target is inside a wall — walk from player toward target and find
        // the closest clear tile along the ray.
        const step=TILE_SIZE*0.4;
        const steps=Math.ceil(dist/step);
        let lastX=this.sx, lastY=this.sy;
        for(let i=1;i<=steps;i++){
            const f=i/steps;
            const cx=this.sx+dx*f, cy=this.sy+dy*f;
            const t=map[Math.floor(cy/TILE_SIZE)]?.[Math.floor(cx/TILE_SIZE)];
            if(t===T_WALL||t===T_VOID) return {x:lastX, y:lastY};
            lastX=cx; lastY=cy;
        }
        return {x:lastX, y:lastY};
    }

    update(){
        if(!this.alive) return;
        this.age++;

        if(!this.landed){
            const f=this.age/this.flightFrames; // 0→1 over flight
            if(f>=1){
                // Landing position was resolved in the constructor — just land there
                this.wx=this.tx; this.wy=this.ty;
                this.height=0;
                this.landed=true;
                this.fuseTimer=this.fuse;
                this._doLandingShockwave();
            } else {
                // Smooth arc: height peaks at f=0.5 with a sine curve
                this.height=Math.sin(f*Math.PI);
                // Horizontal position lerps linearly from spawn to target
                this.wx=this.sx+(this.tx-this.sx)*f;
                this.wy=this.sy+(this.ty-this.sy)*f;
            }
        } else {
            this.fuseTimer--;
            if(this.fuseTimer<=0) this._explode();
        }
    }

    _doLandingShockwave(){
        const rad=this.wd.landShockRadius||45;
        const bf=this.wd.landShockForce||3;
        const col=this.wd.color||'#ff4400';

        // Visual ring burst
        for(let i=0;i<14;i++){
            const a=Math.random()*Math.PI*2, sp=2+Math.random()*5;
            particles.push(new Particle(this.tx,this.ty,Math.cos(a)*sp,Math.sin(a)*sp,22,4,'spark'));
        }
        camera.x+=(Math.random()-.5)*5; camera.y+=(Math.random()-.5)*5;
        spawnDamageText(this.tx,this.ty-22,'IMPACT',col);

        // Light damage + knockback in landing radius
        damageSourceIsPlayer=true;
        for(const e of enemies){
            if(e.dead) continue;
            const d=Math.hypot(e.x-this.tx,e.y-this.ty);
            if(d<rad){
                const f=(1-d/rad);
                e.takeDamage(Math.round(15*f));
                const ang=Math.atan2(e.y-this.ty,e.x-this.tx);
                e.vx+=Math.cos(ang)*bf*f*0.6;
                e.vy+=Math.sin(ang)*bf*f*0.6;
            }
        }
        if(activeBoss&&!activeBoss.dead){ const bd=Math.hypot(activeBoss.x-this.tx,activeBoss.y-this.ty); if(bd<rad) activeBoss.takeDamage(Math.round(15*(1-bd/rad)),this.tx,this.ty); }
        const pd=Math.hypot(player.x-this.tx,player.y-this.ty);
        if(pd<rad){
            const f=(1-pd/rad);
            const ang=Math.atan2(player.y-this.ty,player.x-this.tx);
            player.momentumX+=Math.cos(ang)*bf*f;
            player.momentumY+=Math.sin(ang)*bf*f;
        }
    }

    _explode(){
        if(this.exploded) return;
        this.exploded=true;
        const rad=this.wd.explosionRadius||92, bf=this.wd.blastForce||8;
        const col=this.wd.color||'#ff4400';

        // Big particle burst
        for(let i=0;i<36;i++){
            const a=Math.random()*Math.PI*2, sp=2+Math.random()*10;
            particles.push(new Particle(this.tx,this.ty,Math.cos(a)*sp,Math.sin(a)*sp,28+Math.random()*20,6+Math.random()*5,'spark'));
        }
        camera.x+=(Math.random()-.5)*18; camera.y+=(Math.random()-.5)*18;

        // Weakpoint check: any enemy whose WP is inside blast radius gets 2× damage
        damageSourceIsPlayer=true;
        for(const e of enemies){
            if(e.dead) continue;
            const d=Math.hypot(e.x-this.tx,e.y-this.ty);
            if(d<rad){
                const frac=1-d/rad;
                const dmg=Math.round(80*frac);
                e.takeDamage(dmg);
                // Heavy knockback
                const ang=Math.atan2(e.y-this.ty,e.x-this.tx);
                e.vx+=Math.cos(ang)*bf*frac*1.6;
                e.vy+=Math.sin(ang)*bf*frac*1.6;
            }
        }
        if(activeBoss&&!activeBoss.dead){ const bd=Math.hypot(activeBoss.x-this.tx,activeBoss.y-this.ty); if(bd<rad) activeBoss.takeDamage(Math.round(80*(1-bd/rad)),this.tx,this.ty); }
        // Blast push player
        const pd=Math.hypot(player.x-this.tx,player.y-this.ty);
        if(pd<rad){
            const frac=1-pd/rad;
            const ang=Math.atan2(player.y-this.ty,player.x-this.tx);
            player.momentumX+=Math.cos(ang)*bf*frac;
            player.momentumY+=Math.sin(ang)*bf*frac;
        }
        spawnDamageText(this.tx,this.ty-30,randomFrom(SFX.rail_mortar),col);
        this.alive=false;
    }

    draw(){
        if(!this.alive) return;
        const col=this.wd.color||'#ff4400';

        if(this.landed){
            // Fuse countdown: pulsing ground glyph
            const tf=this.fuseTimer/this.fuse;
            const pulse=Math.sin(this.age*(0.4+tf*0.6))*.5+.5;
            // Expanding warning ring that shrinks as fuse runs out
            ctx.save();
            ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.shadowBlur=10; ctx.shadowColor=col;
            ctx.globalAlpha=tf*(.55+pulse*.3);
            ctx.beginPath(); ctx.arc(this.tx,this.ty,(this.wd.explosionRadius||92)*tf*.55,0,Math.PI*2); ctx.stroke();
            ctx.globalAlpha=tf*(.8+pulse*.2);
            ctx.fillStyle=col; ctx.shadowBlur=14+pulse*8;
            ctx.beginPath(); ctx.arc(this.tx,this.ty,4+pulse*3,0,Math.PI*2); ctx.fill();
            // Tick count flash
            const ticks=Math.ceil(tf*6);
            ctx.strokeStyle=col; ctx.lineWidth=2; ctx.globalAlpha=tf*.7;
            for(let i=0;i<ticks;i++){
                const a=(i/6)*Math.PI*2-Math.PI/2;
                const r=10;
                ctx.beginPath(); ctx.moveTo(this.tx+Math.cos(a)*r,this.ty+Math.sin(a)*r);
                ctx.lineTo(this.tx+Math.cos(a)*(r+5),this.ty+Math.sin(a)*(r+5)); ctx.stroke();
            }
            ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
            return;
        }

        // In-flight: draw shadow at ground target, then shell above it
        const h=this.height; // 0..1 peak arc

        // --- Ground shadow / targeting reticle at target pos ---
        const shadowAlpha=0.28+h*0.18;
        ctx.save();
        ctx.globalAlpha=shadowAlpha;
        ctx.strokeStyle='rgba(255,100,0,0.9)'; ctx.lineWidth=1.2;
        ctx.setLineDash([4,4]);
        ctx.beginPath(); ctx.arc(this.tx,this.ty,12+h*6,0,Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);
        // Crosshair lines
        ctx.strokeStyle='rgba(255,100,0,0.55)'; ctx.lineWidth=1;
        const cLen=10;
        ctx.beginPath();
        ctx.moveTo(this.tx-cLen,this.ty); ctx.lineTo(this.tx+cLen,this.ty);
        ctx.moveTo(this.tx,this.ty-cLen); ctx.lineTo(this.tx,this.ty+cLen);
        ctx.stroke();
        ctx.globalAlpha=1; ctx.restore();

        // --- Shell itself: visual offset upward + scale for height illusion ---
        // "Height" maps to: upward screen offset and larger radius
        const maxRise=38;   // max pixels the shell appears to float above ground
        const visualOffsetY=-h*maxRise;  // negative = up
        const baseRadius=6;
        const shellRadius=baseRadius*(1+h*1.1); // gets bigger at peak
        const shellAlpha=0.9+h*0.1;

        const drawX=this.wx;
        const drawY=this.wy+visualOffsetY;

        // Drop-shadow circle at ground level to reinforce height
        if(h>0.05){
            ctx.save();
            ctx.globalAlpha=0.35*(1-h*0.5);
            ctx.fillStyle='rgba(0,0,0,0.7)';
            ctx.beginPath(); ctx.ellipse(this.wx,this.wy,shellRadius*0.9,shellRadius*0.45,0,0,Math.PI*2); ctx.fill();
            ctx.globalAlpha=1; ctx.restore();
        }

        // The shell
        ctx.save();
        ctx.globalAlpha=shellAlpha;
        ctx.fillStyle=col; ctx.shadowBlur=14+h*12; ctx.shadowColor=col;
        ctx.beginPath(); ctx.arc(drawX,drawY,shellRadius,0,Math.PI*2); ctx.fill();
        // Bright core
        ctx.fillStyle='rgba(255,200,100,0.85)'; ctx.shadowBlur=8;
        ctx.beginPath(); ctx.arc(drawX,drawY,shellRadius*0.45,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  WEAPON LOGIC
// ═══════════════════════════════════════════════════════════════════════════════
function switchWeapon(idx){
    if(idx===currentWeapon||idx<0||idx>=WEAPONS.length) return;
    // Reset all active states
    wState.swinging=false; wState.pikeActive=false;
    wState.holdingFire=false; wState.beamActive=false;
    wState.spinUp=0; wState.cleaverPhase='idle'; wState.cooldown=0;
    teslaCooldown=0;
    wState.spearActive=false; wState.monoSwinging=false;
    wState.lancerDashing=false; wState.lancerStabActive=false;
    wState.sniperCharging=false; wState.trackBeamActive=false;
    wState.railBeam=null; wState.railBeamTimer=0;
    wState.reloading=false; wState.reloadTimer=0;
    wState.whirling=false; wState.comboHit=0; wState.comboTimer=0;
    wState.whirlSpeedTimer=0; wState.whirlFullSpinAnnounced=false;
    wState.thrustHitSet=new Set();
    currentWeapon=idx;
    weaponBank=idx<8?0:idx<16?1:2;
}

// ── Switch between the 2 module slots ───────────────────────────────────────
function switchToSlot(s){
    if(s===activeModuleSlot) return;
    if(moduleSlots[s]===-1) return; // empty slot
    activeModuleSlot=s;
    switchWeapon(moduleSlots[s]);
    spawnDamageText(player.x,player.y-36,'SLOT '+(s+1),WEAPONS[moduleSlots[s]].color);
}

// ── Try to swap the inactive slot with a nearby dropped module (key E) ──────
function tryModuleSwap(){
    // Check loot pedestals first
    for(let i=0;i<lootPedestals.length;i++){
        const lp=lootPedestals[i];
        if(lp.claimed) continue;
        if(Math.hypot(lp.x-player.x,lp.y-player.y)>TILE_SIZE*1.2) continue;
        const targetSlot=(moduleSlots[0]===-1)?0:(moduleSlots[1]===-1)?1:(1-activeModuleSlot);
        const evicted=moduleSlots[targetSlot];
        const evictedData=moduleSlotData[targetSlot];
        moduleSlots[targetSlot]=lp.weaponIdx;
        moduleSlotData[targetSlot]={tierIdx:lp.tierIdx,tierData:lp.tierData,mods:lp.mods||[]};
        lp.claimed=true;
        explodeSiblingPedestals(lp);
        if(evicted!==-1){
            // Drop old module on the pedestal spot
            droppedModules.push({x:lp.x,y:lp.y,weaponIdx:evicted,
                tierIdx:evictedData?.tierIdx||0,tierData:evictedData?.tierData||TIER_DATA[0],
                mods:evictedData?.mods||[],life:480,pickupPrompt:false});
            spawnDamageText(player.x,player.y-44,'SWAPPED OUT!','#aaaaaa');
        } else {
            spawnDamageText(player.x,player.y-44,'MODULE INSTALLED!',lp.tierData.color);
        }
        if(targetSlot===activeModuleSlot) switchWeapon(moduleSlots[activeModuleSlot]);
        return;
    }
    // Then check dropped modules
    for(let i=droppedModules.length-1;i>=0;i--){
        const dm=droppedModules[i];
        if(Math.hypot(dm.x-player.x,dm.y-player.y)>TILE_SIZE*1.2) continue;
        const targetSlot=(moduleSlots[0]===-1)?0:(moduleSlots[1]===-1)?1:(1-activeModuleSlot);
        const evicted=moduleSlots[targetSlot];
        const evictedData=moduleSlotData[targetSlot];
        moduleSlots[targetSlot]=dm.weaponIdx;
        moduleSlotData[targetSlot]={tierIdx:dm.tierIdx,tierData:dm.tierData,mods:dm.mods||[]};
        if(evicted!==-1){
            dm.weaponIdx=evicted;
            dm.tierIdx=evictedData?.tierIdx||0;
            dm.tierData=evictedData?.tierData||TIER_DATA[0];
            dm.mods=evictedData?.mods||[];
            dm.life=480;
            spawnDamageText(player.x,player.y-44,'SWAPPED OUT!','#aaaaaa');
        } else {
            droppedModules.splice(i,1);
            spawnDamageText(player.x,player.y-44,'MODULE INSTALLED!','#cccccc');
        }
        if(targetSlot===activeModuleSlot) switchWeapon(moduleSlots[activeModuleSlot]);
        break;
    }
}

// ── Reload ───────────────────────────────────────────────────────────────────
function startReload(){
    const wp=WEAPONS[currentWeapon];
    if(!wp.maxAmmo) return;                      // melee or beam-type — no reload
    if(wp.ammo>=wp.maxAmmo) return;              // already full
    if(wState.reloading) return;
    if(wp.type==='beam'||wp.type==='precise_track') return; // auto-recharge types
    wState.reloading=true;
    wState.reloadDuration=wp.reloadTime||75;
    wState.reloadTimer=wState.reloadDuration;
    wState.holdingFire=false;
    spawnDamageText(player.x,player.y-38,'RELOADING…',wp.color);
}

function updateReload(){
    if(!wState.reloading) return;
    wState.reloadTimer--;
    if(wState.reloadTimer<=0){
        const wp=WEAPONS[currentWeapon];
        wp.ammo=wp.maxAmmo;
        wState.reloading=false;
        spawnDamageText(player.x,player.y-40,'LOADED!',wp.color);
    }
}

function castPrismRay(ox,oy,angle,maxLen){
    const dx=Math.cos(angle), dy=Math.sin(angle);
    let hx=ox+dx*maxLen, hy=oy+dy*maxLen;
    let hitX=null,hitY=null,nx=0,ny=0;
    
    // Segment 1: cast forward until hitting a wall
    for(let i=8;i<maxLen;i+=4){
        const cx=ox+dx*i, cy=oy+dy*i;
        const tx=Math.floor(cx/TILE_SIZE);
        const ty=Math.floor(cy/TILE_SIZE);
        const t=map[ty]?.[tx];
        if(t===T_WALL||t===T_VOID){
            hx=cx; hy=cy; hitX=cx; hitY=cy;
            
            // Check adjacent tiles (not pixels) to determine wall orientation
            const checkLeft=map[ty]?.[tx-1];
            const checkRight=map[ty]?.[tx+1];
            const checkUp=map[ty-1]?.[tx];
            const checkDown=map[ty+1]?.[tx];
            
            const isWallLeft=(checkLeft===T_WALL||checkLeft===T_VOID);
            const isWallRight=(checkRight===T_WALL||checkRight===T_VOID);
            const isWallUp=(checkUp===T_WALL||checkUp===T_VOID);
            const isWallDown=(checkDown===T_WALL||checkDown===T_VOID);
            
            // Determine which side is OPEN (came from that direction)
            const cameFromLeft=!isWallLeft;
            const cameFromRight=!isWallRight;
            const cameFromUp=!isWallUp;
            const cameFromDown=!isWallDown;
            
            // Set normal based on open side
            if(cameFromLeft && !cameFromRight) { nx=1; ny=0; }      // came from left, hit right face
            else if(cameFromRight && !cameFromLeft) { nx=-1; ny=0; } // came from right, hit left face
            else if(cameFromUp && !cameFromDown) { nx=0; ny=1; }     // came from up, hit bottom face
            else if(cameFromDown && !cameFromUp) { nx=0; ny=-1; }    // came from down, hit top face
            else if(cameFromLeft && cameFromUp) { nx=1; ny=1; }      // corner
            else if(cameFromRight && cameFromUp) { nx=-1; ny=1; }
            else if(cameFromLeft && cameFromDown) { nx=1; ny=-1; }
            else if(cameFromRight && cameFromDown) { nx=-1; ny=-1; }
            else { nx=1; ny=0; } // default
            
            // Normalize
            const nlen=Math.hypot(nx,ny)||1;
            nx/=nlen; ny/=nlen;
            break;
        }
    }
    
    const seg1={x1:ox,y1:oy,x2:hx,y2:hy};
    if(hitX===null) return {segs:[seg1],crit:false};
    
    // Reflect direction
    const dot=dx*nx+dy*ny;
    const rdx=dx-2*dot*nx, rdy=dy-2*dot*ny;
    
    // Crit when perpendicular hit (dot product near 0)
    const crit=Math.abs(dot)<(WEAPONS[currentWeapon].cleanAngleThresh||0.25);
    
    // Segment 2
    let ex=hitX+rdx*maxLen, ey=hitY+rdy*maxLen;
    const remaining=maxLen*0.75;
    for(let i=4;i<remaining;i+=4){
        const cx2=hitX+rdx*i, cy2=hitY+rdy*i;
        const tx2=Math.floor(cx2/TILE_SIZE);
        const ty2=Math.floor(cy2/TILE_SIZE);
        const t2=map[ty2]?.[tx2];
        if(t2===T_WALL||t2===T_VOID){ ex=cx2; ey=cy2; break; }
    }
    const seg2={x1:hitX,y1:hitY,x2:ex,y2:ey};
    return {segs:[seg1,seg2],crit,reflectAngle:Math.atan2(rdy,rdx),hitX,hitY};
}

function randomFrom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

function spawnDamageText(x,y,text,color){

// Centralised enemy → player damage; applies current depth damage scale
function hurtPlayer(dmg){
    let mult = enemyScaleDmg * diffMults.enemyDmg * activeEnemyDmgMult;
    if(hasMod2('corroded_plating')) mult *= 1.2;
    if(hasMod2('small_pockets')) mult *= 1 + Math.min(playerScrap/500, 1)*0.5;
    const scaled=Math.ceil(dmg*mult);
    player.health=Math.max(0,player.health-scaled);
    spawnDamageText(player.x,player.y-player.size-14,'−'+scaled,'#ff2244');
    // Butterfingers: 35% chance to drop active module on hit
    if(hasMod2('butterfingers') && moduleSlots[activeModuleSlot]!==-1 && Math.random()<0.35){
        const bi=activeModuleSlot, bd=moduleSlotData[bi];
        if(bd){
            droppedModules.push({x:player.x+(Math.random()-.5)*40,y:player.y+(Math.random()-.5)*40,
                weaponIdx:moduleSlots[bi],life:4800,pickupPrompt:false,
                tierIdx:bd.tierIdx,tierData:bd.tierData,mods:bd.mods});
            moduleSlots[bi]=-1; moduleSlotData[bi]=null;
            spawnDamageText(player.x,player.y-52,'MODULE DROPPED!','#ff8800');
        }
    }
    if(player.health <= 0 && gameState === 'playing') triggerPlayerDeath();
    return scaled;
}

// ── Player projectile factory: applies all active modifiers ──────────────────
function spawnPlayerProjectile(x,y,vx,vy,kind,wd){
    damageSourceIsPlayer=true;
    // Speed mult
    const spd=Math.hypot(vx,vy);
    const nx=vx/spd, ny=vy/spd;
    const newSpd=spd*playerProjSpeedMult;
    const p=new Projectile(x,y,nx*newSpd,ny*newSpd,kind,wd);
    // Size mult stored on projectile for draw
    p.sizeScale=playerProjSizeMult;
    // Piercing
    if(hasMod('piercing')&&kind!=='shard'){
        p.pierce=true;
        p.pierceRemaining=modCount('piercing');
    }
    // Ricochet
    if(hasMod('ricochet')&&(p.bouncesLeft===undefined||p.bouncesLeft===0)){
        p.bouncesLeft=(p.bouncesLeft||0)+modCount('ricochet');
    }
    projectiles.push(p);
    return p;
}

function spawnSwingParticles(color,arcSpan,range){
    const n=14;
    for(let i=0;i<n;i++){
        const a=player.angle-arcSpan/2+(arcSpan/n)*i+(Math.random()-.5)*.25;
        const d=range*.55+Math.random()*range*.4;
        const sp=2+Math.random()*4;
        particles.push(new Particle(player.x+Math.cos(a)*d*.4,player.y+Math.sin(a)*d*.4,
            Math.cos(a)*sp,Math.sin(a)*sp,18+Math.random()*10,4,'spark'));
    }
}

function castBeamRay(maxLen){
    const dx=Math.cos(player.angle), dy=Math.sin(player.angle);
    for(let i=8;i<maxLen;i+=5){
        const cx=player.x+dx*i, cy=player.y+dy*i;
        const t=map[Math.floor(cy/TILE_SIZE)]?.[Math.floor(cx/TILE_SIZE)];
        if(t===T_WALL||t===T_VOID) return{x:cx,y:cy,hit:true};
    }
    return{x:player.x+dx*maxLen,y:player.y+dy*maxLen,hit:false};
}

function fireWeapon(){
    const wp=WEAPONS[currentWeapon];
    damageSourceIsPlayer=true;
    if(wState.reloading){ spawnDamageText(player.x,player.y-30,'RELOADING…',wp.color); return; }
    // SHORT CIRCUIT: weapon is jammed
    if(shortCircuitJam>0){ spawnDamageText(player.x,player.y-30,'JAMMED!','#ffff44'); return; }
    // SCAREDY CAT / HEAD FIRST: block forbidden weapon class
    if(!isModuleAllowedByDiff(currentWeapon)){
        const msg = hasMod2('scaredy_cat') ? 'RANGED ONLY!' : 'MELEE ONLY!';
        spawnDamageText(player.x,player.y-36,msg,'#ff8844'); return;
    }
    // HIGH ENERGY BILLS: firing costs energy
    if(hasMod2('high_energy_bills') && player.energy<8){
        spawnDamageText(player.x,player.y-30,'NO ENERGY!','#44aaff'); return;
    }
    if(hasMod2('high_energy_bills')) player.energy=Math.max(0,player.energy-8);
    // Allow cleaver second hit even during cooldown window
    if(wp.type==='melee_combo'&&wState.cleaverPhase==='window'){
        fireMeleeCombo(wp); return;
    }
    if(wState.cooldown>0) return;

    switch(wp.type){
        case 'melee':            fireMelee(wp);          break;
        case 'melee_slam':       fireMeleeSlam(wp);      break;
        case 'melee_combo':      fireMeleeCombo(wp);     break;
        case 'melee_thrust':     fireMeleeThrust(wp);    break;
        case 'ranged':           fireRanged(wp);         break;
        case 'ranged_arc':       fireRangedArc(wp);      break;
        case 'ranged_hold':      break; // handled in updateWeapons
        case 'beam':             break; // handled in updateWeapons
        case 'precise_thrust':   firePreciseThrust(wp);  break;
        case 'precise_chain':    firePreciseChain(wp);   break;
        case 'precise_rapid':    firePreciseRapid(wp);   break;
        case 'precise_dash':     firePreciseDash(wp);    break;
        case 'precise_charge':   break; // handled via holdingFire in updateWeapons
        case 'precise_track':    break; // handled in updateWeapons
        case 'precise_semi':     firePreciseSemi(wp);    break;
        case 'precise_rail':     firePreciseRail(wp);    break;
        case 'surge_combo3':     fireSurgeCombo(wp);     break;
        case 'surge_arc':        fireSurgeArc(wp);       break;
        case 'surge_whirl':      break; // hold-fire handled in update
        case 'surge_plasma':     fireSurgePlasma(wp);    break;
        case 'surge_tesla':      fireSurgeTesla(wp);     break;
        case 'surge_scatter':    fireSurgeScatter(wp);   break;
        case 'surge_pulse':      fireSurgePulse(wp);     break;
        case 'surge_shard':      fireSurgeShard(wp);     break;
        case 'blank_semi':       firePistol(wp);         break;
    }
}

function fireMelee(wp){ // ── Titan Greatsword
    if(wState.swinging) return;
    wState.swinging=true; wState.swingTimer=wp.cooldown; wState.swingDuration=wp.cooldown;
    wState.swingAngle=player.angle; wState.swingArcSpan=wp.arcSpan;
    wState.swingColor=wp.color; wState.swingCombo=false;
    wState.cooldown=wp.cooldown;
    // Full forward momentum → bonus damage
    const aimDx=Math.cos(player.angle), aimDy=Math.sin(player.angle);
    const forwardSpd=player.momentumX*aimDx+player.momentumY*aimDy;
    const bonusDmg=Math.max(0,Math.round(forwardSpd*10));
    const baseDmg=50+bonusDmg;
    // Self-knockback opposite direction
    player.momentumX-=aimDx*wp.selfKnockback*playerRecoilMult;
    player.momentumY-=aimDy*wp.selfKnockback*playerRecoilMult;
    damageSourceIsPlayer=true;
    spawnSwingParticles(wp.color,wp.arcSpan*playerArcMult,wp.range*playerRangeMult);
    // Hit enemies + push them back
    for(const e of enemies){
        if(e.dead) continue;
        const d=Math.hypot(e.x-player.x,e.y-player.y);
        if(d>wp.range*playerRangeMult+e.size) continue;
        const angleToE=Math.atan2(e.y-player.y,e.x-player.x);
        let diff=angleToE-player.angle;
        while(diff>Math.PI) diff-=Math.PI*2;
        while(diff<-Math.PI) diff+=Math.PI*2;
        if(Math.abs(diff)<wp.arcSpan*playerArcMult/2+0.15){
            e.takeDamage(baseDmg);
            e.vx+=Math.cos(angleToE)*6.5*playerKnockbackMult;
            e.vy+=Math.sin(angleToE)*6.5*playerKnockbackMult;
        }
    }
    if(activeBoss&&!activeBoss.dead){
        const bd=Math.hypot(activeBoss.x-player.x,activeBoss.y-player.y);
        if(bd<=wp.range*playerRangeMult+activeBoss.size){
            const aToB=Math.atan2(activeBoss.y-player.y,activeBoss.x-player.x);
            let diff=aToB-player.angle; while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2;
            if(Math.abs(diff)<wp.arcSpan*playerArcMult/2+0.15) activeBoss.takeDamage(baseDmg,activeBoss.x,activeBoss.y);
        }
    }
    spawnDamageText(player.x+aimDx*60,player.y+aimDy*60-24,randomFrom(SFX[wp.id]),wp.color);
    camera.x+=(Math.random()-.5)*6; camera.y+=(Math.random()-.5)*6;
}

function fireMeleeSlam(wp){ // ── Gravity Maul

    // Huge upward burst (opposite Y + recoil back)

function fireRangedArc(wp){ // ── Rail Mortar

    const ang=Math.atan2(ty-player.y,tx-player.x);
    player.momentumX-=Math.cos(ang)*2.8; player.momentumY-=Math.sin(ang)*2.8;
    for(let i=0;i<10;i++){
        const a=ang+Math.PI+(Math.random()-.5)*0.7;

function firePreciseThrust(wp){ // ── Phase Spear
    if(wState.spearActive) return;
    wState.spearActive=true; wState.spearTimer=16; wState.spearAngle=player.angle;
    wState.cooldown=wp.cooldown;
    wState.thrustHitSet=new Set(); // fresh hit tracking for this thrust
    const tipX=player.x+Math.cos(player.angle)*wp.reach;
    const tipY=player.y+Math.sin(player.angle)*wp.reach;
    // Real weakpoint detection at fire time: does the aimed ray line up with a weakpoint?
    let gotCrit=false;
    for(const e of enemies){
        if(e.dead) continue;
        if(Math.hypot(e.x-player.x,e.y-player.y)>wp.reach+e.size+8) continue;
        if(rayHitsWeakpoint(e,player.x,player.y,player.angle,wp.reach)){ gotCrit=true; break; }
    }
    wState.spearCrit=gotCrit;
    for(let i=0;i<(wState.spearCrit?18:8);i++){
        const a=player.angle+(Math.random()-.5)*(wState.spearCrit?Math.PI*.5:Math.PI*.2);
        particles.push(new Particle(tipX,tipY,Math.cos(a)*3,Math.sin(a)*3,14+Math.random()*8,wState.spearCrit?5:3,'spark'));
    }
        spawnDamageText(tipX,tipY-22,randomFrom(SFX[wp.id]),wp.color);
    // Damage applied per-frame in updateWeapons via thrustCheckEnemies
    // NO self-recoil — that's the Precise identity
}

function firePreciseChain(wp){ // ── Mono Blade
    wState.monoSwinging=true; wState.monoSwingTimer=wp.cooldown;
    wState.cooldown=wp.cooldown;
    
    const arcA=player.angle+(wState.monoCombo%2===0?-1:1)*Math.PI*.18;
    const comboDmg=20+wState.monoCombo*10;
    
    // Check if we actually hit an enemy
    let hitLanded=false;
    for(const e of enemies){
        if(e.dead) continue;
        const d=Math.hypot(e.x-player.x,e.y-player.y);
        if(d>wp.range*playerRangeMult+e.size) continue;
        const angleToE=Math.atan2(e.y-player.y,e.x-player.x);
        let diff=angleToE-arcA;
        while(diff>Math.PI) diff-=Math.PI*2;
        while(diff<-Math.PI) diff+=Math.PI*2;
        if(Math.abs(diff)<wp.arcSpan*playerArcMult/2+0.15){
            hitLanded=true;
            break;
        }
    }
    
    // Update combo state based on hit
    if(!hitLanded){
        wState.monoCombo=0;
        wState.monoComboTimer=0;
        spawnDamageText(player.x,player.y-30,'AWW, MISS','#ff4444');
    } else {
        wState.monoCombo=Math.min(wState.monoCombo+1,wp.maxCombo);
        wState.monoComboTimer=wp.comboWindow;
        const crit=wState.monoCombo>=wp.maxCombo;
        const comboCol=`hsl(${180+wState.monoCombo*30},100%,70%)`;
        
        if(crit){
            spawnDamageText(player.x,player.y-42,'MAX COMBO x'+wp.maxCombo+'!','#ffffff');
            camera.x+=(Math.random()-.5)*7; camera.y+=(Math.random()-.5)*7;
        } else {
            spawnDamageText(player.x,player.y-35,'COMBO x'+wState.monoCombo,comboCol);
        }
    }
    
    spawnSwingParticles(hitLanded?`hsl(${180+wState.monoCombo*30},100%,65%)`:('#ff4444'),wp.arcSpan*playerArcMult,wp.range*playerRangeMult);
    meleeHitEnemies(player.x,player.y,arcA,wp.arcSpan*playerArcMult,wp.range*playerRangeMult,comboDmg);
    
    wState.swinging=true; wState.swingTimer=wp.cooldown; wState.swingDuration=wp.cooldown;
    wState.swingAngle=arcA;
    wState.swingArcSpan=wp.arcSpan*playerArcMult;
    wState.swingColor=hitLanded?`hsl(${180+wState.monoCombo*30},100%,65%)`:('#ff4444');
    wState.swingCombo=wState.monoCombo>=wp.maxCombo;
}

function doNeedleStab(wp, stabIndex){ // ── single stab within a Needle Array burst
    // Stab 0 = dead center, stabs 1+ get slight random spread
    const dev = stabIndex === 0 ? 0 : (Math.random() - 0.5) * 0.32;
    const stabAngle = player.angle + dev;
    // Capture origin so the line stays anchored even if player moves
    const originX = player.x, originY = player.y;
    const thrustDur = 13;
    // All hit detection happens per-frame in the thrust tick loop
    wState.needleThrusts.push({
        angle: stabAngle,
        timer: thrustDur, maxTimer: thrustDur,
        originX, originY,
        hitSet: new Set(),   // enemies already hit by this thrust
        wpHitThisThrust: false,  // has this thrust scored a WP hit yet
        wpHit: false         // visual flag (set when first WP lands)
    });
    // Launch particles at player position
    for(let i=0;i<4;i++){
        const a=stabAngle+(Math.random()-.5)*0.28;
        particles.push(new Particle(originX,originY,Math.cos(a)*3.5,Math.sin(a)*3.5,10,2,'spark'));
    }
}

function firePreciseRapid(wp){ // ── Needle Array — starts a 3-stab burst
    if(wState.cooldown>0||wState.needleBurstActive) return;
    wState.needleBurstActive=true;
    wState.needleBurstStep=1;           // stab 1 fires immediately
    wState.needleBurstTimer=wp.burstDelay;
    wState.needleBurstWpHit=false;
    wState.cooldown=9999;               // locked until burst fully resolves
    doNeedleStab(wp, 0);
}

function firePreciseDash(wp){ // ── Lancer Dash
    if(wState.lancerDashCooldown>0){
        spawnDamageText(player.x,player.y-28,'DASH COOLING…',wp.color); return;
    }
    wState.lancerDashing=true; wState.lancerDashTimer=12; wState.lancerDashAngle=player.angle;
    wState.lancerDashCooldown=wp.dashCooldown; wState.cooldown=wp.cooldown;
    wState.thrustHitSet=new Set(); // fresh hit set for this dash
    // Dash impulse
    player.momentumX+=Math.cos(player.angle)*wp.dashForce;
    player.momentumY+=Math.sin(player.angle)*wp.dashForce;
    for(let i=0;i<12;i++){
        const a=player.angle+Math.PI+(Math.random()-.5)*Math.PI*.6;
        particles.push(new Particle(player.x,player.y,Math.cos(a)*4,Math.sin(a)*4,14,3,'trail'));
    }
}

function finishLancerStab(wp){ // called from update when dash finishes
    wState.lancerStabActive=true; wState.lancerStabTimer=14;
    const tipX=player.x+Math.cos(wState.lancerDashAngle)*wp.reach;
    const tipY=player.y+Math.sin(wState.lancerDashAngle)*wp.reach;
    // Real weakpoint detection: does the dash angle line up with a weakpoint?
    let crit=false;
    for(const e of enemies){
        if(e.dead) continue;
        if(Math.hypot(e.x-player.x,e.y-player.y)>wp.reach+e.size+28) continue;
        if(rayHitsWeakpoint(e,player.x,player.y,wState.lancerDashAngle,wp.reach+20)){ crit=true; break; }
    }
    const col=crit?'#ffffff':wp.color;
    for(let i=0;i<(crit?20:10);i++){
        const a=wState.lancerDashAngle+(Math.random()-.5)*Math.PI*.4;
        particles.push(new Particle(tipX,tipY,Math.cos(a)*4,Math.sin(a)*4,16+Math.random()*8,crit?5:3,'spark'));
    }
    if(crit){
        wState.lancerDashCooldown=0;
        wState.cooldown=0;
        spawnDamageText(tipX,tipY-28,'RESET!','#ffffff');
        camera.x+=(Math.random()-.5)*6; camera.y+=(Math.random()-.5)*6;
    } else {
        spawnDamageText(tipX,tipY-22, randomFrom(SFX[wp.id]),wp.color);
    }
    const stabDmg=crit?60:25;
    // Use thrustCheckEnemies so the full shaft deals damage, once per enemy
    thrustCheckEnemies(player.x,player.y,wState.lancerDashAngle,wp.reach+20,stabDmg,14);
    wState.swinging=true; wState.swingTimer=14; wState.swingDuration=14;
    wState.swingAngle=wState.lancerDashAngle; wState.swingArcSpan=Math.PI*.28;
    wState.swingColor=col; wState.swingCombo=crit;
}

function firePreciseSemi(wp){ // ── Pulse Marksman
    if(wp.ammo<=0){ spawnDamageText(player.x,player.y-30,'EMPTY! [R]','#ff0000'); return; }
    wp.ammo--;
    wState.cooldown=wp.cooldown;
    const spd=Math.hypot(player.momentumX,player.momentumY);
    const stabilized=spd<wp.stabilizeSpd;
    const spread=stabilized?0.018:0.12;
    const ang=player.angle+(Math.random()-.5)*spread*2;
    
    // Create projectile and track if it hits a weakpoint
    const proj=spawnPlayerProjectile(player.x,player.y,Math.cos(ang)*wp.projSpeed,Math.sin(ang)*wp.projSpeed,'pulse',wp);
    spawnDamageText(player.x + 10,player.y-20,randomFrom(SFX[wp.id]),wp.color);

    // Minimal muzzle puff
    for(let i=0;i<5;i++){
        const a=player.angle+(Math.random()-.5)*0.35;
        particles.push(new Particle(player.x,player.y,Math.cos(a)*5,Math.sin(a)*5,10,2,'spark'));

}

function firePreciseRail(wp){ // ── Prism Rail
    if(wp.ammo<=0){ spawnDamageText(player.x,player.y-30,'EMPTY! [R]','#ff0000'); return; }
    wp.ammo--;
    wState.cooldown=wp.cooldown;
    const result=castPrismRay(player.x,player.y,player.angle,wp.beamLength);
    wState.railBeam=result; wState.railBeamTimer=22;
    const col=result.crit?'#ffffff':wp.color;
    
    if(result.crit){
        spawnDamageText(result.segs[result.segs.length-1].x2,result.segs[result.segs.length-1].y2-24,'REFLECT CRIT!','#ffffff');
        camera.x+=(Math.random()-.5)*4; camera.y+=(Math.random()-.5)*4;
    } else if(result.segs.length>1){
        spawnDamageText(result.hitX,result.hitY-22,'REFLECTED',wp.color);
    }
    
    for(let i=0;i<6;i++){
        const a=player.angle+(Math.random()-.5)*0.15;
        particles.push(new Particle(player.x,player.y,Math.cos(a)*5,Math.sin(a)*5,10,2,'spark'));
    }
    
    // Rail beam damage along each segment
    // Base damage is 2× if reflect crit, 1× otherwise
    const baseDmg=result.crit?40:20;
    damageSourceIsPlayer=true;
    for(const seg of result.segs){
        const segLen=Math.hypot(seg.x2-seg.x1,seg.y2-seg.y1);
        if(segLen<1) continue;
        for(const e of enemies){
            if(e.dead) continue;
            const t3=Math.max(0,Math.min(1,((e.x-seg.x1)*(seg.x2-seg.x1)+(e.y-seg.y1)*(seg.y2-seg.y1))/(segLen*segLen)));
            const cx3=seg.x1+t3*(seg.x2-seg.x1), cy3=seg.y1+t3*(seg.y2-seg.y1);
            if(Math.hypot(e.x-cx3,e.y-cy3)<e.size+10){
                const wpHit=segmentHitsWeakpoint(e,seg.x1,seg.y1,seg.x2,seg.y2);
                let finalDmg=baseDmg;
                if(wpHit) finalDmg*=2;
                e.takeDamage(finalDmg);
                if(wpHit) triggerWeakpointEffect(e);
            }
        }
        // ── Also damage active boss along rail segment ───────────────────────
        if(activeBoss && !activeBoss.dead){
            const tb=Math.max(0,Math.min(1,((activeBoss.x-seg.x1)*(seg.x2-seg.x1)+(activeBoss.y-seg.y1)*(seg.y2-seg.y1))/(segLen*segLen)));
            const cbx=seg.x1+tb*(seg.x2-seg.x1), cby=seg.y1+tb*(seg.y2-seg.y1);
            if(Math.hypot(activeBoss.x-cbx,activeBoss.y-cby)<activeBoss.size+10){
                activeBoss.takeDamage(baseDmg, cbx, cby);
            }
        }
    }
}
