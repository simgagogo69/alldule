        const stuckCount=projectiles.filter(p=>p.kind==='shard'&&p.stuck).length;
        if(stuckCount>0){ ctx.fillStyle=wp.color; ctx.shadowBlur=8; ctx.shadowColor=wp.color; ctx.font='bold 9px Orbitron'; ctx.fillText(''+stuckCount+' LODGED',wpX+wsz/2,statY+50); ctx.shadowBlur=0; }
        else { ctx.fillStyle='rgba(140,160,100,0.4)'; ctx.font='bold 7px Orbitron'; ctx.fillText('STICK THEN DETONATE',wpX+wsz/2,statY+50); }
    } else if(wp.type==='blank_semi'){
        ctx.fillStyle='#fff'; ctx.font='bold 32px Orbitron'; ctx.fillText(wp.ammo,wpX+wsz/2,statY+22);
        ctx.fillStyle='rgba(0,140,190,0.4)'; ctx.fillRect(wpX+16,statY+30,wsz-32,1.5);
        ctx.fillStyle='#445566'; ctx.font='bold 9px Orbitron'; ctx.fillText('/'+wp.maxAmmo+' [R]',wpX+wsz/2,statY+44);
        // pip ammo display
        const pipW2=Math.min(10,(wsz-22)/wp.maxAmmo-1.5);
        for(let i=0;i<wp.maxAmmo;i++){
            const px=wpX+11+i*((wsz-22)/wp.maxAmmo);
            ctx.fillStyle=i<wp.ammo?wp.color:'#111e28'; ctx.shadowBlur=i<wp.ammo?5:0; ctx.shadowColor=wp.color;
            ctx.fillRect(px,statY+52,pipW2,6);
        }
        ctx.shadowBlur=0;
        ctx.fillStyle='rgba(140,150,160,0.4)'; ctx.font='bold 7px Orbitron';
    } else {
        ctx.fillStyle='#fff'; ctx.font='bold 32px Orbitron'; ctx.fillText(wp.ammo!=null?wp.ammo:'—',wpX+wsz/2,statY+22);
        if(wp.maxAmmo){ctx.fillStyle='#445566';ctx.font='bold 10px Orbitron';ctx.fillText('/'+wp.maxAmmo,wpX+wsz/2,statY+38);}
    }
    } // end !reloading

    // Module slot indicator dots (bottom strip)
    ctx.fillStyle='rgba(0,140,190,0.25)'; ctx.fillRect(wpX+14,wpY+wsz+8,wsz-28,1);
    // two pip dots showing which slot is active
    for(let s=0;s<2;s++){
        const isEmpty2=moduleSlots[s]===-1;
        const isAct=s===activeModuleSlot;
        const dotX=wpX+wsz/2+(s===0?-14:14), dotY=wpY+wsz+18;
        const dotCol=isEmpty2?'#223344':WEAPONS[moduleSlots[s]].color;
        ctx.fillStyle=isAct?dotCol:'rgba(0,40,60,0.7)';
        ctx.shadowBlur=isAct?8:0; ctx.shadowColor=dotCol;
        ctx.strokeStyle=dotCol; ctx.lineWidth=1;
        ctx.beginPath(); ctx.arc(dotX,dotY,5,0,Math.PI*2); ctx.fill(); ctx.stroke();
    }
    ctx.shadowBlur=0;
    // Top center — exits panel (shows N portals / leaf label)
    const children=currentSector.children;
    const isBossLvl = isBossSector(currentSector);
    const topLabel = isBossLvl ? '⚠ BOSS ARENA ⚠' :
        children.length===0 ? '— DEAD END —' :
        children.length===1 ? '1 EXIT' : children.length+' EXITS';
    const tcW=220, tcH=34, tcX=canvas.width/2-tcW/2, tcY=pad-8;
    ctx.fillStyle='rgba(0,7,16,0.82)'; ctx.strokeStyle='rgba(0,165,235,0.35)'; ctx.lineWidth=1.5;
    roundRect(tcX,tcY,tcW,tcH,4); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#006680'; ctx.font='bold 11px Orbitron'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(topLabel,canvas.width/2,tcY+17);

    // ── Active difficulty + modifier badges — bottom centre ──────────────────
    if(selectedDifficulty!==1 || activeModifiers.size>0){
        const badges=[];
        if(selectedDifficulty!==1) badges.push({label:DIFFICULTY_LABELS[selectedDifficulty],col:DIFFICULTY_COLORS[selectedDifficulty]});
        for(const id of activeModifiers){
            const def=MODIFIER_DEFS.find(m=>m.id===id);
            if(def) badges.push({label:def.label,col:def.color});
        }
        const bH=16, bPad=6, gap=4;
        let totalW=0;
        badges.forEach(b=>{
            ctx.font='bold 6px Orbitron';
            totalW+=ctx.measureText(b.label).width+bPad*2+gap;
        });
        let bx=canvas.width/2-totalW/2;
        const by=canvas.height-pad-58;
        for(const b of badges){
            ctx.font='bold 6px Orbitron';
            const bw=ctx.measureText(b.label).width+bPad*2;
            ctx.fillStyle='rgba(0,5,14,0.85)';
            ctx.strokeStyle=b.col+'88'; ctx.lineWidth=1;
            roundRect(bx,by,bw,bH,3); ctx.fill(); ctx.stroke();
            ctx.fillStyle=b.col; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(b.label,bx+bw/2,by+bH/2);
            bx+=bw+gap;
        }
    }

    // ── SCRAP counter — bottom left ──────────────────────────────────────────
    const scrapPulse = Math.sin(Date.now()/400)*0.15+0.85;
    const scW=172, scH=36, scX=pad-8, scY=canvas.height-pad-scH+8;
    // Background
    ctx.fillStyle='rgba(0,7,16,0.90)';
    ctx.strokeStyle=`rgba(180,140,0,0.55)`; ctx.lineWidth=1.5;
    ctx.shadowBlur=0;
    roundRect(scX,scY,scW,scH,5); ctx.fill(); ctx.stroke();
    // Inner accent line
    ctx.strokeStyle=`rgba(255,220,80,0.18)`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(scX+8,scY+scH-1); ctx.lineTo(scX+scW-8,scY+scH-1); ctx.stroke();
    // Hex icon
    ctx.fillStyle=`rgba(255,220,80,${scrapPulse*0.9})`;
    ctx.shadowBlur=10*scrapPulse; ctx.shadowColor='#ffaa00';
    ctx.beginPath();
    for(let i=0;i<6;i++){
        const a=i/6*Math.PI*2-Math.PI/6;
        const hx=scX+18+Math.cos(a)*7, hy=scY+scH/2+Math.sin(a)*7;
        i===0?ctx.moveTo(hx,hy):ctx.lineTo(hx,hy);
    }
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;
    // Label
    ctx.fillStyle='rgba(180,150,60,0.55)'; ctx.font='bold 7px Orbitron';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('SCRAP', scX+30, scY+scH/2-8);
    // Amount — large
    ctx.fillStyle=`rgba(255,225,100,${scrapPulse})`;
    ctx.shadowBlur=8*scrapPulse; ctx.shadowColor='#ffcc00';
    ctx.font='bold 17px Orbitron'; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(playerScrap, scX+30, scY+scH/2+6);
    ctx.shadowBlur=0;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  COMPASS — points to nearest portal
// ═══════════════════════════════════════════════════════════════════════════════
function drawCompass(){
    if(doors.length===0) return; // leaf node

    // Find nearest door
    let nearest=doors[0], nDist=Infinity;
    for(const d of doors){
        const dist2=Math.hypot(d.x+TILE_SIZE/2-player.x, d.y+TILE_SIZE/2-player.y);
        if(dist2<nDist){ nDist=dist2; nearest=d; }
    }
    const dx=(nearest.x+TILE_SIZE/2)-player.x, dy=(nearest.y+TILE_SIZE/2)-player.y;
    const ang=Math.atan2(dy,dx), dist=Math.floor(Math.sqrt(dx*dx+dy*dy)/TILE_SIZE);
    const col=nearest.targetNode.color;
    const cx=canvas.width/2, cy=canvas.height-72, R=28;

    ctx.fillStyle='rgba(0,7,16,0.88)'; ctx.strokeStyle=`rgba(0,145,205,0.6)`; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx,cy,R+10,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.strokeStyle='rgba(0,80,120,0.4)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(cx,cy,R-2,0,Math.PI*2); ctx.stroke();

    ctx.save(); ctx.translate(cx,cy); ctx.rotate(ang);
    ctx.fillStyle=col; ctx.shadowBlur=14; ctx.shadowColor=col;
    ctx.beginPath(); ctx.moveTo(R,0); ctx.lineTo(R-13,-7); ctx.lineTo(R-11,0); ctx.lineTo(R-13,7); ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='#2a3c4c';
    ctx.beginPath(); ctx.moveTo(-R,0); ctx.lineTo(-(R-10),-4); ctx.lineTo(-(R-10),4); ctx.closePath(); ctx.fill();
    ctx.restore();

    ctx.fillStyle=col; ctx.shadowBlur=8; ctx.shadowColor=col;
    ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle='#88aabd'; ctx.font='bold 11px Orbitron'; ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(dist+'m',cx,cy+R+14);

    // Show nearest destination name
    const shortName=nearest.targetNode.name.length>10?nearest.targetNode.name.slice(0,9)+'…':nearest.targetNode.name;
    ctx.fillStyle=col; ctx.font='bold 8px Orbitron';
    ctx.fillText(shortName.toUpperCase(),cx,cy+R+27);

    // Multiple portal indicators (dots on ring)
    if(doors.length>1){
        doors.forEach((d,i)=>{
            const ddx=(d.x+TILE_SIZE/2)-player.x, ddy=(d.y+TILE_SIZE/2)-player.y;
            const da=Math.atan2(ddy,ddx);
            const dc=d.targetNode.color;
            ctx.fillStyle=dc; ctx.shadowBlur=5; ctx.shadowColor=dc;
            ctx.beginPath();
            ctx.arc(cx+Math.cos(da)*(R+4), cy+Math.sin(da)*(R+4), 3.5, 0, Math.PI*2);
            ctx.fill();
        });
        ctx.shadowBlur=0;
    }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  WEAPON DRAW (world space — called inside camera transform)
// ═══════════════════════════════════════════════════════════════════════════════
function drawWeaponEffects(){
    // ── Swing arc ────────────────────────────────────────────────────────────
    if(wState.swinging&&wState.swingDuration>0){
        const prog=1-wState.swingTimer/wState.swingDuration;
        const col=wState.swingColor;
        const as=wState.swingAngle-wState.swingArcSpan/2;
        const ae=wState.swingAngle+wState.swingArcSpan*prog-wState.swingArcSpan/2;
        const r=wState.swingCombo?74:58;
        const fade=(1-Math.pow(prog,1.8));
        ctx.save(); ctx.translate(player.x,player.y);
        ctx.strokeStyle=col; ctx.lineWidth=7; ctx.shadowBlur=20; ctx.shadowColor=col;
        ctx.globalAlpha=.72*fade;
        ctx.beginPath(); ctx.arc(0,0,r,as,ae); ctx.stroke();
        ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=2; ctx.shadowBlur=0;
        ctx.beginPath(); ctx.arc(0,0,r,as,ae); ctx.stroke();
        // Leading edge sparkle
        ctx.fillStyle=col; ctx.shadowBlur=14; ctx.shadowColor=col;
        ctx.beginPath(); ctx.arc(Math.cos(ae)*r,Math.sin(ae)*r,4,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }

    // ── Pike thrust line ─────────────────────────────────────────────────────
    if(wState.pikeActive&&wState.pikeTimer>0){
        const pw=WEAPONS[3];
        const prog=1-wState.pikeTimer/18;
        const reach=pw.reach*(1-Math.pow(prog*1.4-.2,2));
        const ex=player.x+Math.cos(wState.pikeAngle)*Math.max(0,reach);
        const ey=player.y+Math.sin(wState.pikeAngle)*Math.max(0,reach);
        const spFrac=Math.min(wState.pikePlayerSpd/6,1);
        ctx.save();
        ctx.strokeStyle=spFrac>0.5?'#ffdd00':pw.color; ctx.lineWidth=5;
        ctx.shadowBlur=16; ctx.shadowColor=spFrac>0.5?'#ffdd00':pw.color;
        ctx.globalAlpha=1-prog*.9;
        ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(ex,ey); ctx.stroke();
        ctx.fillStyle='#fff'; ctx.shadowBlur=10;
        ctx.beginPath(); ctx.arc(ex,ey,5+spFrac*3,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }

    // ── Gravity wells ────────────────────────────────────────────────────────
    for(const gw of wState.gravityWells){
        const prog=1-gw.timer/gw.maxTimer;
        const pulse=Math.sin(Date.now()/130)*.5+.5;
        const fade=1-prog;
        ctx.save(); ctx.globalAlpha=fade*(.55+pulse*.3);
        ctx.strokeStyle=gw.color; ctx.lineWidth=1.5; ctx.shadowBlur=14; ctx.shadowColor=gw.color;
        ctx.beginPath(); ctx.arc(gw.x,gw.y,gw.radius*(.12+pulse*.04),0,Math.PI*2); ctx.stroke();
        ctx.globalAlpha=fade*.3;
        ctx.beginPath(); ctx.arc(gw.x,gw.y,gw.radius*(.5+prog*.5),0,Math.PI*2); ctx.stroke();
        // Rotating tick marks
        ctx.save(); ctx.translate(gw.x,gw.y); ctx.rotate(Date.now()/400);
        ctx.globalAlpha=fade*.5;
        for(let i=0;i<6;i++){
            ctx.save(); ctx.rotate(i*Math.PI/3);
            ctx.fillStyle=gw.color;
            ctx.fillRect(gw.radius*.2,-1,5,2);
            ctx.restore();
        }
        ctx.restore(); ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }

    // ── Projectiles ──────────────────────────────────────────────────────────
    projectiles.forEach(p=>p.draw());
    // Mortar shells (drawn above regular projectiles — they're "in the air")
    mortarShells.forEach(s=>s.draw());
    // ── Mortar shells ────────────────────────────────────────────────────────
    mortarShells.forEach(m=>m.draw());

    // ── Siege beam ───────────────────────────────────────────────────────────
    if(wState.beamActive){
        const bwp=WEAPONS[currentWeapon];
        const beamEnd=castBeamRay(bwp.beamLength);
        const pulse=Math.sin(Date.now()/55)*.5+.5;
        ctx.save();
        ctx.strokeStyle=bwp.color; ctx.lineWidth=14; ctx.shadowBlur=28; ctx.shadowColor=bwp.color;
        ctx.globalAlpha=.2+pulse*.12;
        ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(beamEnd.x,beamEnd.y); ctx.stroke();
        ctx.strokeStyle='#fff'; ctx.lineWidth=3; ctx.shadowBlur=10; ctx.shadowColor=bwp.color;
        ctx.globalAlpha=.9+pulse*.1;
        ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(beamEnd.x,beamEnd.y); ctx.stroke();
        ctx.fillStyle=bwp.color; ctx.shadowBlur=22+pulse*10;
        ctx.beginPath(); ctx.arc(beamEnd.x,beamEnd.y,6+pulse*4,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }

    // ── Cleaver exposed ring ─────────────────────────────────────────────────
    if(wState.cleaverPhase==='exposed'){
        const af=wState.cleaverExposedTimer/WEAPONS[2].exposedDuration;
        const pulse=Math.sin(Date.now()/80)*.5+.5;
        ctx.save(); ctx.globalAlpha=af;
        ctx.strokeStyle=`rgba(255,${20+pulse*60|0},0,0.9)`;
        ctx.lineWidth=2; ctx.shadowBlur=12; ctx.shadowColor='#ff2200';
        ctx.beginPath(); ctx.arc(player.x,player.y,player.size+7+pulse*3,0,Math.PI*2); ctx.stroke();
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }

    // ── Minigun spin-up ring ─────────────────────────────────────────────────
    if(WEAPONS[currentWeapon].type==='ranged_hold'&&wState.spinUp>0){
        const sf=wState.spinUp/WEAPONS[currentWeapon].spinUpFrames;
        ctx.save(); ctx.translate(player.x,player.y); ctx.rotate(Date.now()/200*sf*3);
        ctx.globalAlpha=sf*.55; ctx.strokeStyle=WEAPONS[currentWeapon].color;
        ctx.lineWidth=1.5; ctx.shadowBlur=8; ctx.shadowColor=WEAPONS[currentWeapon].color;
        ctx.setLineDash([4*sf,3]); ctx.beginPath(); ctx.arc(0,0,player.size+10,0,Math.PI*2); ctx.stroke();
        ctx.setLineDash([]); ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }

    // ════════════════════════════════════════════════════════════════════════
    //  PRECISE VISUAL EFFECTS
    // ════════════════════════════════════════════════════════════════════════

    // ── Phase Spear thrust line ───────────────────────────────────────────────
    if(wState.spearActive&&wState.spearTimer>0){
        const wp=WEAPONS[currentWeapon];
        const prog=1-wState.spearTimer/16;
        const col=wState.spearCrit?'#ffffff':wp.color;
        const ext=wState.spearCrit?1.35:1.0;
        const ex=player.x+Math.cos(wState.spearAngle)*wp.reach*ext;
        const ey=player.y+Math.sin(wState.spearAngle)*wp.reach*ext;
        ctx.save(); ctx.globalAlpha=(1-prog)*0.95;
        ctx.strokeStyle=col; ctx.lineWidth=wState.spearCrit?3:2;
        ctx.shadowBlur=wState.spearCrit?22:10; ctx.shadowColor=col;
        ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(ex,ey); ctx.stroke();
        if(wState.spearCrit){
            ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=6; ctx.globalAlpha=(1-prog)*.3;
            ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(ex,ey); ctx.stroke();
        }
        ctx.fillStyle=col; ctx.shadowBlur=16;
        ctx.beginPath(); ctx.arc(ex,ey,wState.spearCrit?6:3.5,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }

    // ── Needle Array — per-stab thrust visuals ───────────────────────────────
    if(wState.needleThrusts.length>0){
        const wp=WEAPONS[currentWeapon];
        for(const th of wState.needleThrusts){
            const prog=1-th.timer/th.maxTimer;
            // Extend tip out then retract, like spear — peak at ~35% through
            const extScale=1-Math.pow(prog*1.5-0.25,2);
            const reach=wp.reach*Math.max(0.05,extScale);
            const ex=player.x+Math.cos(th.angle)*reach;
            const ey=player.y+Math.sin(th.angle)*reach;
            const fade=1-prog;
            const sFrac=wState.needleStack/wp.maxStack;
            const col=th.wpHit?`hsl(${170+sFrac*60},100%,72%)`:`${wp.color}`;
            const lw=th.wpHit?2.5:1.8;
            const glow=th.wpHit?16:8;
            ctx.save(); ctx.globalAlpha=fade*0.92;
            ctx.strokeStyle=col; ctx.lineWidth=lw;
            ctx.shadowBlur=glow; ctx.shadowColor=col;
            ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(ex,ey); ctx.stroke();
            // Inner bright core line
            ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=0.8; ctx.shadowBlur=4;
            ctx.globalAlpha=fade*0.5;
            ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(ex,ey); ctx.stroke();
            // Glowing tip dot
            ctx.fillStyle=col; ctx.shadowBlur=glow+6; ctx.shadowColor=col;
            ctx.globalAlpha=fade*0.95;
            ctx.beginPath(); ctx.arc(ex,ey,th.wpHit?5:3,0,Math.PI*2); ctx.fill();
            ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
        }
    }

    // ── Lancer Dash afterimage ────────────────────────────────────────────────
    if(wState.lancerDashing){
        const wp=WEAPONS[currentWeapon];
        const af=wState.lancerDashTimer/12;
        ctx.save(); ctx.globalAlpha=af*.45;
        ctx.fillStyle=wp.color; ctx.shadowBlur=14; ctx.shadowColor=wp.color;
        ctx.beginPath(); ctx.ellipse(player.x-Math.cos(wState.lancerDashAngle)*18,player.y-Math.sin(wState.lancerDashAngle)*18,player.size*.7,player.size*.45,wState.lancerDashAngle,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
        // Speed lines
        ctx.save(); ctx.translate(player.x,player.y); ctx.rotate(wState.lancerDashAngle+Math.PI);
        ctx.globalAlpha=af*.6;
        ctx.strokeStyle=wp.color; ctx.lineWidth=1.5;
        for(let i=0;i<5;i++){
            const oy=(i-2)*5, len=12+Math.random()*20;
            ctx.beginPath(); ctx.moveTo(0,oy); ctx.lineTo(len,oy); ctx.stroke();
        }
        ctx.globalAlpha=1; ctx.restore();
    }

    // ── Lancer Stab tip ──────────────────────────────────────────────────────
    if(wState.lancerStabActive){
        const wp=WEAPONS[currentWeapon];
        const prog=1-wState.lancerStabTimer/14;
        const tipX=player.x+Math.cos(wState.lancerDashAngle)*wp.reach;
        const tipY=player.y+Math.sin(wState.lancerDashAngle)*wp.reach;
        ctx.save(); ctx.globalAlpha=(1-prog)*.85;
        ctx.strokeStyle=wp.color; ctx.lineWidth=3.5; ctx.shadowBlur=12; ctx.shadowColor=wp.color;
        ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(tipX,tipY); ctx.stroke();
        ctx.fillStyle='#fff'; ctx.shadowBlur=16;
        ctx.beginPath(); ctx.arc(tipX,tipY,4,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }

    // ── Sniper Core charge indicator ─────────────────────────────────────────
    if(wState.sniperCharging&&wState.sniperCharge>0){
        const wp=WEAPONS[currentWeapon];
        const cf=wState.sniperCharge/wp.chargeMax;
        const pulse=Math.sin(Date.now()/(120-cf*80))*.5+.5;
        const r=player.size+8+cf*10;
        ctx.save(); ctx.translate(player.x,player.y);
        ctx.strokeStyle=`rgba(${(170+cf*85)|0},${(240+cf*15)|0},255,${0.6+cf*.4})`;
        ctx.lineWidth=1.5+cf*2; ctx.shadowBlur=10+cf*14; ctx.shadowColor=wp.color;
        ctx.beginPath(); ctx.arc(0,0,r*(0.97+pulse*.03),0,Math.PI*2*cf); ctx.stroke();
        if(cf>=1){
            ctx.strokeStyle='#ffffff'; ctx.lineWidth=2.5; ctx.shadowBlur=24; ctx.shadowColor='#ffffff';
            ctx.globalAlpha=0.7+pulse*.3;
            ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
        }
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
        // Aim line
        ctx.save(); ctx.globalAlpha=cf*.55;
        ctx.strokeStyle=cf>=1?'#ffffff':wp.color; ctx.lineWidth=cf>=1?2:1;
        ctx.setLineDash([6,4]); ctx.shadowBlur=cf>=1?14:6; ctx.shadowColor=wp.color;
        ctx.beginPath(); ctx.moveTo(player.x,player.y);
        const aimEnd=castBeamRay(wp.pierceDist);
        ctx.lineTo(aimEnd.x,aimEnd.y); ctx.stroke();
        ctx.setLineDash([]); ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }

    // ── Tracking Laser beam ──────────────────────────────────────────────────
    if(wState.trackBeamActive){
        const wp=WEAPONS[currentWeapon];
        const beamEnd=castBeamRay(wp.beamLength);
        const rampFrac=wState.trackRamp/wp.rampMax;
        const pulse=Math.sin(Date.now()/45)*.5+.5;
        const hue=170+rampFrac*60;
        // Width grows from thin to chunky as ramp builds
        const coreW=1.5+rampFrac*6.5;       // 1.5 → 8px
        const glowW=10+rampFrac*20;          // 10 → 30px outer glow
        const hitRadius=3+rampFrac*9;        // tip impact circle
        ctx.save();
        // Outer glow
        ctx.strokeStyle=`hsla(${hue},100%,70%,${0.14+rampFrac*0.12})`; ctx.lineWidth=glowW; ctx.shadowBlur=0;
        ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(beamEnd.x,beamEnd.y); ctx.stroke();
        // Mid glow
        if(rampFrac>0.2){
            ctx.strokeStyle=`hsla(${hue},100%,80%,${0.18*rampFrac})`; ctx.lineWidth=coreW*2.5;
            ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(beamEnd.x,beamEnd.y); ctx.stroke();
        }
        // Core
        ctx.strokeStyle=`hsl(${hue},100%,88%)`; ctx.lineWidth=coreW;
        ctx.shadowBlur=8+rampFrac*22; ctx.shadowColor=`hsl(${hue},100%,70%)`;
        ctx.globalAlpha=0.9+pulse*.1;
        ctx.beginPath(); ctx.moveTo(player.x,player.y); ctx.lineTo(beamEnd.x,beamEnd.y); ctx.stroke();
        // Tip impact
        ctx.fillStyle=`hsl(${hue},100%,85%)`; ctx.shadowBlur=14+rampFrac*18;
        ctx.beginPath(); ctx.arc(beamEnd.x,beamEnd.y,hitRadius,0,Math.PI*2); ctx.fill();
        // Ramp flicker sparks at high ramp
        if(rampFrac>0.5&&Math.random()<rampFrac*0.4){
            const t=Math.random();
            const sx=player.x+(beamEnd.x-player.x)*t, sy=player.y+(beamEnd.y-player.y)*t;
            ctx.fillStyle=`hsl(${hue},100%,95%)`; ctx.shadowBlur=6;
            ctx.beginPath(); ctx.arc(sx+(Math.random()-.5)*4,sy+(Math.random()-.5)*4,1.5,0,Math.PI*2); ctx.fill();
        }
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }

    // ── Pulse Marksman stabilize crosshair ring ──────────────────────────────
    if(WEAPONS[currentWeapon].type==='precise_semi'&&wState.markStabilized){
        const wp=WEAPONS[currentWeapon];
        const pulse=Math.sin(Date.now()/350)*.5+.5;
        ctx.save(); ctx.translate(player.x,player.y);
        ctx.strokeStyle=wp.color; ctx.lineWidth=1; ctx.shadowBlur=8; ctx.shadowColor=wp.color;
        ctx.globalAlpha=.45+pulse*.25;
        ctx.beginPath(); ctx.arc(0,0,player.size+14,0,Math.PI*2); ctx.stroke();
        // 4 corner ticks
        for(let i=0;i<4;i++){
            ctx.save(); ctx.rotate(i*Math.PI/2);
            ctx.fillStyle=wp.color;
            ctx.fillRect(player.size+6,-1,9,2);
            ctx.restore();
        }
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }

    // ── Prism Rail beam linger ───────────────────────────────────────────────
    if(wState.railBeam&&wState.railBeamTimer>0){
        const wp=WEAPONS[currentWeapon];
        const fade=wState.railBeamTimer/22;
        const col=wState.railBeam.crit?'#ffffff':wp.color;
        ctx.save(); ctx.globalAlpha=fade;
        for(const seg of wState.railBeam.segs){
            ctx.strokeStyle=col; ctx.lineWidth=wState.railBeam.crit?3:2;
            ctx.shadowBlur=wState.railBeam.crit?20:10; ctx.shadowColor=col;
            ctx.beginPath(); ctx.moveTo(seg.x1,seg.y1); ctx.lineTo(seg.x2,seg.y2); ctx.stroke();
            // Glow hull
            ctx.strokeStyle=`${col}44`; ctx.lineWidth=8; ctx.shadowBlur=0;
            ctx.beginPath(); ctx.moveTo(seg.x1,seg.y1); ctx.lineTo(seg.x2,seg.y2); ctx.stroke();
        }
        // Reflect node sparkle
        if(wState.railBeam.segs.length>1&&wState.railBeam.hitX){
            ctx.fillStyle=col; ctx.shadowBlur=16; ctx.shadowColor=col;
            ctx.beginPath(); ctx.arc(wState.railBeam.hitX,wState.railBeam.hitY,5*fade,0,Math.PI*2); ctx.fill();
        }
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }

    // ── Sniper piercing projectile draw override ─────────────────────────────
    // (handled in Projectile.draw — but add glow trail for pierce type)
    for(const p of projectiles){
        if(p.kind==='sniper'&&p.alive){
            ctx.save(); ctx.globalAlpha=.4;
            ctx.strokeStyle=WEAPONS[currentWeapon].color||'#aaffff';
            ctx.lineWidth=2; ctx.shadowBlur=12; ctx.shadowColor='#aaffff';
            ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-p.vx*4,p.y-p.vy*4); ctx.stroke();
            ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
        }
    }

    // ── Lancer Dash cooldown arc on player ───────────────────────────────────
    if(WEAPONS[currentWeapon].type==='precise_dash'){
        const wp=WEAPONS[currentWeapon];
        if(wState.lancerDashCooldown>0){
            const cf=1-wState.lancerDashCooldown/wp.dashCooldown;
            ctx.save(); ctx.translate(player.x,player.y); ctx.rotate(-Math.PI/2);
            ctx.strokeStyle=wp.color; ctx.lineWidth=2; ctx.shadowBlur=6; ctx.shadowColor=wp.color;
            ctx.globalAlpha=.45;
            ctx.beginPath(); ctx.arc(0,0,player.size+5,-Math.PI/2,-Math.PI/2+Math.PI*2*cf); ctx.stroke();
            ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
        }
    }

    // ── Mono Blade combo glow on player ─────────────────────────────────────
    if(WEAPONS[currentWeapon].type==='precise_chain'&&wState.monoCombo>0){
        const wp=WEAPONS[currentWeapon];
        const sf=wState.monoCombo/wp.maxCombo;
        const pulse=Math.sin(Date.now()/(300-sf*200))*.5+.5;
        ctx.save(); ctx.translate(player.x,player.y);
        ctx.strokeStyle=`hsl(${180+sf*80},100%,70%)`; ctx.lineWidth=1.5;
        ctx.shadowBlur=8+sf*8; ctx.shadowColor=`hsl(${180+sf*80},100%,60%)`;
        ctx.globalAlpha=.3+sf*.35+pulse*.15;
        ctx.beginPath(); ctx.arc(0,0,player.size+4,0,Math.PI*2); ctx.stroke();
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }

    // ════════════════════════════════════════════════════════════════════════
    //  SURGE VISUAL EFFECTS
    // ════════════════════════════════════════════════════════════════════════

    // ── Tesla / Arc Blade lightning arcs ─────────────────────────────────────
    if(wState.teslaArcs.length>0){
        for(const arc of wState.teslaArcs){
            const af=arc.life/arc.maxLife;
            ctx.save(); ctx.globalAlpha=af;
            ctx.strokeStyle=arc.color; ctx.lineWidth=1.5; ctx.shadowBlur=10; ctx.shadowColor=arc.color;
            if(arc.jagged){
                // Draw jagged lightning between points
                const segs=6;
                const dx=(arc.x2-arc.x1)/segs, dy=(arc.y2-arc.y1)/segs;
                ctx.beginPath(); ctx.moveTo(arc.x1,arc.y1);
                for(let s=1;s<segs;s++){
                    const jag=(Math.random()-.5)*18*(1-s/segs);
                    ctx.lineTo(arc.x1+dx*s+jag,arc.y1+dy*s+jag);
                }
                ctx.lineTo(arc.x2,arc.y2); ctx.stroke();
            } else {
                ctx.beginPath(); ctx.moveTo(arc.x1,arc.y1); ctx.lineTo(arc.x2,arc.y2); ctx.stroke();
            }
            ctx.fillStyle=arc.color; ctx.shadowBlur=14;
            ctx.beginPath(); ctx.arc(arc.x2,arc.y2,2.5*af,0,Math.PI*2); ctx.fill();
            ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
        }
    }

    // ── Plasma Chain waves ────────────────────────────────────────────────────
    if(wState.plasmaWaves.length>0){
        for(const pw of wState.plasmaWaves){
            const af=pw.life/pw.maxLife;
            const pulse=Math.sin(Date.now()/55+pw.angle)*.4+.6;
            ctx.save(); ctx.globalAlpha=af*pulse;
            ctx.fillStyle=pw.color; ctx.shadowBlur=12; ctx.shadowColor=pw.color;
            ctx.beginPath(); ctx.arc(pw.x,pw.y,4+af*3,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle=pw.color; ctx.lineWidth=1; ctx.globalAlpha=af*.4;
            ctx.beginPath(); ctx.arc(pw.x,pw.y,8,0,Math.PI*2); ctx.stroke();
            ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
        }
    }

    // ── Combat Sword shockwave ring ───────────────────────────────────────────
    if(WEAPONS[currentWeapon].type==='surge_combo3'){
        const wp=WEAPONS[currentWeapon];
        // Hit number indicator ring
        if(wState.comboHit>0&&wState.comboTimer>0){
            const tf=wState.comboTimer/(wp.cooldown*2.5);
            const col=wState.comboHit===3?'#ffffff':wp.color;
            ctx.save(); ctx.translate(player.x,player.y);
            ctx.strokeStyle=col; ctx.lineWidth=1.5; ctx.shadowBlur=wState.comboHit===3?16:6; ctx.shadowColor=col;
            ctx.globalAlpha=tf*.6;
            ctx.beginPath(); ctx.arc(0,0,player.size+6,0,Math.PI*2*(wState.comboHit/3)); ctx.stroke();
            ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
        }
    }

    // ── Arc Blades charge pips ────────────────────────────────────────────────
    if(WEAPONS[currentWeapon].type==='surge_arc'&&wState.arcCharge>0){
        const wp=WEAPONS[currentWeapon];
        const pulse=Math.sin(Date.now()/120)*.5+.5;
        ctx.save(); ctx.translate(player.x,player.y);
        ctx.globalAlpha=.55+pulse*.2;
        for(let i=0;i<wState.arcCharge;i++){
            const a=-Math.PI/2+(i/(wp.maxCharge-1))*Math.PI*2;
            const r=player.size+9;
            ctx.fillStyle=wp.color; ctx.shadowBlur=8; ctx.shadowColor=wp.color;
            ctx.beginPath(); ctx.arc(Math.cos(a)*r,Math.sin(a)*r,2.5,0,Math.PI*2); ctx.fill();
        }
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }

    // ── Whirl Module spin ring ────────────────────────────────────────────────
    if(WEAPONS[currentWeapon].type==='surge_whirl'&&wState.whirling){
        const wp=WEAPONS[currentWeapon];
        const spd=Math.hypot(player.momentumX,player.momentumY);
        const sf=Math.min(spd/player.maxSpeed,1);
        ctx.save(); ctx.translate(player.x,player.y); ctx.rotate(wState.whirlAngle);
        ctx.strokeStyle=`hsl(${44+sf*20},100%,${60+sf*25}%)`; ctx.lineWidth=2;
        ctx.shadowBlur=12+sf*8; ctx.shadowColor=wp.color;
        ctx.globalAlpha=.6+sf*.3;
        ctx.beginPath(); ctx.arc(0,0,wp.range*.7,0,Math.PI*2); ctx.stroke();
        // 4 speed lines
        for(let i=0;i<4;i++){
            ctx.save(); ctx.rotate(i*Math.PI/2);
            ctx.globalAlpha=(.4+sf*.4);
            ctx.strokeStyle=`hsl(${44+sf*30},100%,75%)`; ctx.lineWidth=1;
            ctx.beginPath(); ctx.moveTo(wp.range*.55,0); ctx.lineTo(wp.range*.85,0); ctx.stroke();
            ctx.restore();
        }
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }

    // ── Scatter Shot spread cone preview while aiming ─────────────────────────
    if(WEAPONS[currentWeapon].type==='surge_scatter'){
        const wp=WEAPONS[currentWeapon];
        const halfSpread=wp.spread/2;
        ctx.save(); ctx.translate(player.x,player.y); ctx.rotate(player.angle);
        ctx.strokeStyle=wp.color; ctx.lineWidth=1; ctx.shadowBlur=0;
        ctx.globalAlpha=.18;
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.lineTo(60*Math.cos(-halfSpread),60*Math.sin(-halfSpread));
        ctx.moveTo(0,0);
        ctx.lineTo(60*Math.cos(halfSpread),60*Math.sin(halfSpread));
        ctx.stroke();
        ctx.globalAlpha=1; ctx.restore();
    }

    // ── Pulse Storm momentum accumulator glow ────────────────────────────────
    if(WEAPONS[currentWeapon].type==='surge_pulse'&&wState.pulseAccum>0.1){
        const wp=WEAPONS[currentWeapon];
        const pf=wState.pulseAccum/player.maxSpeed;
        const pulse=Math.sin(Date.now()/80)*.5+.5;
        ctx.save(); ctx.translate(player.x,player.y); ctx.rotate(player.angle);
        ctx.fillStyle=wp.color; ctx.shadowBlur=12+pf*10; ctx.shadowColor=wp.color;
        ctx.globalAlpha=pf*(.45+pulse*.2);
        // Forward arrow shape
        ctx.beginPath(); ctx.moveTo(player.size+4,0); ctx.lineTo(player.size+14,-5); ctx.lineTo(player.size+14,5); ctx.closePath(); ctx.fill();
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }
}

function getStatLines(wp){
    const s=[];
    if(wp.ammo!==undefined)         s.push({k:'AMMO',         v:`${wp.ammo}/${wp.maxAmmo}`});
    if(wp.cooldown!==undefined)     s.push({k:'COOLDOWN',     v:wp.cooldown+'f'});
    if(wp.projSpeed!==undefined)    s.push({k:'PROJ SPD',     v:wp.projSpeed});
    if(wp.reach!==undefined)        s.push({k:'REACH',        v:wp.reach});
    if(wp.range!==undefined)        s.push({k:'RANGE',        v:wp.range});
    if(wp.arcSpan!==undefined)      s.push({k:'ARC',          v:Math.round(wp.arcSpan*180/Math.PI)+'°'});
    if(wp.selfRecoil!==undefined)   s.push({k:'RECOIL',       v:wp.selfRecoil});
    if(wp.knockback!==undefined)    s.push({k:'KNOCKBACK',    v:wp.knockback});
    if(wp.explosionRadius!==undefined) s.push({k:'BLAST RAD', v:wp.explosionRadius});
    if(wp.pellets!==undefined)      s.push({k:'PELLETS',      v:wp.pellets});
    if(wp.chainCount!==undefined)   s.push({k:'CHAIN COUNT',  v:wp.chainCount});
    if(wp.burstCount!==undefined)   s.push({k:'BURST COUNT',  v:wp.burstCount});
    if(wp.shardCount!==undefined)   s.push({k:'SHARD COUNT',  v:wp.shardCount});
    if(wp.drainRate!==undefined)    s.push({k:'DRAIN RATE',   v:wp.drainRate+'/f'});
    return s.slice(0,5);
}

function wrapText(text, maxW){
    // simple word-wrap returning array of lines
    const words=text.split(' '), lines=[];
    let cur='';
    for(const w of words){
        const test=cur+(cur?' ':'')+w;
        if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}
        else cur=test;
    }
    if(cur) lines.push(cur);
    return lines;
}

function drawModulePopup(dm){
    const wp   = WEAPONS[dm.weaponIdx];
    const td   = dm.tierData || TIER_DATA[0];
    const mods = dm.mods || [];
    const classCol = CLASS_COLORS[wp.class]||'#aaaaaa';
    const tierCol  = td.color;

    const PW   = 200;
    const LH   = 13;   // line height for stat/mod rows
    const PAD  = 8;

    const stats = getStatLines(wp);

    // Pre-compute flavor wrap height
    ctx.save(); ctx.font='7px Orbitron';
    const flavorLines = wrapText(wp.flavor||'', PW-PAD*2);
    ctx.restore();

    // Height: top header area (42) + divider (10) + stats + mods section + flavor + bottom pad
    const statsH = stats.length*(LH+1) + (stats.length>0?10:0);
    const modsH  = mods.length>0 ? (16 + mods.length*(LH+1) + 6) : 0;
    const flavorH= flavorLines.length*11 + 6;
    const PH = 46 + statsH + modsH + flavorH + PAD;

    const px = dm.x - PW/2;
    const py = dm.y - 36 - PH;
    const pulse = Math.sin(Date.now()/300)*0.5+0.5;

    ctx.save();
    ctx.globalAlpha = 0.97;

    // ── drop shadow ──────────────────────────────────────────────────────────
    ctx.shadowBlur  = 22+pulse*8;
    ctx.shadowColor = tierCol;
    ctx.fillStyle   = 'rgba(0,4,12,0.96)';
    ctx.strokeStyle = tierCol;
    ctx.lineWidth   = 1.8;
    roundRect(px, py, PW, PH, 6);
    ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;

    // ── top accent bar ───────────────────────────────────────────────────────
    ctx.fillStyle = tierCol+'33';
    roundRectTop(px, py, PW, 26, 6);
    ctx.fill();
    // thin colored top border
    ctx.strokeStyle = tierCol;
    ctx.lineWidth   = 2.5;
    ctx.shadowBlur  = 10; ctx.shadowColor = tierCol;
    ctx.beginPath(); ctx.moveTo(px+6,py+1); ctx.lineTo(px+PW-6,py+1); ctx.stroke();
    ctx.shadowBlur = 0;

    // ── tier badge (top-right) ───────────────────────────────────────────────
    const badgeW=50, badgeH=18, badgeX=px+PW-badgeW-4, badgeY=py+4;
    ctx.fillStyle = tierCol+'25';
    ctx.strokeStyle= tierCol;
    ctx.lineWidth  = 1;
    ctx.shadowBlur = 8; ctx.shadowColor = tierCol;
    roundRect(badgeX,badgeY,badgeW,badgeH,3); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle  = tierCol;
    ctx.font='bold 8px Orbitron'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowBlur=6; ctx.shadowColor=tierCol;
    ctx.fillText(''+td.label+' '+td.name, badgeX+badgeW/2, badgeY+badgeH/2);
    ctx.shadowBlur=0;

    // ── weapon name ──────────────────────────────────────────────────────────
    ctx.fillStyle  = classCol;
    ctx.font       = 'bold 12px Orbitron';
    ctx.textAlign  = 'left'; ctx.textBaseline='middle';
    ctx.shadowBlur = 10; ctx.shadowColor = classCol;
    ctx.fillText(wp.name, px+PAD, py+14);
    ctx.shadowBlur=0;

    // ── class badge ──────────────────────────────────────────────────────────
    const cbW=46, cbH=13, cbX=px+PAD, cbY=py+25;
    ctx.fillStyle  = classCol+'22';
    ctx.strokeStyle= classCol+'88'; ctx.lineWidth=1;
    roundRect(cbX,cbY,cbW,cbH,2); ctx.fill(); ctx.stroke();
    ctx.fillStyle  = classCol;
    ctx.font='bold 7px Orbitron'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(wp.class, cbX+cbW/2, cbY+cbH/2);

    // ── dmg multiplier ───────────────────────────────────────────────────────
    ctx.fillStyle  = tierCol;
    ctx.font       = 'bold 9px Orbitron'; ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.shadowBlur = 7; ctx.shadowColor = tierCol;
    ctx.fillText('DMG ×'+td.dmgMult.toFixed(2), px+PW-PAD, cbY+cbH/2);
    ctx.shadowBlur=0;

    // ── divider ──────────────────────────────────────────────────────────────
    let curY = py + 42;
    ctx.strokeStyle=classCol+'55'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px+PAD,curY); ctx.lineTo(px+PW-PAD,curY); ctx.stroke();
    curY += 7;

    // ── stats ────────────────────────────────────────────────────────────────
    for(const s of stats){
        ctx.fillStyle='rgba(130,170,200,0.65)'; ctx.font='7px Orbitron';
        ctx.textAlign='left'; ctx.textBaseline='middle';
        ctx.fillText(s.k, px+PAD, curY+5);
        ctx.fillStyle='#cceeff'; ctx.font='bold 8px Orbitron';
        ctx.textAlign='right';
        ctx.fillText(s.v, px+PW-PAD, curY+5);
        curY += LH+1;
    }
    if(stats.length>0){
        ctx.strokeStyle=classCol+'33'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(px+PAD,curY+2); ctx.lineTo(px+PW-PAD,curY+2); ctx.stroke();
        curY += 8;
    }

    // ── modifiers ────────────────────────────────────────────────────────────
    if(mods.length>0){
        ctx.fillStyle='rgba(200,215,230,0.5)'; ctx.font='bold 7px Orbitron';
        ctx.textAlign='left'; ctx.textBaseline='middle';
        ctx.fillText('MODIFIERS', px+PAD, curY+5);
        curY+=14;
        for(const modId of mods){
            const md=MOD_POOL.find(m=>m.id===modId);
            if(!md) continue;
            const mc=md.color;
            // Dot
            ctx.fillStyle=mc; ctx.shadowBlur=5; ctx.shadowColor=mc;
            ctx.beginPath(); ctx.arc(px+PAD+3, curY+5, 2.5, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur=0;
            // Name
            ctx.fillStyle=mc; ctx.font='bold 8px Orbitron'; ctx.textAlign='left';
            ctx.fillText(md.name, px+PAD+10, curY+5);
            // Short desc
            ctx.fillStyle='rgba(210,195,150,0.65)'; ctx.font='7px Orbitron';
            ctx.textAlign='right';
            ctx.fillText(md.short, px+PW-PAD, curY+5);
            curY+=LH+1;
        }
        ctx.strokeStyle=classCol+'33'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(px+PAD,curY+2); ctx.lineTo(px+PW-PAD,curY+2); ctx.stroke();
        curY+=8;
    }

    // ── flavor text ──────────────────────────────────────────────────────────
    ctx.font='7px Orbitron'; ctx.textAlign='left'; ctx.textBaseline='middle';
    for(const fl of flavorLines){
        ctx.fillStyle='rgba(140,170,190,0.5)';
        ctx.fillText(fl, px+PAD, curY+5);
        curY+=11;
    }

    // ── bottom connector arrow ───────────────────────────────────────────────
    ctx.fillStyle=tierCol+'88'; ctx.shadowBlur=6; ctx.shadowColor=tierCol;
    ctx.beginPath();
    ctx.moveTo(dm.x-5, py+PH);
    ctx.lineTo(dm.x+5, py+PH);
    ctx.lineTo(dm.x,   py+PH+8);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur=0;

    ctx.restore();
}

// Helper: round only top corners of a rect
function roundRectTop(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h); ctx.lineTo(x,y+h);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
}


function drawDamageTexts(){
    for(const d of damageTexts){
        const a=d.life/d.maxLife;
        const sx=d.x-camera.x, sy=d.y-camera.y;
        ctx.save(); ctx.globalAlpha=a;
        ctx.fillStyle=d.color; ctx.font='bold 13px Orbitron';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.shadowBlur=8; ctx.shadowColor=d.color;
        ctx.fillText(d.text,sx,sy);
        ctx.shadowBlur=0; ctx.restore();
    }
}

let activeModifiers = new Set();

function hasMod2(id){ return activeModifiers.has(id); }
function toggleModifier(id){
    const def = MODIFIER_DEFS.find(m=>m.id===id);
    if(activeModifiers.has(id)){
        activeModifiers.delete(id);
    } else {
        // Enforce stance group exclusivity
        if(def && def.group==='stance'){
            MODIFIER_DEFS.filter(m=>m.group==='stance'&&m.id!==id).forEach(m=>activeModifiers.delete(m.id));
        }
        activeModifiers.add(id);
    }
}

// Live difficulty multipliers — computed once per run start
let diffMults = {
    enemyDmg:1, enemyHP:1, enemySpeed:1,
    shopCost:1, playerHPMult:1, playerDmgPenalty:1,
    boostDrain:1, scrapMult:1, moduleDropMult:0.1,
};
let inflationCount = 0;
let shortCircuitJam = 0; // frames remaining on jam

function computeDiffMults(){
    const d = selectedDifficulty;
    diffMults.enemyDmg         = d===0?0.9  :d===2?1.1  :1;
    diffMults.enemyHP           = d===0?0.8  :d===2?1.2  :1;
    diffMults.enemySpeed        = d===0?1.0  :d===2?1.2  :1;
    diffMults.shopCost          = d===0?0.8  :d===2?1.2  :1;
    diffMults.playerHPMult      = d===0?1.1  :d===2?0.9  :1;
    diffMults.playerDmgPenalty  = d===0?1.0  :d===2?0.9  :1; // Assembly hurts player dmg
    diffMults.boostDrain        = d===0?0.9  :d===2?1.1  :1;
    diffMults.scrapMult         = hasMod2('depression')?0.5:1;
    diffMults.moduleDropMult    = d===0?0.2  :d===2?0.05  :0.1;
    inflationCount = 0;
    shortCircuitJam = 0;
}

function diffShopPrice(base){
    const inflation = hasMod2('inflation') ? (1 + inflationCount*0.15) : 1;
    let discount = 1;
    if(hasMeta('get_your_moneys_worth'))   discount -= 0.05;
    if(hasMeta('get_your_moneys_worth_2')) discount -= 0.05;
    return Math.max(1, Math.round(base * diffMults.shopCost * inflation * discount));
}

function onDiffPurchase(){
    if(hasMod2('inflation')) inflationCount++;
}

function isModuleAllowedByDiff(weaponIdx){
    if(weaponIdx===-1) return true;
    const wp = WEAPONS[weaponIdx];
    if(!wp) return true;
    if(hasMod2('scaredy_cat') && isMeleeWp(wp)) return false;
    if(hasMod2('head_first')  && isRangedWp(wp)) return false;
    return true;
}

function applyDifficultyToRun(){
    computeDiffMults();
    // Base 100 + 40 per Get Harder tier purchased
    let getHarderBonus = 0;
    if(hasMeta('get_harder'))   getHarderBonus += 40;
    if(hasMeta('get_harder_2')) getHarderBonus += 40;
    if(hasMeta('get_harder_3')) getHarderBonus += 40;
    if(hasMeta('get_harder_4')) getHarderBonus += 40;
    player.maxHealth = Math.round((100 + getHarderBonus) * diffMults.playerHPMult);
    player.health    = player.maxHealth;
    // Feet Pics: +5% move speed
    player.speed = 0.5 * (1 + (hasMeta('feet_pics') ? 0.05 : 0));
    // Bigger Balls: +10% max energy per tier
    let ballsMult = 1;
    if(hasMeta('bigger_balls'))   ballsMult += 0.10;
    if(hasMeta('bigger_balls_2')) ballsMult += 0.10;
    if(hasMeta('bigger_balls_3')) ballsMult += 0.10;
    player.maxEnergy = Math.round(100 * ballsMult);
    player.energy    = player.maxEnergy;
    if(hasMod2('full_hands')){ moduleSlots[1]=-1; moduleSlotData[1]=null; }
}

                ctx.beginPath(); ctx.arc(Math.cos(a)*r2,Math.sin(a)*r2,2,0,Math.PI*2); ctx.fill();
            }
            ctx.fillStyle='rgba(0,200,255,0.75)'; ctx.font='bold 11px Orbitron'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.shadowBlur=10; ctx.shadowColor='#00aaff';
            ctx.fillText('ΛLLDULΞ',0,66); ctx.shadowBlur=0;
            ctx.restore();
        }
    },
];

// ─── Build the lobby as a static tile map ────────────────────────────────────
function buildLobby(){
    if(lobbyState.built) return;
    lobbyState.built = true;

    // Autosave permanent progress whenever the lobby is entered
    saveGame();

    // Use laboratory theme for lobby
    currentSector = SECTOR_TREE;
    currentDepth  = 0;
    enemyScaleHP  = 1; enemyScaleDmg = 1;

    // Fresh map
    map = [];
    for(let y=0;y<MAP_H;y++) map[y]=new Uint8Array(MAP_W).fill(T_VOID);

    // ── Main lobby room ──────────────────────────────────────────────────────
    const RW=14, RH=10;
    const RX=Math.floor(MAP_W/2 - RW/2);
    const RY=Math.floor(MAP_H/2 - RH/2);
    for(let y=RY;y<RY+RH;y++)
        for(let x=RX;x<RX+RW;x++) map[y][x]=T_FLOOR;

    // ── Shooting range room — to the south ───────────────────────────────────
    const RNG_W=22, RNG_H=16;
    const RNG_X=Math.floor(MAP_W/2 - RNG_W/2);
    const RNG_Y=RY+RH+4;   // 4 tiles gap south of lobby
    for(let y=RNG_Y;y<RNG_Y+RNG_H;y++)
        for(let x=RNG_X;x<RNG_X+RNG_W;x++) map[y][x]=T_FLOOR;

    // ── Corridor connecting lobby bottom to range top ────────────────────────
    const corridorX=Math.floor(MAP_W/2)-1;
    for(let y=RY+RH;y<RNG_Y;y++){
        map[y][corridorX]=T_FLOOR;
        map[y][corridorX+1]=T_FLOOR;
        map[y][corridorX+2]=T_FLOOR;
    }

    // Generate surrounding walls
    for(let y=1;y<MAP_H-1;y++) for(let x=1;x<MAP_W-1;x++){
        if(map[y][x]!==T_VOID) continue;
        let f=false;
        outer2: for(let ny=-1;ny<=1;ny++) for(let nx=-1;nx<=1;nx++)
            if(map[y+ny]?.[x+nx]===T_FLOOR){ f=true; break outer2; }
        if(f) map[y][x]=T_WALL;
    }

    const cx=(RX+RW/2)*TILE_SIZE, cy=(RY+RH/2)*TILE_SIZE;
    const rcx=(RNG_X+RNG_W/2)*TILE_SIZE, rcy=(RNG_Y+RNG_H/2)*TILE_SIZE;

    // Player starts on the couch
    player.x = cx-160;
    player.y = cy+20;
    player.momentumX=0; player.momentumY=0;
    camera.x = player.x - canvas.width/2;
    camera.y = player.y - canvas.height/2;

    // Difficulty — upper-right corner
    lobbyState.npcX = cx + 80;
    lobbyState.npcY = cy - 170;
    lobbyState.dialAngle = selectedDifficulty * (Math.PI*2/3);
    lobbyState.dialTargetAngle = lobbyState.dialAngle;

    // Van — right wall, lower half
    lobbyState.vanX = cx + 150;
    lobbyState.vanY = cy + 70;

    // Upgrade terminal — bottom-left corner
    lobbyState.termX = cx - 170;
    lobbyState.termY = cy + 148;

    // Reset tree view
    treeView.panX = 0; treeView.panY = 0; treeView.zoom = 0.85;
    treeView.hoveredId = null; treeView.selectedId = null;

    // Ambient drones
    lobbyState.drones = [];
    for(let i=0;i<5;i++){
        lobbyState.drones.push({
            x: cx + (-60+Math.random()*120),
            y: cy + (-40+Math.random()*80),
            vx:(Math.random()-.5)*0.3, vy:(Math.random()-.5)*0.3,
            col:`hsl(${180+Math.random()*60},100%,70%)`,
            phase: Math.random()*Math.PI*2,
        });

    lobbyState.tipIndex = Math.floor(Math.random()*LOBBY_TIPS.length);
    lobbyState.tipTimer  = 300;

    // ── Shooting range setup ─────────────────────────────────────────────────
    lobbyState.rangeRoomX = RNG_X; lobbyState.rangeRoomY = RNG_Y;
    lobbyState.rangeRoomW = RNG_W; lobbyState.rangeRoomH = RNG_H;
    lobbyState.inRange = false;

    // All range appliances on the SOUTH wall — one row of terminals
    const southWallY = (RNG_Y + RNG_H - 2) * TILE_SIZE;
    const rangeLeft  = (RNG_X + 1.5) * TILE_SIZE;
    const rangeRight = (RNG_X + RNG_W - 1.5) * TILE_SIZE;

    // Weapon rack — 8 slots spread across most of the south wall
    lobbyState.rackTerminals = [];
    const validRackWeapons = WEAPONS.map((w,idx)=>({w,idx})).filter(({w})=>w.class!=='BLANK');
    const numT = Math.min(8, validRackWeapons.length);
    for(let i=0;i<numT;i++){
        const tx = rangeLeft + 60 + i * ((rangeRight - rangeLeft - 120) / (numT - 1));
        lobbyState.rackTerminals.push({ x:tx, y:southWallY, prompt:false });
    }
    lobbyState.rackSelectedWeaponIdx = -1;

    // Tier terminal — far left of south wall
    lobbyState.tierTerminal = { x:rangeLeft, y:southWallY, prompt:false, selectedTier:0 };

    // Reroll terminal — just right of tier terminal
    lobbyState.rerollTerminal = { x:rangeLeft+46, y:southWallY, prompt:false };
    lobbyState.rerollMenuOpen = false;

    // Weapon browser terminal — just right of reroll terminal
    lobbyState.weaponBrowserTerminal = { x:rangeLeft+92, y:southWallY, prompt:false };
    lobbyState.weaponBrowserOpen = false;
    lobbyState.weaponBrowserScroll = 0;

    // 4 training_dummy enemies spread across the north half of the range

        enemies.push(new Enemy('training_dummy', dx, dummyY));
