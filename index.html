function spawnSurgeParticles(x,y,count,color,speed=5,life=22,size=4){
    for(let i=0;i<count;i++){
        const a=Math.random()*Math.PI*2, sp=speed*.5+Math.random()*speed;
        particles.push(new Particle(x,y,Math.cos(a)*sp,Math.sin(a)*sp,life,size,'surge'));
    }
}

function fireSurgeCombo(wp){ // ── Combat Sword 3-hit combo
    if(wState.comboTimer>0) wState.comboTimer=0; // allow chaining quickly
    wState.comboHit=(wState.comboHit%3)+1;
    wState.comboTimer=wp.cooldown*2.5;
    wState.cooldown=wp.cooldown;
    const hitNum=wState.comboHit;
    const isFinal=hitNum===3;
    // Alternate swing sides, getting wider
    const sideFlip=(hitNum%2===1?1:-1);
    const arc=wp.arcSpan*(0.7+hitNum*0.15);
    const col=isFinal?'#ffffff':wp.color;
    wState.swinging=true; wState.swingTimer=wp.cooldown; wState.swingDuration=wp.cooldown;
    wState.swingAngle=player.angle+sideFlip*Math.PI*0.12*(hitNum-1);
    wState.swingArcSpan=arc*playerArcMult; wState.swingColor=col; wState.swingCombo=isFinal;
    spawnSwingParticles(col,arc*playerArcMult,wp.range*(0.8+hitNum*0.1)*playerRangeMult);
    const comboDmg=isFinal?60:30;
    meleeHitEnemies(player.x,player.y,player.angle+sideFlip*Math.PI*0.12*(hitNum-1),arc*playerArcMult,wp.range*(0.8+hitNum*0.1)*playerRangeMult,comboDmg);
    spawnDamageText(player.x+Math.cos(player.angle)*40,player.y+Math.sin(player.angle)*40-28,
        isFinal?'SHOCKWAVE!': randomFrom(SFX[wp.id]),col);
    if(isFinal){
        // Shockwave burst in all directions
        const cx=player.x+Math.cos(player.angle)*70, cy=player.y+Math.sin(player.angle)*70;
        spawnSurgeParticles(cx,cy,28,'#ffdd00',8,30,6);
        camera.x+=(Math.random()-.5)*10; camera.y+=(Math.random()-.5)*10;
        // Shockwave enemy damage
        damageSourceIsPlayer=true;
        for(const e of enemies){ if(e.dead) continue; if(Math.hypot(e.x-cx,e.y-cy)<wp.shockwaveRadius*playerRangeMult) e.takeDamage(32); }
        if(activeBoss&&!activeBoss.dead&&Math.hypot(activeBoss.x-cx,activeBoss.y-cy)<wp.shockwaveRadius*playerRangeMult) activeBoss.takeDamage(32,cx,cy);
        // Radial knockback on self (shockwave recoil)
        const pushAng=player.angle+Math.PI;
        player.momentumX+=Math.cos(pushAng)*wp.shockwaveForce*.5;
        player.momentumY+=Math.sin(pushAng)*wp.shockwaveForce*.5;
        wState.comboHit=0;
    }
}

function fireSurgeArc(wp){ // ── Arc Blades twin slashes
    if(wState.swinging) return;
    wState.cooldown=wp.cooldown;
    const isLeft=wState.arcCharge%2===0;
    wState.swinging=true; wState.swingTimer=wp.cooldown; wState.swingDuration=wp.cooldown;
    wState.swingAngle=player.angle+(isLeft?-0.25:0.25);
    wState.swingArcSpan=wp.arcSpan*playerArcMult; wState.swingColor=wp.color; wState.swingCombo=false;
    spawnSwingParticles(wp.color,wp.arcSpan*playerArcMult,wp.range*playerRangeMult);
    meleeHitEnemies(player.x,player.y,player.angle+(isLeft?-0.25:0.25),wp.arcSpan*playerArcMult,wp.range*playerRangeMult,30);
    wState.arcCharge++;
    if(wState.arcCharge>=wp.maxCharge){
        // LIGHTNING CHAIN: fire arcs in a fan
        wState.arcCharge=0;
        const col='#ffe566';
        spawnDamageText(player.x,player.y-44,'LIGHTNING!',col);
        camera.x+=(Math.random()-.5)*8; camera.y+=(Math.random()-.5)*8;
        for(let i=0;i<wp.lightningArcs;i++){
            const a=player.angle+(i-(wp.lightningArcs-1)/2)*0.28;
            const dist=40+Math.random()*wp.lightningRange;
            const ex=player.x+Math.cos(a)*dist, ey=player.y+Math.sin(a)*dist;
            wState.teslaArcs.push({x1:player.x,y1:player.y,x2:ex,y2:ey,life:18,maxLife:18,color:col,jagged:true});
            // Lightning arc damage
            damageSourceIsPlayer=true;
            for(const e of enemies){ if(e.dead) continue; if(Math.hypot(e.x-ex,e.y-ey)<e.size+22||Math.hypot(e.x-player.x,e.y-player.y)<40) e.takeDamage(28); }
            if(activeBoss&&!activeBoss.dead&&(Math.hypot(activeBoss.x-ex,activeBoss.y-ey)<activeBoss.size+22||Math.hypot(activeBoss.x-player.x,activeBoss.y-player.y)<40)){ wState.teslaArcs.push({x1:player.x,y1:player.y,x2:activeBoss.x,y2:activeBoss.y,life:18,maxLife:18,color:wp.color,jagged:true}); activeBoss.takeDamage(28,activeBoss.x,activeBoss.y); }
        }
        wState.swingColor='#ffe566'; wState.swingCombo=true;
    } else {
        spawnDamageText(player.x+Math.cos(player.angle+( isLeft?-.5:.5))*36,
            player.y+Math.sin(player.angle)*36-20,randomFrom(SFX[wp.id]),wp.color);
    }
}

function fireSurgeWhirl(wp){ // ── Whirl Module (called when holding fire + moving)
    wState.cooldown=wp.cooldown;
    wState.whirling=true; wState.whirlAngle+=Math.PI*0.28;
    const FULL_SPIN_FRAMES=90;
    // bonus is 0→1 based on how long player has held max speed (not instant speed)
    const bonus=Math.min(wState.whirlSpeedTimer/FULL_SPIN_FRAMES,1);
    const col=`hsl(${44+bonus*30},100%,${60+bonus*20}%)`;
    wState.swinging=true; wState.swingTimer=wp.cooldown; wState.swingDuration=wp.cooldown;
    wState.swingAngle=wState.whirlAngle; wState.swingArcSpan=wp.arcSpan*playerArcMult;
    wState.swingColor=col; wState.swingCombo=bonus>=1;
    const whirlDmg=Math.round(2+bonus*(wp.maxSpeedBonus*2.5));
    meleeHitEnemies(player.x,player.y,wState.whirlAngle,Math.PI*2,wp.range*playerRangeMult,whirlDmg);
    if(bonus>0.35) spawnSurgeParticles(player.x,player.y,Math.ceil(bonus*10),col,Math.hypot(player.momentumX,player.momentumY)*1.2,18,4);
    // "FULL SPIN!" fires exactly once when the timer first hits max
    if(bonus>=1 && !wState.whirlFullSpinAnnounced){
        wState.whirlFullSpinAnnounced=true;
        spawnDamageText(player.x,player.y-36,'FULL SPIN!',col);
        camera.x+=(Math.random()-.5)*5; camera.y+=(Math.random()-.5)*5;
    } else if(bonus>0.55 && bonus<1){
        // optional subtle label during charge-up, not FULL SPIN
        if(Math.random()<0.08) spawnDamageText(player.x,player.y-36,'SPIN',col);
    }
}

function fireSurgePlasma(wp){ // ── Plasma Chain
    if(wState.swinging) return;
    wState.cooldown=wp.cooldown;
    wState.swinging=true; wState.swingTimer=16; wState.swingDuration=16;

function fireSurgeTesla(wp){ // ── Tesla Emitter
    if(wp.ammo<=0){ spawnDamageText(player.x,player.y-28,'EMPTY! [R]','#ff0000'); return; }
    if(teslaCooldown>0) return; // raw cooldown — immune to playerCooldownDrain
    wp.ammo--;
    wState.cooldown=wp.cooldown;
    teslaCooldown=wp.cooldown;
    // Build a list of alive enemies within chainRange
    const nearby=enemies.filter(e=>!e.dead&&Math.hypot(e.x-player.x,e.y-player.y)<wp.chainRange);
    // Sort by distance so we chain closest first
    nearby.sort((a,b)=>Math.hypot(a.x-player.x,a.y-player.y)-Math.hypot(b.x-player.x,b.y-player.y));
    const zapped=new Set();
    let prevX=player.x, prevY=player.y;
    damageSourceIsPlayer=true;
    for(let i=0;i<Math.min(wp.chainCount,nearby.length);i++){
        const e=nearby[i];
        wState.teslaArcs.push({x1:prevX,y1:prevY,x2:e.x,y2:e.y,life:18,maxLife:18,color:wp.color,jagged:true});
        e.takeDamage(10);
        zapped.add(e);
        prevX=e.x; prevY=e.y;
        // Secondary arc: try to jump to a neighbour enemy not yet zapped
        const neighbours=nearby.filter(n=>!zapped.has(n)&&Math.hypot(n.x-e.x,n.y-e.y)<80);
        if(neighbours.length>0){
            const nb=neighbours[0];
            wState.teslaArcs.push({x1:e.x,y1:e.y,x2:nb.x,y2:nb.y,life:12,maxLife:12,color:wp.color,jagged:true});
            nb.takeDamage(10);
            zapped.add(nb);
        }
    }
    // Also arc to boss if in range
    if(activeBoss&&!activeBoss.dead&&Math.hypot(activeBoss.x-player.x,activeBoss.y-player.y)<wp.chainRange){
        wState.teslaArcs.push({x1:player.x,y1:player.y,x2:activeBoss.x,y2:activeBoss.y,life:18,maxLife:18,color:wp.color,jagged:true});
        damageSourceIsPlayer=true; activeBoss.takeDamage(10,activeBoss.x,activeBoss.y);
    }
    // If no enemies nearby, spray random arcs as a visual (no damage)
    if(nearby.length===0){        for(let i=0;i<wp.chainCount;i++){
            const a=Math.random()*Math.PI*2;
            const dist=40+Math.random()*wp.chainRange*0.5;
            wState.teslaArcs.push({x1:player.x,y1:player.y,x2:player.x+Math.cos(a)*dist,y2:player.y+Math.sin(a)*dist,life:10,maxLife:10,color:wp.color,jagged:true});
        }
        spawnDamageText(player.x,player.y-32,'ZZRR...',wp.color);
    } else {
        spawnDamageText(player.x,player.y-32,'CHAIN x'+zapped.size+'!',wp.color);
        camera.x+=(Math.random()-.5)*5; camera.y+=(Math.random()-.5)*5;
    }
    if(wp.ammo===0) spawnDamageText(player.x,player.y-48,'RELOAD [R]',wp.color);
}

function fireSurgeScatter(wp){ // ── Scatter Shot
    if(wp.ammo<=0){ spawnDamageText(player.x,player.y-28,'EMPTY! [R]','#ff0000'); return; }
    wp.ammo--;
    wState.cooldown=wp.cooldown;

        const p=spawnPlayerProjectile(player.x,player.y,Math.cos(a)*spd,Math.sin(a)*spd,'pellet',wp);

        p.surgeColor=wp.color;

    spawnDamageText(player.x,player.y-28,randomFrom(SFX[wp.id]), wp.color)
    // Light kick recoil
    player.momentumX-=Math.cos(player.angle)*1.2; player.momentumY-=Math.sin(player.angle)*1.2;
    for(let i=0;i<12;i++){
        const a=player.angle+(Math.random()-.5)*wp.spread;
        particles.push(new Particle(player.x,player.y,Math.cos(a)*6,Math.sin(a)*6,12,3,'surge'));
    }
    camera.x+=(Math.random()-.5)*5; camera.y+=(Math.random()-.5)*5;
}

function fireSurgePulse(wp){ // ── Pulse Storm
    if(wp.ammo<=0){ spawnDamageText(player.x,player.y-28,'EMPTY! [R]','#ff0000'); return; }

function fireSurgeShard(wp){ // ── Shard Launcher

// ── Weapon Update (called every frame) ──────────────────────────────────────
function updateWeapons(){
    const wp=WEAPONS[currentWeapon];
    if(wState.cooldown>0) wState.cooldown=Math.max(0,wState.cooldown-playerCooldownDrain);
    if(teslaCooldown>0) teslaCooldown--;

    // Swing timer
    if(wState.swinging){ wState.swingTimer--; if(wState.swingTimer<=0) wState.swinging=false; }

    // Pike timer — per-frame capsule sweep along the full shaft
    if(wState.pikeActive){
        wState.pikeTimer--;
        if(wState.pikeTimer<=0) wState.pikeActive=false;
        else {
            const pikeWp=WEAPONS[currentWeapon];
            const pikeSpd=wState.pikePlayerSpd;
            const dmg=Math.round((pikeWp.knockback+pikeSpd*1.2)*6);
            thrustCheckEnemies(player.x,player.y,wState.pikeAngle,pikeWp.reach,dmg,12);
        }
    }

    // Phase Spear timer — per-frame sweep along full shaft
    if(wState.spearActive){
        wState.spearTimer--;
        if(wState.spearTimer<=0) wState.spearActive=false;
        else {
            const spearWp=WEAPONS[currentWeapon];
            const spearDmg=wState.spearCrit?80:30;
            thrustCheckEnemies(player.x,player.y,wState.spearAngle,spearWp.reach,spearDmg,10);
        }
    }

    // Lancer Dash in-flight — sweep ahead each frame during the dash
    if(wState.lancerDashing){
        const lancerWp=WEAPONS[currentWeapon];
        thrustCheckEnemies(player.x,player.y,wState.lancerDashAngle,lancerWp.reach*0.7,30,12);
    }

    // Cleaver window
    if(wState.cleaverPhase==='window'){
        wState.cleaverWindowTimer--;
        if(wState.cleaverWindowTimer<=0){
            wState.cleaverPhase='exposed';
            wState.cleaverExposedTimer=WEAPONS[2].exposedDuration;
            spawnDamageText(player.x,player.y-35,'EXPOSED!','#ff2200');
        }
    }
    if(wState.cleaverPhase==='exposed'){
        wState.cleaverExposedTimer--;
        player.momentumX*=0.94; player.momentumY*=0.94;
        if(wState.cleaverExposedTimer<=0) wState.cleaverPhase='idle';
    }

    // Gravity wells
    wState.gravityWells=wState.gravityWells.filter(w=>w.timer>0);
    for(const gw of wState.gravityWells){
        gw.timer--;
        // Pull player toward well
        const d=Math.hypot(player.x-gw.x,player.y-gw.y);
        if(d<gw.radius&&d>6){
            const ang=Math.atan2(gw.y-player.y,gw.x-player.x);
            const force=gw.strength*(1-d/gw.radius);
            player.momentumX+=Math.cos(ang)*force; player.momentumY+=Math.sin(ang)*force;
        }
        // Pull enemies toward well center too
        for(const e of enemies){
            if(e.dead) continue;
            const ed=Math.hypot(e.x-gw.x,e.y-gw.y);
            if(ed<gw.radius&&ed>4){
                const eAng=Math.atan2(gw.y-e.y,gw.x-e.x);
                const eForce=gw.strength*1.8*(1-ed/gw.radius);
                e.vx+=Math.cos(eAng)*eForce; e.vy+=Math.sin(eAng)*eForce;
            }
        }
        // Pull boss toward well center
        if(activeBoss&&!activeBoss.dead){
            const bd=Math.hypot(activeBoss.x-gw.x,activeBoss.y-gw.y);
            if(bd<gw.radius&&bd>4){
                const bAng=Math.atan2(gw.y-activeBoss.y,gw.x-activeBoss.x);
                activeBoss.x+=Math.cos(bAng)*gw.strength*1.4*(1-bd/gw.radius);
                activeBoss.y+=Math.sin(bAng)*gw.strength*1.4*(1-bd/gw.radius);
            }
        }
    }

    // Minigun Core
    if(wp.type==='ranged_hold'){
        if(wState.holdingFire&&wp.ammo>0){
            wState.spinUp=Math.min(wState.spinUp+1,wp.spinUpFrames);
            if(wState.spinUp>=wp.spinUpFrames*.35){
                wState.miniFireTimer--;
                if(wState.miniFireTimer<=0){
                    const rate=wp.fireRate+Math.floor((1-wState.spinUp/wp.spinUpFrames)*5);
                    wState.miniFireTimer=Math.max(1,rate);
                    if(wp.ammo>0){
                        wp.ammo--;
                        const spinFrac=wState.spinUp/wp.spinUpFrames;
                        let spread=wp.minSpread+(1-spinFrac)*(wp.baseSpread-wp.minSpread);
                        // Counter-momentum bonus: moving backward reduces spread
                        const aimDx=Math.cos(player.angle), aimDy=Math.sin(player.angle);
                        const dot=player.momentumX*aimDx+player.momentumY*aimDy;
                        if(dot<-1.5) spread*=0.45;
                        const ang=player.angle+(Math.random()-.5)*spread*2;
                        damageSourceIsPlayer=true;
                        spawnPlayerProjectile(player.x,player.y,Math.cos(ang)*13,Math.sin(ang)*13,'minigun',wp);
                        player.momentumX-=Math.cos(player.angle)*wp.selfRecoilPerShot*playerRecoilMult;
                        player.momentumY-=Math.sin(player.angle)*wp.selfRecoilPerShot*playerRecoilMult;
                        if(Math.random()<.5) particles.push(new Particle(player.x,player.y,Math.cos(player.angle)*5,Math.sin(player.angle)*5,7,3,'spark'));
                    }
                }
            }
        } else {
            wState.spinUp=Math.max(0,wState.spinUp-2);
        }
    }

    // Siege Beam
    if(wp.type==='beam'){
        if(wState.holdingFire&&wp.ammo>0){
            wState.beamActive=true;
            wp.ammo=Math.max(0,wp.ammo-wp.drainRate);
            // If draining emptied the charge, cut the beam immediately
            if(wp.ammo<=0){ wState.beamActive=false; wState.holdingFire=false; wp.ammo=0; }
            else {
            // Slow player
            player.momentumX*=wp.beamFriction; player.momentumY*=wp.beamFriction;
            // Beam particles + damage
            const beamEnd=castBeamRay(wp.beamLength);
            if(Math.random()<.4){
                const t=Math.random();
                particles.push(new Particle(
                    player.x+(beamEnd.x-player.x)*t, player.y+(beamEnd.y-player.y)*t,
                    (Math.random()-.5)*1.5,(Math.random()-.5)*1.5,10,3,'spark'));
            }
            // Beam hit: damage enemies along path each frame
            if(Math.random()<0.5){
                const bLen=Math.hypot(beamEnd.x-player.x,beamEnd.y-player.y)||1;
                damageSourceIsPlayer=true;
                for(const e of enemies){
                    if(e.dead) continue;
                    const tb=Math.max(0,Math.min(1,((e.x-player.x)*(beamEnd.x-player.x)+(e.y-player.y)*(beamEnd.y-player.y))/(bLen*bLen)));
                    const cbx=player.x+tb*(beamEnd.x-player.x), cby=player.y+tb*(beamEnd.y-player.y);
                    if(Math.hypot(e.x-cbx,e.y-cby)<e.size+12){
                        // Ray-trace the beam segment through the weakpoint
                        const wpHit=rayHitsWeakpoint(e,player.x,player.y,player.angle,wp.beamLength);
                        e.takeDamage(wpHit?6:3);
                        if(wpHit&&Math.random()<0.06) triggerWeakpointEffect(e); // throttled so it doesn't spam every frame
                    }
                }
                if(activeBoss&&!activeBoss.dead){
                    const tb=Math.max(0,Math.min(1,((activeBoss.x-player.x)*(beamEnd.x-player.x)+(activeBoss.y-player.y)*(beamEnd.y-player.y))/(bLen*bLen)));
                    const cbx=player.x+tb*(beamEnd.x-player.x), cby=player.y+tb*(beamEnd.y-player.y);
                    if(Math.hypot(activeBoss.x-cbx,activeBoss.y-cby)<activeBoss.size+12) activeBoss.takeDamage(3,cbx,cby);
                }
            }
            // Overuse burst
            if(!wState.beamOverused&&wp.ammo<=wp.overuseAt){
                wState.beamOverused=true;
                player.momentumX-=Math.cos(player.angle)*wp.overuseBurst;
                player.momentumY-=Math.sin(player.angle)*wp.overuseBurst;
                camera.x+=(Math.random()-.5)*18; camera.y+=(Math.random()-.5)*18;
                spawnDamageText(player.x,player.y-42,'OVERLOAD!',wp.color);
            }
            } // end else (ammo > 0 after drain)
        } else {
            wState.beamActive=false;
            if(wp.ammo<wp.maxAmmo){
                wp.ammo=Math.min(wp.maxAmmo,wp.ammo+wp.rechargeRate);
                if(wp.ammo>=wp.maxAmmo) wState.beamOverused=false;
            }
        }
    }

    // Projectiles
    projectiles=projectiles.filter(p=>p.alive);
    projectiles.forEach(p=>p.update());
    // Mortar shells — own lifecycle
    mortarShells=mortarShells.filter(s=>s.alive);
    mortarShells.forEach(s=>s.update());

    // Mortar shells (separate system)
    mortarShells=mortarShells.filter(m=>m.alive);
    mortarShells.forEach(m=>m.update());

    // Damage texts
    damageTexts=damageTexts.filter(d=>d.life>0);
    damageTexts.forEach(d=>{ d.life--; d.y+=d.vy; });

    // ── PRECISE weapon updates ────────────────────────────────────────────────
    // Mono Blade combo timer
    if(wState.monoSwinging){ wState.monoSwingTimer--; if(wState.monoSwingTimer<=0) wState.monoSwinging=false; }
    if(wState.monoComboTimer>0){
        wState.monoComboTimer--;
        if(wState.monoComboTimer<=0){ wState.monoCombo=0; }
    }

    // Needle Array burst auto-progression
    if(wState.needleBurstActive&&WEAPONS[currentWeapon].type==='precise_rapid'){
        const wp=WEAPONS[currentWeapon];
        wState.needleBurstTimer--;
        if(wState.needleBurstTimer<=0){
            doNeedleStab(wp, wState.needleBurstStep);
            wState.needleBurstStep++;
            if(wState.needleBurstStep>=wp.burstCount){
                // Full burst complete — check if any WP was hit
                wState.needleBurstActive=false;
                if(!wState.needleBurstWpHit) wState.needleStack=0; // full miss burst: reset stack
                wState.cooldown=wp.cooldown;                        // real cooldown now starts
            } else {
                wState.needleBurstTimer=wp.burstDelay;
            }
        }
    }

    if(wState.needleThrusts.length>0){
        const wp=WEAPONS[currentWeapon].type==='precise_rapid'?WEAPONS[currentWeapon]:null;
        for(let i=wState.needleThrusts.length-1;i>=0;i--){
            const th=wState.needleThrusts[i];
            th.timer--;
            if(th.timer<=0){ wState.needleThrusts.splice(i,1); continue; }
            if(!wp) continue;
            // Mirror the same extend/retract curve used by the renderer
            const prog=1-th.timer/th.maxTimer;
            const extScale=1-Math.pow(prog*1.5-0.25,2);
            const reach=wp.reach*Math.max(0.05,extScale);
            const tipX=th.originX+Math.cos(th.angle)*reach;
            const tipY=th.originY+Math.sin(th.angle)*reach;
            
            for(const e of enemies){
                if(e.dead||th.hitSet.has(e)) continue;
                
                // Check if ANY part of the needle shaft touches the enemy
                // Use capsule collision: closest point on needle line to enemy center
                const needleLen=reach||0.1;
                const needleDx=Math.cos(th.angle)*needleLen;
                const needleDy=Math.sin(th.angle)*needleLen;
                
                // Project enemy center onto the needle line segment
                const toEnemyX=e.x-th.originX;
                const toEnemyY=e.y-th.originY;
                const t=Math.max(0,Math.min(1,(toEnemyX*needleDx+toEnemyY*needleDy)/(needleLen*needleLen)));
                
                // Closest point on needle to enemy
                const closestX=th.originX+needleDx*t;
                const closestY=th.originY+needleDy*t;
                const distToEnemy=Math.hypot(e.x-closestX,e.y-closestY);
                
                // Needle thickness is ~8 pixels
                if(distToEnemy>e.size+8) continue;
                
                th.hitSet.add(e);
                
                // Check for weakpoint hit using the closest point on needle
                const wpHit=isWeakpointHit(e,closestX,closestY);
                
                if(wpHit&&!th.wpHitThisThrust){
                    th.wpHitThisThrust=true;
                    th.wpHit=true; // visual upgrade
                    wState.needleStack=Math.min(wState.needleStack+1,wp.maxStack);
                    wState.needleBurstWpHit=true;
                    const sFrac=wState.needleStack/wp.maxStack;
                    const sc=`hsl(${170+sFrac*60},100%,75%)`;
                    spawnDamageText(closestX,closestY-20+(Math.random()-.5)*8,'▲ WP x'+wState.needleStack,sc);
                    triggerWeakpointEffect(e);
                }
                const needleDmg=wpHit?(15+wState.needleStack*5)*2:15;
                e.takeDamage(needleDmg);
                // Spark burst on impact at closest point
                for(let p=0;p<5;p++){
                    const a=th.angle+(Math.random()-.5)*0.5;
                    particles.push(new Particle(closestX,closestY,Math.cos(a)*4,Math.sin(a)*4,12,2,'spark'));
                }
            }
            // Also check active boss against this thrust
            if(activeBoss&&!activeBoss.dead&&!th.hitSet.has(activeBoss)){
                const needleLen=reach||0.1;
                const needleDx=Math.cos(th.angle)*needleLen, needleDy=Math.sin(th.angle)*needleLen;
                const toBx=activeBoss.x-th.originX, toBy=activeBoss.y-th.originY;
                const bt=Math.max(0,Math.min(1,(toBx*needleDx+toBy*needleDy)/(needleLen*needleLen)));
                const bcx=th.originX+needleDx*bt, bcy=th.originY+needleDy*bt;
                if(Math.hypot(activeBoss.x-bcx,activeBoss.y-bcy)<activeBoss.size+8){
                    th.hitSet.add(activeBoss);
                    activeBoss.takeDamage(15,bcx,bcy);
                }
            }
                    }
    }
    if(wState.lancerDashCooldown>0) wState.lancerDashCooldown--;
    if(wState.lancerDashing){
        wState.lancerDashTimer--;
        if(wState.lancerDashTimer<=0){
            wState.lancerDashing=false;
            finishLancerStab(WEAPONS[currentWeapon]);
        }
    }
    if(wState.lancerStabActive){ wState.lancerStabTimer--; if(wState.lancerStabTimer<=0) wState.lancerStabActive=false; }

    // Sniper Core charge
    if(wp.type==='precise_charge'){
        if(wState.holdingFire&&wp.ammo>0){
            wState.sniperCharging=true;
            wState.sniperCharge=Math.min(wState.sniperCharge+1,wp.chargeMax);
        } else if(wState.sniperCharging&&wState.sniperCharge>0){
            // Release
            wState.sniperCharging=false;
            if(!wState.reloading&&wp.ammo>0){
                wp.ammo--;
                const chargeFrac=wState.sniperCharge/wp.chargeMax;
                const spd=wp.projSpeed*(0.4+chargeFrac*0.6);
                const isCrit=chargeFrac>0.85;
                damageSourceIsPlayer=true;
                const proj=spawnPlayerProjectile(player.x,player.y,Math.cos(player.angle)*spd,Math.sin(player.angle)*spd,'sniper',wp);
                proj.pierce=true; proj.pierceRemaining=wp.pierceDist+(hasMod('piercing')?modCount('piercing'):0);
                proj.isCrit=isCrit;
                if(isCrit){ spawnDamageText(player.x,player.y-40,'FULL CHARGE',wp.color); camera.x+=(Math.random()-.5)*3; }
                else if(chargeFrac<0.3) spawnDamageText(player.x,player.y-36,'PARTIAL SHOT',wp.color);
            }
            wState.sniperCharge=0;
        } else {
            wState.sniperCharge=Math.max(0,wState.sniperCharge-3);
        }
    }

    // Tracking Laser — energy bar + consecutive-hit ramp
    if(wp.type==='precise_track'){
        if(wState.holdingFire&&wp.ammo>0){
            wState.trackBeamActive=true;
            wp.ammo=Math.max(0,wp.ammo-wp.drainRate);

            const beamEnd=castBeamRay(wp.beamLength);

            // Beam particles
            if(Math.random()<.35){
                const t=Math.random();
                particles.push(new Particle(player.x+(beamEnd.x-player.x)*t,player.y+(beamEnd.y-player.y)*t,(Math.random()-.5),(Math.random()-.5),8,2,'spark'));
            }

            // Damage + consecutive-hit tracking
            const tLen=Math.hypot(beamEnd.x-player.x,beamEnd.y-player.y)||1;
            const rampFrac=wState.trackRamp/wp.rampMax;
            const trackDmg=1.5*(1+rampFrac);
            let hitEnemy=false;
            damageSourceIsPlayer=true;
            for(const e of enemies){
                if(e.dead) continue;
                const tt=Math.max(0,Math.min(1,((e.x-player.x)*(beamEnd.x-player.x)+(e.y-player.y)*(beamEnd.y-player.y))/(tLen*tLen)));
                const ctx2=player.x+tt*(beamEnd.x-player.x), cty2=player.y+tt*(beamEnd.y-player.y);
                if(Math.hypot(e.x-ctx2,e.y-cty2)<e.size+10+rampFrac*6){
                    hitEnemy=true;
                    if(Math.random()<0.5){
                        const wpHit=rayHitsWeakpoint(e,player.x,player.y,player.angle,wp.beamLength);
                        if(wpHit){
                            e.takeDamage(trackDmg*2);
                            triggerWeakpointEffect(e);
                        } else {
                            e.takeDamage(trackDmg);
                        }
                    }
                }
            }
            if(activeBoss&&!activeBoss.dead){
                const tt=Math.max(0,Math.min(1,((activeBoss.x-player.x)*(beamEnd.x-player.x)+(activeBoss.y-player.y)*(beamEnd.y-player.y))/(tLen*tLen)));
                const cbx=player.x+tt*(beamEnd.x-player.x), cby=player.y+tt*(beamEnd.y-player.y);
                if(Math.hypot(activeBoss.x-cbx,activeBoss.y-cby)<activeBoss.size+10+rampFrac*6){
                    hitEnemy=true;
                    if(Math.random()<0.5) activeBoss.takeDamage(trackDmg,cbx,cby);
                }
            }

            if(hitEnemy){
                wState.trackNoHitFrames=0;
                const prevRamp=wState.trackRamp;
                wState.trackRamp=Math.min(wState.trackRamp+wp.rampRate,wp.rampMax);
                if(Math.floor(wState.trackRamp/30)>Math.floor(prevRamp/30)&&wState.trackRamp<wp.rampMax){
                    spawnDamageText(beamEnd.x+(Math.random()-.5)*20,beamEnd.y-22,'RAMP +'+Math.floor(wState.trackRamp),wp.color);
                }
            } else {
                wState.trackNoHitFrames++;
                if(wState.trackNoHitFrames>=5){
                    if(wState.trackRamp>0) spawnDamageText(player.x,player.y-44,'RAMP LOST','#ff4444');
                    wState.trackRamp=0;
                }
            }

            if(wp.ammo<=0){
                wState.trackBeamActive=false;
                wState.holdingFire=false;
            }
        } else {
            wState.trackBeamActive=false;
            wState.trackRamp=0;
            // Recharge energy when not firing
            if(wp.ammo<wp.maxAmmo) wp.ammo=Math.min(wp.maxAmmo,wp.ammo+wp.rechargeRate);
        }
    }
    // Prism Rail beam linger
    if(wState.railBeamTimer>0) wState.railBeamTimer--;
    if(wState.railBeamTimer<=0) wState.railBeam=null;

    // Marksman stabilize indicator
    if(wp.type==='precise_semi'){
        const spd=Math.hypot(player.momentumX,player.momentumY);
        wState.markStabilized=spd<(WEAPONS[currentWeapon].stabilizeSpd||1.2);
    }

    // ════════════════════════════════════════════════════════════════════════
    //  SURGE weapon updates
    // ════════════════════════════════════════════════════════════════════════

    // Whirl Module — fires continuously while holding and moving
    if(wp.type==='surge_whirl'){
        const spd=Math.hypot(player.momentumX,player.momentumY);
        const FULL_SPIN_FRAMES=90; // 1.5 seconds at 60fps
        const AT_MAX_THRESHOLD=player.maxSpeed*0.88; // 88% of max counts as "holding max"

        if(wState.holdingFire && spd>AT_MAX_THRESHOLD){
            wState.whirlSpeedTimer=Math.min(wState.whirlSpeedTimer+1, FULL_SPIN_FRAMES);
        } else if(wState.holdingFire && spd>0.6){
            // moving but below threshold — drain timer slowly
            wState.whirlSpeedTimer=Math.max(0, wState.whirlSpeedTimer-0.5);
        } else {
            // not holding or stopped — drain faster
            wState.whirlSpeedTimer=Math.max(0, wState.whirlSpeedTimer-2);
        }

        // Reset announcement when timer drops below full
        if(wState.whirlSpeedTimer<FULL_SPIN_FRAMES) wState.whirlFullSpinAnnounced=false;

        if(wState.holdingFire && wState.cooldown===0 && spd>0.6){
            fireSurgeWhirl(wp);
        }
        if(!wState.holdingFire) wState.whirling=false;
    }

    // Pulse Storm — auto-fire while holding
    if(wp.type==='surge_pulse'&&wState.holdingFire&&wState.cooldown===0) fireSurgePulse(wp);
    // Pulse momentum accumulator drain
    if(wState.pulseAccum>0) wState.pulseAccum=Math.max(0,wState.pulseAccum-0.04);

    // Combat Sword combo timer expire
    if(wState.comboTimer>0){ wState.comboTimer--; if(wState.comboTimer<=0) wState.comboHit=0; }
    // Plasma waves — move and age
    wState.plasmaWaves=wState.plasmaWaves.filter(pw=>pw.life>0);
    for(const pw of wState.plasmaWaves){
        pw.life--;
        pw.x+=pw.vx; pw.y+=pw.vy;
        const t=map[Math.floor(pw.y/TILE_SIZE)]?.[Math.floor(pw.x/TILE_SIZE)];
        if(t===T_WALL||t===T_VOID){ pw.life=0; continue; }
        // Plasma wave enemy damage on contact
        if(pw.life%4===0){
            damageSourceIsPlayer=true;
            for(const e of enemies){ if(e.dead) continue; if(Math.hypot(e.x-pw.x,e.y-pw.y)<e.size+12) e.takeDamage(2); }
            if(activeBoss&&!activeBoss.dead&&Math.hypot(activeBoss.x-pw.x,activeBoss.y-pw.y)<activeBoss.size+12) activeBoss.takeDamage(2,pw.x,pw.y);
        }
        if(Math.random()<0.35) particles.push(new Particle(pw.x,pw.y,(Math.random()-.5)*2,(Math.random()-.5)*2,10,3,'surge'));
    }
    
    // Tesla arcs age
    wState.teslaArcs=wState.teslaArcs.filter(a=>a.life>0);
    for(const a of wState.teslaArcs) a.life--;

    // Stuck shards checked inside Projectile.update — no extra needed

    // Reload
    updateReload();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  COLLISION
// ═══════════════════════════════════════════════════════════════════════════════
function checkColParticle(x,y){
    const t=map[Math.floor(y/TILE_SIZE)]?.[Math.floor(x/TILE_SIZE)];
    return t===T_WALL||t===T_VOID;
}
function checkCol(x,y){
    const s=player.size/2-2;
    for(const p of [{x:x-s,y:y-s},{x:x+s,y:y-s},{x:x-s,y:y+s},{x:x+s,y:y+s}]){
        const t=map[Math.floor(p.y/TILE_SIZE)]?.[Math.floor(p.x/TILE_SIZE)];
        if(t===T_WALL||t===T_VOID) return true;
    }
    return false;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  ROOM GRAPH — DIRECTED STRUCTURED DUNGEON SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════
const ROOM_TYPE = { START:'start',COMBAT:'combat',HAZARD:'hazard',ELITE:'elite',LOOT:'loot',SHOP:'shop',SECRET:'secret',EXIT:'exit',BOSS:'boss' };
const ROOM_COLORS = { start:'#00ccff',combat:'#ff4455',hazard:'#ff8800',elite:'#dd44ff',loot:'#ffdd00',shop:'#44ff88',secret:'#aa44ff',exit:'#ffffff',boss:'#ff2266' };
const ROOM_LABELS = { start:'START',combat:'COMBAT',hazard:'HAZARD',elite:'ELITE',loot:'LOOT CACHE',shop:'SHOP',secret:'SECRET',exit:'EXIT PORTAL',boss:'BOSS ARENA' };

let roomGraph = [];   // array of room objects
let currentRoomIdx = 0; // which room the player is in

// ─── Room size palette ─────────────────────────────────────────────────────────
const ROOM_SIZES = {
    start:  ()=>({w:16,h:14}),
    combat: ()=>({w:12+rndInt(0,5),h:10+rndInt(0,5)}),
    hazard: ()=>({w:14+rndInt(0,4),h:12+rndInt(0,4)}),
    elite:  ()=>({w:16+rndInt(0,4),h:14+rndInt(0,3)}),
    loot:   ()=>({w:10+rndInt(0,3),h:9+rndInt(0,3)}),
    shop:   ()=>({w:12+rndInt(0,2),h:10+rndInt(0,2)}),
    secret: ()=>({w:9+rndInt(0,4),h:8+rndInt(0,4)}),
    exit:   ()=>({w:14+rndInt(0,4),h:12+rndInt(0,3)}),
    boss:   ()=>({w:40+rndInt(0,4),h:36+rndInt(0,4)})
};

function rndInt(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }

// ─── Cover object templates (dx,dy offsets from room center in tiles) ──────────
function coverPillars(rw,rh){
    const ox=Math.floor(rw*0.28)|0, oy=Math.floor(rh*0.28)|0;
    return [{dx:-ox,dy:-oy},{dx:-ox+1,dy:-oy},{dx:ox,dy:-oy},{dx:ox-1,dy:-oy},
            {dx:-ox,dy:oy},{dx:-ox+1,dy:oy},{dx:ox,dy:oy},{dx:ox-1,dy:oy}];
}
function coverIsland(){
    const r=[];
    for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++) r.push({dx,dy});
    return r;
}
function coverBars(rh){
    const r=[], gy=Math.floor(rh*0.25);
    for(let dx=-2;dx<=2;dx++) r.push({dx,dy:-gy},{dx,dy:gy});
    return r;
}
function coverCross(){
    const r=[];
    for(let i=-2;i<=2;i++) r.push({dx:i,dy:0},{dx:0,dy:i});
    return r.filter((a,i,arr)=>arr.findIndex(b=>b.dx===a.dx&&b.dy===a.dy)===i);
}
function coverLShape(rw,rh){
    const r=[];
    const ox=Math.floor(rw*0.22)|0, oy=Math.floor(rh*0.22)|0;
    for(let i=0;i<4;i++) r.push({dx:-ox+i,dy:-oy});
    for(let i=0;i<4;i++) r.push({dx:-ox,dy:-oy+i});
    for(let i=0;i<4;i++) r.push({dx:ox,dy:oy-i});
    for(let i=0;i<4;i++) r.push({dx:ox-i,dy:oy});
    return r;
}
const COVER_FNS = [coverPillars,coverIsland,coverBars,coverCross,coverLShape];

// ─── AABB overlap check (gap = minimum tile gap between room edges) ────────────
function aabbOverlap(ax,ay,aw,ah, bx,by,bw,bh, gap){
    return !(ax+aw+gap<=bx || bx+bw+gap<=ax || ay+ah+gap<=by || by+bh+gap<=ay);
}
function roomsOverlap(a,b,gap){ return aabbOverlap(a.x,a.y,a.w,a.h,b.x,b.y,b.w,b.h,gap); }

// ─── Build room graph with nested branching ───────────────────────────────────
function buildRoomGraph(numExits, hasBoss=false){
    const graph=[];
    function mkRoom(type,depth){
        const id=graph.length, sz=ROOM_SIZES[type]();
        const w=sz.w|0, h=sz.h|0;
        graph.push({id,type,depth,w,h,x:0,y:0,cx:0,cy:0,
            connections:[],visited:false,cleared:false,
            enemyDefs:[],portalTarget:null,lootDrop:false});
        return id;
    }
    function connect(a,b){
        if(!graph[a].connections.includes(b)) graph[a].connections.push(b);
        if(!graph[b].connections.includes(a)) graph[b].connections.push(a);
    }

    const startId=mkRoom(ROOM_TYPE.START,0);
    const totalRooms=rndInt(12,16);
    const lenA=rndInt(4,7);
    const lenB=rndInt(3,6);

    // Pick type for a room given its depth and position in path
    function pickType(depth,isLast,isSecondHalf,wantBoss){
        if(isLast && wantBoss) return ROOM_TYPE.BOSS;
        if(isLast) return ROOM_TYPE.EXIT;
        if(depth<=1) return ROOM_TYPE.COMBAT;
        if(isSecondHalf){
            const r=Math.random();
            if(r<0.35) return ROOM_TYPE.COMBAT;
            if(r<0.50) return ROOM_TYPE.HAZARD;
            if(r<0.63) return ROOM_TYPE.ELITE;
            if(r<0.75) return ROOM_TYPE.LOOT;
            if(r<0.84) return ROOM_TYPE.SHOP;
            return ROOM_TYPE.COMBAT;
        }
        const r=Math.random();
        if(r<0.55) return ROOM_TYPE.COMBAT;
        if(r<0.73) return ROOM_TYPE.HAZARD;
        if(r<0.86) return ROOM_TYPE.LOOT;
        return ROOM_TYPE.COMBAT;
    }

    // Build a path; allowExit controls whether the last room can be EXIT
    function buildPath(fromId, length, branchBudget, allowExit, makeBoss=false){
        let prev=fromId;
        for(let i=0;i<length;i++){
            const depth=graph[prev].depth+1;
            const isLast=(i===length-1);
            const isSecondHalf=(i>=Math.ceil(length*0.5));
            // Sub-branches and paths without allowExit never end in EXIT
            const wantExit=isLast&&allowExit;
            const wantBoss=isLast&&makeBoss;
            const id=mkRoom(pickType(depth,wantExit||wantBoss,isSecondHalf,wantBoss),depth);
            connect(prev,id);

            // Secret side room — always a dead-end loot room, never EXIT
            if(!isLast && depth>=2 && Math.random()<0.28){
                const secId=mkRoom(ROOM_TYPE.SECRET,depth+1);
                connect(id,secId);
                graph[secId].lootDrop=true;
            }

            // Sub-branch: a whole new mini-path; allowExit=false always
            if(!isLast && branchBudget>0 && depth>=2 && i>=1 && Math.random()<0.30){
                branchBudget--;
                buildPath(id, rndInt(2,3), 0, false);
            }

            prev=id;
        }
        return prev;
    }

    // Build exactly numExits exit paths, rest end in loot/combat
    const effectiveExits=Math.max(1,Math.min(numExits,2));
    const tipA=buildPath(startId,lenA,1, effectiveExits>=1 && !hasBoss, hasBoss);
    const tipB=buildPath(startId,lenB,1, effectiveExits>=2 && !hasBoss, false);

    // If second path wasn't supposed to be an exit, ensure it ends as Loot
    if((effectiveExits<2 || hasBoss) && graph[tipB] && graph[tipB].type===ROOM_TYPE.EXIT){
        graph[tipB].type=ROOM_TYPE.LOOT;
        graph[tipB].lootDrop=true;
    }
    for(const r of graph) if(r.type===ROOM_TYPE.LOOT) r.lootDrop=true;

    // ── Guarantee minimum room counts — convert excess COMBAT rooms ────────────
    function getCombatPool(){ return graph.filter(r=>r.type===ROOM_TYPE.COMBAT && r.id!==0); }
    function ensureAtLeastOne(targetType, applyFn){
        if(graph.some(r=>r.type===targetType)) return;
        const pool=getCombatPool(); if(!pool.length) return;
        const chosen=pool[Math.floor(Math.random()*pool.length)];
        chosen.type=targetType; if(applyFn) applyFn(chosen);
    }
    ensureAtLeastOne(ROOM_TYPE.SHOP);
    ensureAtLeastOne(ROOM_TYPE.LOOT, r=>{ r.lootDrop=true; });
    if(currentDepth>=2){ ensureAtLeastOne(ROOM_TYPE.ELITE); ensureAtLeastOne(ROOM_TYPE.HAZARD); }

    return graph;
}

// ─── Place rooms in tile-space — AABB separation, random start, varied angles ──
function placeRooms(graph){
    const GAP=6;       // minimum tile gap between any two room edges
    const MIN_STEP=26; // minimum center-to-center step when following a direction

    // 8 compass directions (tile-unit vectors, cardinal + diagonal)
    const DIRS=[
        {dx:0,dy:-1},{dx:1,dy:-1},{dx:1,dy:0},{dx:1,dy:1},
        {dx:0,dy:1},{dx:-1,dy:1},{dx:-1,dy:0},{dx:-1,dy:-1}
    ];

    // Snap room to integer tile coords given a desired center
    function snap(r,wcx,wcy){
        r.x=Math.max(2,Math.min(MAP_W-r.w-2,(wcx-(r.w>>1))|0));
        r.y=Math.max(2,Math.min(MAP_H-r.h-2,(wcy-(r.h>>1))|0));
        r.cx=(r.x+(r.w>>1))|0;
        r.cy=(r.y+(r.h>>1))|0;
    }

    // Check proposed (tx,ty,w,h) against all placed rooms
    function overlapsAny(tx,ty,tw,th,skip){
        for(const pid of placed){
            if(pid===skip) continue;
            const p=graph[pid];
            if(aabbOverlap(tx,ty,tw,th,p.x,p.y,p.w,p.h,GAP)) return true;
        }
        return false;
    }

    const placed=new Set();
    const parentDir=new Array(graph.length).fill(-1); // direction used to reach each room

    // ── Start room: random quadrant offset, NOT dead centre ──────────────────
    const quadrants=[
        {qx:MAP_W*0.25, qy:MAP_H*0.28},
        {qx:MAP_W*0.72, qy:MAP_H*0.28},
        {qx:MAP_W*0.25, qy:MAP_H*0.68},
        {qx:MAP_W*0.72, qy:MAP_H*0.68},
    ];
    const q0=quadrants[rndInt(0,3)];
    const jx=rndInt(-6,6), jy=rndInt(-6,6);
    snap(graph[0], q0.qx+jx, q0.qy+jy);
    placed.add(0);

    // ── Pick two non-opposite starting directions for the two main branches ──
    // (opposite = differ by 4 in 8-dir space)
    const startDirA=rndInt(0,7);
    let startDirB;
    do { startDirB=rndInt(0,7); }
    while(Math.abs(startDirB-startDirA)===4 || startDirB===startDirA);
    // Assign start directions for the two children of the start room
    const startChildren=graph[0].connections.slice();

    // BFS placement
    const bfsQ=[0];
    let childIdx=0;
    while(bfsQ.length){
        const parentId=bfsQ.shift();
        const parent=graph[parentId];
        const unplaced=parent.connections.filter(id=>!placed.has(id));

        // Build direction priority pool for this parent
        const baseDir=parentDir[parentId];
        let dirPool=Array.from({length:8},(_,i)=>i);

        if(parentId===0){
            // Start room: assign the two pre-chosen non-opposing directions
            // first child gets startDirA, second gets startDirB
            dirPool=[startDirA, startDirB, ...dirPool.filter(d=>d!==startDirA&&d!==startDirB)];
        } else if(baseDir>=0){
            // Prefer to continue roughly in the same direction (±2 steps), avoid back-track
            const backDir=(baseDir+4)%8;
            dirPool.sort((a,b)=>{
                if(a===backDir) return 1; if(b===backDir) return -1;
                const da=Math.min(Math.abs(a-baseDir),8-Math.abs(a-baseDir));
                const db=Math.min(Math.abs(b-baseDir),8-Math.abs(b-baseDir));
                return da-db;
            });
        }

        let slotUsed=0;
        for(const childId of unplaced){
            if(placed.has(childId)) continue;
            const child=graph[childId];
            let placed_ok=false;

            // Try every direction, increasing step distance each attempt
            for(let att=0;att<32&&!placed_ok;att++){
                const di=dirPool[att%8];
                const d=DIRS[di];
                // Step grows with attempt count to escape crowded areas
                const step=MIN_STEP+Math.floor(att/8)*8;
                const wcx=(parent.cx+d.dx*step)|0;
                const wcy=(parent.cy+d.dy*step)|0;
                const tx=Math.max(2,Math.min(MAP_W-child.w-2,(wcx-(child.w>>1))|0));
                const ty=Math.max(2,Math.min(MAP_H-child.h-2,(wcy-(child.h>>1))|0));
                if(!overlapsAny(tx,ty,child.w,child.h,-1)){
                    child.x=tx; child.y=ty;
                    child.cx=(tx+(child.w>>1))|0;
                    child.cy=(ty+(child.h>>1))|0;
                    parentDir[childId]= parentId===0
                        ? (slotUsed===0?startDirA:startDirB)
                        : di;
                    placed.add(childId);
                    placed_ok=true;
                    slotUsed++;
                }
            }

            // Hard fallback: scan the full map in a grid for any free spot
            if(!placed_ok){
                outer:
                for(let gy=2;gy<MAP_H-child.h-2;gy+=child.h+GAP+2){
                    for(let gx=2;gx<MAP_W-child.w-2;gx+=child.w+GAP+2){
                        if(!overlapsAny(gx,gy,child.w,child.h,-1)){
                            child.x=gx; child.y=gy;
                            child.cx=(gx+(child.w>>1))|0;
                            child.cy=(gy+(child.h>>1))|0;
                            parentDir[childId]=baseDir>=0?baseDir:0;
                            placed.add(childId);
                            placed_ok=true;
                            break outer;
                        }
                    }
                }
            }

            if(placed.has(childId)) bfsQ.push(childId);
        }
    }

    // Final safety pass — if any room somehow wasn't placed (shouldn't happen),
    // snap it to a free grid position
    for(const r of graph){
        if(placed.has(r.id)) continue;
        for(let gy=2;gy<MAP_H-r.h-2;gy+=r.h+GAP+2){
            for(let gx=2;gx<MAP_W-r.w-2;gx+=r.w+GAP+2){
                if(!overlapsAny(gx,gy,r.w,r.h,-1)){
                    r.x=gx; r.y=gy;
                    r.cx=(gx+(r.w>>1))|0; r.cy=(gy+(r.h>>1))|0;
                    placed.add(r.id); break;
                }
            }
            if(placed.has(r.id)) break;
        }
    }
}

// ─── Place cover objects (interior walls) inside rooms ────────────────────────
function placeCoverForRoom(room){
    if(room.type===ROOM_TYPE.START||room.type===ROOM_TYPE.SHOP||
       room.type===ROOM_TYPE.LOOT||room.type===ROOM_TYPE.EXIT||
       room.type===ROOM_TYPE.BOSS) return;
    const fn=COVER_FNS[Math.floor(Math.random()*COVER_FNS.length)];
    const offsets=fn(room.w,room.h);
    const cx=room.cx|0, cy=room.cy|0;
    for(const o of offsets){
        const tx=(cx+(o.dx|0)), ty=(cy+(o.dy|0));
        if(tx>=room.x+2&&tx<room.x+room.w-2&&ty>=room.y+2&&ty<room.y+room.h-2
           &&ty>=0&&ty<MAP_H&&tx>=0&&tx<MAP_W)
            map[ty][tx]=T_WALL;
    }
}

// ─── Assign enemy compositions to each room ───────────────────────────────────
function assignRoomEnemies(room,sectorId){
    // Black Friday: shop rooms get enemies too
    const isShop = room.type===ROOM_TYPE.SHOP;
    if(room.type===ROOM_TYPE.START||room.type===ROOM_TYPE.LOOT||room.type===ROOM_TYPE.BOSS) return;
    if(isShop && !hasMod2('black_friday')) return;
    const pool=(SECTOR_ENEMIES[sectorId]||[{type:'test_drone',count:6}]).map(e=>e.type);
    const depth=room.depth;
    const isElite=(room.type===ROOM_TYPE.ELITE);
    const isSecret=(room.type===ROOM_TYPE.SECRET);

    // Choose available enemy types by depth tier
    const earlyTypes=pool.filter(t=>['test_drone','scout_crawler','spark_mine','reactor_drone'].includes(t));
    const midTypes=pool.filter(t=>!['war_automaton','prototype_sentinel','mutant_core'].includes(t));
    const allTypes=pool;
    const typePool=depth<=2?(earlyTypes.length?earlyTypes:pool):depth<=4?(midTypes.length?midTypes:pool):allTypes;

    let count=isElite?rndInt(3,6):isSecret?rndInt(2,4):rndInt(Math.max(2,depth),Math.min(depth+4,10));
    room.enemyDefs=[];

    if(isElite){
        // Pick one of the top-half strongest enemies in this sector by base HP
        const sorted=[...pool].sort((a,b)=>(ENEMY_DEFS[b]?.hp||0)-(ENEMY_DEFS[a]?.hp||0));
        const topCount=Math.max(1,Math.ceil(sorted.length*0.5));
        const eliteType=sorted[Math.floor(Math.random()*topCount)];
        room.enemyDefs.push({type:eliteType,count:1,isElite:true});
        count--;
    }
    while(count>0){
        const t=typePool[Math.floor(Math.random()*typePool.length)];
        const batch=Math.min(count,rndInt(1,3));
        room.enemyDefs.push({type:t,count:batch});
        count-=batch;
    }
}

// ─── Spawn enemies for a room on first entry (lazy) ───────────────────────────
function spawnRoomEnemies(room){
    for(const def of room.enemyDefs){
        for(let n=0;n<def.count;n++){
            let ex,ey,placed=false;
            // Try up to 60 times to find a clear floor tile
            for(let att=0;att<60;att++){
                const tx=(room.x+2+Math.random()*(room.w-4))|0;
                const ty=(room.y+2+Math.random()*(room.h-4))|0;
                // Must be floor, not wall/void
                if(map[ty]?.[tx]!==T_FLOOR) continue;
                // Must not be inside a cover wall (check 3x3 around spawn)
                let wallNear=false;
                for(let dy=-1;dy<=1&&!wallNear;dy++)
                    for(let dx=-1;dx<=1&&!wallNear;dx++)
                        if(map[ty+dy]?.[tx+dx]===T_WALL) wallNear=true;
                if(wallNear&&att<40) continue; // loosen check after many tries
                ex=tx*TILE_SIZE+TILE_SIZE/2;
                ey=ty*TILE_SIZE+TILE_SIZE/2;
                // Keep distance from player
                if(Math.hypot(ex-player.x,ey-player.y)<TILE_SIZE*5&&att<50) continue;
                placed=true; break;
            }
            if(placed) {
                const e = new Enemy(def.type,ex,ey);
                if(def.isElite){
                    e.isElite      = true;
                    e.size         = Math.round(e.size * 1.4);
                    e.hp           = Math.round(e.hp   * 2);
                    e.maxHp        = e.hp;
                    e.eliteDmgMult = 1.5;
                }
                enemies.push(e);
            }
        }
    }
}

// ─── Determine which room the player occupies ────────────────────────────────
function findPlayerRoom(){
    const ptx=Math.floor(player.x/TILE_SIZE), pty=Math.floor(player.y/TILE_SIZE);
    for(const room of roomGraph){
        if(ptx>=room.x&&ptx<room.x+room.w&&pty>=room.y&&pty<room.y+room.h) return room.id;
    }
    return currentRoomIdx; // in a corridor — stay in last known room
}

// ─── Main world generation ────────────────────────────────────────────────────
function generateWorld(sectorNode){
    currentSector=sectorNode;
    visitedSectorIds.add(sectorNode.id);
    // ── Depth scaling ────────────────────────────────────────────────────────
    currentDepth = SECTOR_DEPTH_MAP[sectorNode.id] || 0;
    // HP: ×1 at d=0 → ×6 at d=5 (exponential feel: ~1.43^depth)
    enemyScaleHP  = Math.pow(6, currentDepth / 5);
    // DMG: ×1 at d=0 → ×3 at d=5
    enemyScaleDmg = Math.pow(3, currentDepth / 5);
    // ─────────────────────────────────────────────────────────────────────────
    map=[]; rooms=[]; enemies=[]; enemyProjectiles=[]; projectiles=[]; mortarShells=[]; droppedModules=[]; lootPedestals=[];
    scrapPickups=[]; shopVendors=[]; hazardTraps=[]; enemyHealOrbs=[]; closeShopUI();
    // Reset boss state + van (van only valid in the sector it spawned)
    activeBoss=null; bossDefeated=false; runVan=null; bossDoorTiles=[];
    for(let y=0;y<MAP_H;y++) map[y]=new Uint8Array(MAP_W).fill(T_VOID);

    const numExits=Math.max(0,sectorNode.children.length);
    const hasBoss = isBossSector(sectorNode);

    // 1. Build graph
    roomGraph=buildRoomGraph(Math.min(numExits,2), hasBoss);

    // 2. Assign tile-space positions
    placeRooms(roomGraph);

    // 3. Carve rooms
    for(const room of roomGraph){
        carveRoom({x:room.x,y:room.y,w:room.w,h:room.h});
        rooms.push({x:room.x,y:room.y,w:room.w,h:room.h});
    }

    // 4. Carve corridors between all connected room pairs
    const doneCorridors=new Set();
    for(const room of roomGraph){
        for(const cid of room.connections){
            const key=Math.min(room.id,cid)*200+Math.max(room.id,cid);
            if(doneCorridors.has(key)) continue;
            doneCorridors.add(key);
            carveCorridor({x:room.x,y:room.y,w:room.w,h:room.h},
                          {x:roomGraph[cid].x,y:roomGraph[cid].y,w:roomGraph[cid].w,h:roomGraph[cid].h});
        }
    }

    // 5. Generate border walls
    generateWalls();

    // 6. Cover objects (placed after walls so they overwrite floor tiles correctly)
    for(const room of roomGraph) placeCoverForRoom(room);

    // 7. Assign enemy compositions
    for(const room of roomGraph) assignRoomEnemies(room,sectorNode.id);

    // 8. Player spawns in start room
    const startRoom=roomGraph[0];
    player.x=startRoom.cx*TILE_SIZE; player.y=startRoom.cy*TILE_SIZE;
    player.momentumX=0; player.momentumY=0;
    currentRoomIdx=0; startRoom.visited=true;
    // (start room has no enemies)

    // STARTER PACK: T1 chest in start room on first sector
    if(hasMeta('starter_pack') && currentDepth===0){
        spawnStarterChest(startRoom);
    }

    // 9. Place portals — only in rooms matched to a child sector (non-boss sectors)
    doors=[];
    const children=sectorNode.children;
    if(!hasBoss){
        // Only take as many exit rooms as there are actual child sectors
        const exitRooms=roomGraph.filter(r=>r.type===ROOM_TYPE.EXIT).slice(0,children.length);
        // Demote any extra exit rooms that didn't get a child to loot rooms
        roomGraph.filter(r=>r.type===ROOM_TYPE.EXIT&&!exitRooms.includes(r)).forEach(r=>{
            r.type=ROOM_TYPE.LOOT; r.lootDrop=true;
        });

        exitRooms.forEach((room,i)=>{
            const child=children[i];
            room.portalTarget=child;
            const px=room.cx|0, py=room.cy|0;
            // Carve a guaranteed 3×3 open zone around the portal center
            for(let dy=-1;dy<=1;dy++) for(let dx=-1;dx<=1;dx++){
                const ttx=px+dx, tty=py+dy;
                if(ttx>=room.x&&ttx<room.x+room.w&&tty>=room.y&&tty<room.y+room.h
                   &&ttx>=0&&ttx<MAP_W&&tty>=0&&tty<MAP_H)
                    map[tty][ttx]=T_FLOOR;
            }
            map[py][px]=T_DOOR;
            doors.push({x:px*TILE_SIZE,y:py*TILE_SIZE,targetNode:child,roomId:room.id});
        });
    }
    // Boss sectors have no portals — the boss room is the end
}

function spawnEnemies(){ /* replaced by per-room lazy spawning — see spawnRoomEnemies */ }

function carveRoom(r){
    const x0=Math.max(0,r.x|0), y0=Math.max(0,r.y|0);
    const x1=Math.min(MAP_W,x0+(r.w|0)), y1=Math.min(MAP_H,y0+(r.h|0));
    for(let y=y0;y<y1;y++)
        for(let x=x0;x<x1;x++) map[y][x]=T_FLOOR;
}
function carveCorridor(r1,r2){
    const c1x=((r1.x|0)+((r1.w|0)>>1)), c1y=((r1.y|0)+((r1.h|0)>>1));
    const c2x=((r2.x|0)+((r2.w|0)>>1)), c2y=((r2.y|0)+((r2.h|0)>>1));
    const x0=Math.max(0,Math.min(c1x,c2x)), x1=Math.min(MAP_W-1,Math.max(c1x,c2x));
    const y0=Math.max(0,Math.min(c1y,c2y)), y1=Math.min(MAP_H-1,Math.max(c1y,c2y));
    for(let x=x0;x<=x1;x++){
        if(map[c1y]) map[c1y][x]=T_FLOOR;
        if(map[c1y+1]) map[c1y+1][x]=T_FLOOR;
    }
    for(let y=y0;y<=y1;y++){
        if(map[y]&&c2x>=0&&c2x<MAP_W) map[y][c2x]=T_FLOOR;
        if(map[y]&&c2x+1<MAP_W) map[y][c2x+1]=T_FLOOR;
    }
}
function generateWalls(){
    const nm=map.map(r=>new Uint8Array(r));
    for(let y=1;y<MAP_H-1;y++) for(let x=1;x<MAP_W-1;x++){
        if(map[y][x]!==T_VOID) continue;
        let f=false;
        outer: for(let ny=-1;ny<=1;ny++) for(let nx=-1;nx<=1;nx++)
            if(map[y+ny][x+nx]===T_FLOOR){ f=true; break outer; }
        if(f) nm[y][x]=T_WALL;
    }
    map=nm;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════════════════════════════
function update(){
    frameTime++;
    if(trans.active){ updateTransition(); return; }

    // ── Inactive-slot ammo reset (4 s = 240 frames) ──────────────────────────
    // The active slot's counter is always zeroed; the inactive slot counts up.
    // Any slot that reaches 240 frames without being equipped has its weapon
    // ammo silently restored to full.  Works for both the second slot AND for
    // weapons that aren't in either slot (they were already reset in resetRunState
    // when the run started, and slots never point to them, so they stay clean).
    slotInactiveFrames[activeModuleSlot] = 0;
    for(let _s = 0; _s < 2; _s++){
        if(_s === activeModuleSlot) continue;
        const _idx = moduleSlots[_s];
        if(_idx === -1) continue;
        slotInactiveFrames[_s]++;
        if(slotInactiveFrames[_s] >= 240){
            resetModuleAmmo(_idx);
            slotInactiveFrames[_s] = 0; // prevent re-firing every frame
        }
    }

    recalcModMults();
    damageSourceIsPlayer = false; // reset each frame; set true in fire fns
    // SHORT CIRCUIT: random weapon jam
    if(hasMod2('short_circuit') && shortCircuitJam<=0 && Math.random()<0.002){
        shortCircuitJam=60; // 1 second at 60fps
        spawnDamageText(player.x,player.y-36,'SHORT CIRCUIT!','#ffff44');
    }
    if(shortCircuitJam>0) shortCircuitJam--;

    if(keys['w']||keys['ArrowUp'])    { if(!shopUI.open) player.momentumY-=player.speed; }
    if(keys['s']||keys['ArrowDown'])  { if(!shopUI.open) player.momentumY+=player.speed; }
    if(keys['a']||keys['ArrowLeft'])  { if(!shopUI.open) player.momentumX-=player.speed; }
    if(keys['d']||keys['ArrowRight']) { if(!shopUI.open) player.momentumX+=player.speed; }

    // ── ROCKET BOOST (Space) ─────────────────────────────────────────────────
    const boostHeld = (keys[' '] || keys['Space']) && !shopUI.open;
    const BOOST_FORCE      = 0.5 * (hasMeta('stronger_output') ? 1.1 : 1);    // impulse per frame in aim direction
    const BOOST_MAX_SPEED  = 8   * (hasMeta('stronger_output') ? 1.1 : 1);   // boosted top speed
    const BOOST_DRAIN      = 0.3 * diffMults.boostDrain;    // energy per frame while boosting
    const BOOST_RECHARGE   = 0.45;   // energy per frame when idle
    const BOOST_DELAY      = 40;     // frames before recharge starts after releasing

    if(boostHeld && player.energy > 0){
        player.boosting = true;
        player.energy = Math.max(0, player.energy - BOOST_DRAIN);
        player.boostRechargeDelay = BOOST_DELAY;
        // Apply impulse in aim direction (facing angle)
        player.momentumX += Math.cos(player.angle) * BOOST_FORCE;
        player.momentumY += Math.sin(player.angle) * BOOST_FORCE;
        // Boost particles — flame trail from the back of the player
        const bx = player.x - Math.cos(player.angle) * 16;
        const by = player.y - Math.sin(player.angle) * 16;
        for(let i = 0; i < 3; i++){
            const spread = (Math.random() - 0.5) * 0.7;
            const backAngle = player.angle + Math.PI + spread;
            const sp = 3 + Math.random() * 5;
            particles.push(new Particle(bx, by,
                Math.cos(backAngle)*sp, Math.sin(backAngle)*sp,
                10 + Math.random()*8, 4 + Math.random()*3, 'surge'));
        }
    } else {
        player.boosting = false;
        if(player.boostRechargeDelay > 0){
            player.boostRechargeDelay--;
        } else {
            player.energy = Math.min(player.maxEnergy, player.energy + BOOST_RECHARGE);
        }
    }

    // Speed cap — higher when boosting, normal otherwise
    const activeMaxSpeed = player.boosting ? BOOST_MAX_SPEED : player.maxSpeed;

    player.momentumX*=player.friction; player.momentumY*=player.friction;
    const spd=Math.hypot(player.momentumX,player.momentumY);
    if(spd>activeMaxSpeed){
        player.momentumX=player.momentumX/spd*activeMaxSpeed;
        player.momentumY=player.momentumY/spd*activeMaxSpeed;
    }
    if(spd>.1){
        // Power-curve phase advance: nearly zero at low speed, rapid at high speed
        const t = spd / player.maxSpeed;          // 0..1 normalised
        player.legPhase += Math.pow(t, 2.4) * 0.55;

        // Smoothly track the movement direction (lerp toward current)
        const targetMoveAngle = Math.atan2(player.momentumY, player.momentumX);
        // Angular lerp — find shortest arc
        let diff = targetMoveAngle - player.smoothMoveAngle;
        while(diff >  Math.PI) diff -= Math.PI*2;
        while(diff < -Math.PI) diff += Math.PI*2;
        player.smoothMoveAngle += diff * 0.18;
    }

    moveEntity(player.momentumX,player.momentumY);
    spawnTrailParticles();
    particles=particles.filter(p=>p.isAlive());
    particles.forEach(p=>p.update());
    camera.x+=(player.x-canvas.width/2 -camera.x)*.1;
    camera.y+=(player.y-canvas.height/2-camera.y)*.1;

    updateWeapons();
    updateEnemies();

    // ── Scrap pickups ────────────────────────────────────────────────────────
    updateScrapPickups();

    // ── Enemy heal orbs ───────────────────────────────────────────────────────
    updateEnemyHealOrbs();

    // ── Shop vendors ─────────────────────────────────────────────────────────
    updateShopVendors();

    // ── Hazard traps ──────────────────────────────────────────────────────────
    updateHazardTraps();

    // ── Dropped module lifetime + auto-pickup ────────────────────────────────
    for(let i=droppedModules.length-1;i>=0;i--){
        const dm=droppedModules[i];
        // Apply slide momentum (from weapon browser spawns)
        if(dm.vx||dm.vy){
            dm.x+=dm.vx; dm.y+=dm.vy;
            dm.vx*=0.88; dm.vy*=0.88;
            if(Math.abs(dm.vx)<0.05&&Math.abs(dm.vy)<0.05){ dm.vx=0; dm.vy=0; }
        }
        dm.life--;
        if(dm.life<=0){ droppedModules.splice(i,1); continue; }
        const dist=Math.hypot(dm.x-player.x,dm.y-player.y);
        dm.pickupPrompt=dist<TILE_SIZE*1.2;
        if(dist<TILE_SIZE*0.75){
            // Auto-pickup into an empty slot
            if(moduleSlots[0]===-1){
                moduleSlots[0]=dm.weaponIdx;
                seenWeaponIds.add(WEAPONS[dm.weaponIdx].id);
                moduleSlotData[0]={tierIdx:dm.tierIdx,tierData:dm.tierData,mods:dm.mods||[]};
                droppedModules.splice(i,1);
                spawnDamageText(player.x,player.y-44,'MODULE SLOT 1!','#cccccc');
                // Ensure activeSlot points to a real weapon
                if(activeModuleSlot===0) switchWeapon(moduleSlots[0]);
            } else if(moduleSlots[1]===-1){
                moduleSlots[1]=dm.weaponIdx;
                seenWeaponIds.add(WEAPONS[dm.weaponIdx].id);
                moduleSlotData[1]={tierIdx:dm.tierIdx,tierData:dm.tierData,mods:dm.mods||[]};
                droppedModules.splice(i,1);
                spawnDamageText(player.x,player.y-44,'MODULE SLOT 2!','#cccccc');
            }
            // If both full: just show E-prompt (handled in dm.pickupPrompt)
        }
    }

    // ── Track player room transitions; lazy-spawn enemies on first entry ──────
    const detectedRoom=findPlayerRoom();
    if(detectedRoom!==currentRoomIdx){
        currentRoomIdx=detectedRoom;
        const room=roomGraph[currentRoomIdx];
        if(room&&!room.visited){
            room.visited=true;
            if(room.type===ROOM_TYPE.LOOT)       spawnLootRoom(room);
            else if(room.type===ROOM_TYPE.SHOP)  spawnShopVendors(room);
            else if(room.type===ROOM_TYPE.BOSS){  spawnBossForRoom(room); sealBossDoor(); }
            else {
                spawnRoomEnemies(room);
                if(room.type===ROOM_TYPE.HAZARD) spawnHazardTraps(room);
            }
        }
    }
    // Mark current room cleared when all enemies dead (and boss defeated if present)
    if(roomGraph[currentRoomIdx]&&roomGraph[currentRoomIdx].visited){
        const noEnemies = enemies.filter(e=>!e.dead).length===0;
        const bossOk = !activeBoss || activeBoss.dead;
        if(noEnemies && bossOk) roomGraph[currentRoomIdx].cleared=true;
    }
    // Update active boss
    if(activeBoss) activeBoss.update();

    // Update extraction van (post-boss)
    updateRunVan();

    // ── Loot pedestal pickup ──────────────────────────────────────────────────
    for(let i=lootPedestals.length-1;i>=0;i--){
        const lp=lootPedestals[i];
        if(lp.claimed) continue;
        const dist=Math.hypot(lp.x-player.x,lp.y-player.y);
        lp.pickupPrompt=dist<TILE_SIZE*1.2;
        if(dist<TILE_SIZE*0.75){
            if(moduleSlots[0]===-1){
                moduleSlots[0]=lp.weaponIdx;
                moduleSlotData[0]={tierIdx:lp.tierIdx,tierData:lp.tierData,mods:lp.mods||[]};
                if(activeModuleSlot===0) switchWeapon(moduleSlots[0]);
                lp.claimed=true;
                explodeSiblingPedestals(lp);
                spawnDamageText(player.x,player.y-44,'MODULE SLOT 1!',lp.tierData.color);
            } else if(moduleSlots[1]===-1){
                moduleSlots[1]=lp.weaponIdx;
                moduleSlotData[1]={tierIdx:lp.tierIdx,tierData:lp.tierData,mods:lp.mods||[]};
                lp.claimed=true;
                explodeSiblingPedestals(lp);
                spawnDamageText(player.x,player.y-44,'MODULE SLOT 2!',lp.tierData.color);
            }
        }
    }

    // Check each door (portal proximity)
    for(const d of doors){
        const portalCX=d.x+TILE_SIZE/2, portalCY=d.y+TILE_SIZE/2;
        if(Math.hypot(player.x-portalCX, player.y-portalCY)<TILE_SIZE){
            startTransition(d);
            break;
        }
    }
}

function startTransition(doorObj){
    trans.active=true; trans.t=0; trans.worldSwapped=false; trans.rings=[];
    trans.targetNode=doorObj.targetNode;
    trans.originDoorX=doorObj.x+TILE_SIZE/2;
    trans.originDoorY=doorObj.y+TILE_SIZE/2;
    for(let i=0;i<6;i++) trans.rings.push({startT:i*5, r:0, maxR:220+i*60});
    player.momentumX=0; player.momentumY=0;
}

function updateTransition(){
    trans.t++;
    trans.rings.forEach(rg=>{ const age=trans.t-rg.startT; if(age>0) rg.r=Math.min(rg.maxR,age*12); });
    if(!trans.worldSwapped && trans.t>=TRANS_FLASH){
        // TAXES: lose 20% of scrap on sector change
        if(hasMod2('taxes') && playerScrap>0){
            const taxed=Math.ceil(playerScrap*0.2);
            playerScrap=Math.max(0,playerScrap-taxed);
            spawnDamageText(player.x,player.y-44,'TAXES: -'+taxed+' SCRAP','#ff4488');
        }
        sectorsCleared++; // count each sector we leave
        generateWorld(trans.targetNode);
        trans.worldSwapped=true;
    }
    if(trans.t>=TRANS_TOTAL) trans.active=false;
    // SHORT CIRCUIT: tick down jam timer
    if(shortCircuitJam>0) shortCircuitJam--;
}

function moveEntity(dx,dy){
    let cx=false, cy=false;
    if(!checkCol(player.x+dx,player.y)) player.x+=dx; else cx=true;
    if(!checkCol(player.x,player.y+dy)) player.y+=dy; else cy=true;
    if((cx||cy)&&!player.collidingWithWall){
        const f=Math.hypot(dx,dy);
        if(f>1) spawnImpactParticles(player.x,player.y,f,dx,dy);
        player.collidingWithWall=true;
    } else if(!cx&&!cy) player.collidingWithWall=false;
}

//  TILE UTILS

function tileHash(x,y){ return(((x*2654435761)^(y*2246822519))>>>0)/0xFFFFFFFF; }
function slantedRect(x,y,w,h,s){
    ctx.beginPath();
    ctx.moveTo(x+s,y); ctx.lineTo(x+w+s,y); ctx.lineTo(x+w-s,y+h); ctx.lineTo(x-s,y+h);
    ctx.closePath();
}
function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
}

function drawFloor(tx,ty){
    const th=currentSector.theme;
    const h=tileHash(tx/TILE_SIZE|0,ty/TILE_SIZE|0);
    const b=4+(h*5)|0;
    // Use theme floor base — parse hex and tint
    ctx.fillStyle=th.floorBase; ctx.fillRect(tx,ty,TILE_SIZE,TILE_SIZE);
    // Per-tile brightness variance as a dark overlay
    ctx.fillStyle=`rgba(0,0,0,${0.08*(1-h)})`; ctx.fillRect(tx,ty,TILE_SIZE,TILE_SIZE);
    // Grid lines
    ctx.strokeStyle=th.floorGrid; ctx.lineWidth=.5;
    ctx.strokeRect(tx+.5,ty+.5,TILE_SIZE-1,TILE_SIZE-1);
    // Rare glow pixel
    if(h>.965){ctx.fillStyle=th.floorGlow; ctx.fillRect(tx+2,ty+2,3,3);}
    // Rare sunken panel
    if(h<.035){ctx.fillStyle=th.floorGlow; ctx.fillRect(tx+8,ty+8,TILE_SIZE-16,TILE_SIZE-16);}
}

function drawWall(tx,ty,x,y){
    const th=currentSector.theme;
    const below=map[y+1]?.[x], above=map[y-1]?.[x];
    const isFace=below===T_FLOOR||below===T_DOOR;
    const h=tileHash(x,y);
    if(isFace){
        ctx.fillStyle=th.wallFace; ctx.fillRect(tx,ty,TILE_SIZE,TILE_SIZE);
        // Vertical gradient overlay using wallEdge color at top
        const g=ctx.createLinearGradient(tx,ty,tx,ty+TILE_SIZE);
        g.addColorStop(0,th.wallEdge.replace('0.9','0.35')); g.addColorStop(.2,th.wallEdge.replace('0.9','0.10')); g.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=g; ctx.fillRect(tx,ty,TILE_SIZE,TILE_SIZE);
        // Top highlight edge
        ctx.fillStyle=th.wallEdge; ctx.fillRect(tx,ty,TILE_SIZE,2);
        ctx.fillStyle=th.wallEdge.replace('0.9','0.35').replace('0.95','0.35').replace('0.85','0.35').replace('0.88','0.35').replace('0.92','0.35'); ctx.fillRect(tx,ty+2,TILE_SIZE,4);
        // Bottom shadow
        ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(tx,ty+TILE_SIZE-9,TILE_SIZE,9);
        // Occasional panel recess
        if(h>.82){ctx.fillStyle=th.wallAccent; ctx.fillRect(tx+6,ty+12,TILE_SIZE-12,TILE_SIZE-24);}
    } else {
        ctx.fillStyle=th.wallTop; ctx.fillRect(tx,ty,TILE_SIZE,TILE_SIZE);
        ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fillRect(tx,ty,TILE_SIZE,TILE_SIZE); // darken
        // Bevel
        ctx.fillStyle=th.wallEdge.replace('0.9','0.28').replace('0.95','0.28').replace('0.85','0.28').replace('0.88','0.28').replace('0.92','0.28');
        ctx.fillRect(tx,ty,TILE_SIZE,3); ctx.fillRect(tx,ty,3,TILE_SIZE);
        // Recessed inner
        ctx.fillStyle='rgba(0,0,0,0.30)'; ctx.fillRect(tx+4,ty+4,TILE_SIZE-8,TILE_SIZE-8);
        // Occasional circuit trace
        if(h>.87){
            ctx.strokeStyle=th.wallAccent.replace('0.25','0.45').replace('0.28','0.45').replace('0.30','0.45'); ctx.lineWidth=1;
            ctx.beginPath(); ctx.moveTo(tx+6,ty+TILE_SIZE/2); ctx.lineTo(tx+TILE_SIZE-6,ty+TILE_SIZE/2); ctx.stroke();
        }
        if(h>.93){ctx.fillStyle=th.wallEdge.replace('0.9','0.5').replace('0.95','0.5').replace('0.85','0.5').replace('0.88','0.5').replace('0.92','0.5'); ctx.fillRect(tx+TILE_SIZE-7,ty+4,3,3);}
    }
    // Floor-bleed glow from above
    if(above===T_FLOOR||above===T_DOOR){ctx.fillStyle=th.ambientGlow; ctx.fillRect(tx,ty+TILE_SIZE-5,TILE_SIZE,5);}
}

function drawPortal(tx,ty,doorObj){
    const now=Date.now(), pulse=Math.sin(now/320)*.5+.5, spin=(now/900)%(Math.PI*2);
    const cx=tx+TILE_SIZE/2, cy=ty+TILE_SIZE/2;
    // Get this portal's destination color
    const col = doorObj ? doorObj.targetNode.color : '#00ccff';
    // Parse color to rgb for glow
    function hexToRgb(hex){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return[r,g,b]; }
    const [cr,cg,cb]=hexToRgb(col);

    ctx.fillStyle='#04101a'; ctx.fillRect(tx,ty,TILE_SIZE,TILE_SIZE);

    // Ambient glow (colored)
    const og=ctx.createRadialGradient(cx,cy,2,cx,cy,TILE_SIZE*.85);
    og.addColorStop(0,`rgba(${cr},${cg},${cb},${.55+pulse*.3})`);
    og.addColorStop(.5,`rgba(${cr*.5|0},${cg*.5|0},${cb*.5|0},${.2+pulse*.18})`);
    og.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=og; ctx.fillRect(tx-12,ty-12,TILE_SIZE+24,TILE_SIZE+24);

    ctx.save(); ctx.translate(cx,cy);

    // Outer ring (gold)
    ctx.rotate(spin);
    ctx.strokeStyle=`rgba(255,215,0,${.65+pulse*.35})`; ctx.lineWidth=2; ctx.shadowBlur=18; ctx.shadowColor='#ffd700';
    ctx.setLineDash([7,5]); ctx.beginPath(); ctx.arc(0,0,TILE_SIZE*.44,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);

    // Inner ring (sector color)
    ctx.rotate(-spin*2.3);
    ctx.strokeStyle=`rgba(${cr},${cg},${cb},${.6+pulse*.4})`; ctx.lineWidth=1.5; ctx.shadowColor=col;
    ctx.setLineDash([4,7]); ctx.beginPath(); ctx.arc(0,0,TILE_SIZE*.29,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
    ctx.shadowBlur=0;

    // Tick marks
    ctx.rotate(spin*.5);
    for(let i=0;i<8;i++){
        ctx.save(); ctx.rotate(i*Math.PI/4);
        ctx.fillStyle=`rgba(255,215,0,${.5+pulse*.5})`; ctx.fillRect(TILE_SIZE*.42,-1,4,2);
        ctx.restore();
    }
    ctx.restore();

    // Core glow
    const coreG=ctx.createRadialGradient(cx,cy,0,cx,cy,TILE_SIZE*.22);
    coreG.addColorStop(0,`rgba(255,255,255,${.9+pulse*.1})`);
    coreG.addColorStop(.35,`rgba(${cr},${cg},${cb},.85)`);
    coreG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=coreG; ctx.beginPath(); ctx.arc(cx,cy,TILE_SIZE*.22,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.shadowBlur=12; ctx.shadowColor=`rgba(${cr},${cg},${cb},1)`;
    ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;

    // Label above portal — destination name
    if(doorObj){
        const name=doorObj.targetNode.name.toUpperCase();
        const labelY=ty-18;
        const labelBob=Math.sin(now/500+tx)*3; // subtle float
        ctx.save();
        ctx.translate(cx, labelY+labelBob);
        // Pill background
        ctx.font='bold 9px Orbitron';
        const tw=ctx.measureText(name).width;
        const pw=tw+18, ph=16, pr=4;
        ctx.fillStyle='rgba(0,5,14,0.88)';
        ctx.strokeStyle=col; ctx.lineWidth=1;
        ctx.shadowBlur=8; ctx.shadowColor=col;
        roundRect(-pw/2,-ph/2,pw,ph,pr); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
        // Text
        ctx.fillStyle=col; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(name,0,0.5);
        ctx.restore();
    }
}
