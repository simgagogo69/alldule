//  PLAYER (ROBOTIC BIPED)
// ═══════════════════════════════════════════════════════════════════════════════
function drawPlayer(){
    const now=Date.now(), spd=Math.hypot(player.momentumX,player.momentumY);

    // ── SHADOW (world space, no rotation) ───────────────────────────────────
    ctx.save(); ctx.translate(player.x,player.y);
    ctx.globalAlpha=.22; ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(1,1,16,10,0,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
    ctx.restore();

    // ── LEG SYSTEM — own transform, MOVEMENT direction only ─────────────────
    // Zero influence from player.angle. Legs only care about where you move.
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.smoothMoveAngle); // movement space — never touches aim angle

    // Swing amplitude: scales with speed; blend fades in/out smoothly
    const moveBlend = Math.min(spd / 2.5, 1);
    const swing = Math.min(spd * 1.5, 13) * moveBlend;

    // Left leads right by half a cycle
    const leftSwing  =  Math.sin(player.legPhase) * swing;
    const rightSwing = -Math.sin(player.legPhase) * swing;

    // Hip attachment points in movement-local space (+X = forward direction)
    const hipY = 6.5;
    const LH = { x: -1, y: -hipY };
    const RH = { x: -1, y:  hipY };

    const restX = -5;

    // Feet swing purely along the forward (X) axis — we are already oriented
    const LF = { x: LH.x + restX * (1 - moveBlend) + leftSwing,  y: LH.y };
    const RF = { x: RH.x + restX * (1 - moveBlend) + rightSwing, y: RH.y };

    function calcKnee(H, F, outSign) {
        const mx = (H.x + F.x) * 0.5, my = (H.y + F.y) * 0.5;
        const dx = F.x - H.x, dy = F.y - H.y;
        const len = Math.hypot(dx, dy) || 0.01;
        const px = -dy / len * outSign, py = dx / len * outSign;
        const bendAmt = 5 + swing * 0.28;
        return { x: mx + px * bendAmt, y: my + py * bendAmt };
    }

    const LK = calcKnee(LH, LF, -1);
    const RK = calcKnee(RH, RF,  1);

    function drawLeg(H, K, F) {
        ctx.strokeStyle = '#112030'; ctx.lineWidth = 5.5; ctx.lineCap = 'round'; ctx.shadowBlur = 0;
        ctx.beginPath(); ctx.moveTo(H.x,H.y); ctx.lineTo(K.x,K.y); ctx.stroke();
        ctx.strokeStyle = '#0055aa'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(H.x-.5,H.y-.5); ctx.lineTo(K.x-.5,K.y-.5); ctx.stroke();
        ctx.strokeStyle = '#0e1e2a'; ctx.lineWidth = 3.5;
        ctx.beginPath(); ctx.moveTo(K.x,K.y); ctx.lineTo(F.x,F.y); ctx.stroke();
        ctx.strokeStyle = '#003c88'; ctx.lineWidth = 1.2;
        ctx.beginPath(); ctx.moveTo(K.x-.5,K.y-.5); ctx.lineTo(F.x-.5,F.y-.5); ctx.stroke();
        ctx.fillStyle = '#0a1e30'; ctx.strokeStyle = '#007ab8'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(K.x,K.y,3.5,0,Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#00ccff'; ctx.shadowBlur = 7; ctx.shadowColor = '#00aaff';
        ctx.beginPath(); ctx.arc(K.x,K.y,1.5,0,Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
        const fa = Math.atan2(F.y-K.y, F.x-K.x);
        ctx.fillStyle = '#0e2030'; ctx.strokeStyle = '#0099bb'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.ellipse(F.x,F.y,5.5,2.5,fa,0,Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#00eeff'; ctx.shadowBlur = 8; ctx.shadowColor = '#00ffff';
        ctx.beginPath(); ctx.arc(F.x,F.y,1.5,0,Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
    }

    drawLeg(LH, LK, LF);
    drawLeg(RH, RK, RF);
    ctx.restore(); // end leg transform

    // ── BODY — separate transform: AIM direction (mouse) only ────────────────
    ctx.save(); ctx.translate(player.x,player.y); ctx.rotate(player.angle);

    // Body glow
    const bg=ctx.createRadialGradient(0,0,2,0,0,18);
    bg.addColorStop(0,'rgba(0,90,160,0.3)'); bg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=bg; ctx.beginPath(); ctx.ellipse(0,0,18,14,0,0,Math.PI*2); ctx.fill();

    // Thruster — reacts to boost state
    const boosting = player.boosting;
    const tp = boosting
        ? 0.85 + Math.sin(Date.now()/40)*0.15   // fast flicker when boosting
        : 0.55 + Math.sin(now/130)*0.45;         // slow idle pulse

    if(boosting){
        // Extended flame cone behind the thruster
        const flameLen = 18 + Math.random()*14;
        const flameW   = 5  + Math.random()*4;
        const fg = ctx.createLinearGradient(-15,0,-15-flameLen,0);
        fg.addColorStop(0,'rgba(255,240,100,0.95)');
        fg.addColorStop(0.25,'rgba(255,140,0,0.85)');
        fg.addColorStop(0.6,'rgba(255,60,0,0.5)');
        fg.addColorStop(1,'rgba(255,30,0,0)');
        ctx.fillStyle=fg;
        ctx.shadowBlur=22; ctx.shadowColor='#ff8800';
        ctx.beginPath();
        ctx.moveTo(-15,-flameW*0.5);
        ctx.lineTo(-15-flameLen, (Math.random()-0.5)*3);
        ctx.lineTo(-15,flameW*0.5);
        ctx.closePath(); ctx.fill(); ctx.shadowBlur=0;

        // Hot core dot
        ctx.fillStyle='rgba(255,255,200,0.95)'; ctx.shadowBlur=16; ctx.shadowColor='#ffff88';
        ctx.beginPath(); ctx.arc(-15,0,3.5,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    } else {
        // Normal idle glow ellipse
        ctx.fillStyle=`rgba(0,200,100,${tp*.75})`; ctx.shadowBlur=14; ctx.shadowColor='#00ff88';
        ctx.beginPath(); ctx.ellipse(-13,0,7,3,0,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    }

    // Thruster housing (always drawn)
    ctx.fillStyle='#001810'; ctx.strokeStyle=boosting?'#88ff44':'#00993a'; ctx.lineWidth=1;
    ctx.fillRect(-15,-2.5,6,5); ctx.strokeRect(-15,-2.5,6,5);
    ctx.fillStyle=`rgba(${boosting?'180,255,100':'0,255,140'},${tp*.9})`;
    for(let i=0;i<3;i++) ctx.fillRect(-14+i*2,-1,1,2);

    // Torso
    ctx.fillStyle='#07131d'; ctx.strokeStyle='#008fbb'; ctx.lineWidth=1.5;
    ctx.shadowBlur=10; ctx.shadowColor='#0077aa';
    ctx.beginPath();
    ctx.moveTo(-11,-6); ctx.lineTo(-6,-9); ctx.lineTo(4,-9); ctx.lineTo(10,-4);
    ctx.lineTo(10,4); ctx.lineTo(4,9); ctx.lineTo(-6,9); ctx.lineTo(-11,6); ctx.lineTo(-13,0);
    ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(0,140,190,0.38)'; ctx.lineWidth=.6;
    ctx.beginPath(); ctx.moveTo(-9,-4); ctx.lineTo(7,-4); ctx.moveTo(-9,4); ctx.lineTo(7,4); ctx.stroke();
    for(const ry of[-5.5,5.5]){
        ctx.fillStyle='rgba(0,150,200,0.5)';
        ctx.beginPath(); ctx.arc(-7,ry,1,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(2,ry,1,0,Math.PI*2); ctx.fill();
    }

    // Reactor
    const rp=.6+Math.sin(now/250)*.4;
    const rg=ctx.createRadialGradient(-1,0,0,-1,0,5.5);
    rg.addColorStop(0,`rgba(200,235,255,${rp})`); rg.addColorStop(.4,`rgba(0,140,255,${rp*.85})`); rg.addColorStop(1,'rgba(0,40,140,0)');
    ctx.fillStyle=rg; ctx.shadowBlur=18; ctx.shadowColor='#00aaff';
    ctx.beginPath(); ctx.arc(-1,0,5.5,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle='#cceeff'; ctx.beginPath(); ctx.arc(-1,0,2.2,0,Math.PI*2); ctx.fill();



    ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  TRANSITION OVERLAY
// ═══════════════════════════════════════════════════════════════════════════════
function drawTransition(){
    if(!trans.active) return;
    const t=trans.t, W=canvas.width, H=canvas.height, cx=W/2, cy=H/2;
    const col = trans.targetNode ? trans.targetNode.color : '#00ccff';
    function hexToRgb(hex){ return [parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)]; }
    const [cr,cg,cb]=hexToRgb(col);
    const portalSX=trans.originDoorX-camera.x;
    const portalSY=trans.originDoorY-camera.y;

    if(t<TRANS_FLASH){
        const prog=t/TRANS_FLASH;
        // Shockwave rings
        trans.rings.forEach(rg=>{
            const age=t-rg.startT; if(age<=0||rg.r<=0) return;
            const rp=rg.r/rg.maxR, alpha=Math.max(0,(1-rp)*.9);
            ctx.save(); ctx.globalAlpha=alpha;
            ctx.strokeStyle=`rgb(${cr},${Math.min(255,cg+rp*55)|0},${cb})`;
            ctx.lineWidth=3+rp*8; ctx.shadowBlur=22; ctx.shadowColor=col;
            ctx.beginPath(); ctx.arc(portalSX,portalSY,rg.r,0,Math.PI*2); ctx.stroke();
            ctx.shadowBlur=0; ctx.restore();
        });
        // Chromatic aberration
        if(prog>.4){
            const str=(prog-.4)/.6;
            ctx.save(); ctx.globalAlpha=str*.14;
            ctx.fillStyle='#ff0000'; ctx.fillRect(-4,0,W,H);
            ctx.fillStyle='#0000ff'; ctx.fillRect(4,0,W,H);
            ctx.restore();
        }
        // White-colored flash
        const fa=Math.pow(prog,2.2)*.92;
        ctx.save(); ctx.globalAlpha=fa;
        const fg=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*.8);
        fg.addColorStop(0,`rgba(${cr+80|0},${Math.min(255,cg+80|0)},${Math.min(255,cb+80|0)},1)`);
        fg.addColorStop(.5,`rgba(${cr},${cg},${cb},0.7)`);
        fg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=fg; ctx.fillRect(0,0,W,H); ctx.restore();
        // Vignette
        const vig=ctx.createRadialGradient(cx,cy,Math.max(W,H)*(.6-prog*.5),cx,cy,Math.max(W,H));
        vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,`rgba(0,0,12,${.6+prog*.4})`);
        ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

    } else if(t<TRANS_FADEIN){
        const prog=(t-TRANS_FLASH)/(TRANS_FADEIN-TRANS_FLASH);
        ctx.save(); ctx.globalAlpha=1-prog;
        ctx.fillStyle='#000d18'; ctx.fillRect(0,0,W,H); ctx.restore();
        ctx.save(); ctx.globalAlpha=(1-prog)*.7;
        const cg2=ctx.createRadialGradient(cx,cy,0,cx,cy,300);
        cg2.addColorStop(0,`rgba(${cr},${cg},${cb},0.9)`); cg2.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=cg2; ctx.fillRect(0,0,W,H); ctx.restore();

    } else {
        // Sector name stamp
        const prog=(t-TRANS_FADEIN)/(TRANS_TOTAL-TRANS_FADEIN);
        const stampA=prog<.25?prog/.25:prog>.7?1-(prog-.7)/.3:1;
        const scale=prog<.2?1+(1-prog/.2)*.4:1;
        const name=trans.targetNode ? trans.targetNode.name.toUpperCase() : '';

        ctx.save();
        ctx.globalAlpha=stampA*.9;
        ctx.translate(cx,cy); ctx.scale(scale,scale); ctx.translate(-cx,-cy);

        const pw=400, ph=88;
        const px=cx-pw/2, py=cy-ph/2;
        ctx.fillStyle='rgba(0,8,20,0.94)';
        ctx.strokeStyle=col; ctx.lineWidth=2;
        ctx.shadowBlur=20; ctx.shadowColor=col;
        roundRect(px,py,pw,ph,6); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;

        ctx.fillStyle=`rgba(${cr},${cg},${cb},0.6)`; ctx.font='bold 13px Orbitron';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('ENTERING SECTOR',cx,cy-24);

        ctx.fillStyle=col; ctx.shadowBlur=28; ctx.shadowColor=col;
        ctx.font='bold 36px Orbitron';
        ctx.fillText(name,cx,cy+14);
        ctx.shadowBlur=0;
        ctx.restore();

        if(prog<.12){
            ctx.save(); ctx.globalAlpha=(.12-prog)/.12*.3;
            ctx.fillStyle=col; ctx.fillRect(0,0,W,H); ctx.restore();
        }
    }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  MINIMAP
// ═══════════════════════════════════════════════════════════════════════════════
function drawMinimap(){
    if(!roomGraph||roomGraph.length===0) return;
    const MM_X=canvas.width-198, MM_Y=28, MM_W=170, MM_H=148;

    // Panel background
    ctx.fillStyle='rgba(0,5,14,0.92)'; ctx.strokeStyle='rgba(0,135,200,0.55)'; ctx.lineWidth=1.5;
    roundRect(MM_X,MM_Y,MM_W,MM_H,5); ctx.fill(); ctx.stroke();
    ctx.fillStyle='rgba(0,140,180,0.6)'; ctx.font='bold 9px Orbitron';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('SECTOR MAP',MM_X+8,MM_Y+9);

    // Compute bounding box of placed rooms
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    for(const r of roomGraph){
        minX=Math.min(minX,r.x); minY=Math.min(minY,r.y);
        maxX=Math.max(maxX,r.x+r.w); maxY=Math.max(maxY,r.y+r.h);
    }
    const pad=10, topPad=18;
    const rngX=maxX-minX||1, rngY=maxY-minY||1;
    const scl=Math.min((MM_W-pad*2)/rngX,(MM_H-pad-topPad)/rngY);
    const oX=MM_X+pad+(MM_W-pad*2-rngX*scl)*0.5;
    const oY=MM_Y+topPad+(MM_H-topPad-pad-rngY*scl)*0.5;

    function mm(tx,ty){ return {x:oX+(tx-minX)*scl, y:oY+(ty-minY)*scl}; }

    ctx.save();
    ctx.beginPath(); roundRect(MM_X+1,MM_Y+topPad+1,MM_W-2,MM_H-topPad-2,4); ctx.clip();

    // Connections
    const drawnEdges=new Set();
    for(const room of roomGraph){
        for(const cid of room.connections){
            const key=Math.min(room.id,cid)*300+Math.max(room.id,cid);
            if(drawnEdges.has(key)) continue; drawnEdges.add(key);
            const other=roomGraph[cid];
            const a=mm(room.cx,room.cy), b=mm(other.cx,other.cy);
            const vis=room.visited||other.visited;
            ctx.strokeStyle=vis?'rgba(0,160,220,0.45)':'rgba(20,50,70,0.6)';
            ctx.lineWidth=vis?1.2:0.7;
            ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
        }
    }

    // Rooms
    const now=Date.now();
    for(const room of roomGraph){
        const p=mm(room.cx,room.cy);
        const col=ROOM_COLORS[room.type]||'#888';
        const isCurrent=(room.id===currentRoomIdx);
        const rw=Math.max(5,room.w*scl*0.8), rh=Math.max(4,room.h*scl*0.8);

        if(!room.visited){
            ctx.fillStyle='rgba(10,20,36,0.9)'; ctx.strokeStyle='rgba(0,60,90,0.5)'; ctx.lineWidth=0.7;
            ctx.beginPath(); ctx.rect(p.x-rw/2,p.y-rh/2,rw,rh); ctx.fill(); ctx.stroke();
            // Question mark for unvisited
            ctx.fillStyle='rgba(0,80,110,0.5)'; ctx.font=`bold ${Math.max(6,rh*0.7)|0}px Orbitron`;
            ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('?',p.x,p.y);
            continue;
        }

        const alpha=room.cleared?0.35:0.75;
        ctx.fillStyle=col+(Math.round(alpha*255).toString(16).padStart(2,'0'));
        ctx.strokeStyle=isCurrent?col:'rgba(0,100,140,0.5)';
        ctx.lineWidth=isCurrent?1.5:0.8;
        ctx.shadowBlur=isCurrent?8:0; ctx.shadowColor=col;
        ctx.beginPath(); ctx.rect(p.x-rw/2,p.y-rh/2,rw,rh); ctx.fill(); ctx.stroke();
        ctx.shadowBlur=0;

        // Current room pulsing ring
        if(isCurrent){
            const pulse=Math.sin(now/300)*0.5+0.5;
            ctx.strokeStyle=col; ctx.lineWidth=1; ctx.globalAlpha=pulse*0.55;
            ctx.beginPath(); ctx.rect(p.x-rw/2-2,p.y-rh/2-2,rw+4,rh+4); ctx.stroke();
            ctx.globalAlpha=1;
        }

        // Room type icon letter
        ctx.fillStyle=isCurrent?'#fff':(col+'cc');
        const fs=Math.max(5,Math.min(8,rh*0.65))|0;
        ctx.font=`bold ${fs}px Orbitron`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(room.type[0].toUpperCase(),p.x,p.y);
    }

    ctx.restore();

    // Current room type label below minimap
    const cr=roomGraph[currentRoomIdx];
    if(cr){
        const col=ROOM_COLORS[cr.type]||'#888';
        const label=ROOM_LABELS[cr.type]||'ROOM';
        const lx=MM_X+MM_W/2, ly=MM_Y+MM_H+12;
        ctx.fillStyle='rgba(0,5,14,0.88)'; ctx.strokeStyle=col; ctx.lineWidth=1;
        ctx.shadowBlur=8; ctx.shadowColor=col;
        roundRect(lx-52,ly-8,104,16,3); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
        ctx.fillStyle=col; ctx.font='bold 8px Orbitron';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(label,lx,ly);
    }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  DRAW
// ═══════════════════════════════════════════════════════════════════════════════
function draw(){
    ctx.fillStyle=currentSector.theme.bg; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.save(); ctx.translate(-camera.x,-camera.y);

    const sc=Math.floor(camera.x/TILE_SIZE)-1, ec=sc+Math.ceil(canvas.width/TILE_SIZE)+3;
    const sr=Math.floor(camera.y/TILE_SIZE)-1, er=sr+Math.ceil(canvas.height/TILE_SIZE)+3;

    // Pass 1: floors
    for(let y=Math.max(0,sr);y<Math.min(MAP_H,er);y++)
        for(let x=Math.max(0,sc);x<Math.min(MAP_W,ec);x++){
            const t=map[y][x];
            if(t===T_FLOOR) drawFloor(x*TILE_SIZE,y*TILE_SIZE);
        }

    // Pass 1b: hazard room floor tint
    {
        const hRoom = roomGraph[currentRoomIdx];
        if(hRoom && hRoom.type === ROOM_TYPE.HAZARD){
            const hx = hRoom.x*TILE_SIZE, hy = hRoom.y*TILE_SIZE;
            const hw = hRoom.w*TILE_SIZE, hh = hRoom.h*TILE_SIZE;
            const hPulse = Math.sin(Date.now()/700)*0.5+0.5;
            const hGrad = ctx.createRadialGradient(hx+hw/2,hy+hh/2,0,hx+hw/2,hy+hh/2,Math.max(hw,hh)*0.6);
            hGrad.addColorStop(0,`rgba(180,50,0,${0.08+hPulse*0.05})`);
            hGrad.addColorStop(0.7,`rgba(120,30,0,${0.04+hPulse*0.02})`);
            hGrad.addColorStop(1,'rgba(0,0,0,0)');
            ctx.fillStyle=hGrad; ctx.fillRect(hx,hy,hw,hh);
        }
    }

    // Pass 1c: boss arena floor overlay
    if(isBossSector(currentSector)){
        const bossRoom = roomGraph.find(r=>r.type===ROOM_TYPE.BOSS);
        if(bossRoom){
            const bx2=bossRoom.x*TILE_SIZE, by2=bossRoom.y*TILE_SIZE;
            const bw=bossRoom.w*TILE_SIZE, bh=bossRoom.h*TILE_SIZE;
            const now3=Date.now();
            const pulse2=Math.sin(now3/600)*0.5+0.5;
            const bossCol = activeBoss ? activeBoss.color : '#ff2266';
            const bossGlow = activeBoss ? activeBoss.glow : '#cc0033';
            // Ambient glow wash on arena floor
            const arenaGrad=ctx.createRadialGradient(bx2+bw/2,by2+bh/2,0,bx2+bw/2,by2+bh/2,Math.max(bw,bh)*0.65);
            arenaGrad.addColorStop(0,`rgba(60,0,10,${0.18+pulse2*0.1})`);
            arenaGrad.addColorStop(0.6,`rgba(30,0,5,${0.08+pulse2*0.04})`);
            arenaGrad.addColorStop(1,'rgba(0,0,0,0)');
            ctx.fillStyle=arenaGrad; ctx.fillRect(bx2,by2,bw,bh);
            // Outer ring etched into floor
            ctx.strokeStyle=`rgba(200,20,40,${0.22+pulse2*0.14})`; ctx.lineWidth=2;
            ctx.shadowBlur=10+pulse2*8; ctx.shadowColor=bossGlow;
            ctx.beginPath(); ctx.ellipse(bx2+bw/2,by2+bh/2,bw*0.4,bh*0.4,0,0,Math.PI*2); ctx.stroke();
            // Inner ring
            ctx.strokeStyle=`rgba(180,10,30,${0.15+pulse2*0.12})`; ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.ellipse(bx2+bw/2,by2+bh/2,bw*0.25,bh*0.25,0,0,Math.PI*2); ctx.stroke();
            // Cross hairs
            ctx.strokeStyle=`rgba(150,10,20,${0.1+pulse2*0.08})`; ctx.lineWidth=1;
            ctx.beginPath(); ctx.moveTo(bx2+bw/2,by2+10); ctx.lineTo(bx2+bw/2,by2+bh-10); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(bx2+10,by2+bh/2); ctx.lineTo(bx2+bw-10,by2+bh/2); ctx.stroke();
            ctx.shadowBlur=0;
            // Boss name etched on floor (only if boss not yet spawned or alive)
            if(!activeBoss||!activeBoss.dead){
                const bossType2=getBossTypeForSector(currentSector.id);
                if(bossType2){
                    const def2=BOSS_DEFS[bossType2];
                    ctx.fillStyle=`rgba(180,10,30,${0.06+pulse2*0.05})`;
                    ctx.font=`bold ${bw/14|0}px Orbitron`; ctx.textAlign='center'; ctx.textBaseline='middle';
                    ctx.fillText(def2.name, bx2+bw/2, by2+bh/2);
                }
            }
        }
    }

    // Pass 2: portals (need door obj for color/label)
    for(const d of doors){
        const tx=d.x, ty=d.y;
        const gx=tx/TILE_SIZE|0, gy=ty/TILE_SIZE|0;
        if(gx>=sc&&gx<ec&&gy>=sr&&gy<er) drawPortal(tx,ty,d);
    }

    // Pass 3: walls
    for(let y=Math.max(0,sr);y<Math.min(MAP_H,er);y++)
        for(let x=Math.max(0,sc);x<Math.min(MAP_W,ec);x++)
            if(map[y][x]===T_WALL) drawWall(x*TILE_SIZE,y*TILE_SIZE,x,y);

    // ── Boss door seal — red glow on locked corridor tiles ───────────────────
    if(bossDoorTiles.length > 0){
        const bdPulse = Math.sin(Date.now()/180)*0.4+0.6;
        for(const t of bossDoorTiles){
            const tx=t.x*TILE_SIZE, ty=t.y*TILE_SIZE;
            ctx.save();
            ctx.fillStyle=`rgba(255,20,40,${0.18+bdPulse*0.14})`;
            ctx.fillRect(tx,ty,TILE_SIZE,TILE_SIZE);
            ctx.strokeStyle=`rgba(255,40,60,${0.5+bdPulse*0.4})`;
            ctx.lineWidth=2; ctx.shadowBlur=12+bdPulse*8; ctx.shadowColor='#ff1428';
            ctx.strokeRect(tx+1,ty+1,TILE_SIZE-2,TILE_SIZE-2);
            ctx.shadowBlur=0; ctx.restore();
        }
    }

    particles.forEach(p=>p.draw());

    // ── Hazard traps (spikes + lasers) ───────────────────────────────────────
    drawHazardTraps();

    // ── Loot pedestals ───────────────────────────────────────────────────────
    for(const lp of lootPedestals){
        if(lp.claimed) continue;
        const wp2=WEAPONS[lp.weaponIdx];
        const td=lp.tierData;
        const tierCol=td.color;
        const classCol=CLASS_COLORS[wp2.class]||'#aaaaaa';
        const pulse=Math.sin(Date.now()/260+lp.x*0.01)*.5+.5;
        const now2=Date.now();

        ctx.save();
        ctx.translate(lp.x, lp.y);

        // ── Pedestal base ──────────────────────────────────────────────────
        // Shadow
        ctx.globalAlpha=0.22;
        ctx.fillStyle='#000';
        ctx.beginPath(); ctx.ellipse(0,12,18,6,0,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=1;

        // Base column
        ctx.fillStyle='#0a1220';
        ctx.strokeStyle=tierCol; ctx.lineWidth=1.2;
        ctx.shadowBlur=8; ctx.shadowColor=tierCol+'88';
        roundRect(-12, 4, 24, 16, 3); ctx.fill(); ctx.stroke();
        ctx.shadowBlur=0;

        // Tier accent stripe
        ctx.fillStyle=tierCol+'55';
        ctx.fillRect(-12, 8, 24, 4);
        ctx.strokeStyle=tierCol+'cc'; ctx.lineWidth=0.8;
        ctx.beginPath(); ctx.moveTo(-12,10); ctx.lineTo(12,10); ctx.stroke();

        // Glowing platform top
        const grd=ctx.createLinearGradient(-12,2,12,4);
        grd.addColorStop(0, classCol+'44');
        grd.addColorStop(0.5, tierCol+'99');
        grd.addColorStop(1, classCol+'44');
        ctx.fillStyle=grd;
        ctx.shadowBlur=12+pulse*6; ctx.shadowColor=tierCol;
        roundRect(-12, 0, 24, 6, 2); ctx.fill(); ctx.shadowBlur=0;

        // ── Module orb (floating above pedestal) ──────────────────────────
        const floatY=-14+Math.sin(now2/700+lp.x*0.02)*4;

        // Outer tier ring
        ctx.globalAlpha=0.5+pulse*0.3;
        ctx.strokeStyle=tierCol; ctx.lineWidth=1.8;
        ctx.shadowBlur=14+pulse*8; ctx.shadowColor=tierCol;
        ctx.beginPath(); ctx.arc(0, floatY, 13+pulse*2, 0, Math.PI*2); ctx.stroke();
        ctx.shadowBlur=0;

        // Inner class fill
        ctx.globalAlpha=0.4+pulse*0.2;
        ctx.fillStyle=classCol+'55';
        ctx.beginPath(); ctx.arc(0, floatY, 10, 0, Math.PI*2); ctx.fill();

        // Class inner ring
        ctx.globalAlpha=0.7+pulse*0.2;
        ctx.strokeStyle=classCol; ctx.lineWidth=1.3;
        ctx.shadowBlur=8; ctx.shadowColor=classCol;
        ctx.beginPath(); ctx.arc(0, floatY, 10, 0, Math.PI*2); ctx.stroke();
        ctx.shadowBlur=0;

        // Tier label inside orb
        ctx.globalAlpha=1;
        ctx.fillStyle=tierCol;
        ctx.font='bold 7px Orbitron'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.shadowBlur=5; ctx.shadowColor=tierCol;
        ctx.fillText(td.label, 0, floatY);
        ctx.shadowBlur=0;

        // Class label below orb
        ctx.fillStyle=classCol;
        ctx.font='bold 6px Orbitron';
        ctx.shadowBlur=4; ctx.shadowColor=classCol;
        ctx.fillText(wp2.class, 0, floatY+14);
        ctx.shadowBlur=0;

        // Weapon name below pedestal
        ctx.globalAlpha=0.85;
        ctx.fillStyle='#ccdde8'; ctx.font='bold 6px Orbitron';
        ctx.fillText(wp2.name.slice(0,10), 0, 26);

        // Pickup / swap prompt
        if(lp.pickupPrompt && (moduleSlots[0]===-1||moduleSlots[1]===-1)){
            ctx.globalAlpha=0.95;
            ctx.fillStyle='#ffffff'; ctx.font='bold 7px Orbitron';
            ctx.fillText('[E] TAKE', 0, -32+floatY);
        } else if(lp.pickupPrompt){
            ctx.globalAlpha=0.95;
            ctx.fillStyle='#ffffff'; ctx.font='bold 7px Orbitron';
            ctx.fillText('[E] SWAP', 0, -32+floatY);
        }

        ctx.globalAlpha=1; ctx.restore();

        // Draw popup card when nearby
        if(lp.pickupPrompt) drawModulePopup(lp);
    }

    // ── Dropped modules ──────────────────────────────────────────────────────
    for(const dm of droppedModules){
        const wp2=WEAPONS[dm.weaponIdx];
        const td=dm.tierData||TIER_DATA[0];
        const tierCol=td.color;
        const pulse=Math.sin(Date.now()/280)*.5+.5;
        const lf=Math.min(dm.life/60,1); // fade in last second
        ctx.save();
        // Tier-colored outer ring
        ctx.globalAlpha=(0.45+pulse*0.3)*lf;
        ctx.shadowBlur=18+pulse*10; ctx.shadowColor=tierCol;
        ctx.strokeStyle=tierCol; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(dm.x,dm.y,13+pulse*3,0,Math.PI*2); ctx.stroke();
        // Class-color inner fill
        ctx.globalAlpha=(0.35+pulse*0.2)*lf;
        ctx.shadowBlur=10; ctx.shadowColor=wp2.color;
        ctx.fillStyle=wp2.color+'44';
        ctx.beginPath(); ctx.arc(dm.x,dm.y,9,0,Math.PI*2); ctx.fill();
        // Second inner ring (class color)
        ctx.strokeStyle=wp2.color; ctx.lineWidth=1.5; ctx.globalAlpha=(0.6+pulse*0.3)*lf;
        ctx.beginPath(); ctx.arc(dm.x,dm.y,9,0,Math.PI*2); ctx.stroke();
        // Tier label
        ctx.shadowBlur=0; ctx.globalAlpha=(0.9+pulse*0.1)*lf;
        ctx.fillStyle=tierCol; ctx.font='bold 7px Orbitron';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('T'+td.label,dm.x,dm.y);
        // Module name below
        ctx.globalAlpha=(0.85+pulse*0.15)*lf;
        ctx.fillStyle=wp2.color; ctx.font='bold 6px Orbitron';
        const shortN=wp2.name.length>9?wp2.name.slice(0,9):wp2.name;
        ctx.fillText(shortN,dm.x,dm.y+21);
        // [E] prompt when close
        if(dm.pickupPrompt&&moduleSlots[0]!==-1&&moduleSlots[1]!==-1){
            ctx.globalAlpha=0.9; ctx.fillStyle='#ffffff'; ctx.font='bold 7px Orbitron';
            ctx.fillText('[E] SWAP',dm.x,dm.y-22);
        }
        ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();

        // Popup card above module when player is nearby
        if(dm.pickupPrompt) drawModulePopup(dm);
    }

    drawEnemies();
    if(activeBoss) drawBossEntity(activeBoss);
    drawRunVan();
    drawWeaponEffects();
    drawPlayer();
    drawScrapPickups();
    drawEnemyHealOrbs();
    drawVendors();
    ctx.restore();
    drawDamageTexts();
    drawHUD(); drawCompass(); drawMinimap(); drawBossHUD();
    drawShopUI();
    drawTransition();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  HUD
// ═══════════════════════════════════════════════════════════════════════════════
function drawHUD(){
    const pad=28;
    const sName=currentSector.name.toUpperCase();
    const sCol=currentSector.color;

    // Sector panel
    ctx.fillStyle='rgba(0,7,16,0.90)'; ctx.strokeStyle='rgba(0,135,200,0.55)'; ctx.lineWidth=1.5;
    roundRect(pad-8,pad-8,300,76,5); ctx.fill(); ctx.stroke();
    ctx.fillStyle='rgba(0,140,180,0.6)'; ctx.font='bold 10px Orbitron'; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('CURRENT SECTOR',pad+6,pad+7);
    ctx.fillStyle=sCol; ctx.shadowBlur=14; ctx.shadowColor=sCol;
    ctx.font='bold 19px Orbitron'; ctx.fillText(sName,pad+8,pad+28); ctx.shadowBlur=0;
    // Depth badge (right side of sector panel)
    const depthColors=['#778899','#4488ff','#22cc66','#ffdd00','#ff6600','#ff2244'];
    const dCol=depthColors[Math.min(currentDepth,5)];
    const depthLabel='DEPTH '+currentDepth;
    ctx.fillStyle=dCol+'22'; ctx.strokeStyle=dCol; ctx.lineWidth=1.2;
    ctx.shadowBlur=8; ctx.shadowColor=dCol;
    roundRect(pad+186,pad+10,88,22,3); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
    ctx.fillStyle=dCol; ctx.font='bold 9px Orbitron';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(depthLabel,pad+230,pad+21);
    // HP/DMG scale hints at depth>0
    if(currentDepth>0){
        ctx.fillStyle='rgba(200,180,160,0.5)'; ctx.font='bold 7px Orbitron'; ctx.textAlign='center';
        ctx.fillText('HP ×'+enemyScaleHP.toFixed(1)+'  DMG ×'+enemyScaleDmg.toFixed(1),pad+230,pad+34);
    }
    // Current room type row
    const cr2=roomGraph[currentRoomIdx];
    if(cr2){
        const rCol=ROOM_COLORS[cr2.type]||'#888';
        const rLbl=ROOM_LABELS[cr2.type]||'ROOM';
        ctx.fillStyle='rgba(0,100,140,0.4)'; ctx.fillRect(pad-8,pad+44,300,22);
        ctx.textAlign='left'; ctx.textBaseline='middle';
        ctx.fillStyle=rCol; ctx.shadowBlur=8; ctx.shadowColor=rCol;
        ctx.font='bold 9px Orbitron'; ctx.fillText('\u25B6 '+rLbl,pad+8,pad+55);
        ctx.shadowBlur=0;
        if(cr2.cleared){
            ctx.fillStyle='rgba(0,200,100,0.7)'; ctx.font='bold 8px Orbitron';
            ctx.textAlign='right';
            ctx.fillText('\u2713 CLEARED',pad+284,pad+55);
            ctx.textAlign='left';
        }
    }

    // HP bar
    const hbW=300,hbH=26,sl=10,hbX=pad,hbY=pad+86;
    const hp=player.health/player.maxHealth, hW=hbW*hp;
    const hCol=hp>.5?'#00cc44':hp>.25?'#ffaa00':'#ff2200';
    ctx.fillStyle='rgba(0,7,16,0.88)'; slantedRect(hbX,hbY,hbW,hbH,sl); ctx.fill();
    ctx.fillStyle=hCol; ctx.shadowBlur=12; ctx.shadowColor=hCol;
    slantedRect(hbX,hbY,hW,hbH,sl); ctx.fill(); ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(0,160,220,0.6)'; ctx.lineWidth=1.5; slantedRect(hbX,hbY,hbW,hbH,sl); ctx.stroke();
    ctx.fillStyle='#88aabb'; ctx.font='bold 10px Orbitron'; ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('HP',hbX+7,hbY+hbH/2);
    ctx.fillStyle='#fff'; ctx.font='bold 11px Orbitron'; ctx.textAlign='right';
    ctx.fillText(Math.round(player.health),hbX+hbW-6,hbY+hbH/2);

    // EN bar — pulses when boosting, green recharge indicator when refilling
    const ebW=220,ebH=15,esl=7,ebX=pad,ebY=hbY+hbH+8;
    const enFrac = player.energy/player.maxEnergy;
    const enBoosting = player.boosting;
    const enCol = enBoosting
        ? (enFrac>0.3?'#ff9900':'#ff2200')   // orange→red when boosting low
        : '#0099ff';                           // normal blue
    ctx.fillStyle='rgba(0,7,16,0.88)'; slantedRect(ebX,ebY,ebW,ebH,esl); ctx.fill();
    ctx.fillStyle=enCol; ctx.shadowBlur=enBoosting?14:10; ctx.shadowColor=enCol;
    slantedRect(ebX,ebY,ebW*enFrac,ebH,esl); ctx.fill(); ctx.shadowBlur=0;
    ctx.strokeStyle=`rgba(${enBoosting?'220,120,0':'0,140,220'},0.55)`; ctx.lineWidth=1.5;
    slantedRect(ebX,ebY,ebW,ebH,esl); ctx.stroke();
    ctx.fillStyle=enBoosting?enCol:'#4488aa'; ctx.font='bold 10px Orbitron';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(enBoosting?'BOOST':'EN', ebX+6, ebY+ebH/2);
    // Recharge delay indicator — tiny pip when waiting to recharge
    if(!enBoosting && player.boostRechargeDelay>0 && enFrac<1){
        const pip = 1 - player.boostRechargeDelay/40;
        ctx.fillStyle=`rgba(0,180,255,${0.3+pip*0.4})`;
        slantedRect(ebX+ebW*enFrac, ebY, Math.min(6, ebW*(1-enFrac)), ebH, esl);
        ctx.fill();
    }
    // [SPACE] hint when energy is full and not boosting
    if(!enBoosting && enFrac>=1){
        ctx.fillStyle='rgba(100,160,200,0.4)'; ctx.font='bold 7px Orbitron';
        ctx.textAlign='right';
        ctx.fillText('[SPACE] BOOST', ebX+ebW-6, ebY+ebH/2);
    }

    // ── XP / Level bar ───────────────────────────────────────────────────────
    const xbW=300, xbH=12, xsl=5, xbX=pad, xbY=ebY+ebH+6;
    const xpFrac = Math.min(playerXP / xpForNextLevel(), 1);
    const xpCol  = '#ffdd00';
    ctx.fillStyle='rgba(0,7,16,0.80)'; slantedRect(xbX,xbY,xbW,xbH,xsl); ctx.fill();
    if(xpFrac > 0){
        ctx.fillStyle=xpCol; ctx.shadowBlur=10; ctx.shadowColor=xpCol;
        slantedRect(xbX,xbY,xbW*xpFrac,xbH,xsl); ctx.fill(); ctx.shadowBlur=0;
    }
    ctx.strokeStyle='rgba(200,180,60,0.45)'; ctx.lineWidth=1;
    slantedRect(xbX,xbY,xbW,xbH,xsl); ctx.stroke();
    // "LVL N" label on left
    ctx.fillStyle='#bbaa44'; ctx.font='bold 7px Orbitron';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText('LVL '+playerLevel, xbX+6, xbY+xbH/2);
    // XP numbers on right
    ctx.fillStyle='rgba(200,180,60,0.6)'; ctx.font='bold 7px Orbitron';
    ctx.textAlign='right';
    ctx.fillText(playerXP+' / '+xpForNextLevel()+' XP', xbX+xbW-6, xbY+xbH/2);
    const wp=WEAPONS[currentWeapon];
    const wsz=180, wpX=canvas.width-pad-wsz, wpY=canvas.height-pad-wsz-44;
    ctx.fillStyle='rgba(0,4,10,0.94)';
    ctx.strokeStyle=wp.color; ctx.lineWidth=2;
    ctx.shadowBlur=16; ctx.shadowColor=wp.color;
    roundRect(wpX,wpY,wsz,wsz+44,6); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;

    // ── Module slot tabs (replaces bank toggle) ──────────────────────────────
    const slotW=(wsz-8)/2, slotH=22;
    for(let s=0;s<2;s++){
        const sx=wpX+2+s*(slotW+4), sy=wpY+2;
        const slotWpIdx=moduleSlots[s];
        const isEmpty=slotWpIdx===-1;
        const isActive=s===activeModuleSlot;
        const slotCol=isEmpty?'#223344':WEAPONS[slotWpIdx].color;
        ctx.fillStyle=isActive?(slotCol+'44'):'rgba(0,5,12,0.6)';
        ctx.strokeStyle=isActive?slotCol:'rgba(0,60,80,0.4)'; ctx.lineWidth=isActive?1.5:1;
        ctx.shadowBlur=isActive?10:0; ctx.shadowColor=slotCol;
        roundRect(sx,sy,slotW-2,slotH,3); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
        ctx.fillStyle=isActive?slotCol:'rgba(100,130,150,0.5)';
        ctx.font='bold 7px Orbitron'; ctx.textAlign='center'; ctx.textBaseline='middle';
        const slotLabel=isEmpty?'[EMPTY]':(isEmpty?'':WEAPONS[slotWpIdx].name.slice(0,9));
        ctx.fillText((s===0?'①':'②')+' '+(isEmpty?'EMPTY':slotLabel),sx+slotW/2-1,sy+11);
    }
    ctx.fillStyle='rgba(100,130,150,0.35)'; ctx.font='bold 7px Orbitron'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('[Q/TAB] SWITCH  [E] SWAP',wpX+wsz/2,wpY+32);

    // Class badge + name (with tier inline)
    const activeTd = moduleSlotData[activeModuleSlot]?.tierData || TIER_DATA[0];
    const clsCol=CLASS_COLORS[wp.class]||'#ff3300';
    ctx.fillStyle=clsCol; ctx.shadowBlur=10; ctx.shadowColor=clsCol;
    ctx.font='bold 9px Orbitron';
    ctx.fillText('◆ '+wp.class+' ◆',wpX+wsz/2,wpY+44); ctx.shadowBlur=0;
    ctx.fillStyle='#ccdde8'; ctx.font='bold 11px Orbitron';
    ctx.fillText(wp.name,wpX+wsz/2,wpY+58);
    // Tier label inline, smaller, colored
    ctx.fillStyle=activeTd.color; ctx.font='bold 8px Orbitron';
    ctx.shadowBlur=6; ctx.shadowColor=activeTd.color;
    ctx.fillText('['+activeTd.label+']',wpX+wsz/2,wpY+71);
    ctx.shadowBlur=0;
    const typeMap={'melee':'MELEE','melee_slam':'MELEE','melee_combo':'COMBO MELEE','melee_thrust':'THRUST MELEE',
        'ranged':'RANGED','ranged_arc':'ARC RANGED','ranged_hold':'HOLD RANGED','beam':'BEAM',
        'precise_thrust':'PRECISE THRUST','precise_chain':'CHAIN MELEE','precise_rapid':'RAPID MELEE',
        'precise_dash':'DASH MELEE','precise_charge':'CHARGE RANGED','precise_track':'TRACK BEAM',
        'precise_semi':'SEMI-AUTO','precise_rail':'RAIL BEAM',
        'surge_combo3':'COMBO MELEE','surge_arc':'ARC MELEE','surge_whirl':'WHIRL MELEE',
        'surge_plasma':'PLASMA MELEE','surge_tesla':'TESLA CHAIN','surge_scatter':'SCATTER SHOT',
        'surge_pulse':'PULSE STORM','surge_shard':'SHARD LAUNCH',
        'blank_semi':'SEMI-AUTO PISTOL'};
    ctx.fillStyle='rgba(180,200,220,0.42)'; ctx.font='bold 8px Orbitron';
    ctx.fillText(typeMap[wp.type]||wp.type.toUpperCase(),wpX+wsz/2,wpY+82);
    ctx.fillStyle='rgba(0,140,190,0.35)'; ctx.fillRect(wpX+14,wpY+90,wsz-28,1.5);

    // Reload bar
    if(wState.reloading){
        const rf=1-(wState.reloadTimer/wState.reloadDuration);
        const rW=wsz-28,rX=wpX+14,rY=wpY+100;
        ctx.fillStyle='rgba(0,5,12,0.9)'; slantedRect(rX,rY,rW,12,3); ctx.fill();
        ctx.fillStyle=wp.color; ctx.shadowBlur=10; ctx.shadowColor=wp.color;
        slantedRect(rX,rY,rW*rf,12,3); ctx.fill(); ctx.shadowBlur=0;
        ctx.strokeStyle='rgba(0,160,220,0.4)'; ctx.lineWidth=1; slantedRect(rX,rY,rW,12,3); ctx.stroke();
        ctx.fillStyle=wp.color; ctx.font='bold 10px Orbitron';
        ctx.fillText('RELOADING…',wpX+wsz/2,wpY+122);
    } else {
    const statY=wpY+102;
    if(wp.type==='melee'||wp.type==='melee_slam'||wp.type==='melee_thrust'){
        ctx.fillStyle='rgba(160,190,210,0.5)'; ctx.font='bold 10px Orbitron';
        ctx.fillText('COOLDOWN',wpX+wsz/2,statY);
        const cdFrac=wState.cooldown>0?1-(wState.cooldown/wp.cooldown):1;
        const cdW=wsz-32,cdH=14,cdX=wpX+16,cdY=statY+10;
        ctx.fillStyle='rgba(0,6,14,0.9)'; slantedRect(cdX,cdY,cdW,cdH,4); ctx.fill();
        ctx.fillStyle=cdFrac>=1?wp.color:'rgba(255,100,0,0.6)'; ctx.shadowBlur=cdFrac>=1?10:0; ctx.shadowColor=wp.color;
        slantedRect(cdX,cdY,cdW*Math.min(cdFrac,1),cdH,4); ctx.fill(); ctx.shadowBlur=0;
        ctx.strokeStyle='rgba(0,160,220,0.4)'; ctx.lineWidth=1.2; slantedRect(cdX,cdY,cdW,cdH,4); ctx.stroke();
        ctx.fillStyle='#fff'; ctx.font='bold 10px Orbitron';
        ctx.fillText(cdFrac>=1?'READY':'CHARGING',wpX+wsz/2,statY+32);
    } else if(wp.type==='melee_combo'){
        ctx.fillStyle='rgba(160,190,210,0.5)'; ctx.font='bold 10px Orbitron';
        ctx.fillText('COMBO STATE',wpX+wsz/2,statY);
        const phaseCol=wState.cleaverPhase==='exposed'?'#ff2200':wState.cleaverPhase==='window'?'#ffdd00':'#aaccff';
        const phaseStr=wState.cleaverPhase==='exposed'?'EXPOSED!':wState.cleaverPhase==='window'?'STRIKE NOW!':'READY';
        ctx.fillStyle=phaseCol; ctx.shadowBlur=wState.cleaverPhase!=='idle'?12:0; ctx.shadowColor=phaseCol;
        ctx.font='bold 14px Orbitron'; ctx.fillText(phaseStr,wpX+wsz/2,statY+18); ctx.shadowBlur=0;
        if(wState.cleaverPhase==='window'){
            const wf=wState.cleaverWindowTimer/WEAPONS[2].secondWindow;
            const bW=wsz-32,bX=wpX+16,bY=statY+30;
            ctx.fillStyle='rgba(0,6,14,0.9)'; slantedRect(bX,bY,bW,10,3); ctx.fill();
            ctx.fillStyle='#ffdd00'; ctx.shadowBlur=8; ctx.shadowColor='#ffdd00';
            slantedRect(bX,bY,bW*wf,10,3); ctx.fill(); ctx.shadowBlur=0;
            ctx.strokeStyle='rgba(255,200,0,0.35)'; ctx.lineWidth=1; slantedRect(bX,bY,bW,10,3); ctx.stroke();
        }
    } else if(wp.type==='ranged_hold'){
        ctx.fillStyle='rgba(160,190,210,0.5)'; ctx.font='bold 10px Orbitron';
        ctx.fillText('SPIN-UP',wpX+wsz/2,statY);
        const sf=wState.spinUp/wp.spinUpFrames;
        const sW=wsz-32,sX=wpX+16,sY=statY+10;
        ctx.fillStyle='rgba(0,6,14,0.9)'; slantedRect(sX,sY,sW,12,4); ctx.fill();
        ctx.fillStyle=sf>=1?'#ff2200':`rgba(255,${100+sf*80|0},0,0.85)`;
        ctx.shadowBlur=sf>0?8:0; ctx.shadowColor='#ff3300';
        slantedRect(sX,sY,sW*sf,12,4); ctx.fill(); ctx.shadowBlur=0;
        ctx.strokeStyle='rgba(0,160,220,0.35)'; ctx.lineWidth=1.2; slantedRect(sX,sY,sW,12,4); ctx.stroke();
        ctx.fillStyle='#fff'; ctx.font='bold 24px Orbitron'; ctx.fillText(wp.ammo,wpX+wsz/2,statY+38);
        ctx.fillStyle='#445566'; ctx.font='bold 9px Orbitron'; ctx.fillText('/'+wp.maxAmmo,wpX+wsz/2,statY+54);
    } else if(wp.type==='beam'){
        ctx.fillStyle='rgba(160,190,210,0.5)'; ctx.font='bold 10px Orbitron';
        ctx.fillText('CHARGE',wpX+wsz/2,statY);
        const cf=wp.ammo/wp.maxAmmo;
        const bW=wsz-32,bX=wpX+16,bY=statY+10;
        ctx.fillStyle='rgba(0,6,14,0.9)'; slantedRect(bX,bY,bW,14,4); ctx.fill();
        ctx.fillStyle=cf>0.5?wp.color:cf>0.25?'#ff7700':'#ff2200'; ctx.shadowBlur=wState.beamActive?14:4; ctx.shadowColor=wp.color;
        slantedRect(bX,bY,bW*cf,14,4); ctx.fill(); ctx.shadowBlur=0;
        ctx.strokeStyle='rgba(0,160,220,0.35)'; ctx.lineWidth=1.2; slantedRect(bX,bY,bW,14,4); ctx.stroke();
        ctx.fillStyle=wState.beamActive?wp.color:'#aabbcc'; ctx.font='bold 9px Orbitron';
        ctx.fillText(wState.beamActive?'FIRING':'READY',wpX+wsz/2,statY+32);
        if(wState.beamOverused){ctx.fillStyle='#ff0066';ctx.shadowBlur=10;ctx.shadowColor='#ff0066';ctx.font='bold 10px Orbitron';ctx.fillText('OVERLOAD!',wpX+wsz/2,statY+46);ctx.shadowBlur=0;}
    } else if(wp.type==='precise_thrust'){
        ctx.fillStyle='rgba(160,200,220,0.5)'; ctx.font='bold 9px Orbitron'; ctx.fillText('LAST HIT',wpX+wsz/2,statY);
        const cCol=wState.spearCrit?'#ffffff':wp.color;
        ctx.fillStyle=cCol; ctx.shadowBlur=wState.spearCrit?14:0; ctx.shadowColor='#ffffff';
        ctx.font='bold 13px Orbitron'; ctx.fillText('NORMAL HIT',wpX+wsz/2,statY+18); ctx.shadowBlur=0;
        ctx.fillStyle='rgba(120,160,180,0.4)'; ctx.font='bold 7px Orbitron'; ctx.fillText('STAND STILL = +CRIT CHANCE',wpX+wsz/2,statY+32);
    } else if(wp.type==='precise_chain'){
        ctx.fillStyle='rgba(160,200,220,0.5)'; ctx.font='bold 9px Orbitron'; ctx.fillText('COMBO',wpX+wsz/2,statY);
        const maxC=wp.maxCombo;
        const pipCW=(wsz-32)/maxC-1.5;
        for(let i=0;i<maxC;i++){
            const px=wpX+16+i*((wsz-32)/maxC);
            const filled=i<wState.monoCombo;
            ctx.fillStyle=filled?`hsl(${180+i*30},100%,65%)`:('#0a1a24');
            ctx.shadowBlur=filled?5:0; ctx.shadowColor=`hsl(${180+i*30},100%,60%)`;
            ctx.fillRect(px,statY+10,pipCW,10);
        }
        ctx.shadowBlur=0;
        ctx.fillStyle=wState.monoCombo>0?`hsl(${180+wState.monoCombo*30},100%,70%)`:('#445566');
        ctx.font='bold 12px Orbitron'; ctx.fillText(wState.monoCombo>0?('x'+wState.monoCombo+' CHAIN'):('NO COMBO'),wpX+wsz/2,statY+30);
        if(wState.monoCombo>=maxC){ctx.fillStyle='#ffffff';ctx.shadowBlur=12;ctx.shadowColor='#ffffff';ctx.font='bold 10px Orbitron';ctx.fillText('MAX CRIT!',wpX+wsz/2,statY+44);ctx.shadowBlur=0;}
    } else if(wp.type==='precise_rapid'){
        ctx.fillStyle='rgba(160,200,220,0.5)'; ctx.font='bold 9px Orbitron'; ctx.fillText('STACK',wpX+wsz/2,statY);

    } else if(wp.type==='precise_track'){
        const rf=wState.trackRamp/(wp.rampMax||150);

        // Ramp bar label

        ctx.strokeStyle='rgba(0,160,220,0.35)'; ctx.lineWidth=1; slantedRect(rX2,rY2,rW2,10,3); ctx.stroke();
        // Status line
        const noHit=wState.trackNoHitFrames;
        let statusStr, statusCol;
        if(!wState.trackBeamActive){
            statusStr=ef>=1?'CHARGED':'RECHARGING…'; statusCol='#7799aa';
        } else if(rf>=1){
            statusStr='MAX RAMP!'; statusCol='#ffffff';
        } else if(noHit<5&&wState.trackRamp>0){
            statusStr='RAMPING x'+Math.floor(wState.trackRamp+1); statusCol=`hsl(${170+rf*60},100%,75%)`;
        } else {
            statusStr='HIT TO RAMP'; statusCol='#7799aa';
        }

    } else if(wp.type==='precise_semi'){
        ctx.fillStyle='#fff'; ctx.font='bold 32px Orbitron'; ctx.fillText(wp.ammo,wpX+wsz/2,statY+22);

        ctx.fillStyle='#445566'; ctx.font='bold 9px Orbitron'; ctx.fillText('/'+wp.maxAmmo+' [R]',wpX+wsz/2,statY+44);
        if(wState.markStabilized){ctx.fillStyle=wp.color;ctx.shadowBlur=8;ctx.shadowColor=wp.color;ctx.font='bold 9px Orbitron';ctx.fillText('◎ STABILIZED',wpX+wsz/2,statY+58);ctx.shadowBlur=0;}
    } else if(wp.type==='precise_rail'){
        ctx.fillStyle='#fff'; ctx.font='bold 32px Orbitron'; ctx.fillText(wp.ammo,wpX+wsz/2,statY+18);
        ctx.fillStyle='#445566'; ctx.font='bold 9px Orbitron'; ctx.fillText('/'+wp.maxAmmo+' [R]',wpX+wsz/2,statY+34);
        if(wState.railBeam){const rc=wState.railBeam.crit?'#ffffff':wp.color;ctx.fillStyle=rc;ctx.shadowBlur=wState.railBeam.crit?10:0;ctx.shadowColor='#fff';ctx.font='bold 9px Orbitron';ctx.fillText(wState.railBeam.crit?'REFLECT CRIT':wState.railBeam.segs.length>1?'REFLECTED':'NO REFLECT',wpX+wsz/2,statY+50);ctx.shadowBlur=0;}
    // ── SURGE stat panels ────────────────────────────────────────────────────
    } else if(wp.type==='surge_combo3'){
        ctx.fillStyle='rgba(180,200,140,0.5)'; ctx.font='bold 9px Orbitron'; ctx.fillText('COMBO HIT',wpX+wsz/2,statY);
        const hitCols=['#ffdd00','#ffaa00','#ffffff'];

        for(let h=0;h<3;h++){

            ctx.shadowBlur=active?8:0; ctx.shadowColor=hitCols[h];
            ctx.fillRect(hx,statY+12,(wsz-36)/3-3,14);

        ctx.fillStyle=wState.comboHit>0?wp.color:'#445566'; ctx.font='bold 9px Orbitron'; ctx.textAlign='center';
        ctx.fillText(wState.comboHit===0?'PRESS TO START':wState.comboHit===3?'HIT 3 READY':wState.comboHit+' HIT',wpX+wsz/2,statY+36);

        ctx.fillStyle='rgba(180,200,140,0.5)'; ctx.font='bold 9px Orbitron'; ctx.fillText('ARC CHARGE',wpX+wsz/2,statY);
        const acf=wState.arcCharge/wp.maxCharge;
        const acW=wsz-32,acX=wpX+16,acY=statY+12;
        ctx.fillStyle='rgba(0,6,14,0.9)'; slantedRect(acX,acY,acW,12,4); ctx.fill();
        ctx.fillStyle=acf>=1?'#ffe566':wp.color; ctx.shadowBlur=acf>=1?14:acf>0?6:0; ctx.shadowColor='#ffe566';
        slantedRect(acX,acY,acW*acf,12,4); ctx.fill(); ctx.shadowBlur=0;
        ctx.strokeStyle='rgba(200,180,0,0.4)'; ctx.lineWidth=1; slantedRect(acX,acY,acW,12,4); ctx.stroke();
        ctx.fillStyle=acf>=1?'#ffe566':wp.color; ctx.font='bold 9px Orbitron';
        ctx.fillText(acf>=1?'LIGHTNING READY!':wState.arcCharge+'/'+wp.maxCharge+' CHARGE',wpX+wsz/2,statY+34);
    } else if(wp.type==='surge_whirl'){
        const FULL_SPIN_FRAMES=90;
        const bonus=Math.min(wState.whirlSpeedTimer/FULL_SPIN_FRAMES,1);
        const spd=Math.hypot(player.momentumX,player.momentumY);
        const sf=Math.min(spd/player.maxSpeed,1); // raw speed still drives bar colour
        const col=`hsl(${44+bonus*30},100%,${60+bonus*20}%)`;
        ctx.fillStyle='rgba(180,200,140,0.5)'; ctx.font='bold 9px Orbitron';
        ctx.fillText('SPIN CHARGE',wpX+wsz/2,statY);
        const sW=wsz-32,sX=wpX+16,sY=statY+12;
        ctx.fillStyle='rgba(0,6,14,0.9)'; slantedRect(sX,sY,sW,12,4); ctx.fill();
        ctx.fillStyle=col; ctx.shadowBlur=bonus>=1?14:sf>0.5?6:0; ctx.shadowColor=col;
        slantedRect(sX,sY,sW*bonus,12,4); ctx.fill(); ctx.shadowBlur=0;
        ctx.strokeStyle='rgba(200,180,0,0.35)'; ctx.lineWidth=1; slantedRect(sX,sY,sW,12,4); ctx.stroke();
        // Speed sub-bar (faint, shows current raw speed)
        ctx.globalAlpha=0.3;
        ctx.fillStyle=`hsl(${44+sf*30},100%,65%)`;
        slantedRect(sX,sY,sW*sf,12,4); ctx.fill();
        ctx.globalAlpha=1;
        ctx.fillStyle=bonus>=1?'#ffffff':bonus>0?col:'rgba(140,160,100,0.5)'; ctx.font='bold 9px Orbitron';
        ctx.fillText(bonus>=1?'FULL SPIN!':bonus>0?'CHARGING…':'HOLD + MOVE AT MAX',wpX+wsz/2,statY+34);

        ctx.fillStyle='rgba(180,200,140,0.5)'; ctx.font='bold 9px Orbitron'; ctx.fillText('ACTIVE WAVES',wpX+wsz/2,statY);

        ctx.fillText(wState.plasmaWaves.length,wpX+wsz/2,statY+24);

    } else if(wp.type==='surge_tesla'){
        ctx.fillStyle='rgba(180,200,140,0.5)'; ctx.font='bold 9px Orbitron'; ctx.fillText('AMMO',wpX+wsz/2,statY);
        ctx.fillStyle='#fff'; ctx.font='bold 32px Orbitron'; ctx.fillText(wp.ammo,wpX+wsz/2,statY+24);
        ctx.fillStyle='#445566'; ctx.font='bold 9px Orbitron'; ctx.fillText('/'+wp.maxAmmo+' [R]',wpX+wsz/2,statY+38);
    } else if(wp.type==='surge_scatter'){
        ctx.fillStyle='#fff'; ctx.font='bold 32px Orbitron'; ctx.fillText(wp.ammo,wpX+wsz/2,statY+20);

    } else if(wp.type==='surge_pulse'){

        ctx.fillStyle='#445566'; ctx.font='bold 9px Orbitron'; ctx.fillText('/'+wp.maxAmmo+' [R]',wpX+wsz/2,statY+34);
        // Momentum build bar
        const pf=wState.pulseAccum/player.maxSpeed;
        if(pf>0.05){
            const pW=wsz-32,pX=wpX+16,pY=statY+42;
            ctx.fillStyle='rgba(0,6,14,0.9)'; slantedRect(pX,pY,pW,8,3); ctx.fill();
            ctx.fillStyle=wp.color; ctx.shadowBlur=6; ctx.shadowColor=wp.color;
            slantedRect(pX,pY,pW*pf,8,3); ctx.fill(); ctx.shadowBlur=0;

    } else if(wp.type==='surge_shard'){
        ctx.fillStyle='#fff'; ctx.font='bold 32px Orbitron'; ctx.fillText(wp.ammo,wpX+wsz/2,statY+20);
