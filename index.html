    // ── Lobby interactive devices ─────────────────────────────────────────────
    // Enemy Index terminal — left wall area
    lobbyState.indexTermX = cx + 160;
    lobbyState.indexTermY = cy - 180;
    lobbyState.indexTermPrompt = false;

    // Sector Map terminal — left wall area, below index
    lobbyState.mapTermX = cx + 240;
    lobbyState.mapTermY = cy - 180;
    lobbyState.mapTermPrompt = false;
}

// ─── Update lobby ─────────────────────────────────────────────────────────────
function updateLobby(){
    frameTime++;
    recalcModMults();
    damageSourceIsPlayer=false;

    // Movement — frozen while any panel/menu is open
    const anyMenuOpen = lobbyUpgradePanel || lobbyModPanel ||
        lobbyState.indexOpen || lobbyState.mapOpen ||
        lobbyState.weaponBrowserOpen || lobbyState.rerollMenuOpen;
    if(!anyMenuOpen){
    if(keys['w']||keys['ArrowUp'])    player.momentumY-=player.speed;
    if(keys['s']||keys['ArrowDown'])  player.momentumY+=player.speed;
    if(keys['a']||keys['ArrowLeft'])  player.momentumX-=player.speed;
    if(keys['d']||keys['ArrowRight']) player.momentumX+=player.speed;
    }

    // ── ROCKET BOOST (Space) ─────────────────────────────────────────────────
    const boostHeld = (keys[' '] || keys['Space']) && !anyMenuOpen;
    const BOOST_FORCE     = 0.5 * (hasMeta('stronger_output') ? 1.1 : 1);
    const BOOST_MAX_SPEED = 8   * (hasMeta('stronger_output') ? 1.1 : 1);
    const BOOST_DRAIN     = 0.3;
    const BOOST_RECHARGE  = 0.45;
    const BOOST_DELAY     = 40;
    if(boostHeld && player.energy > 0){
        player.boosting = true;
        player.energy = Math.max(0, player.energy - BOOST_DRAIN);
        player.boostRechargeDelay = BOOST_DELAY;
        player.momentumX += Math.cos(player.angle) * BOOST_FORCE;
        player.momentumY += Math.sin(player.angle) * BOOST_FORCE;
        const bx = player.x - Math.cos(player.angle) * 16;
        const by = player.y - Math.sin(player.angle) * 16;
        for(let i=0;i<3;i++){
            const spread=(Math.random()-.5)*0.7;
            const backAngle=player.angle+Math.PI+spread;
            const sp=3+Math.random()*5;
            particles.push(new Particle(bx,by,Math.cos(backAngle)*sp,Math.sin(backAngle)*sp,10+Math.random()*8,4+Math.random()*3,'surge'));
        }
    } else {
        player.boosting = false;
        if(player.boostRechargeDelay > 0){ player.boostRechargeDelay--; }
        else { player.energy = Math.min(player.maxEnergy, player.energy + BOOST_RECHARGE); }
    }
    const activeMaxSpeed = player.boosting ? BOOST_MAX_SPEED : player.maxSpeed;

    player.momentumX*=player.friction; player.momentumY*=player.friction;
    const spd=Math.hypot(player.momentumX,player.momentumY);
    if(spd>activeMaxSpeed){
        player.momentumX=player.momentumX/spd*activeMaxSpeed;
        player.momentumY=player.momentumY/spd*activeMaxSpeed;
    }
    if(spd>.1){
        const t=spd/player.maxSpeed;
        player.legPhase+=Math.pow(t,2.4)*0.55;
        const ta=Math.atan2(player.momentumY,player.momentumX);
        let diff=ta-player.smoothMoveAngle;
        while(diff>Math.PI)diff-=Math.PI*2; while(diff<-Math.PI)diff+=Math.PI*2;
        player.smoothMoveAngle+=diff*0.18;
    }
    moveEntity(player.momentumX,player.momentumY);
    spawnTrailParticles();
    particles=particles.filter(p=>p.isAlive());
    particles.forEach(p=>p.update());
    camera.x+=(player.x-canvas.width/2 -camera.x)*.1;
    camera.y+=(player.y-canvas.height/2-camera.y)*.1;

    // ── Detect which room player is in ────────────────────────────────────────
    const ptx=Math.floor(player.x/TILE_SIZE), pty=Math.floor(player.y/TILE_SIZE);
    const wasInRange = lobbyState.inRange;
    lobbyState.inRange = (ptx>=lobbyState.rangeRoomX && ptx<lobbyState.rangeRoomX+lobbyState.rangeRoomW &&
                          pty>=lobbyState.rangeRoomY && pty<lobbyState.rangeRoomY+lobbyState.rangeRoomH);

    // When entering range: set up combat state
    if(lobbyState.inRange && !wasInRange){
        applyDifficultyToRun();
        damageSourceIsPlayer=false;
        if(lobbyState.rackSelectedWeaponIdx>=0) switchWeapon(lobbyState.rackSelectedWeaponIdx);
    }

    // ── Shooting range: run weapon + enemy systems (no boost) ────────────────
    if(lobbyState.inRange){
        recalcModMults();
        updateWeapons();
        // Run enemies (the training dummies) via the normal system
        updateEnemies();
    }

    // ── Dropped modules in lobby (weapon browser drops) ──────────────────────
    for(let i=droppedModules.length-1;i>=0;i--){
        const dm=droppedModules[i];
        if(dm.vx||dm.vy){
            dm.x+=dm.vx; dm.y+=dm.vy;
            dm.vx*=0.88; dm.vy*=0.88;
            if(Math.abs(dm.vx)<0.05&&Math.abs(dm.vy)<0.05){ dm.vx=0; dm.vy=0; }
        }
        dm.life--;
        if(dm.life<=0){ droppedModules.splice(i,1); continue; }
        const dist=Math.hypot(dm.x-player.x,dm.y-player.y);
        dm.pickupPrompt = dist<TILE_SIZE*1.2;
        if(dist<TILE_SIZE*0.75){
            if(moduleSlots[0]===-1){
                moduleSlots[0]=dm.weaponIdx;
                seenWeaponIds.add(WEAPONS[dm.weaponIdx].id);
                moduleSlotData[0]={tierIdx:dm.tierIdx,tierData:dm.tierData,mods:dm.mods||[]};
                droppedModules.splice(i,1);
                spawnDamageText(player.x,player.y-44,'MODULE SLOT 1!','#cccccc');
                if(activeModuleSlot===0) switchWeapon(moduleSlots[0]);
            } else if(moduleSlots[1]===-1){
                moduleSlots[1]=dm.weaponIdx;
                seenWeaponIds.add(WEAPONS[dm.weaponIdx].id);
                moduleSlotData[1]={tierIdx:dm.tierIdx,tierData:dm.tierData,mods:dm.mods||[]};
                droppedModules.splice(i,1);
                spawnDamageText(player.x,player.y-44,'MODULE SLOT 2!','#cccccc');
            }
        }
    }

    // ── Terminal proximity ────────────────────────────────────────────────────
    for(const rt of lobbyState.rackTerminals){
        rt.prompt = Math.hypot(player.x-rt.x, player.y-rt.y) < TILE_SIZE*2.2;
    }
    const tt=lobbyState.tierTerminal;
    tt.prompt = Math.hypot(player.x-tt.x, player.y-tt.y) < TILE_SIZE*2.2;
    const rrt=lobbyState.rerollTerminal;
    rrt.prompt = Math.hypot(player.x-rrt.x, player.y-rrt.y) < TILE_SIZE*2.2;
    const wbt=lobbyState.weaponBrowserTerminal;
    wbt.prompt = Math.hypot(player.x-wbt.x, player.y-wbt.y) < TILE_SIZE*2.2;

    // ── Lobby device proximity ────────────────────────────────────────────────
    lobbyState.indexTermPrompt = Math.hypot(player.x-lobbyState.indexTermX, player.y-lobbyState.indexTermY) < TILE_SIZE*2.2;
    lobbyState.mapTermPrompt   = Math.hypot(player.x-lobbyState.mapTermX,   player.y-lobbyState.mapTermY)   < TILE_SIZE*2.2;

    // NPC proximity
    const npcDist=Math.hypot(player.x-lobbyState.npcX, player.y-lobbyState.npcY);
    lobbyState.npcPrompt = npcDist < TILE_SIZE*2.2;

    // Dial lerp
    lobbyState.dialAngle += (lobbyState.dialTargetAngle-lobbyState.dialAngle)*0.1;
    lobbyState.dialSpin  *= 0.92;
    lobbyState.dialAngle += lobbyState.dialSpin;

    // Van proximity & launch
    const vanDist=Math.hypot(player.x-lobbyState.vanX, player.y-lobbyState.vanY);
    lobbyState.vanPrompt = vanDist < TILE_SIZE*2.4 && !lobbyState.vanLaunching;
    lobbyState.vanArmAngle = Math.sin(frameTime*0.04)*0.12;
    if(lobbyState.vanLaunching){
        lobbyState.vanLaunchTimer++;
        // After short animation, start the real run
        if(lobbyState.vanLaunchTimer>80){
            resetRunState();
            gameState='playing';
            applyDifficultyToRun();
            generateWorld(SECTOR_TREE);
        }
    }

    // NPC quote timer
    if(lobbyState.npcQuoteTimer>0) lobbyState.npcQuoteTimer--;

    // Upgrade terminal proximity
    const termDist=Math.hypot(player.x-lobbyState.termX, player.y-lobbyState.termY);
    lobbyState.termPrompt = termDist < TILE_SIZE*2.2 && !lobbyUpgradePanel;

    // Tips cycle
    if(--lobbyState.tipTimer<=0){
        lobbyState.tipTimer=300;
        lobbyState.tipIndex=(lobbyState.tipIndex+1)%LOBBY_TIPS.length;
    }

    // Ambient drones wander
    for(const dr of lobbyState.drones){
        dr.x+=dr.vx; dr.y+=dr.vy;
        dr.vx+=(Math.random()-.5)*0.08; dr.vy+=(Math.random()-.5)*0.08;
        dr.vx*=0.98; dr.vy*=0.98;
        dr.phase+=0.04;
    }
}

// ─── Draw lobby ───────────────────────────────────────────────────────────────
function drawLobby(){
    const now=Date.now(), t=now/1000;
    const th=currentSector.theme;
    ctx.fillStyle=th.bg; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.save(); ctx.translate(-camera.x,-camera.y);

    const sc=Math.floor(camera.x/TILE_SIZE)-1, ec=sc+Math.ceil(canvas.width/TILE_SIZE)+3;
    const sr=Math.floor(camera.y/TILE_SIZE)-1, er=sr+Math.ceil(canvas.height/TILE_SIZE)+3;
    for(let y=Math.max(0,sr);y<Math.min(MAP_H,er);y++)
        for(let x=Math.max(0,sc);x<Math.min(MAP_W,ec);x++){
            const tt=map[y][x];
            if(tt===T_FLOOR) drawFloor(x*TILE_SIZE,y*TILE_SIZE);
        }
    for(let y=Math.max(0,sr);y<Math.min(MAP_H,er);y++)
        for(let x=Math.max(0,sc);x<Math.min(MAP_W,ec);x++)
            if(map[y][x]===T_WALL) drawWall(x*TILE_SIZE,y*TILE_SIZE,x,y);

    particles.forEach(p=>p.draw());

    // ── Ambient props ───────────────────────────────────────────────────────
    drawLobbyProps(t);

    // ── Difficulty NPC ──────────────────────────────────────────────────────
    drawDifficultyNPC(t);

    // ── Upgrade Terminal ────────────────────────────────────────────────────
    drawUpgradeTerminal(t);

    // ── Van ─────────────────────────────────────────────────────────────────
    drawLobbyVan(t);

    // ── Ambient drones ──────────────────────────────────────────────────────
    for(const dr of lobbyState.drones){
        const dp=Math.sin(dr.phase)*0.4+0.6;
        ctx.save(); ctx.translate(dr.x,dr.y);
        ctx.shadowBlur=10+dp*6; ctx.shadowColor=dr.col;
        ctx.fillStyle=dr.col;
        ctx.beginPath(); ctx.arc(0,0,3+dp*1.5,0,Math.PI*2); ctx.fill();
        // Mini rotor blades
        ctx.strokeStyle=dr.col+'88'; ctx.lineWidth=1;
        for(let i=0;i<4;i++){
            const a=i/4*Math.PI*2+t*8;
            ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*7,Math.sin(a)*7); ctx.stroke();
        }
        ctx.shadowBlur=0; ctx.restore();
    }

    drawPlayer();

    // ── Lobby interactive devices (Index + Map terminals) ───────────────────
    drawLobbyDevices(t);

    // ── Shooting range props + enemies ───────────────────────────────────────
    drawRangeRoom(t);
    if(lobbyState.inRange){ drawEnemies(); projectiles.forEach(p=>p.draw()); drawWeaponEffects(); }

    // ── Dropped modules (weapon browser spawns) ──────────────────────────────
    for(const dm of droppedModules){
        const wp2=WEAPONS[dm.weaponIdx];
        const td=dm.tierData||TIER_DATA[0];
        const tierCol=td.color;
        const pulse=Math.sin(Date.now()/280)*.5+.5;
        const lf=Math.min(dm.life/60,1);
        ctx.save();
        ctx.globalAlpha=(0.45+pulse*0.3)*lf;
        ctx.shadowBlur=18+pulse*10; ctx.shadowColor=tierCol;
        ctx.strokeStyle=tierCol; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(dm.x,dm.y,13+pulse*3,0,Math.PI*2); ctx.stroke();
        ctx.globalAlpha=(0.35+pulse*0.2)*lf;
        ctx.shadowBlur=10; ctx.shadowColor=wp2.color;
        ctx.fillStyle=wp2.color+'44';
        ctx.beginPath(); ctx.arc(dm.x,dm.y,9,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle=wp2.color; ctx.lineWidth=1.5; ctx.globalAlpha=(0.6+pulse*0.3)*lf;
        ctx.beginPath(); ctx.arc(dm.x,dm.y,9,0,Math.PI*2); ctx.stroke();
        ctx.shadowBlur=0; ctx.globalAlpha=(0.9+pulse*0.1)*lf;
        ctx.fillStyle=tierCol; ctx.font='bold 7px Orbitron';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('T'+td.label,dm.x,dm.y);
        ctx.globalAlpha=(0.85+pulse*0.15)*lf;
        ctx.fillStyle=wp2.color; ctx.font='bold 6px Orbitron';
        ctx.fillText(wp2.name.length>9?wp2.name.slice(0,9):wp2.name, dm.x, dm.y+21);
        if(dm.pickupPrompt&&moduleSlots[0]!==-1&&moduleSlots[1]!==-1){
            ctx.globalAlpha=0.9; ctx.fillStyle='#ffffff'; ctx.font='bold 7px Orbitron';
            ctx.fillText('[E] SWAP',dm.x,dm.y-22);
        }
        ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
    }

    ctx.restore();

    // ── Lobby HUD overlay ───────────────────────────────────────────────────
    drawLobbyHUD();
}

// ─── Lobby ambient props (CRT TV, speakers, couch, crates) ───────────────────
function drawLobbyProps(t){
    const RW=14, RH=10;
    const RX=Math.floor(MAP_W/2 - RW/2);
    const RY=Math.floor(MAP_H/2 - RH/2);
    const cx=(RX+RW/2)*TILE_SIZE, cy=(RY+RH/2)*TILE_SIZE;
    // inner usable half-extents: ~±220px horiz, ±140px vert

    // ── Helper: draw a wooden table top-down ────────────────────────────────
    function drawTable(tx,ty,tw,th){
        ctx.fillStyle='#2a1a0a'; ctx.strokeStyle='#554422'; ctx.lineWidth=1.5;
        roundRect(tx-tw/2,ty-th/2,tw,th,3); ctx.fill(); ctx.stroke();
        ctx.strokeStyle='rgba(80,50,20,0.35)'; ctx.lineWidth=1;
        for(let g=1;g<3;g++){
            ctx.beginPath();
            ctx.moveTo(tx-tw/2+g*(tw/3),ty-th/2+2);
            ctx.lineTo(tx-tw/2+g*(tw/3),ty+th/2-2); ctx.stroke();
        }
        const legS=4,lp=3;
        ctx.fillStyle='#1a0e04';
        [[-tw/2+lp,-th/2+lp],[tw/2-lp-legS,-th/2+lp],
         [-tw/2+lp,th/2-lp-legS],[tw/2-lp-legS,th/2-lp-legS]]
        .forEach(([lx,ly])=>ctx.fillRect(tx+lx,ty+ly,legS,legS));
    }

    // ── TV TABLE — left wall, upper ──────────────────────────────────────────
    const tvTX=cx-170, tvTY=cy-100;
    drawTable(tvTX,tvTY,64,28);

    // CRT on table
    lobbyState.tvFrame=(lobbyState.tvFrame||0)+1;
    const tvGlitch=Math.random()<0.03;
    ctx.save(); ctx.translate(tvTX,tvTY-3);
    ctx.fillStyle='#1c130a'; ctx.strokeStyle='#665544'; ctx.lineWidth=2;
    roundRect(-15,-11,30,22,3); ctx.fill(); ctx.stroke();
    ctx.fillStyle=tvGlitch?'#441100':'#001833';
    roundRect(-11,-8,22,14,2); ctx.fill();
    if(!tvGlitch){
        for(let sl=0;sl<3;sl++){
            ctx.fillStyle=`rgba(0,${60+sl*40},160,${0.18+Math.random()*0.08})`;
            ctx.fillRect(-11,-8+sl*4,22,2);
        }
        ctx.fillStyle='rgba(0,150,255,0.8)';
        ctx.beginPath(); ctx.arc(0,-3,4,0,Math.PI*2); ctx.fill();
        ctx.fillRect(-2,0,4,5);
        ctx.fillStyle='rgba(255,255,80,0.9)';
        ctx.beginPath(); ctx.arc(-1.5,-4,1.2,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(1.5,-4,1.2,0,Math.PI*2); ctx.fill();
    } else {
        ctx.fillStyle='rgba(255,80,0,0.5)'; ctx.fillRect(-11,-8,22,14);
        ctx.fillStyle='#fff'; ctx.font='bold 4px Orbitron';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('NO SIGNAL',0,-1);
    }
    ctx.fillStyle='#887766';
    ctx.beginPath(); ctx.arc(13,-1,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(13,4,2,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#998877'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(-3,-11); ctx.lineTo(-6,-19); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(3,-11); ctx.lineTo(6,-19); ctx.stroke();
    ctx.restore();

    // ── SPEAKER TABLE — left wall, right of TV ───────────────────────────────
    const spTX=cx-100, spTY=cy-100;
    drawTable(spTX,spTY,24,24);
    ctx.save(); ctx.translate(spTX,spTY-1);
    const sPulse=0.4+Math.sin(t*7)*0.4;
    ctx.fillStyle='#1a1208'; ctx.strokeStyle='#554433'; ctx.lineWidth=1.5;
    roundRect(-7,-7,14,14,2); ctx.fill(); ctx.stroke();
    ctx.fillStyle=`rgba(255,${130+sPulse*80|0},0,${0.4+sPulse*0.45})`;
    ctx.shadowBlur=4*sPulse; ctx.shadowColor='#ff8800';
    ctx.beginPath(); ctx.arc(0,0,4+sPulse,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle='#665544'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.arc(0,0,5.5,0,Math.PI*2); ctx.stroke();
    ctx.restore();

    // ── ROBOT-BUILT SCRAP COUCH — left wall, lower (top-down view) ──────────
    // Frame = metal plating + bolts. Cushions = patched fabric with circuit stitching.
    // 3 seats wide. Armrests = cut engine cylinders. Props on top.
    const couchX=cx-170, couchY=cy+30;
    ctx.save(); ctx.translate(couchX,couchY);
    ctx.scale(1,-1); // flip: back plate faces down (away from TV), cushions face up (toward TV)

    // Ground shadow
    ctx.globalAlpha=0.3; ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(0,6,52,12,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;

    // ── METAL FRAME — scratched dark steel plate ──────────────────────────────
    // Back panel (top strip — thick plate)
    const backGrad=ctx.createLinearGradient(-46,-22,46,-22);
    backGrad.addColorStop(0,'#1c2028'); backGrad.addColorStop(0.5,'#2a3040'); backGrad.addColorStop(1,'#1c2028');
    ctx.fillStyle=backGrad; ctx.strokeStyle='#3a4455'; ctx.lineWidth=2;
    roundRect(-46,-22,92,18,3); ctx.fill(); ctx.stroke();
    // Scratch marks on back plate
    ctx.strokeStyle='rgba(80,100,130,0.4)'; ctx.lineWidth=0.8;
    [[-30,-20,-18,-6],[-10,-21,2,-8],[15,-19,25,-7],[32,-20,40,-9]].forEach(([x1,y1,x2,y2])=>{
        ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    });
    // Panel seam line across back
    ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-44,-14); ctx.lineTo(44,-14); ctx.stroke();
    // Bolts along back plate
    ctx.fillStyle='#3a4a5a'; ctx.strokeStyle='#5a7080'; ctx.lineWidth=0.8;
    [-38,-22,-6,10,26,40].forEach(bx=>{
        ctx.beginPath(); ctx.arc(bx,-13,2.8,0,Math.PI*2); ctx.fill(); ctx.stroke();
        // Bolt cross
        ctx.strokeStyle='rgba(80,110,140,0.6)'; ctx.lineWidth=0.5;
        ctx.beginPath(); ctx.moveTo(bx-1.5,-13); ctx.lineTo(bx+1.5,-13); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(bx,-14.5); ctx.lineTo(bx,-11.5); ctx.stroke();
        ctx.strokeStyle='#5a7080'; ctx.lineWidth=0.8;
    });

    // ── ENGINE CYLINDER ARMRESTS (left + right, top-down = oval shapes) ───────
    // Left armrest — cut cylinder end, top-down = oval with concentric rings
    ctx.fillStyle='#1a2030'; ctx.strokeStyle='#3a5060'; ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.ellipse(-40,4,9,14,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // Cylinder rings
    ctx.strokeStyle='rgba(50,80,100,0.6)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(-40,4,6,10,0,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(-40,4,3,5,0,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='#0a1020'; ctx.beginPath(); ctx.ellipse(-40,4,2,3,0,0,Math.PI*2); ctx.fill();
    // Bolt on cylinder rim
    ctx.fillStyle='#506070';
    ctx.beginPath(); ctx.arc(-40,-8,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-40,16,2,0,Math.PI*2); ctx.fill();

    // Right armrest
    ctx.fillStyle='#1a2030'; ctx.strokeStyle='#3a5060'; ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.ellipse(40,4,9,14,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.strokeStyle='rgba(50,80,100,0.6)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(40,4,6,10,0,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(40,4,3,5,0,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='#0a1020'; ctx.beginPath(); ctx.ellipse(40,4,2,3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#506070';
    ctx.beginPath(); ctx.arc(40,-8,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(40,16,2,0,Math.PI*2); ctx.fill();

    // Side frame plates (left + right, connecting armrest to back)
    ctx.fillStyle='#222835'; ctx.strokeStyle='#3a4455'; ctx.lineWidth=1.2;
    roundRect(-46,-4,10,22,2); ctx.fill(); ctx.stroke();
    roundRect(36,-4,10,22,2);  ctx.fill(); ctx.stroke();

    // ── THREE CUSHIONS ────────────────────────────────────────────────────────
    // Left cushion — faded orange/rust
    const lcGrad=ctx.createLinearGradient(-28,-4,-28,18);
    lcGrad.addColorStop(0,'#8b4a1a'); lcGrad.addColorStop(1,'#6a3210');
    ctx.fillStyle=lcGrad; ctx.strokeStyle='#3a200a'; ctx.lineWidth=1.2;
    roundRect(-28,-4,20,22,3); ctx.fill(); ctx.stroke();
    // Circuit stitch pattern on left cushion
    ctx.strokeStyle='rgba(180,120,60,0.5)'; ctx.lineWidth=0.7; ctx.setLineDash([2,3]);
    ctx.beginPath(); ctx.moveTo(-26,-1); ctx.lineTo(-10,-1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-26,6); ctx.lineTo(-10,6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-20,-1); ctx.lineTo(-20,6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-18,6); ctx.lineTo(-18,16); ctx.stroke();
    ctx.setLineDash([]);
    // Cushion button dimples
    ctx.fillStyle='rgba(40,15,5,0.7)';
    ctx.beginPath(); ctx.arc(-24,7,2.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(-12,7,2.2,0,Math.PI*2); ctx.fill();
    // Seam divider
    ctx.strokeStyle='rgba(100,55,20,0.6)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-18,-2); ctx.lineTo(-18,20); ctx.stroke();

    // Middle cushion — teal/dark cyan (slightly dented — someone always sits here)
    const mcGrad=ctx.createLinearGradient(-8,-4,-8,18);
    mcGrad.addColorStop(0,'#1a6060'); mcGrad.addColorStop(0.4,'#155050'); mcGrad.addColorStop(1,'#0e3838');
    ctx.fillStyle=mcGrad; ctx.strokeStyle='#0a2828'; ctx.lineWidth=1.2;
    roundRect(-8,-4,20,22,3); ctx.fill(); ctx.stroke();
    // Dent / depression — slight darkening oval in centre
    ctx.fillStyle='rgba(0,0,0,0.22)';
    ctx.beginPath(); ctx.ellipse(2,9,7,5,0,0,Math.PI*2); ctx.fill();
    // Circuit stitching
    ctx.strokeStyle='rgba(40,180,180,0.4)'; ctx.lineWidth=0.7; ctx.setLineDash([2,3]);
    ctx.beginPath(); ctx.moveTo(-6,-1); ctx.lineTo(10,-1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-6,15); ctx.lineTo(10,15); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-6,-1); ctx.lineTo(-6,15); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10,-1); ctx.lineTo(10,15); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(0,30,30,0.7)';
    ctx.beginPath(); ctx.arc(-4,7,2.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(10,7,2.2,0,Math.PI*2); ctx.fill();

    // Right cushion — dark gray with lighter stitching
    const rcGrad=ctx.createLinearGradient(12,-4,12,18);
    rcGrad.addColorStop(0,'#363a42'); rcGrad.addColorStop(1,'#242830');
    ctx.fillStyle=rcGrad; ctx.strokeStyle='#1a1e26'; ctx.lineWidth=1.2;
    roundRect(12,-4,20,22,3); ctx.fill(); ctx.stroke();
    // Small fabric patch (repair)
    ctx.fillStyle='rgba(80,90,110,0.6)';
    roundRect(16,2,10,8,2); ctx.fill();
    ctx.strokeStyle='rgba(120,140,170,0.4)'; ctx.lineWidth=0.8; ctx.setLineDash([1,2]);
    roundRect(16,2,10,8,2); ctx.stroke();
    ctx.setLineDash([]);
    // Circuit stitching
    ctx.strokeStyle='rgba(100,120,160,0.45)'; ctx.lineWidth=0.7; ctx.setLineDash([2,3]);
    ctx.beginPath(); ctx.moveTo(14,-1); ctx.lineTo(30,-1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(22,-1); ctx.lineTo(22,16); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(20,25,35,0.7)';
    ctx.beginPath(); ctx.arc(16,14,2.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(28,14,2.2,0,Math.PI*2); ctx.fill();

    // ── HOVER PAD LEGS (4 tiny glowing pads, seen from top) ──────────────────
    ctx.fillStyle='#0a1420'; ctx.strokeStyle='#2a4060'; ctx.lineWidth=1;
    [[-34,20],[-14,20],[14,20],[34,20]].forEach(([lx,ly])=>{
        ctx.beginPath(); ctx.ellipse(lx,ly,5,3,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle='rgba(0,120,200,0.25)';
        ctx.beginPath(); ctx.ellipse(lx,ly,3,1.5,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#0a1420';
    });

    // ── PROPS ON THE COUCH ────────────────────────────────────────────────────

    // Prop 1: Oil can (right cushion area) — top-down = small oval with label
    ctx.save(); ctx.translate(26,3);
    ctx.fillStyle='#8a6a20'; ctx.strokeStyle='#5a4010'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(0,0,5,3.5,0.2,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // Spout
    ctx.strokeStyle='#7a5a10'; ctx.lineWidth=1.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(4,0); ctx.lineTo(7,-2); ctx.stroke();
    // Label stripe
    ctx.fillStyle='rgba(200,160,50,0.5)';
    ctx.beginPath(); ctx.ellipse(0,0,3,2,0.2,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // Prop 2: Remote control (left cushion, slightly angled) — top-down = thin rect with buttons
    ctx.save(); ctx.translate(-22,12); ctx.rotate(-0.3);
    ctx.fillStyle='#1a1e28'; ctx.strokeStyle='#3a3e50'; ctx.lineWidth=1;
    roundRect(-5,-8,10,16,2); ctx.fill(); ctx.stroke();
    // Many tiny buttons
    const btnCols=['#cc2200','#00aacc','#ffaa00','#44cc44','#8844cc','#cc4488'];
    let bi=0;
    for(let br=0;br<3;br++) for(let bc=0;bc<2;bc++){
        ctx.fillStyle=btnCols[bi++%btnCols.length];
        ctx.beginPath(); ctx.arc(-2.5+bc*5, -5+br*5, 1.5, 0, Math.PI*2); ctx.fill();
    }
    // Screen area (top)
    ctx.fillStyle='rgba(0,60,80,0.8)'; ctx.fillRect(-4,-7,8,3);
    ctx.restore();

    ctx.restore(); // end couch translate


    // ── CRATES — upper-left corner cluster ───────────────────────────────────
    [{x:cx-210,y:cy-110,w:18,h:16,a:0.1},
     {x:cx-195,y:cy-90, w:14,h:14,a:-0.08},
     {x:cx-215,y:cy-87, w:13,h:16,a:0.15}
    ].forEach(c=>{
        ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.a);
        ctx.fillStyle='#261500'; ctx.strokeStyle='#664400'; ctx.lineWidth=1.5;
        ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);
        ctx.strokeRect(-c.w/2,-c.h/2,c.w,c.h);
        ctx.fillStyle='rgba(255,140,0,0.2)'; ctx.fillRect(-c.w/2,-c.h/2,c.w,4);
        ctx.strokeStyle='#553300'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(-c.w/2+2,0); ctx.lineTo(c.w/2-2,0); ctx.stroke();
        ctx.fillStyle='#886633';
        [[-c.w/2+3,-c.h/2+3],[c.w/2-3,-c.h/2+3]].forEach(([bx,by])=>{
            ctx.beginPath(); ctx.arc(bx,by,1.5,0,Math.PI*2); ctx.fill();
        });
        ctx.restore();
    });

    // ── FLOATING TIP — above couch area ──────────────────────────────────────
    const tipFade=Math.min(1,lobbyState.tipTimer/40)*Math.min(1,(300-lobbyState.tipTimer)/20||1);
    const tipBob=Math.sin(t*1.5)*2;
    let usedTip = LOBBY_TIPS[lobbyState.tipIndex]
    const tw=ctx.measureText(usedTip).width + 30;
    const pw=(tw / 2)-90
    ctx.save(); ctx.translate(cx-140, cy-155+tipBob); ctx.globalAlpha=0.75*tipFade;
    ctx.fillStyle='rgba(0,14,30,0.85)';
    ctx.strokeStyle='rgba(0,150,220,0.6)'; ctx.lineWidth=1;
    roundRect(-(pw/2),-12,pw,24,4); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#88ccff'; ctx.font='bold 6px Orbitron';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(usedTip,0,0);
    ctx.strokeStyle='rgba(0,180,255,0.07)'; ctx.lineWidth=1;
    [-7,0,7].forEach(hy=>{
        ctx.beginPath(); ctx.moveTo(-90,hy); ctx.lineTo(90,hy); ctx.stroke();
    });
    ctx.globalAlpha=1; ctx.restore();

    // ── AMBIENT SPARKS ───────────────────────────────────────────────────────
    if(Math.random()<0.04){
        const sx=cx+(-200+Math.random()*400), sy=cy+(-140+Math.random()*280);
        const tileX=Math.floor(sx/TILE_SIZE), tileY=Math.floor(sy/TILE_SIZE);
        if(map[tileY]?.[tileX]===T_FLOOR)
            for(let i=0;i<2;i++) particles.push(
                new Particle(sx,sy,(Math.random()-.5)*1.5,(Math.random()-.5)*1.5,8,2,'spark'));
    }
}

function drawDifficultyNPC(t){
    const x=lobbyState.npcX, y=lobbyState.npcY;
    ctx.save(); ctx.translate(x,y);
    const pulse=Math.sin(t*2)*0.3+0.7;
    const selCol=DIFFICULTY_COLORS[selectedDifficulty];

    // Base platform
    ctx.fillStyle='#0a1220'; ctx.strokeStyle='#0088aa'; ctx.lineWidth=1.5;
    ctx.shadowBlur=8; ctx.shadowColor='#0066aa';
    roundRect(-22,10,44,14,3); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;

    // Squat blocky body
    ctx.fillStyle='#0e1825'; ctx.strokeStyle='#0099cc'; ctx.lineWidth=2;
    ctx.shadowBlur=10+pulse*4; ctx.shadowColor='#0077aa';
    roundRect(-18,-8,36,20,4); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;

    // Chest dial mechanism
    ctx.fillStyle='#060e16'; ctx.strokeStyle='#aaaaaa'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(0,4,10,0,Math.PI*2); ctx.fill(); ctx.stroke();
    // Dial ring colored by selection
    ctx.strokeStyle=selCol; ctx.lineWidth=2.5;
    ctx.shadowBlur=12; ctx.shadowColor=selCol;
    ctx.beginPath(); ctx.arc(0,4,10,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;
    // Dial pointer
    ctx.strokeStyle=selCol; ctx.lineWidth=2;
    ctx.shadowBlur=8; ctx.shadowColor=selCol;
    const da=lobbyState.dialAngle-Math.PI/2;
    ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(Math.cos(da)*8,4+Math.sin(da)*8); ctx.stroke();
    ctx.shadowBlur=0;
    // Dial tick marks
    for(let d=0;d<3;d++){
        const ta=d/3*Math.PI*2-Math.PI/2;
        const dc=DIFFICULTY_COLORS[d];
        ctx.fillStyle=selectedDifficulty===d?dc:dc+'44';
        ctx.shadowBlur=selectedDifficulty===d?8:0; ctx.shadowColor=dc;
        ctx.beginPath(); ctx.arc(Math.cos(ta)*8,4+Math.sin(ta)*8,2.5,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
    }

    // Glass dome head
    ctx.fillStyle='rgba(10,30,50,0.85)'; ctx.strokeStyle='#44aadd'; ctx.lineWidth=1.5;
    ctx.shadowBlur=14+pulse*6; ctx.shadowColor=selCol;
    ctx.beginPath(); ctx.arc(0,-18,14,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0;
    // Dome inner colour tint from selection
    const dg=ctx.createRadialGradient(0,-18,2,0,-18,13);
    dg.addColorStop(0,selCol+'44'); dg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=dg; ctx.beginPath(); ctx.arc(0,-18,13,0,Math.PI*2); ctx.fill();
    // Rotating colour indicator inside dome
    const rotA=t*1.5;
    for(let i=0;i<3;i++){
        const ra=rotA+i/3*Math.PI*2;
        ctx.fillStyle=DIFFICULTY_COLORS[i]+(selectedDifficulty===i?'ff':'55');
        ctx.beginPath(); ctx.arc(Math.cos(ra)*5,-18+Math.sin(ra)*5,2.5,0,Math.PI*2); ctx.fill();
    }
    // Eyes (two little dots peering out of dome)
    ctx.fillStyle='#aaddff'; ctx.shadowBlur=6; ctx.shadowColor='#aaddff';
    ctx.beginPath(); ctx.arc(-4,-19,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4,-19,2,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    // Small crane arms pointing at floating panels
    for(let arm=0;arm<2;arm++){
        const ax=arm===0?-18:18, flip=arm===0?-1:1;
        ctx.strokeStyle='#0099cc'; ctx.lineWidth=2; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(ax,0); ctx.lineTo(ax+flip*16,-10); ctx.stroke();
        // Floating difficulty panel
        const panelCol=DIFFICULTY_COLORS[arm===0?0:2];
        const pLabel=DIFFICULTY_LABELS[arm===0?0:2];
        ctx.fillStyle='rgba(0,10,20,0.85)';
        ctx.strokeStyle=panelCol+(selectedDifficulty===(arm===0?0:2)?'cc':'44');
        ctx.lineWidth=1.2;
        ctx.shadowBlur=selectedDifficulty===(arm===0?0:2)?8:0; ctx.shadowColor=panelCol;
        roundRect(ax+flip*10-18,-22,36,14,3); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
        ctx.fillStyle=panelCol; ctx.font='bold 5px Orbitron';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(pLabel, ax+flip*10, -15);
    }
    // Centre panel (Programming)
    ctx.fillStyle='rgba(0,10,20,0.85)';
    ctx.strokeStyle=DIFFICULTY_COLORS[1]+(selectedDifficulty===1?'cc':'44');
    ctx.lineWidth=1.2;
    ctx.shadowBlur=selectedDifficulty===1?8:0; ctx.shadowColor=DIFFICULTY_COLORS[1];
    roundRect(-26,-40,50,14,3); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
    ctx.fillStyle=DIFFICULTY_COLORS[1]; ctx.font='bold 5px Orbitron';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(DIFFICULTY_LABELS[1],0,-33);

    // Prompt & quote
    if(lobbyState.npcPrompt){
        ctx.fillStyle='#ffffff'; ctx.font='bold 7px Orbitron'; ctx.textAlign='center';
        ctx.shadowBlur=6; ctx.shadowColor='#0099cc';
        ctx.fillText('[A/D] DIFFICULTY   [E] MODIFIERS', 0, -52);
        ctx.shadowBlur=0;
    }
    if(lobbyState.npcQuoteTimer>0){
        const qf=Math.min(1,lobbyState.npcQuoteTimer/20);
        ctx.globalAlpha=qf;
        ctx.fillStyle=selCol; ctx.font='bold 7px Orbitron';
        ctx.textAlign='center';
        ctx.shadowBlur=8; ctx.shadowColor=selCol;
        ctx.fillText(lobbyState.npcQuote,0,-72);
        ctx.shadowBlur=0; ctx.globalAlpha=1;
    }
    ctx.restore();
}

// ─── Lobby Van ────────────────────────────────────────────────────────────────
function drawLobbyVan(t){
    const x=lobbyState.vanX, y=lobbyState.vanY;
    const launching=lobbyState.vanLaunching;
    const lp=launching?(lobbyState.vanLaunchTimer/80):0;
    ctx.save(); ctx.translate(x,y);

    // Vibration when idle / shake on launch
    const vib=launching ? (Math.random()-.5)*(lp*8) : Math.sin(t*12)*0.6;
    ctx.translate(vib, 0);

    // Ground shadow
    ctx.globalAlpha=0.3-lp*0.25;
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(0,28,50,12,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;

    // Hover jets / wheels — 4 points
    const jetCols=['#00ccff','#0099ff','#00ccff','#0099ff'];
    for(let j=0;j<4;j++){
        const jx=-30+j*20, jy=22;
        const jp=0.5+Math.sin(t*6+j)*0.5;
        ctx.fillStyle='rgba(0,180,255,0.2)';
        ctx.beginPath(); ctx.ellipse(jx,jy+4,5,3,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=jetCols[j]; ctx.shadowBlur=6+jp*6; ctx.shadowColor='#0099ff';
        ctx.beginPath(); ctx.arc(jx,jy,3+jp,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
    }

    // Van body (top-down: boxy rectangle, wider than tall)
    const vanCol=launching?`hsl(${(t*200)%360},100%,65%)`:'#1a1430';
    ctx.fillStyle=vanCol; ctx.strokeStyle='#6644cc'; ctx.lineWidth=2;
    ctx.shadowBlur=12+lp*20; ctx.shadowColor='#4422aa';
    roundRect(-42,-18,84,36,6); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;

    // Sticker decals
    ctx.fillStyle='rgba(255,200,0,0.5)'; ctx.font='bold 5px Orbitron';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('★', -28, -6);
    ctx.fillStyle='rgba(255,100,100,0.5)'; ctx.fillText('✦', 20, 8);

    // Glowing cable lines
    ctx.strokeStyle=`rgba(100,80,255,${0.5+Math.sin(t*4)*0.3})`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-40,-10); ctx.lineTo(40,-10); ctx.stroke();
    ctx.strokeStyle=`rgba(0,200,255,${0.3+Math.sin(t*3+1)*0.2})`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-38,8); ctx.lineTo(38,8); ctx.stroke();

    // Front cab window
    ctx.fillStyle='rgba(0,220,255,0.15)'; ctx.strokeStyle='#44aadd'; ctx.lineWidth=1.5;
    roundRect(20,-12,18,24,3); ctx.fill(); ctx.stroke();

    // Waving arms (fold out when prompting, wave on launch)
    const armAngle=launching?Math.sin(t*15)*0.8:lobbyState.vanArmAngle;
    for(let arm=0;arm<2;arm++){
        const ay=-18+(arm*36), flip=arm===0?-1:1;
        ctx.save(); ctx.translate(-42,ay); ctx.rotate(armAngle*flip);
        ctx.strokeStyle=launching?'#ffcc00':'#8866cc'; ctx.lineWidth=3; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-14*flip,0); ctx.stroke();
        // Hand
        ctx.fillStyle=launching?'#ffcc00':'#aaaadd';
        ctx.shadowBlur=launching?12:4; ctx.shadowColor=ctx.fillStyle;
        ctx.beginPath(); ctx.arc(-14*flip,0,4,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
        ctx.restore();
    }

    // Launch sparks / neon flash
    if(launching && Math.random()<0.6){
        for(let s=0;s<3;s++) particles.push(
            new Particle(x+(Math.random()-.5)*80,y+(Math.random()-.5)*30,
                (Math.random()-.5)*6,(Math.random()-.5)*6,16,4,'surge'));
    }

    // Prompt
    if(lobbyState.vanPrompt && !launching){
        const pc=Math.sin(t*4)*0.3+0.7;
        ctx.globalAlpha=pc;
        ctx.fillStyle='#ffffff'; ctx.font='bold 8px Orbitron'; ctx.textAlign='center';
        ctx.shadowBlur=10; ctx.shadowColor='#6644cc';
        ctx.fillText('[E] START RUN', 0, -34);
        ctx.shadowBlur=0; ctx.globalAlpha=1;
    }
    if(launching){
        ctx.fillStyle=`rgba(255,200,50,${lp*0.9})`; ctx.font='bold 10px Orbitron';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.shadowBlur=20; ctx.shadowColor='#ffcc00';
        ctx.fillText('DEPLOYING!', 0, -42+lp*-10);
        ctx.shadowBlur=0;
    }
    ctx.restore();
}

// ─── Upgrade Terminal (world prop) ───────────────────────────────────────────
function drawUpgradeTerminal(t){
    const x=lobbyState.termX, y=lobbyState.termY;
    const pulse=Math.sin(t*2.2)*0.5+0.5;
    const glowCol='#ffdd00';

    ctx.save(); ctx.translate(x,y);
    // Ground shadow
    ctx.globalAlpha=0.35; ctx.fillStyle='#000';
    ctx.beginPath(); ctx.ellipse(0,22,72,14,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;

    // ── DESK BASE (south / bottom of sprite — player stands south to face screen) ──
    ctx.fillStyle='#1a1200'; ctx.strokeStyle='#554400'; ctx.lineWidth=1.5;
    roundRect(-64,6,128,20,4); ctx.fill(); ctx.stroke();
    // Top lip highlight
    ctx.fillStyle='rgba(255,200,0,0.1)';
    roundRect(-64,6,128,5,{topLeft:4,topRight:4}); ctx.fill();
    // Bolt details
    ctx.fillStyle='#443300';
    [[-50,15],[0,15],[50,15]].forEach(([bx,by])=>{
        ctx.beginPath(); ctx.arc(bx,by,2.5,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='rgba(100,80,0,0.5)'; ctx.lineWidth=0.8;
        ctx.beginPath(); ctx.moveTo(bx-1.5,by); ctx.lineTo(bx+1.5,by); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(bx,by-1.5); ctx.lineTo(bx,by+1.5); ctx.stroke();
        ctx.strokeStyle='#554400'; ctx.lineWidth=1.5;
    });
    // Cable bundle from desk bottom
    ctx.strokeStyle='#2a1a00'; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-6,26); ctx.bezierCurveTo(-6,34,-2,36,2,38); ctx.stroke();
    ctx.lineWidth=2.5; ctx.strokeStyle='#1a1000';
    ctx.beginPath(); ctx.moveTo(6,26); ctx.bezierCurveTo(6,34,2,36,0,38); ctx.stroke();

    // ── MONITOR STAND / NECK ──────────────────────────────────────────────────
    ctx.fillStyle='#141000'; ctx.strokeStyle='#443300'; ctx.lineWidth=1.2;
    roundRect(-11,0,22,8,3); ctx.fill(); ctx.stroke();
    // Tilt joint ellipse
    ctx.fillStyle='#221800'; ctx.strokeStyle='#554400'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(0,0,9,4,0,0,Math.PI*2); ctx.fill(); ctx.stroke();

    // ── MONITOR OUTER CASING ──────────────────────────────────────────────────
    // Main body (facing north — screen face is TOP of this sprite)
    ctx.fillStyle='#0c0a00'; ctx.strokeStyle='#665500'; ctx.lineWidth=2;
    ctx.shadowBlur=1+pulse*3; ctx.shadowColor=glowCol;
    roundRect(-64,-52,128,54,6); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;

    // Back-edge strip (northernmost edge — top of monitor body)
    ctx.fillStyle='#221a00'; ctx.strokeStyle='#776600'; ctx.lineWidth=1;
    roundRect(-64,-52,128,8,{topLeft:6,topRight:6}); ctx.fill(); ctx.stroke();
    // LED strip on back edge — glows outward toward north
    ctx.fillStyle=`rgba(255,${210+pulse*45|0},0,${0.65+pulse*0.35})`;
    ctx.shadowBlur=10+pulse*10; ctx.shadowColor=glowCol;
    ctx.fillRect(-56,-50,112,3); ctx.shadowBlur=0;

    // Left / right side bezels
    ctx.fillStyle='#181400';
    ctx.fillRect(-64,-44,7,40);
    ctx.fillRect(57,-44,7,40);
    // Bottom chin bezel
    roundRect(-64,-2,128,4,{bottomLeft:6,bottomRight:6}); ctx.fill();

    // ── SCREEN SURFACE ────────────────────────────────────────────────────────
    const SW=106, SH=36, SX=-SW/2, SY=-46;
    // Screen dark fill
    ctx.fillStyle='#060500'; roundRect(SX,SY,SW,SH,2); ctx.fill();
    // Screen gradient glow
    const sg=ctx.createLinearGradient(SX,SY,SX,SY+SH);
    sg.addColorStop(0,`rgba(255,210,0,${0.16+pulse*0.07})`);
    sg.addColorStop(0.5,`rgba(255,180,0,0.07)`);
    sg.addColorStop(1,`rgba(255,150,0,0.03)`);
    ctx.fillStyle=sg; roundRect(SX,SY,SW,SH,2); ctx.fill();

    // Simulated branch preview columns on screen
    const branchCols=['#00ccff','#ff4466','#44ff88','#ffdd00'];
    branchCols.forEach((col,i)=>{
        const bx=SX+7+i*25;
        const bh=6+Math.sin(t*1.8+i*0.9)*3;
        ctx.fillStyle=col+'44'; ctx.fillRect(bx,SY+SH-5-bh,18,bh);
        ctx.fillStyle=col+'99'; ctx.fillRect(bx,SY+SH-6-bh,18,2);
        // tiny node dots
        for(let r=0;r<3;r++){
            ctx.fillStyle=col+(r===0?'cc':'55');
            ctx.beginPath(); ctx.arc(bx+9,SY+6+r*8,2,0,Math.PI*2); ctx.fill();
        }
    });
    // Header line on screen
    ctx.fillStyle=`rgba(255,${200+pulse*55|0},0,${0.85+pulse*0.15})`;
    ctx.font='bold 6px Orbitron'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowBlur=5+pulse*3; ctx.shadowColor=glowCol;
    ctx.fillText('UPGRADES', 0, SY+9); ctx.shadowBlur=0;
    // Blueprint count line
    ctx.fillStyle=`rgba(255,220,50,${0.7+pulse*0.2})`;
    ctx.font='bold 5px Orbitron';
    ctx.fillText('◈ '+playerBlueprints+' BP', 0, SY+20);
    // Scanlines
    ctx.fillStyle='rgba(0,0,0,0.06)';
    for(let sl=0;sl<SH;sl+=3) ctx.fillRect(SX,SY+sl,SW,1.5);
    // Glare
    ctx.fillStyle='rgba(255,255,200,0.06)';
    ctx.beginPath(); ctx.ellipse(SX+20,SY+9,18,7,-0.2,0,Math.PI*2); ctx.fill();
    // Screen border glow
    ctx.strokeStyle=`rgba(255,200,0,${0.45+pulse*0.3})`; ctx.lineWidth=1;
    roundRect(SX,SY,SW,SH,2); ctx.stroke();

    // ── CORNER DETAILS ────────────────────────────────────────────────────────
    // Power LED (bottom right of casing)
    const ledOn=Math.floor(t*1.5)%3<2;
    ctx.fillStyle=ledOn?`rgba(255,${180+pulse*75|0},0,0.9)`:'rgba(80,60,0,0.4)';
    ctx.shadowBlur=ledOn?8+pulse*6:0; ctx.shadowColor=glowCol;
    ctx.beginPath(); ctx.arc(52,-10,2.5,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    // Small vents on left side
    ctx.strokeStyle='rgba(80,60,0,0.4)'; ctx.lineWidth=1;
    for(let v=0;v<3;v++){
        ctx.beginPath(); ctx.moveTo(-61,-38+v*10); ctx.lineTo(-57,-38+v*10); ctx.stroke();
    }

    // ── FLOATING LABEL + PROMPT ───────────────────────────────────────────────
    const bob=Math.sin(t*1.6)*2;
    ctx.globalAlpha=0.9;
    ctx.fillStyle=glowCol; ctx.font='bold 6px Orbitron'; ctx.textAlign='center';
    ctx.shadowBlur=8; ctx.shadowColor=glowCol;
    ctx.fillText('UPGRADE TERMINAL',0,-66+bob); ctx.shadowBlur=0;
    if(lobbyState.termPrompt){
        ctx.fillStyle='#ffffff'; ctx.font='bold 7px Orbitron';
        ctx.shadowBlur=8; ctx.shadowColor=glowCol;
        ctx.fillText('[U] OPEN',0,-78+bob); ctx.shadowBlur=0;
    }
    ctx.globalAlpha=1;
    ctx.restore();
}

// ─── Upgrade Panel (full-screen skill tree UI) ────────────────────────────────
function drawUpgradePanel(){
    const W=canvas.width, H=canvas.height;
    const cx=W/2, cy=H/2;
    const HEADER_H=52, FOOTER_H=60;
    const PAD=0;

    // ── Full-screen dark backdrop ──────────────────────────────────────────────
    ctx.fillStyle='rgba(0,3,8,0.97)';
    ctx.fillRect(0,0,W,H);
    // Subtle scanline texture
    ctx.fillStyle='rgba(0,10,20,0.04)';
    for(let sy=0;sy<H;sy+=3) ctx.fillRect(0,sy,W,1.5);

    // ── Header ────────────────────────────────────────────────────────────────
    const hg=ctx.createLinearGradient(0,0,0,HEADER_H);
    hg.addColorStop(0,'rgba(20,14,0,0.98)'); hg.addColorStop(1,'rgba(0,3,8,0)');
    ctx.fillStyle=hg; ctx.fillRect(0,0,W,HEADER_H);
    ctx.strokeStyle='rgba(255,200,0,0.25)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,HEADER_H); ctx.lineTo(W,HEADER_H); ctx.stroke();

    ctx.fillStyle='#ffdd00'; ctx.font='bold 18px Orbitron';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowBlur=18; ctx.shadowColor='#ffaa00';
    ctx.fillText('UPGRADE TERMINAL', cx, 26); ctx.shadowBlur=0;

    // Blueprint counter top-right
    ctx.fillStyle='rgba(255,220,50,0.9)'; ctx.font='bold 12px Orbitron';
    ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText('◈ '+playerBlueprints+' BLUEPRINTS', W-28, 26);

    // Controls hint top-left
    ctx.fillStyle='rgba(160,140,60,0.5)'; ctx.font='bold 7px Orbitron';
    ctx.textAlign='left';
    ctx.fillText('[U / ESC] CLOSE   SCROLL = ZOOM   DRAG = PAN   [E] BUY   CLICK NODE TO SELECT', 28, 26);

    // ── Branch column headers ──────────────────────────────────────────────────
    const contentTop=HEADER_H, contentBot=H-FOOTER_H;
    const contentH=contentBot-contentTop;

    // Branch divider lines + labels rendered in world space below
    // (done inside the clipped canvas transform)

    // ── CLIPPED TREE AREA ─────────────────────────────────────────────────────
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, contentTop, W, contentH);
    ctx.clip();

    // World-to-screen transform: pan + zoom centred on canvas
    ctx.translate(cx + treeView.panX, contentTop + contentH/2 + treeView.panY);
    ctx.scale(treeView.zoom, treeView.zoom);

    const NW=TREE_NODE_W, NH=TREE_NODE_H;

    // ── Branch column backgrounds ──────────────────────────────────────────────
    UPGRADE_BRANCHES.forEach((br,bi)=>{
        const col=BRANCH_COLORS[br]||'#aaa';
        const bCx=(bi-1.5)*TREE_BRANCH_SPACING;
        // subtle column lane
        ctx.fillStyle=col+'07';
        ctx.fillRect(bCx-TREE_BRANCH_SPACING/2+10, -800, TREE_BRANCH_SPACING-20, 1600);
        // vertical divider
        if(bi>0){
            ctx.strokeStyle=col+'18'; ctx.lineWidth=1;
            ctx.setLineDash([4,6]);
            ctx.beginPath();
            ctx.moveTo(bCx-TREE_BRANCH_SPACING/2+10, -800);
            ctx.lineTo(bCx-TREE_BRANCH_SPACING/2+10, 1600);
            ctx.stroke(); ctx.setLineDash([]);
        }
        // Branch header label (just above row 0)
        ctx.fillStyle=col; ctx.font='bold 11px Orbitron';
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.shadowBlur=10; ctx.shadowColor=col;
        ctx.fillText(br, bCx, -NH/2-18); ctx.shadowBlur=0;
        // Underline bar
        ctx.strokeStyle=col+'66'; ctx.lineWidth=2; ctx.setLineDash([]);
        ctx.beginPath(); ctx.moveTo(bCx-80,(-NH/2-14)); ctx.lineTo(bCx+80,(-NH/2-14)); ctx.stroke();
    });

    // ── Connector lines (drawn first, under nodes) ────────────────────────────
    META_UPGRADE_DEFS.forEach(node=>{
        const bi=UPGRADE_BRANCHES.indexOf(node.branch);
        if(bi<0) return;
        const np=treeNodePos(node,bi);
        node.prereqs.forEach(pid=>{
            // find parent anywhere in defs
            const parent=META_UPGRADE_DEFS.find(d=>d.id===pid);
            if(!parent) return;
            const pbi=UPGRADE_BRANCHES.indexOf(parent.branch);
            if(pbi<0) return;
            const pp=treeNodePos(parent,pbi);
            const unlocked=hasMeta(pid);
            const col=BRANCH_COLORS[node.branch]||'#aaa';
            ctx.strokeStyle=unlocked ? col+'77' : 'rgba(50,55,65,0.6)';
            ctx.lineWidth=unlocked?2:1.5;
            ctx.setLineDash(unlocked?[]:[5,5]);
            ctx.beginPath();
            ctx.moveTo(pp.x, pp.y+NH/2);
            ctx.bezierCurveTo(pp.x, pp.y+NH/2+26, np.x, np.y-NH/2-26, np.x, np.y-NH/2);
            ctx.stroke();
            ctx.setLineDash([]);
        });
    });

    // ── Nodes ─────────────────────────────────────────────────────────────────
    META_UPGRADE_DEFS.forEach(node=>{
        const bi=UPGRADE_BRANCHES.indexOf(node.branch);
        if(bi<0) return;
        const np=treeNodePos(node,bi);
        const owned=hasMeta(node.id);
        const canBuy=canBuyMeta(node.id);
        const prereqOk=prereqsMet(node.id);
        const isSel=(treeView.selectedId===node.id);
        const isHov=(treeView.hoveredId===node.id);
        const col=BRANCH_COLORS[node.branch]||'#aaa';

        // Box fill + stroke
        const alpha=owned?1:prereqOk?0.9:0.4;
        ctx.globalAlpha=alpha;
        ctx.fillStyle=owned?col+'22':isHov?'rgba(20,22,30,0.98)':'rgba(6,8,14,0.92)';
        ctx.strokeStyle=owned?col:(isSel||isHov)?col+'dd':prereqOk?col+'44':'rgba(40,45,55,0.7)';
        ctx.lineWidth=owned?2.5:(isSel||isHov)?2:1;
        ctx.shadowBlur=(isSel||isHov)?16:(owned?8:0); ctx.shadowColor=col;
        roundRect(np.x-NW/2, np.y-NH/2, NW, NH, 7);
        ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;

        // Owned left accent bar
        if(owned){
            ctx.fillStyle=col;
            ctx.beginPath();
            ctx.roundRect(np.x-NW/2, np.y-NH/2, 4, NH, {topLeft:7,bottomLeft:7});
            ctx.fill();
        }
        // Owned shimmer overlay
        if(owned){
            const sg2=ctx.createLinearGradient(np.x-NW/2,np.y-NH/2,np.x+NW/2,np.y+NH/2);
            sg2.addColorStop(0,col+'12'); sg2.addColorStop(0.5,col+'06'); sg2.addColorStop(1,'rgba(0,0,0,0)');
            ctx.fillStyle=sg2;
            roundRect(np.x-NW/2, np.y-NH/2, NW, NH, 7); ctx.fill();
        }
        ctx.globalAlpha=1;

        // ── Node text ─────────────────────────────────────────────────────────
        const textCol=owned?col:(prereqOk?'rgba(210,220,230,0.95)':'rgba(90,95,110,0.65)');

        // Name (bold, larger)
        ctx.fillStyle=textCol; ctx.font='bold 8px Orbitron';
        ctx.textAlign='left'; ctx.textBaseline='top';
        // Clip long names
        const maxNameW=NW-50;
        ctx.save();
        ctx.beginPath(); ctx.rect(np.x-NW/2+10, np.y-NH/2+8, maxNameW, 14); ctx.clip();
        ctx.fillText(node.name, np.x-NW/2+10, np.y-NH/2+8);
        ctx.restore();

        // Desc text (2 lines)
        const descCol=owned?'rgba(255,255,255,0.55)':(prereqOk?'rgba(160,170,185,0.6)':'rgba(70,75,85,0.5)');
        ctx.fillStyle=descCol; ctx.font='5.5px Orbitron';
        ctx.textBaseline='top';
        const desc=node.desc;
        const split=Math.min(32, desc.lastIndexOf(' ',32));
        ctx.save();
        ctx.beginPath(); ctx.rect(np.x-NW/2+10, np.y-4, NW-20, 22); ctx.clip();
        ctx.fillText(desc.slice(0,split), np.x-NW/2+10, np.y-4);
        ctx.fillText(desc.slice(split+1), np.x-NW/2+10, np.y+5);
        ctx.restore();

        // Cost / status badge (top-right of node)
        ctx.textAlign='right'; ctx.textBaseline='top';
        if(owned){
            ctx.fillStyle=col; ctx.font='bold 7px Orbitron';
            ctx.fillText('\u2713 OWNED', np.x+NW/2-7, np.y-NH/2+8);
        } else {
            const cc=canBuy?'#ffdd00':prereqOk?'#ff4455':'rgba(80,80,90,0.5)';
            ctx.fillStyle=cc; ctx.font='bold 8px Orbitron';
            ctx.fillText('◈ '+node.cost, np.x+NW/2-7, np.y-NH/2+8);
            if(!prereqOk){
                ctx.fillStyle='rgba(100,90,70,0.6)'; ctx.font='5px Orbitron';
                ctx.fillText('LOCKED', np.x+NW/2-7, np.y-NH/2+20);
            } else if(!canBuy){
                ctx.fillStyle='rgba(200,70,70,0.7)'; ctx.font='5px Orbitron';
                ctx.fillText('NEED MORE', np.x+NW/2-7, np.y-NH/2+20);
            }
        }
    });

    ctx.restore(); // end clip+transform

    // ── Footer info strip ─────────────────────────────────────────────────────
    const fg2=ctx.createLinearGradient(0,contentBot,0,H);
    fg2.addColorStop(0,'rgba(0,3,8,0)'); fg2.addColorStop(0.3,'rgba(10,8,0,0.97)');
    ctx.fillStyle=fg2; ctx.fillRect(0,contentBot,W,FOOTER_H);
    ctx.strokeStyle='rgba(255,200,0,0.2)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,contentBot); ctx.lineTo(W,contentBot); ctx.stroke();

    const selNode=META_UPGRADE_DEFS.find(d=>d.id===treeView.selectedId);
    if(selNode){
        const col=BRANCH_COLORS[selNode.branch]||'#aaa';
        ctx.fillStyle=col; ctx.font='bold 11px Orbitron';
        ctx.textAlign='left'; ctx.textBaseline='middle';
        ctx.shadowBlur=8; ctx.shadowColor=col;
        ctx.fillText(selNode.name, 36, contentBot+20); ctx.shadowBlur=0;
        ctx.fillStyle='rgba(180,190,200,0.7)'; ctx.font='7px Orbitron';
        ctx.fillText(selNode.desc, 36, contentBot+36);

        const status=hasMeta(selNode.id)?'✓ OWNED':
            canBuyMeta(selNode.id)?'[E / CLICK] BUY   ◈ '+selNode.cost:
            prereqsMet(selNode.id)?'NEED ◈ '+selNode.cost+'  (HAVE '+playerBlueprints+')':
            'LOCKED — COMPLETE PREREQUISITES FIRST';
        const scol=hasMeta(selNode.id)?col:canBuyMeta(selNode.id)?'#ffdd00':prereqsMet(selNode.id)?'#ff4455':'rgba(120,110,90,0.7)';
        ctx.fillStyle=scol; ctx.font='bold 10px Orbitron';
        ctx.textAlign='right'; ctx.textBaseline='middle';
        ctx.fillText(status, W-36, contentBot+28);
    } else {
        ctx.fillStyle='rgba(140,130,80,0.45)'; ctx.font='bold 8px Orbitron';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('CLICK OR HOVER A NODE TO SEE DETAILS', cx, contentBot+30);
    }
}

function drawWeaponBrowserMenu(){
    const W=canvas.width, H=canvas.height, cx=W/2, cy=H/2;
    const allWeps=WEAPONS.map((w,idx)=>({w,idx})).filter(({w})=>w.class!=='BLANK');
    const sel=lobbyState.weaponBrowserScroll;
    const col='#44ffcc';

    // Backdrop
    ctx.fillStyle='rgba(0,4,14,0.93)'; ctx.fillRect(0,0,W,H);

    // Panel
    const PW=480, PH=Math.min(H-80, allWeps.length*30+130);
    const px=cx-PW/2, py=cy-PH/2;
    const panG=ctx.createLinearGradient(px,py,px,py+PH);
    panG.addColorStop(0,'rgba(0,8,20,0.99)'); panG.addColorStop(1,'rgba(0,4,12,0.99)');
    ctx.fillStyle=panG; ctx.strokeStyle=col; ctx.lineWidth=2;
    ctx.shadowBlur=24; ctx.shadowColor=col+'88';
    roundRect(px,py,PW,PH,8); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;

    // Header
    ctx.fillStyle=col; ctx.font='bold 14px Orbitron';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowBlur=12; ctx.shadowColor=col;
    ctx.fillText('ALL WEAPONS', cx, py+22); ctx.shadowBlur=0;
    ctx.fillStyle='rgba(100,200,180,0.5)'; ctx.font='bold 8px Orbitron';
    ctx.fillText('[ESC] CLOSE   [↑/↓] SCROLL   [E/ENTER] DROP', cx, py+38);
    ctx.strokeStyle=col+'44'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px+16,py+48); ctx.lineTo(px+PW-16,py+48); ctx.stroke();

    // Tier badge reminder
    const tdT=TIER_DATA[lobbyState.tierTerminal.selectedTier];
    ctx.fillStyle='rgba(20,40,30,0.7)'; roundRect(px+PW-110,py+12,98,22,4); ctx.fill();
    ctx.fillStyle=tdT.color; ctx.font='bold 8px Orbitron'; ctx.textAlign='center';
    ctx.fillText('TIER: '+tdT.label+' '+tdT.name, px+PW-61, py+23);

    // Scrollable list
    const listTop=py+56, listBot=py+PH-16, visH=listBot-listTop;
    const ITEM_H=30;
    const visCount=Math.floor(visH/ITEM_H);
    const scrollStart=Math.max(0, Math.min(sel-Math.floor(visCount/2), allWeps.length-visCount));

    ctx.save();
    ctx.beginPath(); ctx.rect(px+8,listTop,PW-16,visH); ctx.clip();

    for(let i=0;i<allWeps.length;i++){
        const {w,idx:wIdx}=allWeps[i];
        const iy=listTop+(i-scrollStart)*ITEM_H;
        if(iy+ITEM_H<listTop||iy>listBot) continue;
        const isSeen=seenWeaponIds.has(w.id);
        const isSelected=i===sel;
        const wCol=CLASS_COLORS[w.class]||'#aaaaaa';

        if(isSelected){
            ctx.fillStyle=wCol+'28';
            roundRect(px+14,iy+2,PW-28,ITEM_H-4,4); ctx.fill();
            ctx.strokeStyle=wCol; ctx.lineWidth=1.5;
            ctx.shadowBlur=8; ctx.shadowColor=wCol;
            roundRect(px+14,iy+2,PW-28,ITEM_H-4,4); ctx.stroke(); ctx.shadowBlur=0;
        }

        ctx.textAlign='left'; ctx.textBaseline='middle';
        if(isSeen){
            // Class pill
            ctx.fillStyle=wCol+'33'; roundRect(px+22,iy+8,52,14,3); ctx.fill();
            ctx.fillStyle=wCol; ctx.font='bold 7px Orbitron';
            ctx.fillText(w.class, px+48, iy+ITEM_H/2);
            // Name
            ctx.fillStyle=isSelected?'#ffffff':'rgba(200,230,220,0.85)';
            ctx.font='bold 10px Orbitron';
            ctx.fillText(w.name, px+82, iy+ITEM_H/2);
            // Type tag
            ctx.fillStyle='rgba(120,160,150,0.55)'; ctx.font='7px Orbitron';
            ctx.fillText(w.type||'', px+PW-90, iy+ITEM_H/2);
            if(isSelected){
                ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='bold 8px Orbitron';
                ctx.textAlign='right';
                ctx.fillText('[E] DROP', px+PW-18, iy+ITEM_H/2);
            }
        } else {
            ctx.fillStyle='rgba(60,80,70,0.6)'; ctx.font='bold 9px Orbitron';
            ctx.fillText('???  UNKNOWN', px+28, iy+ITEM_H/2);
        }
    }
    ctx.restore();

    // Scroll arrows
    if(scrollStart>0){ ctx.fillStyle=col+'aa'; ctx.font='bold 10px Orbitron'; ctx.textAlign='center'; ctx.fillText('▲',cx,listTop-6); }
    if(scrollStart+visCount<allWeps.length){ ctx.fillStyle=col+'aa'; ctx.font='bold 10px Orbitron'; ctx.textAlign='center'; ctx.fillText('▼',cx,listBot+10); }

    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

function drawRerollMenu(){
    const W=canvas.width, H=canvas.height, cx=W/2, cy=H/2;
    const col='#cc44ff';
    const slotD=moduleSlotData[activeModuleSlot];

    // Backdrop
    ctx.fillStyle='rgba(0,4,14,0.93)'; ctx.fillRect(0,0,W,H);

    const modCount=slotD?((slotD.mods||[]).length):0;
    const PW=420, PH=slotD ? Math.max(280, 160+modCount*20+40) : 220;
    const px=cx-PW/2, py=cy-PH/2;

    // Panel
    const panG=ctx.createLinearGradient(px,py,px,py+PH);
    panG.addColorStop(0,'rgba(0,4,18,0.99)'); panG.addColorStop(1,'rgba(0,2,10,0.99)');
    ctx.fillStyle=panG; ctx.strokeStyle=col; ctx.lineWidth=2;
    ctx.shadowBlur=24; ctx.shadowColor=col+'88';
    roundRect(px,py,PW,PH,8); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;

    // Corner accents
    ctx.strokeStyle=col+'44'; ctx.lineWidth=1;
    const ca=14;
    ctx.beginPath();
    ctx.moveTo(px+ca,py+2); ctx.lineTo(px+2,py+2); ctx.lineTo(px+2,py+ca);
    ctx.moveTo(px+PW-ca,py+2); ctx.lineTo(px+PW-2,py+2); ctx.lineTo(px+PW-2,py+ca);
    ctx.moveTo(px+2,py+PH-ca); ctx.lineTo(px+2,py+PH-2); ctx.lineTo(px+ca,py+PH-2);
    ctx.moveTo(px+PW-2,py+PH-ca); ctx.lineTo(px+PW-2,py+PH-2); ctx.lineTo(px+PW-ca,py+PH-2);
    ctx.stroke();

    // Flicker header
    const flicker=Math.random()<0.04?Math.random()*0.4:0.7+Math.sin(Date.now()/120)*0.2;
    ctx.globalAlpha=flicker;
    ctx.fillStyle=col; ctx.font='bold 14px Orbitron';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowBlur=14; ctx.shadowColor=col;
    ctx.fillText('FREE REROLL', cx, py+22); ctx.shadowBlur=0;
    ctx.globalAlpha=1;
    ctx.fillStyle='rgba(180,120,220,0.5)'; ctx.font='bold 8px Orbitron';
    ctx.fillText('[ESC] CLOSE', cx, py+38);
    ctx.strokeStyle=col+'44'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px+16,py+48); ctx.lineTo(px+PW-16,py+48); ctx.stroke();

    if(slotD){
        const curMods=slotD.mods||[];
        const wp2=WEAPONS[moduleSlots[activeModuleSlot]];
        const tdT=slotD.tierData||TIER_DATA[0];

        // Weapon + tier label

        ctx.fillStyle=CLASS_COLORS[wp2.class]||'#fff'; ctx.font='bold 11px Orbitron'; ctx.textAlign='right';
        ctx.fillText(wp2.name, px+PW-28, py+70);

        // Mods box
        ctx.fillStyle='rgba(30,0,44,0.8)';
        const modBoxH=Math.max(60, 20+curMods.length*20+8);
        roundRect(cx-168,py+92,336,modBoxH,6); ctx.fill();
        ctx.strokeStyle=col+'33'; ctx.lineWidth=1;
        roundRect(cx-168,py+92,336,modBoxH,6); ctx.stroke();
        ctx.fillStyle='rgba(220,160,255,0.65)'; ctx.font='bold 8px Orbitron'; ctx.textAlign='center';
        ctx.fillText('CURRENT MODIFIERS', cx, py+104);
        let my=py+116;
        if(curMods.length===0){
            ctx.fillStyle='rgba(160,140,175,0.4)'; ctx.font='8px Orbitron';
            ctx.fillText('— NO MODIFIERS —', cx, my+8); my+=20;
        }
        for(const modId of curMods){
            const md=MOD_POOL.find(m=>m.id===modId);
            if(!md) continue;
            ctx.fillStyle=md.color; ctx.font='bold 9px Orbitron';
            ctx.shadowBlur=4; ctx.shadowColor=md.color;
            ctx.fillText('✦  '+md.name+'   ('+md.short+')', cx, my+8);
            ctx.shadowBlur=0; my+=20;
        }

        // Reroll button
        const btnY=py+PH-56;

        ctx.fillStyle='rgba(100,0,140,0.5)'; roundRect(cx-90,btnY,180,34,6); ctx.fill();
        ctx.strokeStyle=col; ctx.lineWidth=2;

        roundRect(cx-90,btnY,180,34,6); ctx.stroke(); ctx.shadowBlur=0;
        ctx.fillStyle='#ffffff'; ctx.font='bold 12px Orbitron'; ctx.textAlign='center';
        ctx.fillText('REROLL  [E / ENTER]', cx, btnY+17);
    } else {

        ctx.fillText('EQUIP A MODULE FIRST', cx, py+PH/2+20);
    }
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

function drawModifierPanel(){
    const W=canvas.width, H=canvas.height;
    const cols=2, rows=Math.ceil(MODIFIER_DEFS.length/cols);
    const PW=420, PH=rows*34+56, PX=(W-PW)/2, PY=(H-PH)/2;

    // Backdrop
    ctx.fillStyle='rgba(0,5,16,0.96)';
    ctx.strokeStyle='rgba(0,160,220,0.55)'; ctx.lineWidth=2;
    ctx.shadowBlur=18; ctx.shadowColor='#0088cc';
    roundRect(PX,PY,PW,PH,8); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;

    // Header
    ctx.fillStyle='rgba(0,140,200,0.18)';
    roundRectTop(PX,PY,PW,36,8); ctx.fill();
    ctx.fillStyle='#00ccff'; ctx.font='bold 13px Orbitron';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowBlur=8; ctx.shadowColor='#0099ff';
    ctx.fillText('MODIFIERS', W/2, PY+18); ctx.shadowBlur=0;
    ctx.fillStyle='rgba(120,160,190,0.5)'; ctx.font='bold 7px Orbitron';
    ctx.fillText('[ESC] CLOSE   [1-9, Q-E] TOGGLE', W/2, PY+30);

    // Conflict warning
    if(hasMod2('scaredy_cat')&&hasMod2('head_first')){
        ctx.fillStyle='#ff4444'; ctx.font='bold 8px Orbitron';
        ctx.fillText('⚠ SCAREDY CAT + HEAD FIRST conflict!', W/2, PY+30);
    }

    // Modifier tiles
    const tW=(PW-24)/cols, tH=30;
    MODIFIER_DEFS.forEach((def,i)=>{
        const col=i%cols, row=Math.floor(i/cols);
        const tx=PX+8+col*(tW+4), ty=PY+46+row*(tH+4);
        const active=hasMod2(def.id);
        const keyHint = i<9 ? String(i+1) : ['Q','W','E','R'][i-9]||'';

        // Tile bg
        ctx.fillStyle=active ? def.color+'22' : 'rgba(0,8,20,0.7)';
        ctx.strokeStyle=active ? def.color : 'rgba(40,70,100,0.5)';
        ctx.lineWidth=active?1.8:1;
        ctx.shadowBlur=active?8:0; ctx.shadowColor=def.color;
        roundRect(tx,ty,tW,tH,4); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;

        // Active glow strip on left
        if(active){
            ctx.fillStyle=def.color;
            ctx.beginPath(); ctx.roundRect(tx,ty,3,tH,{topLeft:4,bottomLeft:4}); ctx.fill();
        }

        // Key hint
        ctx.fillStyle=active?def.color:'rgba(100,130,160,0.6)';
        ctx.font='bold 7px Orbitron'; ctx.textAlign='left'; ctx.textBaseline='middle';
        ctx.fillText('['+keyHint+']', tx+7, ty+tH/2);

        // Label
        ctx.fillStyle=active?def.color:'rgba(180,200,220,0.8)';
        ctx.font='bold 8px Orbitron';
        ctx.fillText(def.label, tx+28, ty+tH/2-5);

        // Desc
        ctx.fillStyle=active?'rgba(255,255,255,0.65)':'rgba(120,140,160,0.55)';
        ctx.font='6px Orbitron';
        ctx.fillText(def.desc, tx+28, ty+tH/2+6);

        // Active check
        if(active){
            ctx.fillStyle=def.color; ctx.font='bold 9px Orbitron';
            ctx.textAlign='right';
            ctx.fillText('✓', tx+tW-6, ty+tH/2);
        }
    });
}
