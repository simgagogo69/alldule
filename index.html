// ═══════════════════════════════════════════════════════════════════════════════
//  HAZARD TRAP SYSTEM  (spike traps + laser traps)
// ═══════════════════════════════════════════════════════════════════════════════
//  Each trap object:
//    type:  'spike' | 'laser'
//    x, y:  world-pixel position (centre of the trap)
//
//  Spike:  hidden → warning (plates rise) → ACTIVE (spikes emerge, deal damage)
//          → cooldown → hidden  (cycle repeats)
//    state: 'hidden' | 'warning' | 'active' | 'cooldown'
//    timer: frames remaining in current state
//
//  Laser:  wall-mounted emitter that fires a horizontal or vertical beam across
//          the room, toggling on/off on a cycle.
//    state: 'off' | 'warn' | 'on' | 'cooldown'
//    timer, angle, length

function spawnHazardTraps(room){
    if(room._trapsSpawned) return;
    room._trapsSpawned = true;

    const cx = room.cx * TILE_SIZE;
    const cy = room.cy * TILE_SIZE;
    const rw = (room.w - 4) * TILE_SIZE;   // usable floor width
    const rh = (room.h - 4) * TILE_SIZE;   // usable floor height

    // Helper: random floor position inside the room (away from walls)
    function rndFloor(marginTiles){
        const m = (marginTiles || 2) * TILE_SIZE;
        for(let att = 0; att < 80; att++){
            const fx = room.x * TILE_SIZE + m + Math.random() * (room.w * TILE_SIZE - m * 2);
            const fy = room.y * TILE_SIZE + m + Math.random() * (room.h * TILE_SIZE - m * 2);
            const tx = Math.floor(fx / TILE_SIZE), ty = Math.floor(fy / TILE_SIZE);
            if(map[ty]?.[tx] === T_FLOOR) return {x: fx, y: fy};
        }
        return {x: cx, y: cy};
    }

    // ── SPIKE TRAPS: 4-7 scattered across the floor ──────────────────────────
    const spikeCount = 4 + Math.floor(Math.random() * 4);
    const SPIKE_STAGGER = 38;   // frames between each spike's hidden phase offset
    for(let i = 0; i < spikeCount; i++){
        const pos = rndFloor(2);
        hazardTraps.push({
            type: 'spike',
            x: pos.x, y: pos.y,
            roomId: room.id,
            state: 'hidden',
            timer: 60 + i * SPIKE_STAGGER,   // stagger activation so they don't all fire together
            dmg: 8,
        });
    }

    // ── LASER TRAPS: 2-3 wall-to-wall beams, alternating H/V ─────────────────
    const laserCount = 2 + (Math.random() < 0.5 ? 1 : 0);
    for(let i = 0; i < laserCount; i++){
        // Alternate between horizontal and vertical beams
        const horiz = (i % 2 === 0);
        let ex, ey, angle, beamLen;
        if(horiz){
            // Beam travels rightward across the room; emitter on left wall
            ex = (room.x + 1) * TILE_SIZE + TILE_SIZE * 0.5;
            // Space them across the room vertically
            const span = (room.h - 4) * TILE_SIZE;
            ey = (room.y + 2) * TILE_SIZE + (i / laserCount) * span + TILE_SIZE;
            angle = 0;
            beamLen = (room.w - 2) * TILE_SIZE;
        } else {
            // Beam travels downward; emitter on top wall
            ey = (room.y + 1) * TILE_SIZE + TILE_SIZE * 0.5;
            const span = (room.w - 4) * TILE_SIZE;
            ex = (room.x + 2) * TILE_SIZE + (i / laserCount) * span + TILE_SIZE;
            angle = Math.PI / 2;
            beamLen = (room.h - 2) * TILE_SIZE;
        }
        // Shorten beam until it doesn't clip outside room
        beamLen = Math.min(beamLen, horiz ? (room.w - 3) * TILE_SIZE : (room.h - 3) * TILE_SIZE);

        hazardTraps.push({
            type: 'laser',
            x: ex, y: ey,
            roomId: room.id,
            angle: angle,
            beamLen: beamLen,
            state: 'off',
            timer: 80 + i * 55,   // stagger so they don't fire simultaneously
            dmg: 6,
        });
    }
}

const SPIKE_HIDDEN   = 90;   // frames spent hidden
const SPIKE_WARNING  = 28;   // plates rising — visible warning, no damage yet
const SPIKE_ACTIVE   = 40;   // fully extended — damages player each frame it overlaps
const SPIKE_COOLDOWN = 20;   // retracting

const LASER_OFF      = 100;  // beam is off
const LASER_WARN     = 30;   // visible red warn line, no damage
const LASER_ON       = 55;   // beam active
const LASER_COOL     = 20;   // powering down

function updateHazardTraps(){
    const room = roomGraph[currentRoomIdx];
    if(!room) return;

    for(const trap of hazardTraps){
        if(trap.roomId !== currentRoomIdx) continue;   // only update traps in current room

        if(trap.type === 'spike'){
            trap.timer--;
            if(trap.timer <= 0){
                if(trap.state === 'hidden')  { trap.state = 'warning';  trap.timer = SPIKE_WARNING; }
                else if(trap.state === 'warning')  { trap.state = 'active';   trap.timer = SPIKE_ACTIVE; }
                else if(trap.state === 'active')   { trap.state = 'cooldown'; trap.timer = SPIKE_COOLDOWN; }
                else if(trap.state === 'cooldown') { trap.state = 'hidden';   trap.timer = SPIKE_HIDDEN + Math.floor(Math.random()*30); }
            }
            // Deal damage while active
            if(trap.state === 'active'){
                const dist = Math.hypot(player.x - trap.x, player.y - trap.y);
                if(dist < player.size + 14 && frameTime % 14 === 0){
                    hurtPlayer(trap.dmg);
                    spawnDamageText(player.x, player.y - 30, 'SPIKE!', '#ff6622');
                    camera.x += (Math.random()-.5)*5; camera.y += (Math.random()-.5)*5;
                }
            }

        } else if(trap.type === 'laser'){
            trap.timer--;
            if(trap.timer <= 0){
                if(trap.state === 'off')  { trap.state = 'warn';     trap.timer = LASER_WARN; }
                else if(trap.state === 'warn')  { trap.state = 'on';       trap.timer = LASER_ON; }
                else if(trap.state === 'on')    { trap.state = 'cooldown'; trap.timer = LASER_COOL; }
                else if(trap.state === 'cooldown') { trap.state = 'off';   trap.timer = LASER_OFF + Math.floor(Math.random()*40); }
            }
            // Deal damage while on — check if player intersects the beam segment
            if(trap.state === 'on' && frameTime % 8 === 0){
                const dx = Math.cos(trap.angle), dy = Math.sin(trap.angle);
                const t = Math.max(0, Math.min(trap.beamLen,
                    (player.x - trap.x) * dx + (player.y - trap.y) * dy));
                const cx = trap.x + dx * t, cy2 = trap.y + dy * t;
                if(Math.hypot(player.x - cx, player.y - cy2) < player.size + 5){
                    hurtPlayer(trap.dmg);
                    spawnDamageText(player.x, player.y - 30, 'LASER!', '#ff2244');
                    camera.x += (Math.random()-.5)*4; camera.y += (Math.random()-.5)*4;
                }
            }
        }
    }
}

function drawHazardTraps(){
    const now = Date.now();
    for(const trap of hazardTraps){
        if(trap.roomId !== currentRoomIdx) continue;

        if(trap.type === 'spike'){
            const state = trap.state;
            if(state === 'hidden') continue;   // fully flush, nothing to see

            ctx.save(); ctx.translate(trap.x, trap.y);

            // How far the spikes are extended: 0 = flush, 1 = fully out
            let ext = 0;
            if(state === 'warning'){
                ext = 1 - trap.timer / SPIKE_WARNING;       // 0 → 1 as warning counts down
            } else if(state === 'active'){
                ext = 1;
            } else if(state === 'cooldown'){
                ext = trap.timer / SPIKE_COOLDOWN;           // 1 → 0 as cooldown counts down
            }

            // Floor plate (always visible while state != hidden)
            const plateAlpha = 0.35 + ext * 0.35;
            ctx.fillStyle = state === 'active' ? `rgba(255,80,30,${plateAlpha})` : `rgba(180,80,30,${plateAlpha})`;
            ctx.strokeStyle = state === 'active' ? '#ff4400' : '#883300';
            ctx.lineWidth = 1.2;
            ctx.shadowBlur = state === 'active' ? 12 : 5;
            ctx.shadowColor = state === 'active' ? '#ff3300' : '#662200';
            roundRect(-11, -11, 22, 22, 3); ctx.fill(); ctx.stroke(); ctx.shadowBlur = 0;

            // 4 spike triangles pointing outward
            const spikeH = ext * 13;
            if(spikeH > 0.5){
                ctx.fillStyle = state === 'active' ? '#ffcc44' : '#cc8833';
                ctx.shadowBlur = state === 'active' ? 10 : 0;
                ctx.shadowColor = '#ff6600';
                const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
                for(const [sdx, sdy] of dirs){
                    const bx = sdx * 6, by = sdy * 6;
                    const tx2 = sdx * (6 + spikeH), ty2 = sdy * (6 + spikeH);
                    const px = -sdy * 4, py = sdx * 4;
                    ctx.beginPath();
                    ctx.moveTo(tx2, ty2);
                    ctx.lineTo(bx + px, by + py);
                    ctx.lineTo(bx - px, by - py);
                    ctx.closePath(); ctx.fill();
                }
                ctx.shadowBlur = 0;
            }

            // Warning pulse ring
            if(state === 'warning'){
                const pf = 1 - trap.timer / SPIKE_WARNING;
                ctx.strokeStyle = `rgba(255,120,0,${0.6 - pf * 0.4})`;
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.arc(0, 0, 10 + pf * 8, 0, Math.PI * 2); ctx.stroke();
            }

            ctx.restore();

        } else if(trap.type === 'laser'){
            const state = trap.state;
            if(state === 'off') continue;

            const dx = Math.cos(trap.angle), dy = Math.sin(trap.angle);
            const ex = trap.x + dx * trap.beamLen;
            const ey = trap.y + dy * trap.beamLen;

            ctx.save();

            if(state === 'warn'){
                // Dashed red warning line
                const wf = 1 - trap.timer / LASER_WARN;
                ctx.strokeStyle = `rgba(255,40,40,${0.45 + wf * 0.35})`;
                ctx.lineWidth = 2;
                ctx.setLineDash([8, 6]);
                ctx.shadowBlur = 6; ctx.shadowColor = '#ff0022';
                ctx.beginPath(); ctx.moveTo(trap.x, trap.y); ctx.lineTo(ex, ey); ctx.stroke();
                ctx.setLineDash([]); ctx.shadowBlur = 0;

            } else if(state === 'on'){
                const pulse = Math.sin(now / 40) * 0.5 + 0.5;
                // Outer glow
                ctx.strokeStyle = `rgba(255,20,60,${0.18 + pulse * 0.12})`;
                ctx.lineWidth = 18; ctx.shadowBlur = 0;
                ctx.beginPath(); ctx.moveTo(trap.x, trap.y); ctx.lineTo(ex, ey); ctx.stroke();
                // Mid glow
                ctx.strokeStyle = `rgba(255,40,80,${0.35 + pulse * 0.2})`;
                ctx.lineWidth = 8;
                ctx.beginPath(); ctx.moveTo(trap.x, trap.y); ctx.lineTo(ex, ey); ctx.stroke();
                // Core beam
                ctx.strokeStyle = `rgb(255,${100 + pulse * 80 | 0},${120 + pulse * 80 | 0})`;
                ctx.lineWidth = 2.5;
                ctx.shadowBlur = 14 + pulse * 10; ctx.shadowColor = '#ff0044';
                ctx.beginPath(); ctx.moveTo(trap.x, trap.y); ctx.lineTo(ex, ey); ctx.stroke();
                ctx.shadowBlur = 0;
                // Emitter dot
                ctx.fillStyle = '#ff6688'; ctx.shadowBlur = 12; ctx.shadowColor = '#ff0044';
                ctx.beginPath(); ctx.arc(trap.x, trap.y, 4, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;

            } else if(state === 'cooldown'){
                const cf = trap.timer / LASER_COOL;
                ctx.strokeStyle = `rgba(180,20,40,${cf * 0.5})`;
                ctx.lineWidth = 1.5;
                ctx.shadowBlur = 4 * cf; ctx.shadowColor = '#ff0033';
                ctx.beginPath(); ctx.moveTo(trap.x, trap.y); ctx.lineTo(ex, ey); ctx.stroke();
                ctx.shadowBlur = 0;
            }

            ctx.restore();
        }
    }
}


const BOSS_SECTORS = new Set(['the_moon_a','the_moon_b','venus','mars']);
function isBossSector(node){ return BOSS_SECTORS.has(node.id); }
function getBossTypeForSector(id){
    if(id==='the_moon_a'||id==='the_moon_b') return 'luminox';
    if(id==='venus') return 'sulfura';
    if(id==='mars') return 'ferrion';
    return null;
}

let activeBoss = null;
let bossDefeated = false;
let teslaCooldown = 0; // raw frame counter — not affected by playerCooldownDrain
let bossDoorTiles = []; // [{x,y}] corridor tiles sealed when entering boss room

const BOSS_DEFS = {
    luminox: { name:'LUMINOX', subtitle:'The Shard-Walker',   color:'#c8d8ff', glow:'#8899dd', maxHp:15000, size:52, p2:0.65, p3:0.30 },
    sulfura: { name:'SULFURA', subtitle:'The Acid Cloud Serpent', color:'#ffcc44', glow:'#cc7700', maxHp:12500, size:48, p2:0.65, p3:0.30 },
    ferrion: { name:'FERRION', subtitle:'The Magnetic Sentinel', color:'#ff5533', glow:'#cc2200', maxHp:12500, size:55, p2:0.65, p3:0.30 },
};

class Boss {
    constructor(type, x, y){
        const def = BOSS_DEFS[type];
        this.type=type; this.x=x; this.y=y;
        this.hp=def.maxHp; this.maxHp=def.maxHp;
        this.size=def.size; this.color=def.color; this.glow=def.glow;
        this.angle=0; this.aimAngle=0;
        this.phase=1; this.age=0; this.dead=false; this.deathTimer=0;
        this.stateTimer=0; this.atkTimer=0;
        this.state='intro'; this.introTimer=150;
        this.vx=0; this.vy=0;
        this.invulnTimer=0;
        this.weakpoints=[]; // [{localAngle, dist, destroyed, flashTimer}]
        this._wpHits={}; // tracking hits per weakpoint index
        this.vars={};
        this._initVars();
    }

    _initVars(){
        if(this.type==='luminox'){
            for(let i=0;i<4;i++) this.weakpoints.push({localAngle:i/4*Math.PI*2+Math.PI/8, dist:this.size*0.82, destroyed:false, flashTimer:0});
            this.vars={ circleAngle:Math.random()*Math.PI*2, circleDir:1, shardTimer:0,
                        afterimages:[], jumpState:'ground', jumpTimer:0, jumpTx:0, jumpTy:0,
                        floorSpikeTimer:0, eyeGlowPhase:0 };
        } else if(this.type==='sulfura'){
            for(let i=0;i<3;i++) this.weakpoints.push({localAngle:-Math.PI/2+i*Math.PI, dist:this.size*0.62, destroyed:false, flashTimer:0});
            this.vars={ segments:[], waveOffset:0, acidPuddles:[], ventTimer:0,
                        poisonAngle:0, slamTimer:0, lungeState:'coiling',
                        lungeTimer:0, lungeAngle:0, spiralAngle:0 };
        } else if(this.type==='ferrion'){
            this.weakpoints.push({localAngle:-Math.PI/2, dist:this.size*0.78, destroyed:false, flashTimer:0});
            this.weakpoints.push({localAngle:Math.PI/2,  dist:this.size*0.78, destroyed:false, flashTimer:0});
            this.vars={ magnetTimer:0, magnetFieldAngle:0, shardAngle:0,
                        shards:[], slamActive:false, slamTimer:0, slamAngle:0,
                        spinAngle:0, backNodes:[
                            {localAngle:-Math.PI*0.65, destroyed:false, flashTimer:0},
                            {localAngle: Math.PI*0.65, destroyed:false, flashTimer:0},
                        ] };
        }
    }

    get hpFrac(){ return this.hp/this.maxHp; }

    updatePhase(){
        const def=BOSS_DEFS[this.type];
        const hp=this.hpFrac;
        const newP = hp<=def.p3?3:hp<=def.p2?2:1;
        if(newP>this.phase){
            this.phase=newP;
            this.invulnTimer=90;
            spawnDamageText(this.x, this.y-90, `— PHASE ${newP} —`, '#ffffff');
            camera.x+=(Math.random()-.5)*24; camera.y+=(Math.random()-.5)*24;
            for(let i=0;i<50;i++){
                const a=Math.random()*Math.PI*2, sp=3+Math.random()*11;
                particles.push(new Particle(this.x,this.y,Math.cos(a)*sp,Math.sin(a)*sp,40,6,'surge'));
            }
        }
    }

    takeDamage(dmg, hx, hy){
        if(this.dead||this.invulnTimer>0) return;
        if(damageSourceIsPlayer) dmg=Math.round(dmg*playerDmgMult*10)/10;
        // Weakpoint bonus
        let wpHit=false;
        if(hx!==undefined && hy!==undefined){
            for(let wi=0;wi<this.weakpoints.length;wi++){
                const wp=this.weakpoints[wi];
                if(wp.destroyed) continue;
                const wpWorldX=this.x+Math.cos(this.angle+wp.localAngle)*wp.dist;
                const wpWorldY=this.y+Math.sin(this.angle+wp.localAngle)*wp.dist;
                if(Math.hypot(hx-wpWorldX, hy-wpWorldY)<18){
                    wpHit=true; dmg*=1.8; wp.flashTimer=12;
                    this._wpHits[wi]=(this._wpHits[wi]||0)+1;
                    if(this._wpHits[wi]>=6){ wp.destroyed=true; spawnDamageText(wpWorldX,wpWorldY-18,'WEAKPOINT DESTROYED!','#ff2222'); for(let i=0;i<24;i++){const a=Math.random()*Math.PI*2,sp=3+Math.random()*8;particles.push(new Particle(wpWorldX,wpWorldY,Math.cos(a)*sp,Math.sin(a)*sp,28,4,'spark'));} camera.x+=(Math.random()-.5)*12; camera.y+=(Math.random()-.5)*12; }
                    else { spawnDamageText(wpWorldX,wpWorldY-14,'WEAKPOINT!!','#ff2222'); for(let i=0;i<16;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*5;particles.push(new Particle(wpWorldX,wpWorldY,Math.cos(a)*sp,Math.sin(a)*sp,20,3,'spark'));} }
                    break;
                }
            }
            // Ferrion back nodes p2
            if(this.type==='ferrion'&&this.phase>=2){
                for(const bn of this.vars.backNodes){
                    if(bn.destroyed) continue;
                    const nx=this.x+Math.cos(this.angle+bn.localAngle)*this.size*0.78;
                    const ny=this.y+Math.sin(this.angle+bn.localAngle)*this.size*0.78;
                    if(Math.hypot(hx-nx,hy-ny)<18){ wpHit=true; dmg*=1.5; bn.flashTimer=12; bn._hits=(bn._hits||0)+1; if(bn._hits>=5){bn.destroyed=true;spawnDamageText(nx,ny-16,'NODE DESTROYED!','#ff5533');for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*6;particles.push(new Particle(nx,ny,Math.cos(a)*sp,Math.sin(a)*sp,22,4,'spark'));}} break; }
                }
            }
        }
        this.hp=Math.max(0,this.hp-dmg);
        spawnDamageText(this.x,this.y-this.size-10,dmg|0,wpHit?'#ff4444':this.color);
        camera.x+=(Math.random()-.5)*3; camera.y+=(Math.random()-.5)*3;
        this.updatePhase();
        if(this.hp<=0&&!this.dead) this.startDeath();
    }

    startDeath(){
        this.dead=true; this.deathTimer=200; bossDefeated=true;
        unsealBossDoor();
        for(let i=0;i<80;i++){
            const a=Math.random()*Math.PI*2, sp=2+Math.random()*14;
            particles.push(new Particle(this.x,this.y,Math.cos(a)*sp,Math.sin(a)*sp,60+Math.random()*40,6+Math.random()*5,'surge'));
        }
        camera.x+=(Math.random()-.5)*40; camera.y+=(Math.random()-.5)*40;
        spawnDamageText(this.x,this.y-110,'BOSS DEFEATED!','#ffdd00');
        // Big scrap drop
        for(let i=0;i<12;i++) spawnScrapDrop(this.x+(Math.random()-.5)*120, this.y+(Math.random()-.5)*120, 80+Math.floor(Math.random()*120));
        // Spawn the extraction van
        spawnRunVan(this.x, this.y);
    }

    update(){
        this.age++;
        if(this.dead){ this.deathTimer--; return; }
        if(this.invulnTimer>0) this.invulnTimer--;
        if(this.atkTimer>0) this.atkTimer--;
        if(this.vars.ventTimer>0) this.vars.ventTimer--;
        this.aimAngle=Math.atan2(player.y-this.y, player.x-this.x);
        // Weakpoint flash decay
        for(const wp of this.weakpoints) if(wp.flashTimer>0) wp.flashTimer--;
        if(this.type==='ferrion' && this.vars.backNodes) for(const bn of this.vars.backNodes) if(bn.flashTimer>0) bn.flashTimer--;

        if(this.state==='intro'){ this.introTimer--; if(this.introTimer<=0) this.state='fight'; return; }
        if(this.type==='luminox') this._updateLuminox();
        else if(this.type==='sulfura') this._updateSulfura();
        else if(this.type==='ferrion') this._updateFerrion();
        // Radius-aware wall push — eject boss if it overlaps a wall
        const _bossR = this.size * 0.55;
        const _probeA = [0, Math.PI/4, Math.PI/2, Math.PI*3/4, Math.PI, Math.PI*5/4, Math.PI*3/2, Math.PI*7/4];
        for(const pa of _probeA){
            const _px=this.x+Math.cos(pa)*_bossR, _py=this.y+Math.sin(pa)*_bossR;
            const _pt=map[Math.floor(_py/TILE_SIZE)]?.[Math.floor(_px/TILE_SIZE)];
            if(_pt===T_WALL||_pt===T_VOID){ this.x+=Math.cos(pa+Math.PI)*3; this.y+=Math.sin(pa+Math.PI)*3; break; }
        }
    }

    // Radius-aware wall resolution: tries to slide along axes if direct move is blocked
    _resolveWall(nx, ny){
        const r = this.size * 0.55; // collision radius — slightly inside visual edge
        const solid = (px,py) => {
            const t = map[Math.floor(py/TILE_SIZE)]?.[Math.floor(px/TILE_SIZE)];
            return t===T_WALL||t===T_VOID;
        };
        // Check 8 probe points around the boss at the proposed position
        const probes = [
            [nx+r, ny], [nx-r, ny], [nx, ny+r], [nx, ny-r],
            [nx+r*0.7, ny+r*0.7], [nx-r*0.7, ny+r*0.7],
            [nx+r*0.7, ny-r*0.7], [nx-r*0.7, ny-r*0.7]
        ];
        const blockedX = probes.some(([px,py])=>solid(px, this.y+(ny-this.y)));
        const blockedY = probes.some(([px,py])=>solid(this.x+(nx-this.x), py));
        // Try axes independently for wall-sliding
        if(!probes.some(([px,py])=>solid(px,py))){
            this.x=nx; this.y=ny;
        } else {
            // Slide on X
            const xProbes = [[nx+r,this.y],[nx-r,this.y],[nx+r*0.7,this.y+r*0.7],[nx-r*0.7,this.y+r*0.7],[nx+r*0.7,this.y-r*0.7],[nx-r*0.7,this.y-r*0.7]];
            if(!xProbes.some(([px,py])=>solid(px,py))) this.x=nx;
            // Slide on Y
            const yProbes = [[this.x,ny+r],[this.x,ny-r],[this.x+r*0.7,ny+r*0.7],[this.x-r*0.7,ny+r*0.7],[this.x+r*0.7,ny-r*0.7],[this.x-r*0.7,ny-r*0.7]];
            if(!yProbes.some(([px,py])=>solid(px,py))) this.y=ny;
        }
    }

    _moveToward(tx,ty,spd){
        const da=Math.atan2(ty-this.y,tx-this.x);
        const nx=this.x+Math.cos(da)*spd, ny=this.y+Math.sin(da)*spd;
        this._resolveWall(nx, ny);
    }

    _orbitTarget(tx,ty,orbitR,speed){
        this.vars.circleAngle+=(speed||0.018)*this.vars.circleDir;
        const goalX=tx+Math.cos(this.vars.circleAngle)*orbitR;
        const goalY=ty+Math.sin(this.vars.circleAngle)*orbitR;
        this._moveToward(goalX,goalY, 2.4+(this.phase===2?0.8:this.phase===3?1.2:0));
    }

    _shootArc(count, spread, speed, dmg, radius, color, glow, kind='bolt'){
        for(let i=0;i<count;i++){
            const a=this.aimAngle+(i-(count-1)/2)*spread;
            enemyProjectiles.push(new EnemyProjectile(this.x,this.y,Math.cos(a)*speed,Math.sin(a)*speed,dmg,radius,color,glow,kind));
        }
    }

    _updateLuminox(){
        const v=this.vars; const p=this.phase;
        const dist=Math.hypot(player.x-this.x,player.y-this.y);
        v.eyeGlowPhase+=0.06;

        if(p>=3){
            // Phase 3: Jump + afterimages + radial shards
            if(v.jumpState==='ground'){
                this._orbitTarget(player.x,player.y,190,0.028*(1+0.015*v.circleDir));
                this.angle+=(this.aimAngle-this.angle)*0.08;
                // Afterimage trail
                if(this.age%4===0) v.afterimages.push({x:this.x,y:this.y,angle:this.angle,life:16,maxLife:16});
                v.afterimages=v.afterimages.filter(ai=>{ai.life--;return ai.life>0;});
                // Radial shard burst
                if(this.atkTimer<=0){ this.atkTimer=55;
                    const cnt=10; for(let i=0;i<cnt;i++){
                        const a=i/cnt*Math.PI*2+this.age*0.07;
                        enemyProjectiles.push(new EnemyProjectile(this.x,this.y,Math.cos(a)*5.5,Math.sin(a)*5.5,8,6,this.color,this.glow,'bolt'));
                    }
                }
                // Prep jump every 140 frames
                if(this.age%140===0){
                    v.jumpState='windup'; v.jumpTimer=35;
                    v.jumpTx=player.x+(Math.random()-.5)*100;
                    v.jumpTy=player.y+(Math.random()-.5)*100;
                    this.invulnTimer=45;
                }
            } else if(v.jumpState==='windup'){
                v.jumpTimer--; if(v.jumpTimer<=0){v.jumpState='jumping';v.jumpTimer=28;}
            } else if(v.jumpState==='jumping'){
                v.jumpTimer--;
                this.x+=(v.jumpTx-this.x)*0.22; this.y+=(v.jumpTy-this.y)*0.22;
                if(v.jumpTimer<=0){
                    v.jumpState='land'; v.jumpTimer=18;
                    if(Math.hypot(player.x-this.x,player.y-this.y)<110){hurtPlayer(14); spawnDamageText(player.x,player.y-28,'LUNAR SLAM!','#c8d8ff');}
                    // Explode all afterimages
                    for(const ai of v.afterimages) for(let i=0;i<10;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*6;particles.push(new Particle(ai.x,ai.y,Math.cos(a)*sp,Math.sin(a)*sp,20,3,'spark'));}
                    v.afterimages=[];
                    for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,sp=3+Math.random()*8;particles.push(new Particle(this.x,this.y,Math.cos(a)*sp,Math.sin(a)*sp,22,4,'surge'));}
                    camera.x+=(Math.random()-.5)*14; camera.y+=(Math.random()-.5)*14;
                }
            } else { v.jumpTimer--; if(v.jumpTimer<=0) v.jumpState='ground'; }
        } if(p>=2) {
            // Phase 1 & 2: Circle orbit + shard arcs
            this._orbitTarget(player.x,player.y,190+(p===2?-30:0),0.016+(p===2?0.01:0));
            this.angle+=(this.aimAngle-this.angle)*(p===2?0.09:0.06);
            // Shard arc fire
            if(this.atkTimer<=0){
                this.atkTimer=p===2?60:90;
                const arcCnt=p===2?3:2;
                for(let arc=0;arc<arcCnt;arc++){
                    const baseA=this.aimAngle+arc*(Math.PI*2/arcCnt);
                    for(let s=0;s<5;s++) enemyProjectiles.push(new EnemyProjectile(this.x,this.y,Math.cos(baseA+(s-2)*0.2)*5,Math.sin(baseA+(s-2)*0.2)*5,6,5,this.color,this.glow,'bolt'));
                }
            }
            // Phase 2: limb radial beams every ~8s
            if(p>=2 && this.age%480===0){
                for(let li=0;li<4;li++){
                    const wp=this.weakpoints[li];
                    if(!wp||wp.destroyed) continue;
                    const bA=this.angle+wp.localAngle;
                    const bx=this.x+Math.cos(bA)*this.size*.85, by=this.y+Math.sin(bA)*this.size*.85;
                    for(let s=-1;s<=1;s++) enemyProjectiles.push(new EnemyProjectile(bx,by,Math.cos(bA+s*0.28)*6,Math.sin(bA+s*0.28)*6,8,5,'#ffffff','#c8d8ff','bolt'));
                }
            }
        }
        // Phase 2+: floor spikes
        if(p>=2){ v.floorSpikeTimer=(v.floorSpikeTimer||0)+1;
            if(v.floorSpikeTimer>=200){
                v.floorSpikeTimer=0;
                for(let i=0;i<5;i++){
                    const a=Math.random()*Math.PI*2, r=60+Math.random()*150;
                    const sx=this.x+Math.cos(a)*r, sy=this.y+Math.sin(a)*r;
                    for(let j=0;j<8;j++){const a2=j/8*Math.PI*2;particles.push(new Particle(sx,sy,Math.cos(a2)*2,Math.sin(a2)*2,30,5,'surge'));}
                    if(Math.hypot(player.x-sx,player.y-sy)<48){hurtPlayer(8);spawnDamageText(player.x,player.y-20,'SHARD SPIKE!',this.color);}
                }
            }
        }
    }

    _updateSulfura(){
        const v=this.vars; const p=this.phase;
        v.spiralAngle+=0.028; v.waveOffset+=0.04;
        // Update segment trail
        v.segments.unshift({x:this.x,y:this.y,angle:this.angle});
        if(v.segments.length>22) v.segments.pop();
        // Acid puddles
        v.acidPuddles=v.acidPuddles.filter(pd=>{
            pd.life--;
            if(pd.life%20===0&&Math.hypot(player.x-pd.x,player.y-pd.y)<pd.r+player.size){hurtPlayer(3);spawnDamageText(player.x,player.y-20,'ACID!','#aaff44');}
            return pd.life>0;
        });

        if(p>=3) {
            // Rapid coil spiral + lunge
            if(v.lungeState==='coiling'){
                const tx=player.x+Math.cos(v.spiralAngle*1.4)*150, ty=player.y+Math.sin(v.spiralAngle*1.4)*150;
                const da=Math.atan2(ty-this.y,tx-this.x);
                this._moveToward(tx,ty,3.8); this.angle+=(da-this.angle)*0.12;
                // Acid trail
                if(this.age%8===0) v.acidPuddles.push({x:this.x,y:this.y,r:20,life:150,maxLife:150});
                // Vent fire
                if(v.ventTimer<=0){ v.ventTimer=45; this._shootArc(5,0.3,4.5,6,5,'#aaff44','#66cc00'); }
                // Trigger lunge
                if(this.atkTimer<=0){ this.atkTimer=200; v.lungeState='windup'; v.lungeTimer=50; v.lungeAngle=this.aimAngle; }
            } else if(v.lungeState==='windup'){
                v.lungeTimer--; v.lungeAngle=this.aimAngle;
                if(v.lungeTimer<=0){v.lungeState='lunging';v.lungeTimer=22;}
            } else if(v.lungeState==='lunging'){
                v.lungeTimer--;
                const speed=13;
                this._resolveWall(this.x+Math.cos(v.lungeAngle)*speed, this.y+Math.sin(v.lungeAngle)*speed);
                this.angle=v.lungeAngle;
                if(Math.hypot(player.x-this.x,player.y-this.y)<this.size+player.size){hurtPlayer(16);spawnDamageText(player.x,player.y-28,'LUNGE!',this.color);player.momentumX+=Math.cos(v.lungeAngle)*8;player.momentumY+=Math.sin(v.lungeAngle)*8;}
                if(v.lungeTimer<=0){v.lungeState='coiling';}
            }
        } if(p>=2) {
            // Gasstorm: rotating poison ring + slam
            v.poisonAngle+=0.022;
            const tx=player.x+Math.cos(v.spiralAngle)*155,ty=player.y+Math.sin(v.spiralAngle)*120;
            const da=Math.atan2(ty-this.y,tx-this.x);
            this._moveToward(tx,ty,2.7); this.angle+=(da-this.angle)*0.08;
            // Rotating poison cloud ring
            if(this.age%75===0){
                for(let i=0;i<8;i++){const a=v.poisonAngle+i/8*Math.PI*2;enemyProjectiles.push(new EnemyProjectile(this.x,this.y,Math.cos(a)*3.8,Math.sin(a)*3.8,6,7,'#aaffaa','#44aa44','bolt'));}
            }
            // Slam shockwave
            v.slamTimer=(v.slamTimer||0)+1;
            if(v.slamTimer>=200){
                v.slamTimer=0;
                for(let i=0;i<14;i++){const a=i/14*Math.PI*2;particles.push(new Particle(this.x,this.y,Math.cos(a)*9,Math.sin(a)*9,28,5,'surge'));}
                camera.x+=(Math.random()-.5)*12; camera.y+=(Math.random()-.5)*12;
                if(Math.hypot(player.x-this.x,player.y-this.y)<130){hurtPlayer(12);spawnDamageText(player.x,player.y-28,'SLAM!',this.color);player.momentumX+=(player.x-this.x)/130*8;player.momentumY+=(player.y-this.y)/130*8;}
            }
            // Acid vent
            if(v.ventTimer<=0){v.ventTimer=55;this._shootArc(4,0.35,4,7,5,'#aaff44','#66cc00');}
        } if(p>=1) {
            // Phase 1: Float wave, acid spray
            const wA=this.age*0.022;
            const tx=player.x+Math.cos(wA)*170+Math.sin(wA*1.5)*50,ty=player.y+Math.sin(wA)*110+Math.cos(wA*1.3)*55;
            const da=Math.atan2(ty-this.y,tx-this.x);
            this._moveToward(tx,ty,2.1); this.angle+=(da-this.angle)*0.06;
            if(v.ventTimer<=0){v.ventTimer=65;this._shootArc(5,0.28,3.8,5,5,'#aaff44','#66cc00');}
        }
    }

    _updateFerrion(){
        const v=this.vars; const p=this.phase;
        v.spinAngle+=0.04+p*0.014; v.magnetFieldAngle+=0.015;
        const dist=Math.hypot(player.x-this.x,player.y-this.y);

        if(p>=3){
            // Float + rotating shards + slam line
            this.angle+=(this.aimAngle-this.angle)*0.04;
            if(dist>110){ this._moveToward(player.x,player.y,1.6); }
            else if(dist<70){ this._moveToward(player.x+(player.x-this.x)*2,player.y+(player.y-this.y)*2,1.9); }
            // Spawn/manage orbital shards
            v.shardAngle+=0.038;
            if(v.shards.length<14&&this.age%12===0) v.shards.push({a:Math.random()*Math.PI*2,r:this.size+30+Math.random()*45,spd:0.03+Math.random()*0.03,life:280});
            v.shards=v.shards.filter(s=>{
                s.life--; s.a+=s.spd;
                const sx=this.x+Math.cos(s.a)*s.r, sy=this.y+Math.sin(s.a)*s.r;
                if(Math.hypot(player.x-sx,player.y-sy)<10+player.size) hurtPlayer(2);
                return s.life>0;
            });
            // Line slam
            if(v.slamActive){ v.slamTimer--; if(v.slamTimer<=0){
                v.slamActive=false;
                const dx=Math.cos(v.slamAngle),dy=Math.sin(v.slamAngle);
                const t2=((player.x-this.x)*dx+(player.y-this.y)*dy);
                if(t2>0&&t2<420){const cx=this.x+dx*t2,cy=this.y+dy*t2;if(Math.hypot(player.x-cx,player.y-cy)<38){hurtPlayer(20);spawnDamageText(player.x,player.y-30,'OVERCHARGE SLAM!',this.color);}}
                for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2,sp=4+Math.random()*10;particles.push(new Particle(this.x,this.y,Math.cos(a)*sp,Math.sin(a)*sp,28,5,'surge'));}
                camera.x+=(Math.random()-.5)*18; camera.y+=(Math.random()-.5)*18;
            }} else if(this.atkTimer<=0){
                this.atkTimer=180; v.slamActive=true; v.slamTimer=65; v.slamAngle=this.aimAngle;
                spawnDamageText(this.x,this.y-70,'SLAM INCOMING!','#ff8844');
            }
        } if(p>=2) {
            // Magnetic dpull + homing rockets
            this.angle+=(this.aimAngle-this.angle)*0.05;
            if(dist>110) this._moveToward(player.x,player.y,2.0);
            v.magnetTimer++;
            if(v.magnetTimer>=120){
                v.magnetTimer=0;
                const toP=Math.atan2(player.y-this.y,player.x-this.x);
                const force=-7;
                player.momentumX+=Math.cos(toP)*force; player.momentumY+=Math.sin(toP)*force;
                spawnDamageText(this.x,this.y-65, 'MAGNETIC PULL!', '#ff8844');
                for(let i=0;i<14;i++){const a=Math.random()*Math.PI*2,sp=1+Math.random()*4;particles.push(new Particle(this.x,this.y,Math.cos(a)*sp,Math.sin(a)*sp,18,3,'surge'));}
            }
            // Homing rockets (curve toward player)
            if(this.atkTimer<=0){ this.atkTimer=130;
                const a=this.aimAngle+(Math.random()-.5)*0.4;
                const rp=new EnemyProjectile(this.x,this.y,Math.cos(a)*5,Math.sin(a)*5,12,9,this.color,this.glow,'ferrion_rocket');
                enemyProjectiles.push(rp);
            }
        } if(p>=1) {
            // Phase 1: Spin + curved magnet sweep
            this.angle=v.spinAngle;
            if(dist>120) this._moveToward(player.x,player.y,1.5);
            v.magnetTimer++;
            if(v.magnetTimer>=150){ v.magnetTimer=0;
                for(let i=0;i<6;i++){
                    const a=this.angle+i/6*Math.PI*2;
                    const rp=new EnemyProjectile(this.x,this.y,Math.cos(a)*5,Math.sin(a)*5,7,7,this.color,this.glow,'ferrion_rocket');
                    rp.noShrapnel=true; // phase-1 sweep: explode visually but no shrapnel bolts
                    enemyProjectiles.push(rp);
                }
                spawnDamageText(this.x,this.y-60,'MAGNET SWEEP!','#ff8844');
            }
        }
    }
}

function spawnRunVan(bx, by){
    // Always place at the boss room's tile center, not the boss entity position
    const bossRoom = roomGraph.find(r => r.type === ROOM_TYPE.BOSS);
    const spawnX = bossRoom ? bossRoom.cx * TILE_SIZE : bx;
    const spawnY = bossRoom ? bossRoom.cy * TILE_SIZE : by;
    runVan = { x: spawnX, y: spawnY, prompt: false, animTimer: 0, launching: false, launchTimer: 0 };
    spawnDamageText(spawnX, spawnY - 140, '★ EXTRACTION VAN ARRIVED ★', '#ffdd00');
}

function updateRunVan(){
    if(!runVan) return;
    runVan.animTimer++;
    const dist = Math.hypot(player.x - runVan.x, player.y - runVan.y);
    runVan.prompt = dist < TILE_SIZE * 2.4 && !runVan.launching;
    if(runVan.launching){
        runVan.launchTimer++;
        if(runVan.launchTimer > 80) triggerRunComplete();
    }
}

function drawRunVan(){
    if(!runVan) return;
    const t = frameTime / 60;
    const x = runVan.x, y = runVan.y;
    const launching = runVan.launching;
    const lp = launching ? Math.min(1, runVan.launchTimer / 80) : 0;
    ctx.save(); ctx.translate(x, y);

    // Vibration when idle / shake on launch — identical to lobby van
    const vib = launching ? (Math.random()-.5)*(lp*8) : Math.sin(t*12)*0.6;
    ctx.translate(vib, 0);

    // Ground shadow
    ctx.globalAlpha = 0.3 - lp*0.25;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(0,28,50,12,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;

    // Hover jets — 4 points
    const jetCols = ['#00ccff','#0099ff','#00ccff','#0099ff'];
    for(let j=0;j<4;j++){
        const jx=-30+j*20, jy=22;
        const jp=0.5+Math.sin(t*6+j)*0.5;
        ctx.fillStyle='rgba(0,180,255,0.2)';
        ctx.beginPath(); ctx.ellipse(jx,jy+4,5,3,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=jetCols[j]; ctx.shadowBlur=6+jp*6; ctx.shadowColor='#0099ff';
        ctx.beginPath(); ctx.arc(jx,jy,3+jp,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
    }

    // Van body
    const vanCol = launching ? `hsl(${(t*200)%360},100%,65%)` : '#1a1430';
    ctx.fillStyle=vanCol; ctx.strokeStyle='#6644cc'; ctx.lineWidth=2;
    ctx.shadowBlur=12+lp*20; ctx.shadowColor='#4422aa';
    roundRect(-42,-18,84,36,6); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;

    // Sticker decals
    ctx.fillStyle='rgba(255,200,0,0.5)'; ctx.font='bold 5px Orbitron';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('★',-28,-6);
    ctx.fillStyle='rgba(255,100,100,0.5)'; ctx.fillText('✦',20,8);

    // Glowing cable lines
    ctx.strokeStyle=`rgba(100,80,255,${0.5+Math.sin(t*4)*0.3})`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-40,-10); ctx.lineTo(40,-10); ctx.stroke();
    ctx.strokeStyle=`rgba(0,200,255,${0.3+Math.sin(t*3+1)*0.2})`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-38,8); ctx.lineTo(38,8); ctx.stroke();

    // Front cab window
    ctx.fillStyle='rgba(0,220,255,0.15)'; ctx.strokeStyle='#44aadd'; ctx.lineWidth=1.5;
    roundRect(20,-12,18,24,3); ctx.fill(); ctx.stroke();

    // Waving arms
    const armAngle = launching ? Math.sin(t*15)*0.8 : Math.sin(t*12)*0.12;
    for(let arm=0;arm<2;arm++){
        const ay=-18+(arm*36), flip=arm===0?-1:1;
        ctx.save(); ctx.translate(-42,ay); ctx.rotate(armAngle*flip);
        ctx.strokeStyle=launching?'#ffcc00':'#8866cc'; ctx.lineWidth=3; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-14*flip,0); ctx.stroke();
        ctx.fillStyle=launching?'#ffcc00':'#aaaadd';
        ctx.shadowBlur=launching?12:4; ctx.shadowColor=ctx.fillStyle;
        ctx.beginPath(); ctx.arc(-14*flip,0,4,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0; ctx.restore();
    }

    // Launch sparks
    if(launching && Math.random()<0.6){
        for(let s=0;s<3;s++) particles.push(
            new Particle(x+(Math.random()-.5)*80, y+(Math.random()-.5)*30,
                (Math.random()-.5)*6,(Math.random()-.5)*6, 16, 4, 'surge'));
    }

    // Prompt
    if(runVan.prompt && !launching){
        const pc = Math.sin(t*4)*0.3+0.7;
        ctx.globalAlpha=pc;
        ctx.fillStyle='#ffffff'; ctx.font='bold 8px Orbitron'; ctx.textAlign='center';
        ctx.shadowBlur=10; ctx.shadowColor='#6644cc';
        ctx.fillText('[E] EXTRACT', 0, -34);
        ctx.shadowBlur=0; ctx.globalAlpha=1;
    }
    if(launching){
        ctx.fillStyle=`rgba(255,200,50,${lp*0.9})`; ctx.font='bold 10px Orbitron';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.shadowBlur=20; ctx.shadowColor='#ffcc00';
        ctx.fillText('EXTRACTING!', 0, -42+lp*-10);
        ctx.shadowBlur=0;
    }
    ctx.restore();
}

    deathData = {
        timer: 0,
        sectorsCleared,
        depth: currentDepth,
        sectorName: currentSector.name.toUpperCase(),
    };
    gameState = 'player_dead';
    // Big death particles
    for(let i=0;i<36;i++){
        const a=Math.random()*Math.PI*2, sp=3+Math.random()*9;
        particles.push(new Particle(player.x,player.y,Math.cos(a)*sp,Math.sin(a)*sp,40+Math.random()*20,6+Math.random()*5,'surge'));
    }
}

function updatePlayerDead(){
    if(deathData) deathData.timer++;
    particles=particles.filter(p=>p.isAlive());
    particles.forEach(p=>p.update());
}

    if(Math.floor(t*1.6)%2===0){
        ctx.fillStyle='rgba(255,100,80,0.75)'; ctx.font='bold 10px Orbitron';
