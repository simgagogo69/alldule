    }
}

function triggerRunComplete(){
    if(!runVan) return;
    // ── Calculate blueprints ────────────────────────────────────────────────
    const sectorBP   = sectorsCleared + 1; // +1 for the boss sector itself
    const modifierBP = activeModifiers.size;
    const diffMult   = selectedDifficulty === 0 ? 0.5 : selectedDifficulty === 2 ? 2 : 1;
    const rawBP      = (sectorBP + modifierBP) * diffMult;
    const earnedBP   = Math.max(1, Math.round(rawBP));
    playerBlueprints += earnedBP;

    runCompleteData = {
        earnedBP,
        totalBP: playerBlueprints,
        sectorBP,
        modifierBP,
        diffMult,
        difficulty: DIFFICULTY_LABELS[selectedDifficulty],
        bossName: activeBoss ? BOSS_DEFS[activeBoss.type].name : 'UNKNOWN',
        timer: 0,
    };
    gameState = 'run_complete';
}

function resetRunState(){
    // Reset all per-run state so the next run starts clean
    playerScrap      = 0;
    sectorsCleared   = 0;
    playerXP         = 0;
    playerLevel      = 1;
    runVan           = null;
    runCompleteData  = null;
    deathData        = null;
    moduleSlots      = [24, -1];
    moduleSlotData   = [null, null];
    activeModuleSlot = 0;
    currentWeapon    = 24;
    inflationCount   = 0;
    slotInactiveFrames = [0, 0];
    // Restore every weapon's ammo to its default so nothing carries over between runs
    for(let i = 0; i < WEAPONS.length; i++) resetModuleAmmo(i);
    // Reset weapon state
    wState.cooldown=0; wState.swinging=false; wState.pikeActive=false;
    wState.holdingFire=false; wState.beamActive=false; wState.spinUp=0;
    wState.cleaverPhase='idle'; wState.reloading=false;
    wState.gravityWells=[]; wState.teslaArcs=[]; wState.plasmaWaves=[];
    wState.needleStack=0; wState.needleBurstActive=false;
    wState.lancerDashing=false; wState.lancerDashCooldown=0;
    wState.sniperCharge=0; wState.sniperCharging=false;
    wState.monoCombo=0; wState.monoComboTimer=0;
    wState.arcCharge=0; wState.trackBeamActive=false;
    // Reset lobby van state so it can launch again
    lobbyState.vanLaunching=false; lobbyState.vanLaunchTimer=0;
    // Reset player combat stats (health set properly by applyDifficultyToRun)
    player.momentumX=0; player.momentumY=0;
    player.health=player.maxHealth; player.energy=player.maxEnergy;
    particles=[];
}

// ── Boss door seal/unseal ──────────────────────────────────────────────────────
function sealBossDoor(){
    const bossRoom = roomGraph.find(r => r.type === ROOM_TYPE.BOSS);
    if(!bossRoom) return;
    // Find the one room connected to the boss room (its parent)
    const parentId = bossRoom.connections.find(cid => roomGraph[cid]?.type !== ROOM_TYPE.BOSS);
    if(parentId === undefined) return;
    const parentRoom = roomGraph[parentId];

    // Walk the corridor between the two room centers and collect floor tiles
    // that lie outside both rooms — those are the corridor tiles.
    const c1x = bossRoom.cx|0,  c1y = bossRoom.cy|0;
    const c2x = parentRoom.cx|0, c2y = parentRoom.cy|0;

    bossDoorTiles = [];
    // Horizontal leg
    const xMin = Math.min(c1x, c2x), xMax = Math.max(c1x, c2x);
    for(let x = xMin; x <= xMax; x++){
        for(let yo = 0; yo <= 1; yo++){
            const ty = c1y + yo;
            const inBoss   = (x>=bossRoom.x   && x<bossRoom.x+bossRoom.w   && ty>=bossRoom.y   && ty<bossRoom.y+bossRoom.h);
            const inParent = (x>=parentRoom.x && x<parentRoom.x+parentRoom.w && ty>=parentRoom.y && ty<parentRoom.y+parentRoom.h);
            if(!inBoss && !inParent && map[ty]?.[x] === T_FLOOR)
                bossDoorTiles.push({x, y:ty});
        }
    }
    // Vertical leg
    const yMin = Math.min(c1y, c2y), yMax = Math.max(c1y, c2y);
    for(let y = yMin; y <= yMax; y++){
        for(let xo = 0; xo <= 1; xo++){
            const tx = c2x + xo;
            const inBoss   = (tx>=bossRoom.x   && tx<bossRoom.x+bossRoom.w   && y>=bossRoom.y   && y<bossRoom.y+bossRoom.h);
            const inParent = (tx>=parentRoom.x && tx<parentRoom.x+parentRoom.w && y>=parentRoom.y && y<parentRoom.y+parentRoom.h);
            if(!inBoss && !inParent && map[y]?.[tx] === T_FLOOR){
                if(!bossDoorTiles.some(t=>t.x===tx&&t.y===y))
                    bossDoorTiles.push({x:tx, y});
            }
        }
    }

    // Replace corridor floor tiles with walls
    for(const t of bossDoorTiles) if(map[t.y]) map[t.y][t.x] = T_WALL;
    spawnDamageText(bossRoom.cx*TILE_SIZE, bossRoom.cy*TILE_SIZE - 80, '⚠ NO ESCAPE ⚠', '#ff2244');
}

function unsealBossDoor(){
    for(const t of bossDoorTiles) if(map[t.y]) map[t.y][t.x] = T_FLOOR;
    bossDoorTiles = [];
}

function spawnBossForRoom(room){
    const bossType = getBossTypeForSector(currentSector.id);
    if(!bossType) return;
    const bx = room.cx * TILE_SIZE;
    const by = room.cy * TILE_SIZE;
    activeBoss = new Boss(bossType, bx, by);
    spawnDamageText(bx, by-100, `⚠ ${BOSS_DEFS[bossType].name} ⚠`, '#ffdd00');
}

// ─── Boss entity draw ─────────────────────────────────────────────────────────
function drawBossEntity(boss){
    if(!boss) return;
    if(boss.dead && boss.deathTimer<=0) return;
    ctx.save();
    if(boss.dead){
        const df=boss.deathTimer/200;
        ctx.globalAlpha=df;
        ctx.translate(boss.x+(Math.random()-.5)*18*(1-df),boss.y+(Math.random()-.5)*18*(1-df));
        ctx.rotate(boss.age*0.12);
        ctx.strokeStyle=boss.color; ctx.lineWidth=3; ctx.shadowBlur=28*df; ctx.shadowColor=boss.glow;
        ctx.beginPath(); ctx.arc(0,0,boss.size*(2.2-df),0,Math.PI*2); ctx.stroke();
        ctx.restore(); return;
    }
    // Invuln flicker
    if(boss.invulnTimer>0 && Math.floor(boss.invulnTimer/4)%2===0){ ctx.restore(); return; }

    // Draw phase-specific pre-body effects (behind body)
    if(boss.type==='luminox') drawLuminoxAfterimages(boss);
    if(boss.type==='sulfura') drawSulfuraSegments(boss);
    if(boss.type==='ferrion') drawFerrionShards(boss);

    ctx.save(); ctx.translate(boss.x,boss.y); ctx.rotate(boss.angle);
    if(boss.type==='luminox') drawLuminoxBody(boss);
    else if(boss.type==='sulfura') drawSulfuraBody(boss);
    else if(boss.type==='ferrion') drawFerrionBody(boss);
    ctx.restore();

    // Boss health arc
    ctx.save(); ctx.translate(boss.x,boss.y);
    const hf=boss.hpFrac;
    ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.arc(0,0,boss.size+12,-Math.PI/2,Math.PI*3/2); ctx.stroke();
    const barCol=hf>0.5?'#44ff44':hf>0.25?'#ffaa00':'#ff2200';
    ctx.strokeStyle=barCol; ctx.shadowBlur=10; ctx.shadowColor=barCol; ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(0,0,boss.size+12,-Math.PI/2,-Math.PI/2+Math.PI*2*hf); ctx.stroke();
    ctx.shadowBlur=0; ctx.restore();

    // Phase indicator dots
    ctx.save(); ctx.translate(boss.x,boss.y);
    for(let i=1;i<=3;i++){
        const dotX=(i-2)*18;
        const active=boss.phase>=i;
        ctx.fillStyle=active?boss.color:'rgba(80,80,80,0.4)';
        ctx.shadowBlur=active?8:0; ctx.shadowColor=boss.glow;
        ctx.beginPath(); ctx.arc(dotX,-boss.size-22,5,0,Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0; ctx.restore();
    ctx.restore();
}

// ─── LUMINOX — crystalline spider, top-down ───────────────────────────────────
function drawLuminoxAfterimages(boss){
    for(const ai of boss.vars.afterimages){
        const af=ai.life/ai.maxLife;
        ctx.save(); ctx.globalAlpha=af*0.28; ctx.translate(ai.x,ai.y); ctx.rotate(ai.angle);
        ctx.strokeStyle=boss.color; ctx.lineWidth=1.5; ctx.shadowBlur=14; ctx.shadowColor=boss.glow;
        ctx.beginPath(); ctx.arc(0,0,boss.size*0.7,0,Math.PI*2); ctx.stroke();
        ctx.restore();
    }
}

function drawLuminoxBody(boss){
    const p=boss.phase, t=boss.age, pulse=Math.sin(t*0.08)*0.4+0.6;
    const sz=boss.size;

    // === 4 LIMBS (spider legs with crystal tips) ===
    for(let li=0;li<4;li++){
        const wp=boss.weakpoints[li];
        const limbAngle=wp.localAngle;
        const limbWorldA=limbAngle; // already in local space
        // Limb has 2 segments
        const seg1R=sz*0.6, seg2R=sz*0.85;
        const jx=Math.cos(limbWorldA)*seg1R, jy=Math.sin(limbWorldA)*seg1R;
        const ex=Math.cos(limbWorldA)*seg2R, ey=Math.sin(limbWorldA)*seg2R;
        const limbWave=Math.sin(t*0.07+li*1.57)*4;
        const perpA=limbWorldA+Math.PI/2;
        const jx2=jx+Math.cos(perpA)*limbWave, jy2=jy+Math.sin(perpA)*limbWave;

        // Outer leg segment
        ctx.strokeStyle='#1a2030'; ctx.lineWidth=7; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(jx2,jy2); ctx.stroke();
        ctx.strokeStyle='#3a5070'; ctx.lineWidth=4.5;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(jx2,jy2); ctx.stroke();
        // Inner leg segment
        ctx.strokeStyle='#1a2030'; ctx.lineWidth=6;
        ctx.beginPath(); ctx.moveTo(jx2,jy2); ctx.lineTo(ex,ey); ctx.stroke();
        ctx.strokeStyle='#2a3a50'; ctx.lineWidth=4;
        ctx.beginPath(); ctx.moveTo(jx2,jy2); ctx.lineTo(ex,ey); ctx.stroke();
        // Joint circle
        ctx.fillStyle='#4a6080'; ctx.shadowBlur=4; ctx.shadowColor=boss.glow;
        ctx.beginPath(); ctx.arc(jx2,jy2,4,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0;
        // Crystal shard tip (WEAKPOINT)
        const destroyed=wp.destroyed;
        const wf=wp.flashTimer>0?1:0;
        const crystalPulse=Math.sin(t*0.14+li*1.1)*0.4+0.6;
        if(!destroyed){
            // Crystal facets (triangle-ish shard cluster)
            const cx2=ex, cy2=ey;
            for(let fi=0;fi<3;fi++){
                const fa=limbWorldA+(fi-1)*0.45;
                const fr=9+fi*1.5;
                ctx.fillStyle=wf?'#ff4444':`rgba(180,210,255,${0.55+crystalPulse*0.35})`;
                ctx.shadowBlur=wf?16:8+crystalPulse*10; ctx.shadowColor=wf?'#ff0000':boss.glow;
                ctx.beginPath();
                ctx.moveTo(cx2,cy2);
                ctx.lineTo(cx2+Math.cos(fa-0.25)*fr, cy2+Math.sin(fa-0.25)*fr);
                ctx.lineTo(cx2+Math.cos(fa+0.25)*fr, cy2+Math.sin(fa+0.25)*fr);
                ctx.closePath(); ctx.fill();
            }
            // Glowing core at crystal base
            ctx.fillStyle=`rgba(220,235,255,${0.7+crystalPulse*0.3})`;
            ctx.shadowBlur=12*crystalPulse; ctx.shadowColor='#ffffff';
            ctx.beginPath(); ctx.arc(cx2,cy2,4,0,Math.PI*2); ctx.fill();
            ctx.shadowBlur=0;
        } else {
            // Destroyed: charred stump
            ctx.fillStyle='#222'; ctx.strokeStyle='#443'; ctx.lineWidth=1;
            ctx.beginPath(); ctx.arc(ex,ey,4,0,Math.PI*2); ctx.fill(); ctx.stroke();
        }
    }

    // === CENTRAL BODY (multi-layered crystalline carapace) ===
    // Outer armored ring
    ctx.fillStyle='#0a0e18';
    ctx.shadowBlur=18; ctx.shadowColor=boss.glow;
    ctx.beginPath(); ctx.arc(0,0,sz*0.65,0,Math.PI*2); ctx.fill();
    // Carapace segments (8-sided)
    ctx.strokeStyle=`rgba(${140+pulse*50|0},170,240,0.7)`; ctx.lineWidth=2;
    ctx.beginPath(); for(let i=0;i<8;i++){const a=i/8*Math.PI*2+t*0.006;i===0?ctx.moveTo(Math.cos(a)*sz*.64,Math.sin(a)*sz*.64):ctx.lineTo(Math.cos(a)*sz*.64,Math.sin(a)*sz*.64);} ctx.closePath(); ctx.stroke();
    ctx.shadowBlur=0;
    // Inner crystal plate
    const innerGrad=ctx.createRadialGradient(0,0,0,0,0,sz*0.48);
    innerGrad.addColorStop(0,'rgba(160,200,255,0.9)'); innerGrad.addColorStop(0.5,'rgba(60,80,140,0.8)'); innerGrad.addColorStop(1,'rgba(10,15,30,0.6)');
    ctx.fillStyle=innerGrad; ctx.beginPath(); for(let i=0;i<8;i++){const a=i/8*Math.PI*2+t*0.006;i===0?ctx.moveTo(Math.cos(a)*sz*.48,Math.sin(a)*sz*.48):ctx.lineTo(Math.cos(a)*sz*.48,Math.sin(a)*sz*.48);} ctx.closePath(); ctx.fill();
    // Crystal facet lines on body
    ctx.strokeStyle='rgba(200,220,255,0.3)'; ctx.lineWidth=1;
    for(let i=0;i<6;i++){const a=i/6*Math.PI*2+t*0.004; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*sz*.45,Math.sin(a)*sz*.45); ctx.stroke();}
    // Inner energy ring
    ctx.strokeStyle=`rgba(160,210,255,${0.4+pulse*0.4})`; ctx.lineWidth=1.5; ctx.shadowBlur=10; ctx.shadowColor=boss.glow;
    ctx.beginPath(); ctx.arc(0,0,sz*0.32,0,Math.PI*2); ctx.stroke(); ctx.shadowBlur=0;

    // === PHASE 3 EYES on sides ===
    if(p>=3){
        for(let ei=0;ei<2;ei++){
            const eyeA=(ei===0?-Math.PI/2:Math.PI/2)+t*0.008;
            const ex2=Math.cos(eyeA)*sz*0.42, ey2=Math.sin(eyeA)*sz*0.42;
            ctx.fillStyle=`rgba(255,80,80,${0.7+Math.sin(boss.vars.eyeGlowPhase+ei)*0.3})`;
            ctx.shadowBlur=16; ctx.shadowColor='#ff2200';
            ctx.beginPath(); ctx.arc(ex2,ey2,6,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#fff'; ctx.shadowBlur=0;
            ctx.beginPath(); ctx.arc(ex2+1.5,ey2-1.5,2,0,Math.PI*2); ctx.fill();
        }
    }
    // Core crystal center
    const coreCol=p>=3?'#ff8888':'#e0f0ff';
    ctx.fillStyle=coreCol; ctx.shadowBlur=18+pulse*8; ctx.shadowColor=p>=3?'#ff2200':boss.glow;
    ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffffff'; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(-2,-2,4,0,Math.PI*2); ctx.fill();
}

// ─── SULFURA — acid cloud serpent, top-down ───────────────────────────────────
function drawSulfuraSegments(boss){
    const segs=boss.vars.segments;
    for(let si=segs.length-1;si>=0;si--){
        const s=segs[si];
        const pct=1-(si/segs.length);
        const r=boss.size*(0.5+pct*0.35);
        const alpha=pct*0.22;
        ctx.save(); ctx.globalAlpha=alpha;
        ctx.fillStyle=boss.color; ctx.shadowBlur=6; ctx.shadowColor=boss.glow;
        ctx.beginPath(); ctx.arc(s.x,s.y,r,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur=0; ctx.restore();
    }
    // Acid puddles
    for(const pd of boss.vars.acidPuddles){
        const lf=pd.life/pd.maxLife;
        ctx.save(); ctx.globalAlpha=lf*0.35;
        ctx.fillStyle='#88ff44'; ctx.shadowBlur=8; ctx.shadowColor='#44aa00';
        ctx.beginPath(); ctx.arc(pd.x,pd.y,pd.r,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#aaff44'; ctx.lineWidth=1;
        ctx.beginPath(); ctx.arc(pd.x,pd.y,pd.r,0,Math.PI*2); ctx.stroke();
        ctx.shadowBlur=0; ctx.restore();
    }
}

function drawSulfuraBody(boss){
    const t=boss.age, p=boss.phase, sz=boss.size;
    const pulse=Math.sin(t*0.07)*0.4+0.6;

    // === NECK / BODY SEGMENTS drawn in local space (boss rotated so +X = forward) ===
    // We draw from tail toward head along the X axis, with lateral sinewave undulation
    const numSegs=10;
    const segSpacing=sz*0.28;
    const undulAmp=sz*0.22;
    const undulFreq=0.5;

    // Build spine points (tail → neck)
    const spinePoints=[];
    for(let si=0;si<numSegs;si++){
        const spineX=-(numSegs-1-si)*segSpacing; // negative = behind head, 0 = base of head
        const spineY=Math.sin(t*0.06+si*undulFreq)*undulAmp*(si/(numSegs-1));
        spinePoints.push({x:spineX,y:spineY});
    }

    // Segment radii: tapers from wide (neck) to thin (tail)
    function segR(si){ return sz*(0.52-si*(0.042)); }

    // === TAIL TIP ===
    const tail=spinePoints[0];
    ctx.fillStyle='#3a1a00'; ctx.shadowBlur=3; ctx.shadowColor=boss.glow;
    ctx.beginPath(); ctx.arc(tail.x,tail.y,segR(0)*0.22,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    // === BODY SEGMENTS (tail to neck) ===
    for(let si=0;si<numSegs;si++){
        const pt=spinePoints[si];
        const r=segR(si);
        const segT=si/(numSegs-1); // 0=tail, 1=neck

        // Segment base fill — gradient from belly to dorsal
        const belly=`rgba(220,${140+si*6},40,0.85)`;
        const dorsal=`rgba(${90+si*8},${60+si*4},10,0.9)`;
        const segGrad=ctx.createRadialGradient(pt.x,pt.y-r*0.25,0,pt.x,pt.y,r);
        segGrad.addColorStop(0,belly); segGrad.addColorStop(0.65,dorsal); segGrad.addColorStop(1,'rgba(30,10,0,0.95)');
        ctx.fillStyle=segGrad; ctx.shadowBlur=segT>0.6?8:4; ctx.shadowColor=boss.glow;
        ctx.beginPath(); ctx.ellipse(pt.x,pt.y,r,r*0.72,0,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;

        // Dorsal ridge line
        ctx.strokeStyle=`rgba(160,${80+si*5},15,0.5)`; ctx.lineWidth=1;
        ctx.beginPath(); ctx.ellipse(pt.x,pt.y-r*0.12,r*0.35,r*0.12,0,0,Math.PI*2); ctx.stroke();

        // Scale pattern (overlapping hexagonal-ish scales)
        if(si>0 && si<numSegs-1){
            const sc=r*0.38;
            for(let row=0;row<2;row++){
                const offY=(row-0.5)*r*0.4;
                const offX=(row%2===0?0:r*0.18);
                ctx.fillStyle=`rgba(${100+si*4},${55+si*3},5,0.35)`;
                ctx.beginPath(); ctx.ellipse(pt.x+offX,pt.y+offY,sc,sc*0.55,0,0,Math.PI*2); ctx.fill();
                ctx.strokeStyle=`rgba(180,${100+si*3},20,0.22)`; ctx.lineWidth=0.8;
                ctx.beginPath(); ctx.ellipse(pt.x+offX,pt.y+offY,sc,sc*0.55,0,0,Math.PI*2); ctx.stroke();
            }
        }

        // Belly scute plates (lighter midline)
        ctx.fillStyle=`rgba(255,${190+si*3},90,0.18)`;
        ctx.beginPath(); ctx.ellipse(pt.x,pt.y,r*0.3,r*0.55,0,0,Math.PI*2); ctx.fill();

        // Segment separation line
        if(si>0){
            const prev=spinePoints[si-1];
            ctx.strokeStyle=`rgba(50,20,0,0.3)`; ctx.lineWidth=r*0.15;
            ctx.beginPath(); ctx.moveTo(prev.x,prev.y+segR(si-1)*0.65); ctx.lineTo(prev.x,prev.y-segR(si-1)*0.65); ctx.stroke();
        }
    }

    // === WEAKPOINT VENTS (on body sides at specific segments) ===
    for(let vi=0;vi<boss.weakpoints.length;vi++){
        const wp=boss.weakpoints[vi];
        // Map vents to mid-body segments (segments 3, 6, 9 for 3 vents)
        const vSeg=Math.round(2+(vi*(numSegs-4)/(boss.weakpoints.length-1||1)));
        const pt=spinePoints[Math.min(vSeg,numSegs-1)];
        const r=segR(vSeg);
        const side=vi%2===0?1:-1;
        const vx=pt.x, vy=pt.y+side*r*0.75;
        const wf=wp.flashTimer>0;
        if(!wp.destroyed){
            const vp=Math.sin(t*0.1+vi*2.1)*0.5+0.5;
            // Vent housing (raised bump on flank)
            ctx.fillStyle=`rgba(${60+vi*10},${30+vi*5},5,0.8)`;
            ctx.beginPath(); ctx.ellipse(vx,vy,r*0.3,r*0.22,0,0,Math.PI*2); ctx.fill();
            // Glowing vent slit
            ctx.fillStyle=wf?'#ff4444':`rgba(180,255,100,${0.65+vp*0.35})`;
            ctx.shadowBlur=wf?18:8+vp*12; ctx.shadowColor=wf?'#ff0000':'#88ff44';
            ctx.beginPath(); ctx.ellipse(vx,vy,r*0.14,r*0.08,0,0,Math.PI*2); ctx.fill();
            // Grill slats
            ctx.strokeStyle=wf?'rgba(255,120,120,0.6)':'rgba(220,255,140,0.45)'; ctx.lineWidth=0.8;
            for(let gi=-1;gi<=1;gi++){
                const gx=vx+gi*r*0.07;
                ctx.beginPath(); ctx.moveTo(gx,vy-r*0.07); ctx.lineTo(gx,vy+r*0.07); ctx.stroke();
            }
            ctx.shadowBlur=0;
        } else {
            // Destroyed vent: charred crater
            ctx.fillStyle='#1a0800'; ctx.strokeStyle='#331100'; ctx.lineWidth=1;
            ctx.beginPath(); ctx.ellipse(vx,vy,r*0.22,r*0.16,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
            ctx.strokeStyle='#443322'; ctx.lineWidth=0.7;
            for(let cr=0;cr<4;cr++){const ca=cr/4*Math.PI*2;ctx.beginPath();ctx.moveTo(vx,vy);ctx.lineTo(vx+Math.cos(ca)*r*0.15,vy+Math.sin(ca)*r*0.15);ctx.stroke();}
        }
    }

    // === HEAD (at origin — forward = +X direction) ===
    const headR=sz*0.56;
    // Jaw / lower head base
    const headGrad=ctx.createRadialGradient(headR*0.15,0,0,0,0,headR);
    headGrad.addColorStop(0,`rgba(255,${180+pulse*40|0},50,0.95)`);
    headGrad.addColorStop(0.4,`rgba(200,100,20,0.88)`);
    headGrad.addColorStop(0.75,'rgba(120,60,10,0.82)');
    headGrad.addColorStop(1,'rgba(50,20,0,0.0)');
    ctx.fillStyle=headGrad; ctx.shadowBlur=14+pulse*8; ctx.shadowColor=boss.glow;
    ctx.beginPath(); ctx.ellipse(headR*0.1,0,headR,headR*0.65,0,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;

    // Head scale texture (crown/top)
    ctx.fillStyle='rgba(140,70,5,0.35)';
    for(let hs=0;hs<3;hs++){
        ctx.beginPath(); ctx.ellipse(headR*(0.2-hs*0.18), hs%2===0?-headR*0.15:headR*0.12, headR*0.28, headR*0.18, 0, 0, Math.PI*2); ctx.fill();
    }

    // Jaw line (darker lower region)
    ctx.fillStyle='rgba(90,40,0,0.55)';
    ctx.beginPath(); ctx.ellipse(headR*0.12,headR*0.28,headR*0.75,headR*0.28,0,0,Math.PI*2); ctx.fill();

    // Nostril slits
    ctx.fillStyle='rgba(20,8,0,0.8)';
    for(let ns=0;ns<2;ns++){
        const ny=(ns===0?-1:1)*headR*0.2;
        ctx.beginPath(); ctx.ellipse(headR*0.72,ny,headR*0.06,headR*0.03,Math.PI*0.3,0,Math.PI*2); ctx.fill();
    }

    // === EYES (vivid, with slit pupils) ===
    const eyeX=headR*0.32, eyeR=headR*0.16;
    for(let ei=0;ei<2;ei++){
        const ey=(ei===0?-1:1)*headR*0.35;
        // Sclera / iris
        const eyeCol=p>=3?'#ff5500':p>=2?'#ffcc00':'#ddff00';
        ctx.fillStyle=eyeCol; ctx.shadowBlur=14+pulse*8; ctx.shadowColor=p>=3?'#ff2200':'#aaff00';
        ctx.beginPath(); ctx.arc(eyeX,ey,eyeR,0,Math.PI*2); ctx.fill();
        // Iris ring detail
        ctx.strokeStyle=p>=3?'rgba(255,120,0,0.7)':'rgba(80,180,0,0.5)'; ctx.lineWidth=1;
        ctx.shadowBlur=0; ctx.beginPath(); ctx.arc(eyeX,ey,eyeR*0.7,0,Math.PI*2); ctx.stroke();
        // Slit pupil (vertical, rotated)
        ctx.fillStyle='#000';
        ctx.beginPath(); ctx.ellipse(eyeX,ey,eyeR*0.22,eyeR*0.62,0,0,Math.PI*2); ctx.fill();
        // Eye glint
        ctx.fillStyle='rgba(255,255,255,0.7)';
        ctx.beginPath(); ctx.arc(eyeX-eyeR*0.25,ey-eyeR*0.3,eyeR*0.2,0,Math.PI*2); ctx.fill();
    }

    // === FORKED TONGUE ===
    const tongueFlick=Math.sin(t*0.18)*0.5+0.5;
    if(tongueFlick>0.2){
        const tongueLen=headR*(0.55+tongueFlick*0.3);
        ctx.strokeStyle='rgba(255,30,80,0.85)'; ctx.lineWidth=2; ctx.lineCap='round';
        ctx.shadowBlur=6; ctx.shadowColor='#ff1144';
        ctx.beginPath(); ctx.moveTo(headR*0.85,0); ctx.lineTo(headR*0.85+tongueLen*0.6,0); ctx.stroke();
        // Fork prongs
        ctx.beginPath(); ctx.moveTo(headR*0.85+tongueLen*0.6,0);
        ctx.lineTo(headR*0.85+tongueLen,headR*0.12); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(headR*0.85+tongueLen*0.6,0);
        ctx.lineTo(headR*0.85+tongueLen,-headR*0.12); ctx.stroke();
        ctx.shadowBlur=0; ctx.lineCap='butt';
    }

    // === PHASE 2+ CLOUD TENDRILS ===
    if(p>=2){
        ctx.globalAlpha=0.32;
        for(let ti=0;ti<6;ti++){
            const ta=ti/6*Math.PI*2+t*0.022;
            const trR=sz*0.55+Math.sin(t*0.04+ti)*8;
            ctx.strokeStyle='rgba(180,255,100,0.55)'; ctx.lineWidth=2+Math.sin(t*0.07+ti)*1.2;
            ctx.shadowBlur=8; ctx.shadowColor='#88ff44';
            ctx.beginPath();
            ctx.moveTo(Math.cos(ta)*sz*0.28, Math.sin(ta)*sz*0.28);
            ctx.lineTo(Math.cos(ta)*trR, Math.sin(ta)*trR);
            ctx.stroke();
        }
        ctx.globalAlpha=1; ctx.shadowBlur=0;
    }

    // === CORE THROAT GLOW ===
    ctx.fillStyle=p>=3?'#ff8800':'#ffcc44'; ctx.shadowBlur=16+pulse*8; ctx.shadowColor=boss.glow;
    ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,220,0.8)'; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(-1.5,-2,3,0,Math.PI*2); ctx.fill();
}

// ─── FERRION — magnetic sentinel robot, top-down ─────────────────────────────
function drawFerrionShards(boss){
    if(boss.phase<3) return;
    for(const s of boss.vars.shards){
        const sx=boss.x+Math.cos(s.a)*s.r, sy=boss.y+Math.sin(s.a)*s.r;
        const lf=s.life/280;
        ctx.save(); ctx.translate(sx,sy); ctx.rotate(s.a*3);
        ctx.globalAlpha=lf*0.85;
        ctx.fillStyle='#cc4422'; ctx.strokeStyle='#ff6644'; ctx.lineWidth=1.2;
        ctx.shadowBlur=8; ctx.shadowColor='#ff4422';
        // Metallic shard (elongated diamond)
        ctx.beginPath(); ctx.moveTo(0,-9); ctx.lineTo(4,0); ctx.lineTo(0,9); ctx.lineTo(-4,0); ctx.closePath();
        ctx.fill(); ctx.stroke(); ctx.shadowBlur=0; ctx.restore();
    }
    // Phase 3 slam line warning
    if(boss.vars.slamActive){
        const pct=1-boss.vars.slamTimer/65;
        ctx.save(); ctx.translate(boss.x,boss.y); ctx.rotate(boss.vars.slamAngle);
        ctx.strokeStyle=`rgba(255,${80+pct*120|0},50,${0.3+pct*0.5})`; ctx.lineWidth=2+pct*20; ctx.shadowBlur=14; ctx.shadowColor='#ff5533';
        ctx.setLineDash([10,8]); ctx.lineDashOffset=-(boss.age%18);
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(420,0); ctx.stroke();
        ctx.setLineDash([]); ctx.shadowBlur=0; ctx.restore();
    }
}

function drawFerrionBody(boss){
    const t=boss.age, p=boss.phase, sz=boss.size;
    const pulse=Math.sin(t*0.07)*0.4+0.6;
    const spinning=t*0.04;

    // === OUTER MAGNETIC FIELD RINGS ===
    for(let ri=0;ri<3;ri++){
        const ra=boss.vars.magnetFieldAngle*(1+ri*0.4)+ri*Math.PI*0.6;
        const rop=ri*Math.PI/3;
        ctx.strokeStyle=`rgba(255,${80+ri*30},40,${0.18+pulse*0.1})`; ctx.lineWidth=1.5;
        ctx.shadowBlur=6; ctx.shadowColor=boss.glow;
        ctx.beginPath(); ctx.ellipse(0,0,sz*0.9+ri*6,sz*0.4+ri*4,ra+rop,0,Math.PI*2); ctx.stroke();
    }
    ctx.shadowBlur=0;

    // === BODY HEXAGON (main armored hull) ===
    ctx.fillStyle='#1a0800';
    ctx.beginPath(); for(let i=0;i<6;i++){const a=i/6*Math.PI*2;i===0?ctx.moveTo(Math.cos(a)*sz*.7,Math.sin(a)*sz*.7):ctx.lineTo(Math.cos(a)*sz*.7,Math.sin(a)*sz*.7);} ctx.closePath(); ctx.fill();
    // Armor plate segments (inner hex divisions)
    ctx.strokeStyle='#3a1400'; ctx.lineWidth=1.5;
    for(let i=0;i<6;i++){
        const a=i/6*Math.PI*2, na=(i+1)/6*Math.PI*2;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*sz*.7,Math.sin(a)*sz*.7); ctx.lineTo(Math.cos(na)*sz*.7,Math.sin(na)*sz*.7); ctx.closePath(); ctx.stroke();
    }
    // Outer hull glow
    ctx.strokeStyle=`rgba(255,${80+pulse*50|0},40,0.85)`; ctx.lineWidth=2.5; ctx.shadowBlur=12+pulse*8; ctx.shadowColor=boss.glow;
    ctx.beginPath(); for(let i=0;i<6;i++){const a=i/6*Math.PI*2;i===0?ctx.moveTo(Math.cos(a)*sz*.7,Math.sin(a)*sz*.7):ctx.lineTo(Math.cos(a)*sz*.7,Math.sin(a)*sz*.7);} ctx.closePath(); ctx.stroke(); ctx.shadowBlur=0;

    // === ROTATING ARMS (2 arms with energy cores) ===
    const armA=p>=3?t*0.06:t*0.04;
    for(let arm=0;arm<2;arm++){
        ctx.save(); ctx.rotate(arm===0?armA:armA+Math.PI);
        // Arm shaft
        ctx.fillStyle='#2a0e00'; ctx.strokeStyle='#441800'; ctx.lineWidth=1.5;
        ctx.fillRect(sz*.28,-7,sz*.5,14); ctx.strokeRect(sz*.28,-7,sz*.5,14);
        // Rivets on arm
        ctx.fillStyle='#553322';
        for(let ri=0;ri<3;ri++) ctx.beginPath(), ctx.arc(sz*.35+ri*sz*.13,-3,2.5,0,Math.PI*2), ctx.fill();
        // === WEAKPOINT: Side energy core on each arm ===
        const wp=boss.weakpoints[arm];
        const wf2=wp&&wp.flashTimer>0;
        if(wp&&!wp.destroyed){
            const cp=Math.sin(t*0.12+arm*Math.PI)*0.5+0.5;
            // Core housing (circular mount)
            ctx.fillStyle='#3a1800'; ctx.strokeStyle=wf2?'#ff4444':boss.color; ctx.lineWidth=2;
            ctx.shadowBlur=wf2?18:8+cp*10; ctx.shadowColor=wf2?'#ff0000':boss.glow;
            ctx.beginPath(); ctx.arc(sz*.78,0,9,0,Math.PI*2); ctx.fill(); ctx.stroke();
            // Core inner glow
            const cg2=ctx.createRadialGradient(sz*.78,0,0,sz*.78,0,7);
            cg2.addColorStop(0,'#ffaa55'); cg2.addColorStop(1,wf2?'#ff4444':boss.color);
            ctx.fillStyle=cg2; ctx.shadowBlur=12*cp; ctx.shadowColor=boss.glow;
            ctx.beginPath(); ctx.arc(sz*.78,0,7,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
            // Energy arcs from core
            if(Math.random()<0.3){
                ctx.strokeStyle=`rgba(255,${80+cp*100|0},40,0.6)`; ctx.lineWidth=1;
                ctx.beginPath(); ctx.moveTo(sz*.78,0); ctx.lineTo(sz*.78+Math.random()*10-5, (Math.random()-.5)*10); ctx.stroke();
            }
        } else if(wp&&wp.destroyed){
            // Destroyed core: cracked dark remnant
            ctx.fillStyle='#222'; ctx.strokeStyle='#441100'; ctx.lineWidth=1;
            ctx.beginPath(); ctx.arc(sz*.78,0,9,0,Math.PI*2); ctx.fill(); ctx.stroke();
            // Crack lines
            ctx.strokeStyle='#333'; ctx.lineWidth=1;
            for(let cr=0;cr<4;cr++){const ca=cr/4*Math.PI*2;ctx.beginPath();ctx.moveTo(sz*.78,0);ctx.lineTo(sz*.78+Math.cos(ca)*8,Math.sin(ca)*8);ctx.stroke();}
        }
        // Arm tip cannon
        ctx.fillStyle='#1a0800';
        ctx.beginPath(); ctx.arc(sz*.78+10,0,5,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=boss.color; ctx.shadowBlur=8; ctx.shadowColor=boss.glow;
        ctx.beginPath(); ctx.arc(sz*.78+10,0,3,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
        ctx.restore();
    }

    // === INNER ROTATING RING (magnetic coil) ===
    ctx.save(); ctx.rotate(spinning*1.8);
    ctx.strokeStyle=`rgba(255,120,50,${0.4+pulse*0.35})`; ctx.lineWidth=2;
    ctx.shadowBlur=8; ctx.shadowColor=boss.glow;
    for(let ri=0;ri<4;ri++){
        const a=ri/4*Math.PI*2;
        ctx.beginPath(); ctx.moveTo(Math.cos(a)*sz*.22,Math.sin(a)*sz*.22);
        ctx.lineTo(Math.cos(a)*sz*.48,Math.sin(a)*sz*.48); ctx.stroke();
    }
    ctx.strokeStyle=`rgba(255,80,30,0.35)`; ctx.lineWidth=1.5; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.arc(0,0,sz*.35,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
    ctx.shadowBlur=0; ctx.restore();

    // === PHASE 2 BACK NODES ===
    if(p>=2){
        for(const bn of boss.vars.backNodes){
            const bnX=Math.cos(bn.localAngle)*sz*.72, bnY=Math.sin(bn.localAngle)*sz*.72;
            const bnf=bn.flashTimer>0;
            if(!bn.destroyed){
                const bnp=Math.sin(t*0.1+bn.localAngle)*0.5+0.5;
                ctx.fillStyle='#2a0a00'; ctx.strokeStyle=bnf?'#ff4444':'#ff6644'; ctx.lineWidth=1.5;
                ctx.shadowBlur=bnf?16:7+bnp*8; ctx.shadowColor=bnf?'#ff0000':boss.glow;
                ctx.beginPath(); ctx.arc(bnX,bnY,7,0,Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle=`rgba(255,${90+bnp*80|0},40,0.9)`; ctx.shadowBlur=10;
                ctx.beginPath(); ctx.arc(bnX,bnY,4.5,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
            } else {
                ctx.fillStyle='#111'; ctx.strokeStyle='#331100'; ctx.lineWidth=1;
                ctx.beginPath(); ctx.arc(bnX,bnY,7,0,Math.PI*2); ctx.fill(); ctx.stroke();
            }
        }
    }

    // === PHASE 3 FLOAT GLOW (energy corona) ===
    if(p>=3){
        ctx.globalAlpha=0.2+pulse*0.15;
        const floatGrad=ctx.createRadialGradient(0,0,sz*.3,0,0,sz*.9);
        floatGrad.addColorStop(0,'rgba(255,80,40,0.7)'); floatGrad.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=floatGrad; ctx.beginPath(); ctx.arc(0,0,sz*.9,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha=1;
    }

    // === CORE CENTER (power reactor) ===
    const coreGrad=ctx.createRadialGradient(0,0,0,0,0,12);
    coreGrad.addColorStop(0,'#fff'); coreGrad.addColorStop(0.4,p>=3?'#ff8844':'#ff5533'); coreGrad.addColorStop(1,boss.glow);
    ctx.fillStyle=coreGrad; ctx.shadowBlur=18+pulse*10; ctx.shadowColor=boss.glow;
    ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill();
    // Center cross detail
    ctx.strokeStyle='rgba(255,200,180,0.6)'; ctx.lineWidth=1.5; ctx.shadowBlur=0;
    ctx.beginPath(); ctx.moveTo(-6,0); ctx.lineTo(6,0); ctx.moveTo(0,-6); ctx.lineTo(0,6); ctx.stroke();
}

// ─── Boss HUD (large health bar at bottom) ────────────────────────────────────
function drawBossHUD(){
    if(!activeBoss) return;
    // Victory overlay when boss is defeated and dying
    if(activeBoss.dead && activeBoss.deathTimer>0){
        const W=canvas.width, H=canvas.height;
        const pct=1-activeBoss.deathTimer/200;
        const alpha=Math.min(pct*1.5,0.72);
        ctx.save();
        ctx.fillStyle=`rgba(0,0,0,${alpha})`;
        ctx.fillRect(0,0,W,H);
        if(pct>0.3){
            const def=BOSS_DEFS[activeBoss.type];
            const ta=(pct-0.3)/0.7;
            ctx.globalAlpha=ta;
            ctx.fillStyle='#ffdd00'; ctx.font='bold 32px Orbitron';
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.shadowBlur=24; ctx.shadowColor='#ff8800';
            ctx.fillText('BOSS DEFEATED', W/2, H/2-30);
            ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='bold 14px Orbitron';
            ctx.shadowBlur=10; ctx.shadowColor='#ffffff44';
            ctx.fillText(def.name.toUpperCase()+' — '+def.subtitle.toUpperCase(), W/2, H/2+10);
            ctx.fillStyle='rgba(100,255,100,0.7)'; ctx.font='bold 10px Orbitron';
            ctx.shadowBlur=0;
            ctx.fillText('SECTOR CLEARED', W/2, H/2+36);
            ctx.globalAlpha=1;
        }
        ctx.restore();
        return;
    }
    if(activeBoss.dead) return;
    const W=canvas.width, H=canvas.height;
    const barW=Math.min(520, W*0.55), barH=18;
    const bx=W/2-barW/2, by=H-52;
    const def=BOSS_DEFS[activeBoss.type];
    const hf=activeBoss.hpFrac;
    const now=Date.now();
    const pulse=Math.sin(now/280)*0.4+0.6;

    // Intro banner
    if(activeBoss.introTimer>0){
        const tf=activeBoss.introTimer/150;
        ctx.save(); ctx.globalAlpha=tf*0.9;
        ctx.fillStyle='rgba(0,0,0,0.85)';
        ctx.fillRect(W/2-200,H/2-50,400,100);
        ctx.strokeStyle=activeBoss.color; ctx.lineWidth=2;
        ctx.shadowBlur=20; ctx.shadowColor=activeBoss.glow;
        ctx.strokeRect(W/2-200,H/2-50,400,100);
        ctx.fillStyle=activeBoss.color; ctx.font='bold 22px Orbitron';
        ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.shadowBlur=16;
        ctx.fillText(def.name, W/2, H/2-14);
        ctx.fillStyle='rgba(200,200,200,0.8)'; ctx.font='bold 11px Orbitron'; ctx.shadowBlur=0;
        ctx.fillText(def.subtitle.toUpperCase(), W/2, H/2+12);
        ctx.restore(); return;
    }

    ctx.save();
    // Background bar track
    ctx.fillStyle='rgba(0,0,0,0.75)';
    roundRect(bx-4, by-4, barW+8, barH+8, 4); ctx.fill();
    ctx.strokeStyle='rgba(100,50,50,0.6)'; ctx.lineWidth=1;
    roundRect(bx-4, by-4, barW+8, barH+8, 4); ctx.stroke();

    // Filled bar
    const barCol=hf>0.5?'#ff3366':hf>0.25?'#ff8800':'#ff1111';
    const barFilled=barW*hf;
    const bgGrad=ctx.createLinearGradient(bx,by,bx+barFilled,by+barH);
    bgGrad.addColorStop(0,barCol+'dd'); bgGrad.addColorStop(0.5,'#ffffff44'); bgGrad.addColorStop(1,barCol+'dd');
    ctx.fillStyle=bgGrad; ctx.shadowBlur=8+pulse*6; ctx.shadowColor=barCol;
    roundRect(bx,by,Math.max(barFilled,2),barH,3); ctx.fill(); ctx.shadowBlur=0;

    // Phase dividers
    for(let ph=1;ph<=2;ph++){
        const px2=bx+barW*(ph===1?def.p2:def.p3);
        ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(px2,by-2); ctx.lineTo(px2,by+barH+2); ctx.stroke();
    }

    // Boss name label
    ctx.fillStyle=activeBoss.color; ctx.font='bold 9px Orbitron';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.shadowBlur=8; ctx.shadowColor=activeBoss.glow;
    ctx.fillText(`${def.name} — ${def.subtitle.toUpperCase()} — PHASE ${activeBoss.phase}`, W/2, by-6);
    ctx.shadowBlur=0;
    // HP numbers
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='bold 7px Orbitron'; ctx.textAlign='right';
    ctx.fillText(`${activeBoss.hp|0} / ${activeBoss.maxHp}`, bx+barW, by+barH+12);
    ctx.restore();
}
// ─── Spawn ────────────────────────────────────────────────────────────────────
function spawnEnemies(){
    enemies=[]; enemyProjectiles=[];
    const sid=currentSector.id;
    const wave=SECTOR_ENEMIES[sid];
    if(!wave) return;
    // Use rooms[1..] to avoid player start room
    const spawnRooms=rooms.slice(1);
    let ri=0;
    for(const entry of wave){
        for(let n=0;n<entry.count;n++){
            const room=spawnRooms[ri%spawnRooms.length]; ri++;
            const ex=(room.x+1+Math.random()*(room.w-2))*TILE_SIZE;
            const ey=(room.y+1+Math.random()*(room.h-2))*TILE_SIZE;
            enemies.push(new Enemy(entry.type,ex,ey));
        }
    }
}

// ─── Enemy projectile ─────────────────────────────────────────────────────────
class EnemyProjectile {
    constructor(x,y,vx,vy,dmg,radius,color,glow,kind='bolt'){
        this.x=x; this.y=y; this.vx=vx; this.vy=vy;
        this.dmg=dmg; this.radius=radius; this.color=color; this.glow=glow;
        this.kind=kind; this.alive=true; this.age=0;
        this.stickTimer=0; // for reactor drone plasma
    }
    update(){
        this.age++;
        if(this.kind==='plasma'&&this.stickTimer>0){ this.stickTimer--; if(this.stickTimer<=0) this.explodePlasma(); return; }

        // ── Lunar curve: gradually bend velocity toward player ────────────────
        if(this.kind==='lunar_curve'){
            const toPlayerAngle = Math.atan2(player.y-this.y, player.x-this.x);
            const curAngle = Math.atan2(this.vy, this.vx);
            let diff = toPlayerAngle - curAngle;
            while(diff > Math.PI) diff -= Math.PI*2;
            while(diff < -Math.PI) diff += Math.PI*2;
            const turn = Math.min(Math.abs(diff), (this.curveStrength||0.018)) * Math.sign(diff) * (this.curveDir||1);
            const newAngle = curAngle + turn;
            const spd = Math.hypot(this.vx, this.vy);
            this.vx = Math.cos(newAngle) * spd;
            this.vy = Math.sin(newAngle) * spd;
        }

        // ── Ferrion rocket: 300-frame lifespan, last 60 frames = speed burst ──
        if(this.kind==='ferrion_rocket'){
            const maxLife=300, burstAt=60;
            const remaining=maxLife-this.age;
            // Curve toward player
            const toPlayerAngle=Math.atan2(player.y-this.y, player.x-this.x);
            const curAngle=Math.atan2(this.vy,this.vx);
            let diff=toPlayerAngle-curAngle;
            while(diff>Math.PI) diff-=Math.PI*2;
            while(diff<-Math.PI) diff+=Math.PI*2;
            const turn=Math.min(Math.abs(diff),0.028)*Math.sign(diff);
            const newAngle=curAngle+turn;
            let spd=Math.hypot(this.vx,this.vy);
            // Last second: accelerate sharply
            if(remaining<=burstAt){
                const burstT=1-(remaining/burstAt); // 0→1
                spd=5+burstT*5; // ramp from 5 to 10
                if(remaining===burstAt) spawnDamageText(this.x,this.y-16,'BOOST!','#ff8844');
            }
            this.vx=Math.cos(newAngle)*spd;
            this.vy=Math.sin(newAngle)*spd;
            // Lifespan expiry → explode
            if(this.age>=maxLife){
                this._ferrionExplode();
                this.alive=false; return;
            }
            // Emit thruster trail
            if(Math.random()<0.5){
                const bA=newAngle+Math.PI+(Math.random()-0.5)*0.4;
                particles.push(new Particle(this.x,this.y,Math.cos(bA)*(2+Math.random()*3),Math.sin(bA)*(2+Math.random()*3),remaining<=burstAt?18:12,remaining<=burstAt?4:3,'surge'));
            }
        }

        // ── Fire wheel: spin angle tracked, roll along floor ─────────────────
        if(this.kind==='firewheel'){
            this.spinAngle = (this.spinAngle||0) + (this.spinSpeed||0.2);
            // Slight deceleration as it rolls
            this.vx *= 0.992; this.vy *= 0.992;
            // Emit fire particles
            if(Math.random() < 0.4){
                particles.push(new Particle(this.x, this.y,
                    (Math.random()-0.5)*2, (Math.random()-0.5)*2, 14, 4, 'surge'));
            }
        }

        this.x+=this.vx; this.y+=this.vy;
        const t=map[Math.floor(this.y/TILE_SIZE)]?.[Math.floor(this.x/TILE_SIZE)];
        if(t===T_WALL||t===T_VOID){ this.alive=false; return; }
        if(this.x<0||this.x>MAP_W*TILE_SIZE||this.y<0||this.y>MAP_H*TILE_SIZE){this.alive=false;return;}
        // Hit player
        if(Math.hypot(this.x-player.x,this.y-player.y)<this.radius+player.size){
            hurtPlayer(this.dmg);
            for(let i=0;i<8;i++){
                const a=Math.random()*Math.PI*2;
                particles.push(new Particle(player.x,player.y,Math.cos(a)*3,Math.sin(a)*3,14,3,'spark'));
            }
            if(this.kind==='ferrion_rocket'){ this._ferrionExplode(); }
            this.alive=false;
        }
        // Plasma orb: stop at range and arm
        if(this.kind==='plasma'&&this.age>50&&this.stickTimer===0){
            this.vx=0; this.vy=0; this.stickTimer=55;
        }
    }
    _ferrionExplode(){
        const expR=90;
        // Particle burst
        for(let i=0;i<28;i++){
            const a=Math.random()*Math.PI*2, sp=3+Math.random()*10;
            particles.push(new Particle(this.x,this.y,Math.cos(a)*sp,Math.sin(a)*sp,28+Math.random()*14,5+Math.random()*3,'surge'));
        }
        for(let i=0;i<16;i++){
            const a=Math.random()*Math.PI*2, sp=1.5+Math.random()*5;
            particles.push(new Particle(this.x,this.y,Math.cos(a)*sp,Math.sin(a)*sp,18,3,'spark'));
        }
        camera.x+=(Math.random()-.5)*14; camera.y+=(Math.random()-.5)*14;
        // Radial shrapnel bolts — only for phase-2+ homing rockets, not phase-1 sweep rockets
        if(!this.noShrapnel){
            for(let i=0;i<8;i++){
                const a=i/8*Math.PI*2+(Math.random()-0.5)*0.2;
                enemyProjectiles.push(new EnemyProjectile(
                    this.x,this.y,Math.cos(a)*7,Math.sin(a)*7,
                    4,5,this.color,this.glow,'bolt'
                ));
            }
        }
        // Splash damage to player if close
        if(Math.hypot(this.x-player.x,this.y-player.y)<expR){
            const falloff=1-Math.hypot(this.x-player.x,this.y-player.y)/expR;
            const splashDmg=Math.round(10*falloff);
            if(splashDmg>0){
                hurtPlayer(splashDmg);
                spawnDamageText(player.x,player.y-32,'ROCKET BLAST!','#ff5533');
            }
        }
    }
    explodePlasma(){
        const rad=100;
        for(let i=0;i<18;i++){
            const a=Math.random()*Math.PI*2, sp=2+Math.random()*5;
            particles.push(new Particle(this.x,this.y,Math.cos(a)*sp,Math.sin(a)*sp,22,5,'spark'));
        }
        camera.x+=(Math.random()-.5)*10; camera.y+=(Math.random()-.5)*10;
        if(Math.hypot(this.x-player.x,this.y-player.y)<rad){
            hurtPlayer(5);
        }
        this.alive=false;
    }
    draw(){
        ctx.save();
        ctx.globalAlpha=0.92;
        if(this.kind==='plasma'&&this.stickTimer>0){
            const pf=this.stickTimer/55;
            const pulse=Math.sin(this.age*.25)*.5+.5;
            ctx.fillStyle=this.color; ctx.shadowBlur=16+pulse*12; ctx.shadowColor=this.glow;
            ctx.beginPath(); ctx.arc(this.x,this.y,6+pulse*3,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle=this.color; ctx.lineWidth=1.5; ctx.globalAlpha=pf*.5;
            ctx.beginPath(); ctx.arc(this.x,this.y,18+(1-pf)*30,0,Math.PI*2); ctx.stroke();
        } else if(this.kind==='laser_dot'){
            // just a fast dot — drawn as part of beam
        } else if(this.kind==='lunar_curve'){
            // Slow glowing orb with a curving tail
            const pulse=Math.sin(this.age*0.15)*0.4+0.6;
            ctx.fillStyle=this.color; ctx.shadowBlur=14+pulse*8; ctx.shadowColor=this.glow;
            ctx.beginPath(); ctx.arc(this.x,this.y,5+pulse*2,0,Math.PI*2); ctx.fill();
            // Curved trail (last 4 positions approximated)
            ctx.globalAlpha=0.25;
            for(let tr=1;tr<=3;tr++){
                ctx.beginPath(); ctx.arc(this.x-this.vx*tr*1.5,this.y-this.vy*tr*1.5,(5-tr)*0.9,0,Math.PI*2); ctx.fill();
            }
            ctx.shadowBlur=0;
        } else if(this.kind==='firewheel'){
            // Spinning fire disc
            const sa=this.spinAngle||0;
            ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(sa);
            ctx.shadowBlur=18; ctx.shadowColor='#ff4400';
            // Outer ring
            ctx.strokeStyle='#ff6600'; ctx.lineWidth=2.5;
            ctx.beginPath(); ctx.arc(0,0,9,0,Math.PI*2); ctx.stroke();
            // Spokes
            ctx.strokeStyle='#ffaa00'; ctx.lineWidth=1.5;
            for(let s=0;s<6;s++){
                const sa2=s/6*Math.PI*2;
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(sa2)*9,Math.sin(sa2)*9); ctx.stroke();
            }
            // Core
            ctx.fillStyle='#ffcc44'; ctx.shadowBlur=10;
            ctx.beginPath(); ctx.arc(0,0,3.5,0,Math.PI*2); ctx.fill();
            ctx.shadowBlur=0; ctx.restore();
        } else if(this.kind==='ferrion_rocket'){
            // Magnetic homing rocket — angular with warning ring in final second
            const remaining=300-this.age;
            const isBoosting=remaining<=60;
            const boostT=isBoosting?(1-remaining/60):0;
            const vAngle=Math.atan2(this.vy,this.vx);
            ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(vAngle);
            // Warning pulse ring when boosting
            if(isBoosting){
                const rp=Math.sin(this.age*0.35)*0.5+0.5;
                ctx.globalAlpha=(0.3+rp*0.4)*boostT;
                ctx.strokeStyle='#ff3300'; ctx.lineWidth=1.5;
                ctx.shadowBlur=8; ctx.shadowColor='#ff2200';
                ctx.beginPath(); ctx.arc(0,0,12+rp*8,0,Math.PI*2); ctx.stroke();
                ctx.shadowBlur=0; ctx.globalAlpha=0.92;
            }
            // Rocket body: elongated hexagonal hull
            const rLen=isBoosting?13+boostT*4:12, rW=isBoosting?5+boostT*2:5;
            ctx.fillStyle='#2a0800';
            ctx.beginPath();
            ctx.moveTo(rLen,0);
            ctx.lineTo(rLen*0.3,rW);
            ctx.lineTo(-rLen*0.5,rW*0.7);
            ctx.lineTo(-rLen*0.8,0);
            ctx.lineTo(-rLen*0.5,-rW*0.7);
            ctx.lineTo(rLen*0.3,-rW);
            ctx.closePath(); ctx.fill();
            // Hull glow outline
            ctx.strokeStyle=isBoosting?'#ff3300':this.color;
            ctx.lineWidth=1.5; ctx.shadowBlur=isBoosting?16+boostT*12:8; ctx.shadowColor=isBoosting?'#ff2200':this.glow;
            ctx.beginPath();
            ctx.moveTo(rLen,0); ctx.lineTo(rLen*0.3,rW); ctx.lineTo(-rLen*0.5,rW*0.7);
            ctx.lineTo(-rLen*0.8,0); ctx.lineTo(-rLen*0.5,-rW*0.7); ctx.lineTo(rLen*0.3,-rW);
            ctx.closePath(); ctx.stroke(); ctx.shadowBlur=0;
            // Nose cone energy tip
            ctx.fillStyle=isBoosting?'#ff6633':'#ff9966';
            ctx.shadowBlur=isBoosting?12+boostT*10:6; ctx.shadowColor=isBoosting?'#ff2200':this.glow;
            ctx.beginPath(); ctx.arc(rLen,0,isBoosting?3.5+boostT*2:3,0,Math.PI*2); ctx.fill();
            ctx.shadowBlur=0;
            // Side fins
            ctx.fillStyle='#441800';
            ctx.beginPath(); ctx.moveTo(-rLen*0.4,rW); ctx.lineTo(-rLen*0.85,rW*1.9); ctx.lineTo(-rLen*0.8,0); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(-rLen*0.4,-rW); ctx.lineTo(-rLen*0.85,-rW*1.9); ctx.lineTo(-rLen*0.8,0); ctx.closePath(); ctx.fill();
            // Thruster glow at rear
            const thrPulse=Math.sin(this.age*0.3)*0.4+0.6;
            const thrCol=isBoosting?`rgba(255,80,20,${0.8+thrPulse*0.2})`:`rgba(255,150,60,${0.5+thrPulse*0.3})`;
            ctx.fillStyle=thrCol; ctx.shadowBlur=isBoosting?18+boostT*14:10; ctx.shadowColor='#ff4400';
            ctx.beginPath(); ctx.arc(-rLen*0.8,0,isBoosting?4+boostT*3:3,0,Math.PI*2); ctx.fill();
            ctx.shadowBlur=0;
            // Lifespan countdown ring (full circle depleting over 300 frames)
            const lifeFrac=remaining/300;
            ctx.strokeStyle=lifeFrac>0.4?`rgba(255,180,80,0.4)`:`rgba(255,60,30,0.6)`;
            ctx.lineWidth=1.2;
            ctx.beginPath(); ctx.arc(0,0,rLen+4,-Math.PI/2,-Math.PI/2+Math.PI*2*lifeFrac); ctx.stroke();
            ctx.restore();
        } else {
            ctx.fillStyle=this.color; ctx.shadowBlur=14; ctx.shadowColor=this.glow;
            const r=this.radius||4;
            ctx.beginPath(); ctx.arc(this.x,this.y,r,0,Math.PI*2); ctx.fill();
            // Trail
            ctx.globalAlpha=0.3;
            ctx.beginPath(); ctx.arc(this.x-this.vx*2,this.y-this.vy*2,r*.6,0,Math.PI*2); ctx.fill();
        }
        ctx.shadowBlur=0; ctx.globalAlpha=1; ctx.restore();
    }
}

// ─── Laser / warning line state (per turret/sniper) ──────────────────────────
let activeLaserBeams=[]; // {x1,y1,x2,y2,life,maxLife,color,glow}

function castEnemyRay(ox,oy,angle,maxLen){
    const dx=Math.cos(angle), dy=Math.sin(angle);
    for(let i=8;i<maxLen;i+=5){
        const cx=ox+dx*i, cy=oy+dy*i;
        const t=map[Math.floor(cy/TILE_SIZE)]?.[Math.floor(cx/TILE_SIZE)];
        if(t===T_WALL||t===T_VOID) return{x:cx,y:cy};
        if(Math.hypot(cx-player.x,cy-player.y)<player.size) return{x:player.x,y:player.y,hitPlayer:true};
    }
    return{x:ox+dx*maxLen,y:oy+dy*maxLen};
}

// ─── Melee hit check (call from swing/thrust fire fns) ────────────────────────
function meleeHitEnemies(x,y,angle,arcSpan,range,dmg){
    damageSourceIsPlayer=true;
    for(const e of enemies){
        if(e.dead) continue;
        const d=Math.hypot(e.x-x,e.y-y);
        if(d>range+e.size) continue;
        const angleToE=Math.atan2(e.y-y,e.x-x);
        let diff=angleToE-angle;
        while(diff>Math.PI) diff-=Math.PI*2;
        while(diff<-Math.PI) diff+=Math.PI*2;
        if(Math.abs(diff)<arcSpan/2+0.15) e.takeDamage(dmg);
    }
    // Also hit boss
    if(activeBoss && !activeBoss.dead){
        const d=Math.hypot(activeBoss.x-x,activeBoss.y-y);
        if(d<=range+activeBoss.size){
            const angleToB=Math.atan2(activeBoss.y-y,activeBoss.x-x);
            let diff2=angleToB-angle;
            while(diff2>Math.PI) diff2-=Math.PI*2;
            while(diff2<-Math.PI) diff2+=Math.PI*2;
            if(Math.abs(diff2)<arcSpan/2+0.15) activeBoss.takeDamage(dmg, x+Math.cos(angle)*range, y+Math.sin(angle)*range);
        }
    }
}

// ─── Thrust hit check: narrow capsule sweep, once-per-thrust-per-enemy ────────
// Also checks if the ray passes through the enemy's weakpoint — if so, 2× damage.
function thrustCheckEnemies(ox, oy, angle, reach, dmg, hitboxR){
    damageSourceIsPlayer=true;
    hitboxR = hitboxR || 15;
    const dx = Math.cos(angle), dy = Math.sin(angle);
    for(const e of enemies){
        if(e.dead) continue;
        if(wState.thrustHitSet.has(e)) continue;
        // Project enemy center onto the thrust ray [0..reach]
        const t = Math.max(0, Math.min(reach, (e.x-ox)*dx + (e.y-oy)*dy));
        const cx = ox + dx*t, cy = oy + dy*t;
        if(Math.hypot(e.x-cx, e.y-cy) < e.size + hitboxR){
            const wpHit = rayHitsWeakpoint(e, ox, oy, angle, reach);
            e.takeDamage(wpHit ? dmg*2 : dmg);
            if(wpHit) triggerWeakpointEffect(e);
            wState.thrustHitSet.add(e);
        }
    }
    // Also hit boss
    if(activeBoss&&!activeBoss.dead){
        const bt=Math.max(0,Math.min(reach,(activeBoss.x-ox)*dx+(activeBoss.y-oy)*dy));
        const bcx=ox+dx*bt, bcy=oy+dy*bt;
        if(Math.hypot(activeBoss.x-bcx,activeBoss.y-bcy)<activeBoss.size+hitboxR)
            activeBoss.takeDamage(dmg, bcx, bcy);
    }
}

// ─── Weakpoint helpers ──────────────────────────────────────────────────
const WP_RADIUS = 10; // hit radius of the red weakpoint circle

function getWeakpointPos(e){
    const def=ENEMY_DEFS[e.type];
    if(!def||!def.wpOffset) return {x:e.x,y:e.y};
    const wpox=def.wpOffset.x, wpoy=def.wpOffset.y;
    return {
        x: e.x + wpox*Math.cos(e.angle) - wpoy*Math.sin(e.angle),
        y: e.y + wpox*Math.sin(e.angle) + wpoy*Math.cos(e.angle)
    };
}

// True spatial check: is point (ax,ay) inside the weakpoint circle?
function isWeakpointHit(e, ax, ay, tolerance){
    const wp=getWeakpointPos(e);
    return Math.hypot(ax-wp.x, ay-wp.y) < (tolerance||WP_RADIUS);
}

// True spatial check for a ray: does the thrust/beam line pass through the weakpoint?
function rayHitsWeakpoint(e, ox, oy, angle, reach){
    const wp=getWeakpointPos(e);
    const dx=Math.cos(angle), dy=Math.sin(angle);
    const t=Math.max(0, Math.min(reach, (wp.x-ox)*dx + (wp.y-oy)*dy));
    return Math.hypot(wp.x-(ox+dx*t), wp.y-(oy+dy*t)) < WP_RADIUS;
}

// True spatial check for a line segment: does this segment pass through the weakpoint?
function segmentHitsWeakpoint(e, x1, y1, x2, y2){
    const wp=getWeakpointPos(e);
    const segLen=Math.hypot(x2-x1,y2-y1);
    if(segLen<1) return false;
    const t=Math.max(0,Math.min(1,((wp.x-x1)*(x2-x1)+(wp.y-y1)*(y2-y1))/(segLen*segLen)));
    return Math.hypot(wp.x-(x1+t*(x2-x1)), wp.y-(y1+t*(y2-y1))) < WP_RADIUS;
}

// Shared weakpoint visual + audio feedback (call after dealing 2× damage)
function triggerWeakpointEffect(e){
    const wp=getWeakpointPos(e);
    for(let i=0;i<20;i++){
        const a=Math.random()*Math.PI*2, sp=3+Math.random()*6;
        particles.push(new Particle(wp.x,wp.y,Math.cos(a)*sp,Math.sin(a)*sp,24,4,'spark'));
    }
    // Bright red ring burst
    camera.x+=(Math.random()-.5)*8; camera.y+=(Math.random()-.5)*8;
    spawnDamageText(wp.x,wp.y-e.size-16,'WEAKPOINT!!!','#ff2222');
}

// ─── Projectile enemy hit ────────────────────────────────────────────────────
function checkProjectileEnemyHits(proj){
    if(!proj.alive) return;
    // Shards manage their own enemy-stick collision inside Projectile.update().
    // If we also handle them here we'll kill them the same frame they first stick.
    if(proj.kind==='shard') return;

    // Track pierce hits so each enemy is only hit once per projectile frame
    if(!proj._pierceHit) proj._pierceHit=new Set();

    for(const e of enemies){
        if(e.dead) continue;
        if(proj._pierceHit.has(e)) continue;
        if(e.type==='spike_worm'&&e.state==='burrowed') continue;
        const hitR=(proj.sizeScale||1)*(e.size+4);
        const d=Math.hypot(proj.x-e.x,proj.y-e.y);
        if(d<hitR){
            // ── Cannon: trigger full area explosion on enemy contact ──
            if(proj.kind==='cannon'){
                const wpRayHit=rayHitsWeakpoint(e,
                    proj.prevX!==undefined?proj.prevX:proj.x,
                    proj.prevY!==undefined?proj.prevY:proj.y,
                    Math.atan2(proj.vy,proj.vx), Math.hypot(proj.vx,proj.vy)*2+e.size*2);
                damageSourceIsPlayer=true;
                proj.explode(); // deals radial blast damage + sets alive=false
                if(wpRayHit) triggerWeakpointEffect(e);
                return; // explode already cleaned up
            }

            let dmg=5;
            if(proj.kind==='minigun') dmg=4;
            else if(proj.kind==='pulse_s') dmg=4;
            else if(proj.kind==='pellet') dmg=5;
            else if(proj.kind==='pulse') dmg=15;
            else if(proj.kind==='sniper') dmg=40;

            // Ray from the bullet's previous position along its travel direction —
            // covers the full path through the enemy rather than just the tiny per-frame step,
            // so central weakpoints (e.g. wpOffset 0,0) are reliably detected.
            const wpHit=rayHitsWeakpoint(e,
                proj.prevX!==undefined?proj.prevX:proj.x,
                proj.prevY!==undefined?proj.prevY:proj.y,
                Math.atan2(proj.vy,proj.vx), Math.hypot(proj.vx,proj.vy)*2+e.size*2);
            if(wpHit){ dmg*=2; triggerWeakpointEffect(e);
                if(proj.kind==='pulse'){
                    const wp=WEAPONS[currentWeapon];
                    wp.ammo=Math.min(wp.maxAmmo,wp.ammo+1);
                    spawnDamageText(proj.x,proj.y-18,'+1 AMMO',wp.color);
                    for(let i=0;i<8;i++){
                        const a=Math.atan2(e.y-player.y,e.x-player.x)+(Math.random()-.5)*Math.PI*.5;
                        particles.push(new Particle(proj.x,proj.y,Math.cos(a)*2.5,Math.sin(a)*2.5,14,3,'spark'));
                    }
                }
            }
            damageSourceIsPlayer=true;
            e.takeDamage(dmg);
            if(proj.onHitPlayer) proj.onHitPlayer();

            // ── Piercing: track hit enemy, keep projectile alive ──────────────
            if(proj.pierce && proj.pierceRemaining > 0){
                proj._pierceHit.add(e);
                proj.pierceRemaining--;
                // show pierce spark
                for(let i=0;i<5;i++){
                    const a=Math.random()*Math.PI*2;
                    particles.push(new Particle(proj.x,proj.y,Math.cos(a)*2,Math.sin(a)*2,8,2,'spark'));
                }
                continue; // keep looping through enemies
            }

            // ── Normal kill ────────────────────────────────────────────────────
            if(proj.kind!=='sniper'||!proj.pierce) proj.alive=false;
            break;
        }
    }
    // ── Also check active boss ─────────────────────────────────────────────
    if(proj.alive && activeBoss && !activeBoss.dead){
        const d=Math.hypot(proj.x-activeBoss.x,proj.y-activeBoss.y);
        if(d < activeBoss.size+6){
            let dmg=5;
            if(proj.kind==='minigun') dmg=4;
            else if(proj.kind==='pulse_s') dmg=4;
            else if(proj.kind==='pellet') dmg=5;
            else if(proj.kind==='pulse') dmg=15;
            else if(proj.kind==='sniper') dmg=40;
            damageSourceIsPlayer=true;
            activeBoss.takeDamage(dmg, proj.x, proj.y);
            proj.alive=false;
        }
    }
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function updateEnemies(){
    activeLaserBeams=activeLaserBeams.filter(b=>b.life>0);
    activeLaserBeams.forEach(b=>b.life--);

    enemyProjectiles=enemyProjectiles.filter(p=>p.alive);
    enemyProjectiles.forEach(p=>p.update());

    // Check player projectile → enemy hits
    for(const p of projectiles) checkProjectileEnemyHits(p);
    for(const p of enemyProjectiles){} // already done in EnemyProjectile.update

    enemies=enemies.filter(e=>!(e.dead&&e.deathTimer<=0));
    for(const e of enemies){
        e.age++;
        if(e.dead){ e.deathTimer--; continue; }
        if(e.atkTimer>0) e.atkTimer--;

        // Apply knockback velocity (from weapons like Titan Greatsword, Impact Pike)
        if(e.vx!==0||e.vy!==0){
            const nx=e.x+e.vx, ny=e.y+e.vy;
            const kt=map[Math.floor(ny/TILE_SIZE)]?.[Math.floor(nx/TILE_SIZE)];
            if(kt!==T_WALL&&kt!==T_VOID){ e.x=nx; e.y=ny; }
            e.vx*=0.78; e.vy*=0.78;
            if(Math.abs(e.vx)<0.05) e.vx=0;
            if(Math.abs(e.vy)<0.05) e.vy=0;
        }

        // Aim toward player
        e.aimAngle=Math.atan2(player.y-e.y,player.x-e.x);
        const distToPlayer=Math.hypot(player.x-e.x,player.y-e.y);

        activeEnemyDmgMult = e.eliteDmgMult || 1;
        switch(e.type){
            case 'test_drone':       updateTestDrone(e,distToPlayer); break;
            case 'laser_turret':     updateLaserTurret(e,distToPlayer); break;
            case 'security_charger': updateSecurityCharger(e,distToPlayer); break;
            case 'reactor_drone':    updateReactorDrone(e,distToPlayer); break;
            case 'spark_mine':       updateSparkMine(e,distToPlayer); break;
            case 'sniper_node':      updateSniperNode(e,distToPlayer); break;
            case 'scout_crawler':    updateScoutCrawler(e,distToPlayer); break;
            case 'radiation_emitter':updateRadiationEmitter(e,distToPlayer); break;
            case 'heavy_charger':    updateHeavyCharger(e,distToPlayer); break;
            case 'sludge_beast':     updateSludgeBeast(e,distToPlayer); break;
            case 'spike_worm':       updateSpikeWorm(e,distToPlayer); break;
            case 'prototype_sentinel':updatePrototypeSentinel(e,distToPlayer); break;
            case 'pulse_emitter':    updatePulseEmitter(e,distToPlayer); break;
            case 'mutant_core':      updateMutantCore(e,distToPlayer); break;
            case 'plasma_orbiter':   updatePlasmaOrbiter(e,distToPlayer); break;
            case 'war_automaton':    updateWarAutomaton(e,distToPlayer); break;
            case 'phase_stalker':    updatePhaseStalker(e,distToPlayer); break;
            case 'lunar_drone':      updateLunarDrone(e,distToPlayer); break;
            case 'solar_warden':     updateSolarWarden(e,distToPlayer); break;
            case 'dust_strider':     updateDustStrider(e,distToPlayer); break;
            case 'training_dummy':   break; // no AI — stands still, never attacks
        }

        // Push enemy out of walls
        const et=map[Math.floor(e.y/TILE_SIZE)]?.[Math.floor(e.x/TILE_SIZE)];
        if(et===T_WALL||et===T_VOID){
            e.x+=Math.cos(e.angle+Math.PI)*e.speed*2;
            e.y+=Math.sin(e.angle+Math.PI)*e.speed*2;
        }
    }
}

// ─── Individual AI update functions ──────────────────────────────────────────
// ── Smart movement: handles wall-stuck detection, wall-sliding, backtracking,
//    and occasional sideways strafing to prevent enemies bunching up. ──────────
function moveEnemyToward(e, tx, ty, spd){
    // ── Initialise nav state lazily on first call ─────────────────────────────
    if(e._navMode === undefined){
        e._navMode      = 'direct';  // 'direct' | 'slide' | 'backtrack'
        e._navTimer     = 0;         // frames spent in current non-direct mode
        e._stuckTimer   = 0;         // frames without meaningful progress
        e._lastX        = e.x;
        e._lastY        = e.y;
        e._slideDir     = 1;         // +1 or -1: which side to slide along
        e._strafeTimer  = 0;         // frames of current strafe phase
        e._strafeDir    = 0;         // -1, 0, +1 lateral offset factor
        e._strafePhase  = Math.floor(Math.random() * 90); // stagger across enemies
        e._staggerSeed  = Math.floor(Math.random() * 60); // fixed per-enemy offset
    }

    // ── Strafe oscillation (runs regardless of nav mode) ─────────────────────
    // Every ~120–180 frames, briefly drift sideways instead of dead-ahead.
    e._strafePhase++;
    if(e._strafeTimer > 0){
        e._strafeTimer--;
        if(e._strafeTimer === 0) e._strafeDir = 0;
    } else if(e._strafePhase > 120 + e._staggerSeed){
        e._strafePhase = 0;
        // 30% chance to strafe for a short burst
        if(Math.random() < 0.30){
            e._strafeDir   = Math.random() < 0.5 ? -1 : 1;
            e._strafeTimer = 14 + Math.floor(Math.random() * 18);
        }
    }

    // ── Stuck detection ───────────────────────────────────────────────────────
    const movedSq = (e.x - e._lastX) ** 2 + (e.y - e._lastY) ** 2;
    if(movedSq < 0.04){           // threshold: less than ~0.2 px per frame
        e._stuckTimer++;
    } else {
        e._stuckTimer = Math.max(0, e._stuckTimer - 2);
    }
    e._lastX = e.x; e._lastY = e.y;

    // If stuck long enough and still in direct mode → switch strategy
    if(e._stuckTimer > 5 && e._navMode === 'direct'){
        e._navMode    = Math.random() < 0.55 ? 'slide' : 'backtrack';
        e._navTimer   = (60 + Math.floor(Math.random() * 75)) / e.speed;
        e._slideDir   = Math.random() < 0.5 ? 1 : -1;
        e._stuckTimer = 0;
    }

    // Count down non-direct mode, return to direct when done
    if(e._navMode !== 'direct'){
        e._navTimer--;
        if(e._navTimer <= 0){
            e._navMode    = 'direct';
            e._stuckTimer = 0;
        }
    }

    // ── Compute movement direction based on mode ───────────────────────────────
    const idealAngle = Math.atan2(ty - e.y, tx - e.x);
    let moveAngle;

    if(e._navMode === 'direct'){
        moveAngle = idealAngle;
    } else if(e._navMode === 'slide'){
        // Slide perpendicular to the ideal direction along the wall face
        moveAngle = idealAngle + e._slideDir * Math.PI * 0.5;
        // Blend slightly toward target so the enemy curves around corners
        moveAngle = idealAngle + e._slideDir * (Math.PI * 0.45 + 0.08 * Math.sin(e._navTimer * 0.25));
    } else { // backtrack
        // Move away from target briefly, then the stuck timer will reset
        moveAngle = idealAngle + Math.PI + e._slideDir * 0.4;
    }

    // ── Apply optional strafe offset ──────────────────────────────────────────
    if(e._strafeDir !== 0 && e._navMode === 'direct'){
        moveAngle += e._strafeDir * 0.52;   // ~30° sideways lean
    }

    // ── Attempt to move; try axis-separated sliding on wall contact ───────────
    const mx = Math.cos(moveAngle) * spd;
    const my = Math.sin(moveAngle) * spd;

    const canX = map[Math.floor(e.y / TILE_SIZE)]?.[Math.floor((e.x + mx) / TILE_SIZE)];
    const canY = map[Math.floor((e.y + my) / TILE_SIZE)]?.[Math.floor(e.x / TILE_SIZE)];
    const canXY = map[Math.floor((e.y + my) / TILE_SIZE)]?.[Math.floor((e.x + mx) / TILE_SIZE)];

    const freeX  = canX  !== T_WALL && canX  !== T_VOID;
    const freeY  = canY  !== T_WALL && canY  !== T_VOID;
    const freeXY = canXY !== T_WALL && canXY !== T_VOID;

    if(freeX && freeY && freeXY){
        e.x += mx; e.y += my;
    } else if(freeX){
        e.x += mx;
    } else if(freeY){
        e.y += my;
    }
    // No movement at all → stuckTimer keeps climbing until mode switches

    // Always orient toward actual target for aiming purposes
    e.angle += (idealAngle - e.angle) * 0.12;
}

function updatePhaseStalker(e,d){
    const v=e.vars;

    // ── Teleport execution (mid-frame dash) ──────────────────────────────────
    if(v.stalkerTeleporting){
        v.stalkerTeleportTimer--;
        v.stalkerGlitch=1; // full glitch during teleport wind-up
        if(v.stalkerTeleportTimer<=0){
            // Snap to target position
            e.x=v.stalkerTeleportTargetX;
            e.y=v.stalkerTeleportTargetY;
            v.stalkerTeleporting=false;
            v.stalkerGlitch=0;
            v.stalkerStrikeTimer=10; // brief window to deal melee damage
            // Particles at arrival
            for(let i=0;i<12;i++){
                const a=Math.random()*Math.PI*2, sp=2+Math.random()*5;
                particles.push(new Particle(e.x,e.y,Math.cos(a)*sp,Math.sin(a)*sp,18,3,'surge'));
            }
        }
        return; // don't move while teleporting
    }

    // ── Strike window (just arrived after teleport) ──────────────────────────
    if(v.stalkerStrikeTimer>0){
        v.stalkerStrikeTimer--;
        v.stalkerVisible=true;
        v.stalkerAlpha=Math.min(1,v.stalkerAlpha+0.15);
        // Deal melee damage if close enough
        if(Math.hypot(e.x-player.x,e.y-player.y)<e.size+player.size+8){
            damageSourceIsPlayer=false;
            hurtPlayer(12);
            spawnDamageText(player.x,player.y-player.size-28,'PHASE STRIKE!',e.color);
            player.momentumX+=Math.cos(e.aimAngle)*5;
            player.momentumY+=Math.sin(e.aimAngle)*5;
            v.stalkerStrikeTimer=0; // only hit once per teleport
        }
        if(v.stalkerStrikeTimer<=0){
            e.atkTimer=e.atkCooldown; // cooldown before next teleport
        }
        return;
    }

    // ── Idle/stalking — invisible, slowly follows ────────────────────────────
    v.stalkerVisible=false;
    // Drift toward alpha=0 (invisible) except for faint glitch ripple
    v.stalkerAlpha=Math.max(0,v.stalkerAlpha-0.04);

    // Slow pursuit while invisible
    e.angle+=(e.aimAngle-e.angle)*0.04;
    if(d>40) moveEnemyToward(e,player.x,player.y,e.speed*0.55);

    // Random ambient glitch pulses (telegraph presence)
    if(Math.random()<0.015) v.stalkerGlitch=1;
    if(v.stalkerGlitch>0) v.stalkerGlitch=Math.max(0,v.stalkerGlitch-0.08);

    // ── Teleport decision — when close enough and cooldown done ──────────────
    if(d<e.atkRange && e.atkTimer<=0){
        // Wind-up flicker (telegraph)
        v.stalkerGlitch=1;
        // Target = just next to player, on the approach angle
        const teleportDist=e.size+player.size+6;
        v.stalkerTeleportTargetX=player.x+Math.cos(e.aimAngle+Math.PI)*teleportDist;
        v.stalkerTeleportTargetY=player.y+Math.sin(e.aimAngle+Math.PI)*teleportDist;
        v.stalkerTeleporting=true;
        v.stalkerTeleportTimer=18; // 18-frame wind-up gives player time to react
        // Leave a distortion ripple at origin
        for(let i=0;i<8;i++){
            const a=Math.random()*Math.PI*2, sp=1+Math.random()*3;
            particles.push(new Particle(e.x,e.y,Math.cos(a)*sp,Math.sin(a)*sp,14,2,'surge'));
        }
    }
}

// ── Lunar Drone — drifts in arcs, fires slow curving projectiles ──────────────

    e.vars.lunarDriftPhase += 0.018;
    const driftAngle = e.aimAngle + Math.sin(e.vars.lunarDriftPhase) * 1.2;
    e.vars.lunarDriftAngle += (driftAngle - e.vars.lunarDriftAngle) * 0.04;
    if(d > 50) moveEnemyToward(e,
        e.x + Math.cos(e.vars.lunarDriftAngle) * 60,
        e.y + Math.sin(e.vars.lunarDriftAngle) * 60,
        e.speed * 0.8);
    e.angle += (e.aimAngle - e.angle) * 0.04;

    // Fire slow curving projectile — stored with a curve angle offset
    if(d < e.atkRange && e.atkTimer <= 0){
        e.atkTimer = e.atkCooldown;
        const spread = (Math.random() - 0.5) * 0.35;
        const a = e.aimAngle + spread;
        const proj = new EnemyProjectile(
            e.x, e.y,
            Math.cos(a) * 2.2, Math.sin(a) * 2.2,
            3, 5, e.color, e.glow, 'lunar_curve'
        );
        proj.curveStrength = 0.018 + Math.random() * 0.012;
        proj.curveDir = Math.random() < 0.5 ? 1 : -1;
        proj.age = 0;
        enemyProjectiles.push(proj);
    }
}
